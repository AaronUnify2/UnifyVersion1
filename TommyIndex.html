<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tommy's Storybook Shelf</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { width:100%; min-height:100%;
    font-family:"Comic Sans MS","Chalkboard SE","Marker Felt","Trebuchet MS",sans-serif; }
  body {
    background:linear-gradient(#cdeaf7 0%, #e9f4d9 55%, #b9d77f 100%);
    background-attachment:fixed;
    padding-bottom:60px;
    overflow-x:hidden;
    position:relative;
  }

  /* ---- sun ---- */
  #sun {
    position:fixed; top:26px; right:30px; width:84px; height:84px; border-radius:50%;
    background:radial-gradient(circle at 40% 35%, #ffe98a, #ffcc33 70%);
    box-shadow:0 0 40px #ffd54faa, 0 0 90px #ffd54f55;
    animation:sunSpin 24s linear infinite; z-index:0;
  }
  #sun::before {
    content:""; position:absolute; inset:-18px; border-radius:50%;
    background:
      repeating-conic-gradient(#ffd54f66 0deg 8deg, transparent 8deg 30deg);
    -webkit-mask:radial-gradient(circle, transparent 55%, #000 56%);
            mask:radial-gradient(circle, transparent 55%, #000 56%);
  }
  @keyframes sunSpin { to { transform:rotate(360deg); } }

  /* ---- drifting clouds ---- */
  .cloud {
    position:fixed; top:0; left:-30vw; z-index:0; pointer-events:none;
    width:150px; height:48px; background:#ffffffee; border-radius:999px;
    animation:drift linear infinite;
  }
  .cloud::before, .cloud::after {
    content:""; position:absolute; background:inherit; border-radius:50%;
  }
  .cloud::before { width:60px; height:60px; left:24px; top:-28px; }
  .cloud::after  { width:44px; height:44px; left:74px; top:-18px; }
  .cloud.c1 { top:8vh;  transform:scale(1);   animation-duration:65s; }
  .cloud.c2 { top:18vh; transform:scale(.7);  animation-duration:90s; animation-delay:-40s; opacity:.85; }
  .cloud.c3 { top:4vh;  transform:scale(.55); animation-duration:110s; animation-delay:-70s; opacity:.7; }
  @keyframes drift { from { left:-30vw; } to { left:110vw; } }

  /* ---- header ---- */
  header { position:relative; z-index:2; text-align:center; padding:42px 16px 10px; }
  header .cast { font-size:clamp(26px,7vw,40px); letter-spacing:4px; }
  header h1 {
    font-family:Georgia,'Times New Roman',serif; color:#b35a10;
    font-size:clamp(32px,9vw,56px); line-height:1.1; margin:10px 0 8px;
    text-shadow:0 3px 0 #ffffff88;
  }
  header p {
    color:#6b5230; font-family:Georgia,serif; font-style:italic;
    font-size:clamp(15px,4.4vw,19px);
  }

  /* ---- story shelf ---- */
  #shelf {
    position:relative; z-index:2;
    width:min(94vw, 900px); margin:26px auto 0;
    display:grid; grid-template-columns:repeat(auto-fill, minmax(min(44vw,190px), 1fr));
    gap:18px;
  }
  .story {
    display:flex; flex-direction:column; align-items:center; text-align:center;
    text-decoration:none; padding:18px 12px 16px;
    background:#FFF8E4; border:3px solid #7a5230; border-radius:18px;
    box-shadow:0 5px 0 #00000022;
    color:#46310f;
    transition:transform .12s, box-shadow .12s;
    animation:bookBob 2.6s ease-in-out infinite;
  }
  .story:nth-child(3n+2) { animation-delay:.4s; }
  .story:nth-child(3n)   { animation-delay:.8s; }
  @keyframes bookBob { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
  .story:hover, .story:focus-visible {
    transform:translateY(-4px) scale(1.03);
    box-shadow:0 9px 0 #00000022, 0 14px 20px #0002;
    animation:none;
  }
  .story:active { transform:translateY(2px) scale(.99); box-shadow:0 2px 0 #00000022; }
  .story:focus-visible { outline:4px solid #ffd54f; outline-offset:3px; }

  .story .pic {
    font-size:clamp(44px,12vw,60px); line-height:1;
    filter:drop-shadow(0 3px 3px #0002);
    margin-bottom:10px;
  }
  .story .name {
    font-weight:bold; font-size:clamp(16px,4.4vw,19px); line-height:1.25;
    min-height:2.5em; display:flex; align-items:center;
  }
  .story .play {
    margin-top:10px; padding:8px 22px; border-radius:999px;
    background:linear-gradient(#ffa14f,#ec7016); color:#fff; font-weight:bold;
    font-size:clamp(14px,3.8vw,17px); letter-spacing:.3px;
    box-shadow:0 4px 0 #a8470a; text-shadow:0 2px 0 #0002;
  }
  .story:active .play { box-shadow:0 1px 0 #a8470a; transform:translateY(2px); }

  /* ---- grassy hills at the bottom ---- */
  #hills { position:fixed; left:0; right:0; bottom:0; height:90px; z-index:1; pointer-events:none; }
  #hills::before, #hills::after {
    content:""; position:absolute; bottom:-70px; border-radius:50%;
  }
  #hills::before { left:-15%; width:75%; height:150px; background:#8fbf58; }
  #hills::after  { right:-15%; width:80%; height:160px; background:#7cb04a; }

  footer {
    position:relative; z-index:2; text-align:center; margin:34px 0 40px;
    color:#6b5230; font-family:Georgia,serif; font-style:italic;
    font-size:clamp(13px,3.8vw,16px);
  }

  @media (prefers-reduced-motion: reduce) {
    .story, #sun, .cloud { animation:none; }
  }
</style>
</head>
<body>

<div id="sun"></div>
<div class="cloud c1"></div>
<div class="cloud c2"></div>
<div class="cloud c3"></div>

<header>
  <div class="cast">👦🐷🐔🐐🐄🚀</div>
  <h1>Tommy's Storybook Shelf</h1>
  <p>Pick a story to play!</p>
</header>

<main id="shelf" aria-label="Story list"></main>

<footer>Made with love, for Tommy ❤️</footer>
<div id="hills"></div>

<script>
/* ============================================================
   EDIT YOUR STORIES HERE
   - emoji : the big picture on the card
   - title : the story name shown to Tommy
   - url   : the link to the story page
   New stories: just add a new line — the shelf builds itself.
   ============================================================ */
const STORIES = [
  { emoji:"🎈", title:"TommyPop",                    url:"https://aaronunify2.github.io/UnifyVersion1/Kids/TommyPop.html" },
  { emoji:"🚀", title:"Tommy Goes to Space",         url:"https://aaronunify2.github.io/UnifyVersion1/TommySpace.html" },
  { emoji:"🐷", title:"Three Little Pigs",           url:"https://aaronunify2.github.io/UnifyVersion1/TommyPig.html" },
  { emoji:"🐔", title:"The Little Red Hen",          url:"https://aaronunify2.github.io/UnifyVersion1/TommyHen.html" },
  { emoji:"🐐", title:"Three Billy Goats Gruff",     url:"https://aaronunify2.github.io/UnifyVersion1/TommyGoat.html" },
  { emoji:"☀️", title:"Help Dad Install the Solar",  url:"https://aaronunify2.github.io/UnifyVersion1/TommySolar.html" },
  { emoji:"🐄", title:"The Day Dad Got the Cows",    url:"https://aaronunify2.github.io/UnifyVersion1/TommyCows.html" },
  { emoji:"🥕", title:"Mum and the Giant Carrot",    url:"https://aaronunify2.github.io/UnifyVersion1/TommyCarrot.html" },
  { emoji:"🧠", title:"Anki Cards",                  url:"https://aaronunify2.github.io/UnifyVersion1/Kids/AnkiCards.html" },
];

const shelf = document.getElementById('shelf');
STORIES.forEach(s => {
  const a = document.createElement('a');
  a.className = 'story';
  a.href = s.url;
  a.innerHTML =
    '<div class="pic">' + s.emoji + '</div>' +
    '<div class="name">' + s.title + '</div>' +
    '<div class="play">Play ▸</div>';
  shelf.appendChild(a);
});
</script>

</body>
</html>
