            const satRing = new THREE.Mesh(new THREE.RingGeometry(1300, 2150, 96),
                new THREE.MeshBasicMaterial({ color: 0xd5ccb5, side: THREE.DoubleSide, transparent: true, opacity: 0.5, fog: false, depthWrite: false }));
            satRing.position.copy(sat.position);
            satRing.rotation.x = Math.PI / 2 + 0.42; satRing.rotation.y = 0.25;
            g.add(satRing);
            // faint warm Saturn-shine
            const tgt2 = new THREE.Object3D(); g.add(tgt2);
            const satShine = new THREE.DirectionalLight(0xd8c8a0, 0.25);
            satShine.position.copy(sat.position).normalize().multiplyScalar(900);
            satShine.target = tgt2; g.add(satShine);
            // Tiger stripes: glowing blue cracks in the ice
            const stripeMat = new THREE.MeshBasicMaterial({ color: 0x66bbff, transparent: true, opacity: 0.55 });
            const stripeSpots = [[-90, -260, 0.4], [40, -330, -0.25], [170, -250, 0.7], [-220, -360, -0.6]];
            stripeSpots.forEach(s => {
                const st = new THREE.Mesh(new THREE.PlaneGeometry(9, 480), stripeMat);
                st.rotation.x = -Math.PI / 2; st.rotation.z = s[2];
                st.position.set(s[0], 0.1, s[1]);
                g.add(st);
            });
            // Geysers on three of the stripes
            [[-90, -260], [40, -330], [170, -250]].forEach(spot => {
                const count = 130;
                const pos = new Float32Array(count * 3);
                const base = { bx: new Float32Array(count), bz: new Float32Array(count), vy: new Float32Array(count) };
                for (let i = 0; i < count; i++) {
                    base.bx[i] = (Math.random() - 0.5) * 8;
                    base.bz[i] = (Math.random() - 0.5) * 8;
                    base.vy[i] = 2.4 + Math.random() * 2.2;
                    pos[i * 3] = base.bx[i]; pos[i * 3 + 1] = Math.random() * 850; pos[i * 3 + 2] = base.bz[i];
                }
                const pg = new THREE.BufferGeometry();
                pg.setAttribute('position', new THREE.BufferAttribute(pos, 3));
                const pts = new THREE.Points(pg, new THREE.PointsMaterial({
                    color: 0xdfeeff, size: 6, sizeAttenuation: true, transparent: true,
                    opacity: 0.8, depthWrite: false, blending: THREE.AdditiveBlending
                }));
                pts.position.set(spot[0], 0, spot[1]);
                g.add(pts);
                encGeysers.push({ pts, base, count, x: spot[0], z: spot[1] });
            });
        },
        update(dt, time) {
            let dNear = Infinity;
            encGeysers.forEach(gz => {
                const arr = gz.pts.geometry.attributes.position.array;
                for (let i = 0; i < gz.count; i++) {
                    let y = arr[i * 3 + 1] + gz.base.vy[i];
                    if (y > 880) y = 0;
                    arr[i * 3 + 1] = y;
                    const spread = 1 + y / 220;
                    arr[i * 3] = gz.base.bx[i] * spread;
                    arr[i * 3 + 2] = gz.base.bz[i] * spread;
                }
                gz.pts.geometry.attributes.position.needsUpdate = true;
                dNear = Math.min(dNear, Math.hypot(gz.x - surfLocalPos.x, gz.z - surfLocalPos.z));
            });
            this._dGeyser = dNear;
        },
        status() {
            actionBtn.style.display = 'none';
            if (this._dGeyser < 80) {
                lockText.innerText = "GEYSER FIELD"; lockText.style.color = "#bfe4ff";
                proxText.innerText = "OCEAN SPRAY FROM UNDER THE ICE — IT'S SNOWING UPWARD";
            } else {
                lockText.innerText = "ENCELADUS"; lockText.style.color = "#dfeeff";
                proxText.innerText = "ITS GEYSERS BUILT ONE OF SATURN'S RINGS";
            }
        },
        placeShip() {
            const t = Date.now();
            saturnP.grp.position.x = Math.cos(saturnP.angle + t * saturnP.orbitSpeed) * saturnP.dist;
            saturnP.grp.position.z = Math.sin(saturnP.angle + t * saturnP.orbitSpeed) * saturnP.dist;
            const en = saturnP.moons[0];
            const ma = (t - (en.pause || 0)) * en.speed;
            en.mesh.position.x = Math.cos(ma) * en.orbitR;
            en.mesh.position.z = Math.sin(ma) * en.orbitR;
            systemGroup.updateMatrixWorld(true);
            en.mesh.getWorldPosition(europaWorld);
            camera.position.copy(europaWorld);
            camera.position.y += 200 + 250;
        }
    };

    /* ---------------- JUPITER: there is no ground ---------------- */
    let diveStart = 0;
    const diveReturnPos = new THREE.Vector3();
    const diveColA = new THREE.Color(0xc4956a), diveColB = new THREE.Color(0x1a0e04);
    function startJupiterDive() {
        gamePhase = 'jupiterdive';
        diveStart = Date.now();
        diveReturnPos.copy(camera.position);
        actionBtn.style.display = 'none';
    }

    /* ================================================================
       GAME LOOP
       ================================================================ */
    const tempVec = new THREE.Vector3(), screenVec = new THREE.Vector3();
    let lastFrameT = Date.now();

    function animate() {
        requestAnimationFrame(animate);
        const time = Date.now();
        const dt = Math.min(100, time - lastFrameT);
        lastFrameT = time;

        // Show/hide HUD toggle + sky speed button
        hudToggle.style.display = (gamePhase === 'space' || gamePhase === 'launching') ? 'flex' : 'none';
        skySpeedBtn.style.display = (gamePhase === 'ground') ? 'flex' : 'none';
        if (gamePhase !== 'space') cometLabel.style.opacity = '0';
        if (gamePhase === 'ground') {
            hudEl.classList.remove('active'); hudEnabled = false;
            hudToggle.classList.remove('hud-on'); hudToggle.textContent = '⬡';
        }

        /* ======== GROUND PHASE ======== */
        if (gamePhase === 'ground') {
            systemGroup.rotation.x = GROUND_TILT;
            planets.forEach(p => p.label.style.opacity = '0');

            const walkFwd = new THREE.Vector3(-Math.sin(camYaw), 0, -Math.cos(camYaw));
            const walkRight = new THREE.Vector3(Math.cos(camYaw), 0, -Math.sin(camYaw));
            if (Math.abs(input.y) > 0.05) groundLocalPos.addScaledVector(walkFwd, -input.y * WALK_SPEED);
            if (Math.abs(input.x) > 0.05) groundLocalPos.addScaledVector(walkRight, input.x * WALK_SPEED);
            groundLocalPos.y = 5;
            groundLocalPos.x = Math.max(-850, Math.min(850, groundLocalPos.x));
            groundLocalPos.z = Math.max(-850, Math.min(850, groundLocalPos.z));

            // Orbit planets
            planets.forEach(p => {
                if (p.dist > 0) {
                    p.grp.position.x = Math.cos(p.angle + time * p.orbitSpeed) * p.dist;
                    p.grp.position.z = Math.sin(p.angle + time * p.orbitSpeed) * p.dist;
                }
                p.mesh.rotation.y += 0.001;
                if (p.cloudMesh) p.cloudMesh.rotation.y += 0.0013;
                if (p.moonMesh) {
                    const md = p.radius * MOON_ORBIT_RADIUS_MULT, ms = -time * 0.00005;
                    p.moonMesh.position.x = Math.cos(ms) * md;
                    p.moonMesh.position.z = Math.sin(ms) * md;
                    p.moonMesh.rotation.y = -ms + Math.PI;
                }
            });

            earthSpawn.grp.getWorldPosition(earthWorldPos);
            groundGroup.position.set(earthWorldPos.x, earthWorldPos.y + GROUND_Y_OFFSET, earthWorldPos.z);
            camera.position.set(earthWorldPos.x + groundLocalPos.x, earthWorldPos.y + GROUND_Y_OFFSET + groundLocalPos.y, earthWorldPos.z + groundLocalPos.z);
            camera.rotation.order = "YXZ"; camera.rotation.y = camYaw; camera.rotation.x = camPitch;

            const dtr = Math.sqrt(groundLocalPos.x * groundLocalPos.x + (groundLocalPos.z + 80) * (groundLocalPos.z + 80));
            nearRocket = dtr < ROCKET_INTERACT_DIST;
            if (nearRocket) {
                actionBtn.style.display = 'flex'; actionBtn.innerText = "LAUNCH";
                lockText.innerText = "ROCKET READY"; lockText.style.color = "#00ffcc";
                proxText.innerText = "BOARD & LAUNCH";
            } else {
                actionBtn.style.display = 'none';
                lockText.innerText = "EXPLORE"; lockText.style.color = "#00aa88";
                proxText.innerText = "WALK TO THE ROCKET";
            }

            // Day/night cycle, moon phases & solar eclipses
            updateGroundSky(dt);

            renderer.render(scene, camera);
            return;
        }

        /* ======== EUROPA SURFACE PHASE ======== */
        if (gamePhase === 'europa') {
            planets.forEach(p => p.label.style.opacity = '0');
            scene.background = europaBg;
            scene.fog = europaFog;

            // Walk on the ice
            const walkFwd = new THREE.Vector3(-Math.sin(camYaw), 0, -Math.cos(camYaw));
            const walkRight = new THREE.Vector3(Math.cos(camYaw), 0, -Math.sin(camYaw));
            if (Math.abs(input.y) > 0.05) europaLocalPos.addScaledVector(walkFwd, -input.y * WALK_SPEED);
            if (Math.abs(input.x) > 0.05) europaLocalPos.addScaledVector(walkRight, input.x * WALK_SPEED);
            europaLocalPos.y = 5;
            europaLocalPos.x = Math.max(-900, Math.min(900, europaLocalPos.x));
            europaLocalPos.z = Math.max(-900, Math.min(900, europaLocalPos.z));
            camera.position.copy(EUROPA_POS).add(europaLocalPos);
            camera.rotation.order = "YXZ"; camera.rotation.y = camYaw; camera.rotation.x = camPitch;

            // Ambient motion: the drill turns, Jupiter slowly rotates
            if (drillShaft) drillShaft.rotation.y += 0.06;
            if (europaJupiter) europaJupiter.rotation.y += 0.0004;

            // Proximity checks
            const dEl = Math.hypot(europaLocalPos.x - ELEV_X, europaLocalPos.z - (ELEV_Z + 8));
            const dSh = Math.hypot(europaLocalPos.x - 0, europaLocalPos.z - 95);
            nearElevator = dEl < 34;
            nearShip = !nearElevator && dSh < 36;
            if (nearElevator) {
                actionBtn.style.display = 'flex'; actionBtn.innerText = "DESCEND";
                lockText.innerText = "DRILL SITE"; lockText.style.color = "#66ccff";
                proxText.innerText = "RIDE THE ELEVATOR DOWN THROUGH THE ICE";
            } else if (nearShip) {
                actionBtn.style.display = 'flex'; actionBtn.innerText = "RETURN TO ORBIT";
                lockText.innerText = "SHIP READY"; lockText.style.color = "#00ffcc";
                proxText.innerText = "BOARD YOUR ROCKET";
            } else {
                actionBtn.style.display = 'none';
                lockText.innerText = "EUROPA SURFACE"; lockText.style.color = "#aaddff";
                proxText.innerText = "EXPLORE THE ICE STATION";
            }

            renderer.render(scene, camera);
            return;
        }

        /* ======== ELEVATOR TRANSIT (descend / ascend) ======== */
        if (gamePhase === 'descending' || gamePhase === 'ascending') {
            planets.forEach(p => p.label.style.opacity = '0');
            const goingDown = gamePhase === 'descending';
            const dur = goingDown ? DESCENT_MS : ASCENT_MS;
            const t = Math.min(1, (time - transT) / dur);
            const k0 = goingDown ? t : 1 - t;          // 0 = surface, 1 = ocean
            const k = k0 * k0 * (3 - 2 * k0);          // smoothstep

            const topY = EUROPA_POS.y + 5;
            const botY = oceanOrigin.y - 120;
            camera.position.set(EUROPA_POS.x + ELEV_X, topY + k * (botY - topY), EUROPA_POS.z + ELEV_Z);
            camera.rotation.order = "YXZ"; camera.rotation.y = camYaw; camera.rotation.x = camPitch;

            // Crossfade between the two scenes through the dark of the ice
            europaGroup.visible = k < 0.55;
            oceanGroup.visible = k > 0.35;
            tmpColA.copy(europaBg).lerp(oceanBg, Math.min(1, k * 1.3));
            scene.background = tmpColA;
            tmpColB.set(0x02030a).lerp(new THREE.Color(0x03242e), k);
            scene.fog = new THREE.Fog(tmpColB.clone(), 40, 300 + (1 - Math.abs(k - 0.5) * 2) * -200 + 900);

            const depthM = Math.max(0, Math.round((topY - camera.position.y) * 12));
            lockText.innerText = goingDown ? "DESCENDING" : "ASCENDING";
            lockText.style.color = "#66ccff";
            proxText.innerText = (k < 0.5 ? "DRILLING THROUGH THE ICE SHELL — " : "LIQUID WATER OCEAN — ") + depthM.toLocaleString() + " M";

            if (t >= 1) {
                if (goingDown) {
                    gamePhase = 'ocean';
                    subPos.set(ELEV_X, -120, ELEV_Z);
                    ambientLight.color.setHex(0x335577); ambientLight.intensity = 0.55;
                    subLight.intensity = 1.3;
                    europaGroup.visible = false; oceanGroup.visible = true;
                } else {
                    gamePhase = 'europa';
                    europaLocalPos.set(ELEV_X, 5, ELEV_Z + 24);
                    ambientLight.color.setHex(0x6677aa); ambientLight.intensity = 0.5;
                    europaGroup.visible = true; oceanGroup.visible = false;
                }
            }

            renderer.render(scene, camera);
            return;
        }

        /* ======== OCEAN PHASE (submarine mode) ======== */
        if (gamePhase === 'ocean') {
            planets.forEach(p => p.label.style.opacity = '0');
            scene.background = oceanBg;
            scene.fog = oceanFog;

            camera.rotation.order = "YXZ"; camera.rotation.y = camYaw; camera.rotation.x = camPitch;
            const fwd = new THREE.Vector3(0, 0, -1).applyEuler(camera.rotation);
            const right = new THREE.Vector3(1, 0, 0).applyEuler(camera.rotation);
            if (Math.abs(input.y) > 0.05) subPos.addScaledVector(fwd, -input.y * SUB_SPEED);
            if (Math.abs(input.x) > 0.05) subPos.addScaledVector(right, input.x * SUB_SPEED);
            if (input.up) subPos.y += SUB_SPEED;
            if (input.down) subPos.y -= SUB_SPEED;
            subPos.x = Math.max(-2400, Math.min(2400, subPos.x));
            subPos.z = Math.max(-2400, Math.min(2400, subPos.z));
            subPos.y = Math.max(OCEAN_FLOOR_Y + 40, Math.min(-30, subPos.y));
            camera.position.copy(oceanOrigin).add(subPos);

            // Headlight follows the sub
            subLight.position.copy(camera.position).addScaledVector(fwd, 40);

            // Marine snow stays around the sub (grid-snapped so flakes feel fixed in the water)
            if (snowPts) snowPts.position.set(
                Math.round(subPos.x / 350) * 350,
                Math.round(subPos.y / 350) * 350,
                Math.round(subPos.z / 350) * 350);

            // Bioluminescent drifters
            for (let i = 0; i < bioGlows.length; i++) {
                const b = bioGlows[i], u = b.userData;
                b.position.set(
                    u.base.x + Math.sin(time * 0.00022 + u.seed) * 90,
                    u.base.y + Math.sin(time * 0.00031 + u.seed * 2) * 50,
                    u.base.z + Math.cos(time * 0.00018 + u.seed) * 90);
                b.material.opacity = 0.45 + 0.4 * Math.sin(time * 0.001 + u.seed * 3);
            }

            // Pulsing guide column back to the elevator
            if (shaftBeaconMat) shaftBeaconMat.opacity = 0.3 + 0.25 * Math.sin(time * 0.004);

            // The creature: a slow patrol loop through the vent field
            let dCre = Infinity;
            if (creature) {
                const cx = 300 + Math.sin(time * 0.00006) * 900;
                const cy = Math.max(OCEAN_FLOOR_Y + 160, Math.min(-140, -800 + Math.sin(time * 0.000045 + 2) * 330));
                const cz = -200 + Math.cos(time * 0.00005) * 900;
                creature.position.set(cx, cy, cz);
                // face along its path
                tempVec.set(
                    300 + Math.sin((time + 500) * 0.00006) * 900,
                    Math.max(OCEAN_FLOOR_Y + 160, Math.min(-140, -800 + Math.sin((time + 500) * 0.000045 + 2) * 330)),
                    -200 + Math.cos((time + 500) * 0.00005) * 900
                ).add(oceanOrigin);
                creature.lookAt(tempVec);

                // jelly breathing
                const pulse = 1 + 0.07 * Math.sin(time * 0.004);
                creatureBell.scale.set(pulse, 0.8 * (2 - pulse), 1.15 * pulse);
                creatureCore.scale.setScalar(0.85 + 0.25 * Math.sin(time * 0.004 + 1));
                creatureLight.intensity = 0.7 + 0.5 * Math.sin(time * 0.004 + 1);

                // it notices you: running lights speed up when you're close
                creature.getWorldPosition(tempVec);
                dCre = camera.position.distanceTo(tempVec);
                const excited = dCre < 240 ? 2.2 : 1;
                for (let i = 0; i < creatureRimLights.length; i++) {
                    creatureRimLights[i].material.opacity = 0.35 + 0.6 * (0.5 + 0.5 * Math.sin(time * 0.004 * excited - i * 0.7));
                }

                // fins flap, tentacles ripple
                creatureFinL.rotation.z = 0.45 + Math.sin(time * 0.003) * 0.35;
                creatureFinR.rotation.z = -0.45 - Math.sin(time * 0.003) * 0.35;
                for (let i = 0; i < creatureTentacles.length; i++) {
                    const tn = creatureTentacles[i];
                    for (let j = 0; j < tn.segs.length; j++) {
                        tn.segs[j].position.set(
                            tn.rootX + Math.sin(time * 0.0025 + tn.seed + j * 0.55) * (j * 1.3),
                            tn.rootY - j * 7 + Math.sin(time * 0.002 + tn.seed * 2 + j * 0.4) * (j * 0.8),
                            tn.rootZ - j * 4.5
                        );
                    }
                }
            }

            // Surface option near the cable
            const dShaft = Math.hypot(subPos.x - ELEV_X, subPos.z - ELEV_Z);
            nearShaft = dShaft < 90;
            const depthM = Math.round((EUROPA_POS.y + 5 - camera.position.y) * 12);
            if (nearShaft) {
                actionBtn.style.display = 'flex'; actionBtn.innerText = "SURFACE";
                lockText.innerText = "ELEVATOR CABLE"; lockText.style.color = "#44ffee";
                proxText.innerText = "RETURN TO THE SURFACE — DEPTH " + depthM.toLocaleString() + " M";
            } else if (dCre < 300) {
                actionBtn.style.display = 'none';
                lockText.innerText = "BIO-SIGNATURE"; lockText.style.color = "#aaffee";
                proxText.innerText = "UNKNOWN LIFEFORM DETECTED — " + Math.round(dCre * 12).toLocaleString() + " M";
            } else {
                actionBtn.style.display = 'none';
                lockText.innerText = "SUBMARINE MODE"; lockText.style.color = "#66ddff";
                proxText.innerText = "EUROPA OCEAN — DEPTH " + depthM.toLocaleString() + " M";
            }

            renderer.render(scene, camera);
            return;
        }

        /* ======== GENERIC SURFACE PHASE ======== */
        if (gamePhase === 'surface' && SURFACE.current) {
            const def = SURFACE.current;
            planets.forEach(p => p.label.style.opacity = '0');
            scene.background = def.bg;
            scene.fog = def.fog;

            const walkFwd = new THREE.Vector3(-Math.sin(camYaw), 0, -Math.cos(camYaw));
            const walkRight = new THREE.Vector3(Math.cos(camYaw), 0, -Math.sin(camYaw));
            if (Math.abs(input.y) > 0.05) surfLocalPos.addScaledVector(walkFwd, -input.y * WALK_SPEED);
            if (Math.abs(input.x) > 0.05) surfLocalPos.addScaledVector(walkRight, input.x * WALK_SPEED);
            surfLocalPos.y = 5;
            surfLocalPos.x = Math.max(-900, Math.min(900, surfLocalPos.x));
            surfLocalPos.z = Math.max(-900, Math.min(900, surfLocalPos.z));
            camera.position.copy(def.pos).add(surfLocalPos);
            camera.rotation.order = "YXZ"; camera.rotation.y = camYaw; camera.rotation.x = camPitch;

            def.update(dt, time);

            // SURFACE.current may have been cleared mid-update (Venus emergency ascent)
            if (gamePhase !== 'surface') { renderer.render(scene, camera); return; }

            const dSh = Math.hypot(surfLocalPos.x - 0, surfLocalPos.z - 95);
            nearSurfShip = dSh < 36;
            if (nearSurfShip) {
                actionBtn.style.display = 'flex'; actionBtn.innerText = "RETURN TO ORBIT";
                lockText.innerText = "SHIP READY"; lockText.style.color = "#00ffcc";
                proxText.innerText = "BOARD YOUR ROCKET";
            } else {
                def.status();
            }

            renderer.render(scene, camera);
            return;
        }

        /* ======== JUPITER DIVE: pressure, clouds, and no bottom ======== */
        if (gamePhase === 'jupiterdive') {
            planets.forEach(p => p.label.style.opacity = '0');
            const t = Math.min(1, (time - diveStart) / 12000);
            const d = Math.sin(t * Math.PI);            // down, then back up
            camera.position.copy(diveReturnPos);
            camera.position.y -= d * 5000;
            camera.position.x += (Math.random() - 0.5) * d * 7;
            camera.position.z += (Math.random() - 0.5) * d * 7;
            camera.rotation.order = "YXZ"; camera.rotation.y = camYaw; camera.rotation.x = camPitch;

            tmpColA.copy(diveColA).lerp(diveColB, Math.min(1, d * 1.25));
            scene.background = tmpColA;
            scene.fog = new THREE.Fog(tmpColA.clone(), 40, 300 + (1 - d) * 40000);

            const pressure = Math.round(1 + d * d * 9000);
            if (t < 0.2) { lockText.innerText = "DESCENDING"; lockText.style.color = "#ffcc66"; proxText.innerText = "ENTERING CLOUD TOPS — LOOKING FOR THE GROUND..."; }
            else if (t < 0.5) { lockText.innerText = "PRESSURE: " + pressure.toLocaleString() + " BAR"; lockText.style.color = "#ff8844"; proxText.innerText = "STILL NO GROUND. ONLY CLOUDS, ALL THE WAY DOWN."; }
            else if (t < 0.7) { lockText.innerText = "NO SURFACE DETECTED"; lockText.style.color = "#ff4422"; proxText.innerText = "JUPITER HAS NO FLOOR — ABORTING"; }
            else { lockText.innerText = "ASCENDING"; lockText.style.color = "#00ffcc"; proxText.innerText = "CLIMBING BACK TO THE SKY"; }

            if (t >= 1) {
                gamePhase = 'space';
                camera.position.copy(diveReturnPos);
                scene.background = spaceBlack;
                scene.fog = null;
            }

            renderer.render(scene, camera);
            return;
        }

        /* ======== LAUNCH PHASE ======== */
        if (gamePhase === 'launching') {
            planets.forEach(p => p.label.style.opacity = '0');
            const elapsed = time - launchTimer;
            const t = Math.min(1, elapsed / LAUNCH_DURATION);
            systemGroup.rotation.x = GROUND_TILT * (1 - t * t);

            planets.forEach(p => {
                if (p.dist > 0) {
                    p.grp.position.x = Math.cos(p.angle + time * p.orbitSpeed) * p.dist;
                    p.grp.position.z = Math.sin(p.angle + time * p.orbitSpeed) * p.dist;
                }
                p.mesh.rotation.y += 0.001;
                if (p.cloudMesh) p.cloudMesh.rotation.y += 0.0013;
            });

            earthSpawn.grp.getWorldPosition(earthWorldPos);
            const launchAccel = t * t * t;
            const launchStartY = earthWorldPos.y + GROUND_Y_OFFSET + 5;
            const launchEndY = earthWorldPos.y + earthSpawn.radius + 5000;
            camera.position.set(earthWorldPos.x, launchStartY + launchAccel * (launchEndY - launchStartY), earthWorldPos.z);
            camPitch = Math.PI / 2;
            camera.rotation.order = "YXZ"; camera.rotation.y = camYaw; camera.rotation.x = camPitch;

            // Speed lines
            speedLineGroup.visible = true;
            speedLineGroup.position.copy(camera.position);
            const scrollSpeed = (0.5 + launchAccel * 20) * 2;
            speedLineData.forEach(sd => {
                const pos = sd.line.geometry.attributes.position.array;
                pos[1] -= scrollSpeed; pos[4] -= scrollSpeed;
                if (pos[1] < -SPEED_LINE_HEIGHT) { pos[1] += SPEED_LINE_HEIGHT * 2; pos[4] = pos[1] - sd.len; }
                sd.line.geometry.attributes.position.needsUpdate = true;
                sd.line.material.opacity = Math.min(0.8, t * 2) * (0.3 + launchAccel * 0.7);
            });

            // Sky transition (starts from whatever the ground sky looked like:
            // launch at night and you climb out of darkness into starlight)
            const skyColor = new THREE.Color();
            skyColor.copy(launchStartSky).lerp(spaceBlack, t * t);
            scene.background = skyColor;
            if (t < 0.8) {
                const fogColor = new THREE.Color();
                fogColor.copy(launchStartSky).lerp(spaceBlack, t);
                scene.fog = new THREE.Fog(fogColor, 400 + t * 10000, 1200 + t * 50000);
            } else {
                scene.fog = null;
            }

            // Status text
            if (t < 0.3) proxText.innerText = "3... 2... 1... LIFTOFF!";
            else if (t < 0.5) { proxText.innerText = "MAX THRUST"; lockText.innerText = "ASCENDING"; lockText.style.color = "#ff8800"; }
            else if (t < 0.8) { proxText.innerText = "LEAVING ATMOSPHERE"; lockText.innerText = "ALTITUDE WARNING"; lockText.style.color = "#ffcc00"; }
            else { proxText.innerText = "ORBIT ACHIEVED"; lockText.innerText = "SYSTEM ONLINE"; lockText.style.color = "#00ffcc"; }

            // HUD data during launch
            hudData.speed = launchAccel * config.deepSpaceSpeed;
            hudData.altitude = launchAccel * (earthSpawn.radius + 5000);
            hudData.heading = camYaw * 180 / Math.PI;
            hudData.targetName = 'ORBIT'; hudData.targetDist = 0;
            hudData.nearPlanet = false; hudData.planets = [];
            updateHUD();

            // Transition to space
            if (t >= 1) {
                gamePhase = 'space';
                systemGroup.rotation.x = 0;
                speedLineGroup.visible = false;
                scene.remove(speedLineGroup);
                speedLineGroup.traverse(c => { if (c.material) c.material.dispose(); if (c.geometry) c.geometry.dispose(); });

                if (earthSpawn) {
                    earthSpawn.mesh.visible = true;
                    if (earthSpawn.cloudMesh) earthSpawn.cloudMesh.visible = true;
                    earthSpawn.grp.children.forEach(c => { if (c.userData && c.userData.isAtmosphere) c.visible = true; });
                }
                scene.remove(groundGroup);
                groundGroup.traverse(c => {
                    if (c.material) { if (c.material.map) c.material.map.dispose(); c.material.dispose(); }
                    if (c.geometry) c.geometry.dispose();
                });

                const ep = earthSpawn.grp.position;
                camera.position.set(ep.x, ep.y + earthSpawn.radius + 5000, ep.z);
                camPitch = -0.3; landedPlanet = null;
                scene.fog = null; scene.background = spaceBlack;
            }

            renderer.render(scene, camera);
            return;
        }

        /* ======== SPACE PHASE ======== */
        systemGroup.rotation.x = 0;
        let closestDist = Infinity, closestP = null, isLocked = false;

        planets.forEach(p => {
            const prev = p.grp.position.clone();
            if (p.dist > 0) {
                p.grp.position.x = Math.cos(p.angle + time * p.orbitSpeed) * p.dist;
                p.grp.position.z = Math.sin(p.angle + time * p.orbitSpeed) * p.dist;
            }
            p.mesh.rotation.y += 0.001;
            if (p.cloudMesh) p.cloudMesh.rotation.y += 0.0013;
            if (p.moonMesh) {
                const md = p.radius * MOON_ORBIT_RADIUS_MULT, ms = -(time - earthMoonPause) * 0.00005;
                p.moonMesh.position.x = Math.cos(ms) * md;
                p.moonMesh.position.z = Math.sin(ms) * md;
                p.moonMesh.rotation.y = -ms + Math.PI;
            }
            if (p.moons && p.moons.length > 0) {
                p.moons.forEach(moon => {
                    const ma = (time - (moon.pause || 0)) * moon.speed;
                    moon.mesh.position.x = Math.cos(ma) * moon.orbitR;
                    moon.mesh.position.z = Math.sin(ma) * moon.orbitR;
                    moon.mesh.rotation.y = -ma + Math.PI;
                });
            }

            p.mesh.getWorldPosition(tempVec);
            const dc = camera.position.distanceTo(tempVec);
            const ds = dc - p.radius;
            if (ds < closestDist) { closestDist = ds; closestP = p; }

            const delta = p.grp.position.clone().sub(prev);
            if (!isNaN(delta.x) && (landedPlanet === p || (!landedPlanet && ds < config.lockDist))) {
                camera.position.add(delta); isLocked = true;
            }

            // Labels
            if (ds < 80000) {
                p.label.style.opacity = '0';
            } else {
                tempVec.project(camera);
                if (tempVec.z < 1 && Math.abs(tempVec.x) < 1 && Math.abs(tempVec.y) < 1) {
                    screenVec.set(tempVec.x, tempVec.y, 0.5);
                    raycaster.setFromCamera(screenVec, camera);
                    const its = raycaster.intersectObjects(systemGroup.children, true);
                    if (its.length > 0 && its[0].object.name === "PM_" + p.name) {
                        p.label.style.left = (tempVec.x * 0.5 + 0.5) * canvas.clientWidth + 'px';
                        p.label.style.top = (tempVec.y * -0.5 + 0.5) * canvas.clientHeight + 'px';
                        p.label.style.opacity = '1';
                        p.label.querySelector('.label-dist').innerText = Math.floor(ds).toLocaleString() + ' u';
                    } else { p.label.style.opacity = '0'; }
                } else { p.label.style.opacity = '0'; }
            }
        });

        // Europa proximity: hold the moon still while we're close, offer landing
        nearEuropa = false;
        if (jupiterP && jupiterP.moons[1] && !landedPlanet) {
            const eu = jupiterP.moons[1];
            eu.mesh.getWorldPosition(europaWorld);
            const edist = camera.position.distanceTo(europaWorld) - EUROPA_RADIUS;
            if (edist < 3000) eu.pause = (eu.pause || 0) + dt;
            if (edist < 600) nearEuropa = true;
        }

        // The Moon (Earth's): hold still nearby, offer landing
        nearMoonBody = false;
        if (earthSpawn && earthSpawn.moonMesh && !landedPlanet) {
            earthSpawn.moonMesh.getWorldPosition(europaWorld);
            const mdist = camera.position.distanceTo(europaWorld) - 270;
            if (mdist < 3000) earthMoonPause += dt;
            if (mdist < 600) nearMoonBody = true;
        }

        // Enceladus: same deal
        nearEnceladus = false;
        if (saturnP && saturnP.moons[0] && !landedPlanet) {
            const en = saturnP.moons[0];
            en.mesh.getWorldPosition(europaWorld);
            const ndist = camera.position.distanceTo(europaWorld) - 200;
            if (ndist < 3000) en.pause = (en.pause || 0) + dt;
            if (ndist < 600) nearEnceladus = true;
        }

        // Comet Tommy-1
        updateComet(time);

        nearestPlanet = (closestDist < 1200 && !landedPlanet) ? closestP : null;

        if (landedPlanet) {
            actionBtn.style.display = 'flex'; actionBtn.innerText = "TAKEOFF";
            lockText.innerText = "SURFACE LOCK"; lockText.style.color = "#00ffcc";
            proxText.innerText = 'LOCATION: ' + landedPlanet.name;
        } else if (nearEuropa) {
            actionBtn.style.display = 'flex'; actionBtn.innerText = "LAND ON EUROPA";
            lockText.innerText = "ICE MOON APPROACH"; lockText.style.color = "#aaddff";
            proxText.innerText = 'EUROPA RESEARCH STATION BELOW';
        } else if (nearMoonBody) {
            actionBtn.style.display = 'flex'; actionBtn.innerText = "LAND ON THE MOON";
            lockText.innerText = "LUNAR APPROACH"; lockText.style.color = "#ccccdd";
            proxText.innerText = 'TRANQUILITY BASE BELOW';
        } else if (nearEnceladus) {
            actionBtn.style.display = 'flex'; actionBtn.innerText = "LAND ON ENCELADUS";
            lockText.innerText = "GEYSER MOON APPROACH"; lockText.style.color = "#bfe4ff";
            proxText.innerText = 'WATER PLUMES DETECTED BELOW';
        } else if (cometDist < 9000) {
            actionBtn.style.display = 'none';
            lockText.innerText = "COMET FLYBY"; lockText.style.color = "#aaddff";
            proxText.innerText = "ITS TAIL ALWAYS POINTS AWAY FROM THE SUN";
        } else if (nearestPlanet) {
            actionBtn.style.display = 'flex'; actionBtn.innerText = "LAND";
            lockText.innerText = "ORBITAL INSERTION"; lockText.style.color = "#ffff00";
            proxText.innerText = 'READY TO LAND ON ' + nearestPlanet.name;
        } else {
            actionBtn.style.display = 'none';
            if (isLocked) {
                lockText.innerText = "GRAVITY WELL"; lockText.style.color = "#00ffcc";
                proxText.innerText = 'APPROACHING ' + closestP.name;
            } else {
                lockText.innerText = "SYSTEM ONLINE"; lockText.style.color = "#00aa88";
                proxText.innerText = "DEEP SPACE CRUISE";
            }
        }

        // Speed
        let targetSpeed = 0;
        if (landedPlanet) targetSpeed = config.minSpeed;
        else {
            targetSpeed = closestDist * 0.005;
            if (targetSpeed > config.deepSpaceSpeed) targetSpeed = config.deepSpaceSpeed;
            if (targetSpeed < config.minSpeed) targetSpeed = config.minSpeed;
        }
        if (isNaN(targetSpeed)) targetSpeed = config.minSpeed;
        currentSpeed = targetSpeed;

        // Movement
        const fwd = new THREE.Vector3(0, 0, -1).applyEuler(camera.rotation);
        const right = new THREE.Vector3(1, 0, 0).applyEuler(camera.rotation);
        const up = new THREE.Vector3(0, 1, 0);
        if (Math.abs(input.y) > 0.05) camera.position.addScaledVector(fwd, -input.y * targetSpeed);
        if (Math.abs(input.x) > 0.05) camera.position.addScaledVector(right, input.x * targetSpeed);
        if (input.up) camera.position.addScaledVector(up, targetSpeed);
        if (input.down) camera.position.addScaledVector(up, -targetSpeed);
        camera.rotation.order = "YXZ"; camera.rotation.y = camYaw; camera.rotation.x = camPitch;

        // Earth atmosphere effect
        const earthP = planets.find(p => p.name === "EARTH");
        if (earthP) {
            const ew = new THREE.Vector3(); earthP.mesh.getWorldPosition(ew);
            const ed = camera.position.distanceTo(ew) - earthP.radius;

            // Eclipse in space
            let eclipse = 0;
            const sunPlanet = planets.find(p => p.name === "SUN");
            if (sunPlanet && earthP.moonMesh && ed < atmosphereHeight) {
                const sw = new THREE.Vector3(); sunPlanet.mesh.getWorldPosition(sw);
                const mw = new THREE.Vector3(); earthP.moonMesh.getWorldPosition(mw);
                const toSun = sw.clone().sub(camera.position).normalize();
                const toMoon = mw.clone().sub(camera.position).normalize();
                const alignment = toSun.dot(toMoon);
                const moonDist = camera.position.distanceTo(mw);
                const sunDist = camera.position.distanceTo(sw);
                const moonAng = (earthP.moonMesh.geometry.parameters.radius || 270) / moonDist;
                const sunAng = sunPlanet.radius / sunDist;
                const totalAng = moonAng + sunAng;
                const overlapThresh = 1 - (totalAng * totalAng) / 2;
                if (alignment > overlapThresh && moonDist < sunDist) {
                    const totalityThresh = 1 - ((moonAng - sunAng) * (moonAng - sunAng)) / 2;
                    const coverage = (alignment - overlapThresh) / (totalityThresh - overlapThresh);
                    eclipse = Math.min(1, Math.max(0, coverage));
                    eclipse = eclipse * eclipse;
                }
            }

            if (ed < atmosphereHeight) {
                let t2;
                if (ed <= skyFullHeight) t2 = 0;
                else { t2 = (ed - skyFullHeight) / (atmosphereHeight - skyFullHeight); t2 = Math.min(1, Math.max(0, t2)); t2 = t2 * t2; }

                const skyCol = new THREE.Color();
                if (eclipse > 0.01) {
                    skyCol.copy(skyBlue).lerp(spaceBlack, t2);
                    skyCol.lerp(new THREE.Color(0x0a0a18), eclipse);
                } else {
                    skyCol.copy(skyBlue).lerp(spaceBlack, t2);
                }
                scene.background = skyCol;

                if (t2 < 0.95) {
                    const fogCol = new THREE.Color();
                    fogCol.copy(skyHorizon).lerp(spaceBlack, t2);
                    if (eclipse > 0.01) fogCol.lerp(new THREE.Color(0x080810), eclipse);
                    const eclipseMult = 1 + eclipse * 8;
                    scene.fog = new THREE.Fog(fogCol, (500 + t2 * 50000) * eclipseMult, (50000 + t2 * 500000) * eclipseMult);
                } else { scene.fog = null; }
            } else {
                scene.background = spaceBlack;
                scene.fog = null;
            }
        }

        // Update HUD data
        hudData.speed = (Math.abs(input.y) > 0.05 || Math.abs(input.x) > 0.05 || input.up || input.down) ? currentSpeed : currentSpeed * 0.1;
        hudData.maxSpeed = config.deepSpaceSpeed;
        hudData.altitude = closestDist;
        hudData.heading = camYaw * 180 / Math.PI;
        hudData.targetName = closestP ? closestP.name : '---';
        hudData.targetDist = closestDist;
        hudData.nearPlanet = nearestPlanet !== null;

        // Radar data — sun-centered: planet positions relative to sun
        const sunWorld = new THREE.Vector3();
        planets[0].mesh.getWorldPosition(sunWorld); // SUN is index 0
        hudData.planets = planets.map(p => {
            const wp = new THREE.Vector3(); p.mesh.getWorldPosition(wp);
            const dx = wp.x - sunWorld.x, dz = wp.z - sunWorld.z;
            return { name: p.name, angle: Math.atan2(dz, dx), dist: Math.sqrt(dx * dx + dz * dz), isSun: p.name === 'SUN' };
        });
        // Player position relative to sun for radar triangle
        const camDx = camera.position.x - sunWorld.x, camDz = camera.position.z - sunWorld.z;
        hudData.playerRadarAngle = Math.atan2(camDz, camDx);
        hudData.playerSunDist = Math.sqrt(camDx * camDx + camDz * camDz);

        updateHUD();
        renderer.render(scene, camera);
    }

    animate();
    </script>
</body>
</html>
