<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Titan Scale: Textured</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Michroma&family=Share+Tech+Mono&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; touch-action: none; user-select: none; -webkit-user-select: none; }
        body { overflow: hidden; background: #000; font-family: 'Michroma', sans-serif; }
        
        #ui-layer { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 10; }
        
        /* Planet Labels */
        .planet-label {
            position: absolute; transform: translate(-50%, -50%);
            color: rgba(255, 255, 255, 0.8); font-size: 10px;
            text-align: center; pointer-events: none;
            text-shadow: 0 0 5px #000; transition: opacity 0.5s;
        }
        .label-name { font-weight: bold; color: #fff; letter-spacing: 1px; }
        .label-dist { font-size: 9px; color: #00ffcc; margin-top: 2px; }

        /* HUD */
        #hud-top { position: absolute; top: 30px; width: 100%; text-align: center; pointer-events: none; }
        #hud-bottom { position: absolute; bottom: 30px; width: 100%; text-align: center; pointer-events: none; }
        .hud-text { color: #00ffcc; font-size: 12px; letter-spacing: 2px; text-shadow: 0 0 10px rgba(0, 255, 204, 0.3); }
        .sub-text { color: #666; font-size: 10px; margin-top: 5px; text-transform: uppercase; }

        /* Sky status (time of day / moon phase) */
        #sky-status {
            color: #ffcc66; font-size: 10px; margin-top: 6px;
            letter-spacing: 1px; text-shadow: 0 0 8px rgba(0,0,0,0.8);
        }

        /* Action Button */
        #action-btn {
            position: absolute; top: 50%; right: 30px; transform: translateY(-50%);
            width: 80px; height: 80px; border-radius: 50%;
            border: 2px solid #00ffcc; color: #00ffcc;
            display: none; align-items: center; justify-content: center;
            font-size: 12px; font-weight: bold; background: rgba(0, 30, 30, 0.9);
            cursor: pointer; pointer-events: auto;
            box-shadow: 0 0 15px rgba(0, 255, 204, 0.3);
            animation: pulse 3s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 10px rgba(0,255,204,0.3); }
            50% { box-shadow: 0 0 20px rgba(0,255,204,0.6); }
            100% { box-shadow: 0 0 10px rgba(0,255,204,0.3); }
        }

        /* Controls */
        #controls { pointer-events: auto; }
        #stick-area {
            position: absolute; bottom: 40px; left: 40px; width: 120px; height: 120px;
            border-radius: 50%; border: 1px dashed rgba(255, 255, 255, 0.15);
        }
        #stick-thumb {
            width: 50px; height: 50px; background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.3); border-radius: 50%;
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
        }
        .btn {
            position: absolute; width: 70px; height: 70px; border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.2); color: #fff;
            display: flex; align-items: center; justify-content: center;
            font-size: 16px; background: rgba(0,0,0,0.5); backdrop-filter: blur(4px);
        }
        #btn-up { bottom: 130px; right: 30px; }
        #btn-down { bottom: 40px; right: 30px; }

        /* ============================== */
        /* SPACESHIP COCKPIT HUD          */
        /* ============================== */
        #cockpit-hud {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            pointer-events: none; z-index: 9;
            opacity: 0; transition: opacity 0.6s ease;
        }
        #cockpit-hud.active { opacity: 1; }

        #hud-toggle {
            position: fixed; top: 16px; right: 16px; z-index: 20;
            width: 44px; height: 44px; border-radius: 8px;
            border: 1px solid rgba(0,255,204,0.25); color: #00ffcc;
            display: none; align-items: center; justify-content: center;
            font-size: 18px; background: rgba(0,20,20,0.7);
            cursor: pointer; pointer-events: auto;
            backdrop-filter: blur(4px); transition: all 0.3s;
            font-family: 'Share Tech Mono', monospace;
        }
        #hud-toggle:hover { background: rgba(0,40,40,0.9); border-color: rgba(0,255,204,0.5); }
        #hud-toggle.hud-on { border-color: rgba(0,255,204,0.6); box-shadow: 0 0 8px rgba(0,255,204,0.3); }

        /* Sky time fast-forward (ground phase only) */
        #sky-speed {
            position: fixed; top: 16px; left: 16px; z-index: 20;
            min-width: 68px; height: 44px; border-radius: 8px; padding: 0 10px;
            border: 1px solid rgba(255,204,0,0.3); color: #ffcc00;
            display: none; align-items: center; justify-content: center;
            font-size: 13px; background: rgba(25,18,0,0.7);
            cursor: pointer; pointer-events: auto;
            backdrop-filter: blur(4px); transition: all 0.3s;
            font-family: 'Share Tech Mono', monospace;
        }
        #sky-speed:hover { background: rgba(45,34,0,0.9); border-color: rgba(255,204,0,0.55); }

        #cockpit-hud.active #scanlines {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,255,180,0.008) 2px, rgba(0,255,180,0.008) 4px);
            pointer-events: none;
        }

        #reticle { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 80px; height: 80px; }
        .hud-inst { font-family: 'Share Tech Mono', monospace; color: #00ffcc; text-shadow: 0 0 6px rgba(0,255,204,0.4); letter-spacing: 1px; }
        .hud-inst-warn { font-family: 'Share Tech Mono', monospace; color: #ff6633; text-shadow: 0 0 6px rgba(255,100,50,0.4); letter-spacing: 1px; }

        #hud-left-panel { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 8px; }
        #speed-gauge { width: 36px; height: 180px; position: relative; }
        #speed-gauge-bg { position: absolute; top: 0; left: 8px; width: 20px; height: 100%; border: 1px solid rgba(0,255,204,0.2); border-radius: 3px; overflow: hidden; }
        #speed-gauge-fill { position: absolute; bottom: 0; left: 0; width: 100%; height: 0%; background: linear-gradient(to top, #00ffcc, #00cc99); border-radius: 2px; transition: height 0.15s; box-shadow: 0 0 8px rgba(0,255,204,0.3); }
        #speed-gauge-label { position: absolute; bottom: -18px; left: 0; width: 36px; text-align: center; font-size: 8px; }
        #speed-gauge-value { position: absolute; top: -18px; left: 0; width: 36px; text-align: center; font-size: 10px; }
        .gauge-tick { position: absolute; left: 0; width: 6px; height: 1px; background: rgba(0,255,204,0.3); }



        #hud-right-panel { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); display: flex; flex-direction: column; gap: 6px; align-items: flex-end; }
        #target-readout { text-align: right; font-size: 9px; margin-top: 4px; }
        #target-label { font-size: 7px; opacity: 0.6; }
        #target-dist { font-size: 11px; margin-top: 2px; }
        #target-name { font-size: 12px; margin-top: 2px; color: #ffcc00; text-shadow: 0 0 6px rgba(255,204,0,0.3); }

        #radar-container { position: absolute; bottom: 24px; left: 50%; transform: translateX(-50%); width: 140px; height: 140px; }
        #radar-canvas { width: 140px; height: 140px; }
        #radar-label { text-align: center; font-size: 7px; margin-top: 2px; opacity: 0.5; }

        #hud-top-bar { position: absolute; top: 12px; left: 50%; transform: translateX(-50%); display: flex; gap: 30px; align-items: center; }
        #heading-readout { font-size: 11px; letter-spacing: 3px; }

        .corner-bracket { position: absolute; width: 60px; height: 60px; border-color: rgba(0,255,204,0.12); border-style: solid; }
        .corner-tl { top: 8px; left: 8px; border-width: 2px 0 0 2px; }
        .corner-tr { top: 8px; right: 8px; border-width: 2px 2px 0 0; }
        .corner-bl { bottom: 8px; left: 8px; border-width: 0 0 2px 2px; }
        .corner-br { bottom: 8px; right: 8px; border-width: 0 2px 2px 0; }

        #cockpit-vignette {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.35) 85%, rgba(0,0,0,0.7) 100%);
            pointer-events: none;
        }

        #proximity-warning {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, 60px);
            font-size: 11px; letter-spacing: 3px;
            opacity: 0; transition: opacity 0.3s;
        }
        #proximity-warning.visible { opacity: 1; animation: warnBlink 1s infinite; }
        @keyframes warnBlink { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>

    <button id="hud-toggle" title="Toggle Cockpit HUD (H)">⬡</button>
    <button id="sky-speed" title="Fast-forward time">⏩ ×1</button>

    <div id="ui-layer">
        <div id="labels-container"></div>
        <div id="hud-top">
            <div id="system-status" class="hud-text">EXPLORE</div>
            <div id="proximity-alert" class="sub-text">WALK TO THE ROCKET</div>
            <div id="sky-status"></div>
        </div>
        <div id="hud-bottom" style="display:none;">
            <div id="speed-readout" class="hud-text">THRUST: 0%</div>
        </div>

        <div id="controls">
            <div id="stick-area"><div id="stick-thumb"></div></div>

        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
    /* ================================================================
       TITAN SCALE: TEXTURED EDITION — WITH COCKPIT HUD
       + GROUND SKY: DAY/NIGHT CYCLE, MOON PHASES, SOLAR ECLIPSES
       ================================================================ */

    const config = {
        renderDist: 3000000000,
        lockDist: 40000,
        deepSpaceSpeed: 2500,
        minSpeed: 5,
        sunRadius: 5000
    };

    const canvas = document.getElementById('gameCanvas');
    const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, logarithmicDepthBuffer: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x4a90d9);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 1, config.renderDist);
    camera.up.set(0, 1, 0);

    const ambientLight = new THREE.AmbientLight(0x404040, 1.0);
    scene.add(ambientLight);
    const sunPointLight = new THREE.PointLight(0xffffff, 1.3, 0);
    scene.add(sunPointLight);

    const raycaster = new THREE.Raycaster();
    const systemGroup = new THREE.Group();
    scene.add(systemGroup);

    /* ================================================================
       COCKPIT HUD SYSTEM
       ================================================================ */
    let hudEnabled = false;
    const hudEl = document.getElementById('cockpit-hud');
    const hudToggle = document.getElementById('hud-toggle');
    const radarCanvas = document.getElementById('radar-canvas');
    const radarCtx = radarCanvas.getContext('2d');
    const reticleSpin = document.getElementById('reticle-spin');

    hudToggle.addEventListener('click', () => {
        hudEnabled = !hudEnabled;
        hudEl.classList.toggle('active', hudEnabled);
        hudToggle.classList.toggle('hud-on', hudEnabled);
        hudToggle.textContent = hudEnabled ? '⬢' : '⬡';
    });

    const hudData = {
        speed: 0, maxSpeed: 2500, altitude: 0, heading: 0,
        targetName: '---', targetDist: 0,
        nearPlanet: false, planets: [],
        maxOrbitDist: 2600000, // Neptune's orbit
        playerRadarAngle: 0, playerSunDist: 0
    };

    function updateHUD() {
        if (!hudEnabled) return;

        // Speed gauge
        const speedPct = Math.min(100, (hudData.speed / hudData.maxSpeed) * 100);
        document.getElementById('speed-gauge-fill').style.height = speedPct + '%';
        document.getElementById('speed-gauge-value').textContent = Math.floor(hudData.speed);

        // Heading
        const hdg = ((hudData.heading % 360) + 360) % 360;
        document.getElementById('heading-readout').textContent = 'HDG ' + String(Math.floor(hdg)).padStart(3, '0');

        // Target info
        document.getElementById('target-name').textContent = hudData.targetName;
        if (hudData.targetDist > 0) {
            const d = hudData.targetDist;
            const distStr = d > 1000000 ? (d / 1000000).toFixed(1) + 'M u'
                : d > 1000 ? (d / 1000).toFixed(1) + 'K u'
                : Math.floor(d) + ' u';
            document.getElementById('target-dist').textContent = distStr;
        } else {
            document.getElementById('target-dist').textContent = '---';
        }

        // Proximity warning
        document.getElementById('proximity-warning').classList.toggle('visible', hudData.nearPlanet);

        // Reticle spin
        const rot = (Date.now() * 0.02) % 360;
        reticleSpin.setAttribute('transform', 'rotate(' + rot + ' 40 40)');

        drawRadar();
    }

    function drawRadar() {
        const w = radarCanvas.width, h = radarCanvas.height;
        const cx = w / 2, cy = h / 2, r = cx - 10;
        radarCtx.clearRect(0, 0, w, h);

        // Background circle
        radarCtx.strokeStyle = 'rgba(0,255,204,0.12)';
        radarCtx.lineWidth = 1;
        radarCtx.beginPath(); radarCtx.arc(cx, cy, r, 0, Math.PI * 2); radarCtx.stroke();

        // Orbit rings (faint concentric circles for scale)
        radarCtx.strokeStyle = 'rgba(0,255,204,0.04)';
        for (let i = 1; i <= 5; i++) {
            radarCtx.beginPath(); radarCtx.arc(cx, cy, r * (i / 5), 0, Math.PI * 2); radarCtx.stroke();
        }

        // Cross hairs
        radarCtx.strokeStyle = 'rgba(0,255,204,0.06)';
        radarCtx.beginPath(); radarCtx.moveTo(cx, cy - r); radarCtx.lineTo(cx, cy + r); radarCtx.stroke();
        radarCtx.beginPath(); radarCtx.moveTo(cx - r, cy); radarCtx.lineTo(cx + r, cy); radarCtx.stroke();

        // Sweep line
        const sweepAngle = (Date.now() * 0.001) % (Math.PI * 2);
        radarCtx.strokeStyle = 'rgba(0,255,204,0.25)';
        radarCtx.lineWidth = 1.5;
        radarCtx.beginPath();
        radarCtx.moveTo(cx, cy);
        radarCtx.lineTo(cx + Math.cos(sweepAngle) * r, cy + Math.sin(sweepAngle) * r);
        radarCtx.stroke();

        // Sun at center (gold dot)
        radarCtx.fillStyle = '#ffcc00';
        radarCtx.shadowColor = '#ffcc00';
        radarCtx.shadowBlur = 8;
        radarCtx.beginPath(); radarCtx.arc(cx, cy, 4, 0, Math.PI * 2); radarCtx.fill();
        radarCtx.shadowBlur = 0;

        // Planet blips — positioned by their orbit around the sun
        hudData.planets.forEach(p => {
            if (p.isSun || p.dist <= 0) return;

            const normDist = Math.min(1, p.dist / hudData.maxOrbitDist);
            const px = cx + Math.cos(p.angle) * normDist * (r - 6);
            const py = cy + Math.sin(p.angle) * normDist * (r - 6);

            // Check within radar circle
            const dx2 = px - cx, dy2 = py - cy;
            if (Math.sqrt(dx2 * dx2 + dy2 * dy2) > r - 4) return;

            // Brightness based on sweep line proximity
            const blipAngle = Math.atan2(py - cy, px - cx);
            let angleDiff = sweepAngle - blipAngle;
            while (angleDiff < 0) angleDiff += Math.PI * 2;
            while (angleDiff > Math.PI * 2) angleDiff -= Math.PI * 2;
            const fade = angleDiff < Math.PI ? Math.max(0.15, 1 - angleDiff / Math.PI) : 0.15;

            // Draw blip
            const isNearest = p.name === hudData.targetName;
            const blipSize = isNearest ? 3.5 : 2.5;
            const blipColor = isNearest ? 'rgba(255,204,0,' + fade + ')' : 'rgba(0,255,180,' + fade + ')';
            radarCtx.fillStyle = blipColor;
            radarCtx.beginPath(); radarCtx.arc(px, py, blipSize, 0, Math.PI * 2); radarCtx.fill();

            // Labels for all visible planets
            if (fade > 0.3) {
                radarCtx.fillStyle = 'rgba(0,255,204,' + (fade * 0.6) + ')';
                radarCtx.font = '7px Share Tech Mono';
                radarCtx.fillText(p.name.slice(0, 3), px + 5, py - 3);
            }
        });

        // Player position indicator (small triangle on the edge pointing inward)
        if (hudData.playerRadarAngle !== undefined) {
            const pa = hudData.playerRadarAngle;
            const playerDist = Math.min(1, hudData.playerSunDist / hudData.maxOrbitDist);
            const ppx = cx + Math.cos(pa) * playerDist * (r - 6);
            const ppy = cy + Math.sin(pa) * playerDist * (r - 6);

            // Check within radar
            const pdx = ppx - cx, pdy = ppy - cy;
            if (Math.sqrt(pdx * pdx + pdy * pdy) <= r - 2) {
                radarCtx.fillStyle = 'rgba(0,255,204,0.7)';
                radarCtx.beginPath();
                const triSize = 4;
                const ta = Math.atan2(ppy - cy, ppx - cx) + Math.PI; // point toward sun
                radarCtx.moveTo(ppx + Math.cos(ta) * triSize, ppy + Math.sin(ta) * triSize);
                radarCtx.lineTo(ppx + Math.cos(ta + 2.4) * triSize * 0.7, ppy + Math.sin(ta + 2.4) * triSize * 0.7);
                radarCtx.lineTo(ppx + Math.cos(ta - 2.4) * triSize * 0.7, ppy + Math.sin(ta - 2.4) * triSize * 0.7);
                radarCtx.closePath(); radarCtx.fill();
            }
        }
    }

    /* ================================================================
       STAR FIELD
       ================================================================ */
    function createStarField() {
        const starCount = 6000;
        const positions = new Float32Array(starCount * 3);
        const colors = new Float32Array(starCount * 3);
        for (let i = 0; i < starCount; i++) {
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            const r = 800000000 + Math.random() * 200000000;
            positions[i * 3] = r * Math.sin(phi) * Math.cos(theta);
            positions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
            positions[i * 3 + 2] = r * Math.cos(phi);
            const colorRoll = Math.random();
            if (colorRoll < 0.5) {
                colors[i * 3] = 0.9 + Math.random() * 0.1;
                colors[i * 3 + 1] = 0.9 + Math.random() * 0.1;
                colors[i * 3 + 2] = 0.9 + Math.random() * 0.1;
            } else if (colorRoll < 0.7) {
                colors[i * 3] = 0.7 + Math.random() * 0.1;
                colors[i * 3 + 1] = 0.8 + Math.random() * 0.1;
                colors[i * 3 + 2] = 1.0;
            } else if (colorRoll < 0.85) {
                colors[i * 3] = 1.0;
                colors[i * 3 + 1] = 0.9 + Math.random() * 0.1;
                colors[i * 3 + 2] = 0.7 + Math.random() * 0.1;
            } else {
                colors[i * 3] = 1.0;
                colors[i * 3 + 1] = 0.6 + Math.random() * 0.2;
                colors[i * 3 + 2] = 0.4 + Math.random() * 0.2;
            }
        }
        const geo = new THREE.BufferGeometry();
        geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        scene.add(new THREE.Points(geo, new THREE.PointsMaterial({
            size: 500000, sizeAttenuation: true, vertexColors: true, transparent: true, opacity: 0.9
        })));

        // Background dimmer stars
        const bgCount = 4000;
        const bgPos = new Float32Array(bgCount * 3);
        const bgCol = new Float32Array(bgCount * 3);
        for (let i = 0; i < bgCount; i++) {
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            const r = 900000000 + Math.random() * 100000000;
            bgPos[i * 3] = r * Math.sin(phi) * Math.cos(theta);
            bgPos[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
            bgPos[i * 3 + 2] = r * Math.cos(phi);
            bgCol[i * 3] = 0.7 + Math.random() * 0.3;
            bgCol[i * 3 + 1] = 0.7 + Math.random() * 0.3;
            bgCol[i * 3 + 2] = 0.8 + Math.random() * 0.1;
        }
        const bgGeo = new THREE.BufferGeometry();
        bgGeo.setAttribute('position', new THREE.BufferAttribute(bgPos, 3));
        bgGeo.setAttribute('color', new THREE.BufferAttribute(bgCol, 3));
        scene.add(new THREE.Points(bgGeo, new THREE.PointsMaterial({
            size: 400000, sizeAttenuation: true, vertexColors: true, transparent: true, opacity: 0.6
        })));
    }
    createStarField();

        const c = document.createElement('canvas'); c.width = w; c.height = h;
        const ctx = c.getContext('2d');
        drawFn(ctx, w, h);
        const t = new THREE.CanvasTexture(c);
        t.magFilter = THREE.LinearFilter;
        return t;
    }

                ctx.save(); ctx.translate(cx, cy); ctx.rotate(rot || 0);
                ctx.fillStyle = color; ctx.beginPath();
                const points = 12 + Math.floor(Math.random() * 6);
                for (let i = 0; i <= points; i++) {

                    else ctx.lineTo(Math.cos(a) * sx * rr, Math.sin(a) * sy * rr);

                ctx.closePath(); ctx.fill(); ctx.restore();

            // North America
            drawContinent(w * 0.18, h * 0.28, 38, 28, '#2d6b30', -0.2);
            drawContinent(w * 0.15, h * 0.22, 20, 15, '#3a7a3d', 0.3);

            drawContinent(w * 0.48, h * 0.38, 18, 16, '#6b8a30', -0.1);

            drawContinent(w * 0.49, h * 0.35, 20, 8, '#c4a555', 0);
            // Asia

    /* ================================================================

       ================================================================ */
    const planets = [];
    const labelsContainer = document.getElementById('labels-container');
    const MOON_ORBIT_RADIUS_MULT = 11;

    function createPlanet(name, radius, dist, texFn, isSun) {
        isSun = isSun || false;
        const grp = new THREE.Group();
        grp.position.set(dist, 0, 0);
        const geo = new THREE.SphereGeometry(radius, 64, 64);
        const mat = isSun
            ? new THREE.MeshBasicMaterial({ map: texFn(), fog: false })
            : new THREE.MeshStandardMaterial({ map: texFn(), roughness: 0.9, metalness: 0.1 });
        const mesh = new THREE.Mesh(geo, mat);
        mesh.name = "PM_" + name;
        grp.add(mesh);

        let moonMesh = null, cloudMesh = null;

        if (name === "EARTH") {
            // Moon
            const mGeo = new THREE.SphereGeometry(radius * 0.27, 32, 32);
            moonMesh = new THREE.Mesh(mGeo, new THREE.MeshStandardMaterial({ map: moonTexture(), roughness: 0.95, fog: false }));
            moonMesh.position.set(radius * MOON_ORBIT_RADIUS_MULT, 0, 0);
            grp.add(moonMesh);
            // Clouds
            cloudMesh = new THREE.Mesh(
                new THREE.SphereGeometry(radius * 1.015, 64, 64),
                new THREE.MeshStandardMaterial({ map: earthCloudTexture(), transparent: true, opacity: 0.45, depthWrite: false, roughness: 1.0 })
            );
            grp.add(cloudMesh);
            // Atmosphere glow
            grp.add(new THREE.Mesh(new THREE.SphereGeometry(radius * 1.08, 64, 64),
                new THREE.MeshBasicMaterial({ color: 0x4488ff, transparent: true, opacity: 0.12, side: THREE.BackSide })));

    /* ================================================================
       GROUND SKY SYSTEM — day/night, moon phases, solar eclipses
       The sky runs on its own clock: one full day lasts 2 minutes and

       before sunrise with a bright gibbous moon in the west; the first

    const SKY = {
        dayLength: 120000,      // ms per full day/night cycle
        moonCycle: 360000,      // ms per lunar cycle (= 3 game days)
        startAngle: -0.227,     // sun angle at spawn (just below the horizon)
        startPhase: 0.55,       // moon phase at spawn (just past full)

    };
    const SKY_DIST_SUN = 4200, SKY_DIST_MOON = 3900, SKY_DIST_STARS = 4400;

    // --- Sun disk + glow ---
    const skySunDisk = new THREE.Mesh(new THREE.SphereGeometry(SUN_DISK_R, 32, 32),

    skyGroup.add(skySunDisk);

    function glowTexture() {
        const c = document.createElement('canvas'); c.width = c.height = 128;
        const g = c.getContext('2d');
        const grad = g.createRadialGradient(64, 64, 4, 64, 64, 64);
        grad.addColorStop(0, 'rgba(255,250,220,1)');
        grad.addColorStop(0.25, 'rgba(255,230,160,0.45)');
        grad.addColorStop(0.6, 'rgba(255,200,120,0.12)');
        grad.addColorStop(1, 'rgba(255,180,100,0)');
        g.fillStyle = grad; g.fillRect(0, 0, 128, 128);
        return new THREE.CanvasTexture(c);
    }
    const skySunGlowMat = new THREE.SpriteMaterial({ map: glowTexture(), transparent: true, opacity: 0.9, blending: THREE.AdditiveBlending, fog: false, depthWrite: false });
    const skySunGlow = new THREE.Sprite(skySunGlowMat);

    // --- Moon: a billboard with the phase drawn in 2D (crisp, textbook
    //     phases — exactly how it looks in a science book). It sits a bit
    //     closer than the sun disk, so during an eclipse it physically
    //     covers the sun, leaving the glow peeking out as a corona. ---
    const MOON_TEX_SIZE = 256;
    const moonPhaseCanvas = document.createElement('canvas');
    moonPhaseCanvas.width = moonPhaseCanvas.height = MOON_TEX_SIZE;
    const moonPhaseCtx = moonPhaseCanvas.getContext('2d');
    const moonPhaseTex = new THREE.CanvasTexture(moonPhaseCanvas);
    let lastDrawnPhase = -1, lastDrawnAlpha = -1;

    function drawMoonPhase(phase, darkAlpha) {
        const s = MOON_TEX_SIZE, cx = s / 2, cy = s / 2, r = s / 2 - 4;
        const ctx = moonPhaseCtx;
        ctx.clearRect(0, 0, s, s);

        // Dark side (faint, like real earthshine; more opaque at night)
        ctx.fillStyle = 'rgba(14,16,28,' + darkAlpha.toFixed(2) + ')';
        ctx.beginPath(); ctx.arc(cx, cy, r, 0, Math.PI * 2); ctx.fill();

        // Lit region: half-disk on the lit side, closed by the terminator
        // ellipse (bulging into the dark side when gibbous, carving into
        // the lit side when crescent).
        const f = phase * Math.PI * 2;
        const waxing = phase < 0.5;
        const gibbous = (1 - Math.cos(f)) / 2 > 0.5;
        const rx = Math.max(0.001, Math.abs(Math.cos(f))) * r;
        ctx.fillStyle = '#dcd9cf';
        ctx.beginPath();
        ctx.arc(cx, cy, r, -Math.PI / 2, Math.PI / 2, !waxing);
        ctx.ellipse(cx, cy, rx, r, 0, Math.PI / 2, -Math.PI / 2, gibbous ? !waxing : waxing);
        ctx.closePath();
        ctx.fill();

        // Maria + craters, painted onto whatever disk is there
        ctx.save();
        ctx.globalCompositeOperation = 'source-atop';
        const maria = [
            [0.34, 0.36, 0.15], [0.56, 0.30, 0.10], [0.62, 0.55, 0.12],
            [0.40, 0.62, 0.08], [0.71, 0.41, 0.06], [0.28, 0.50, 0.07]
        ];
        ctx.fillStyle = 'rgba(70,72,82,0.30)';
        maria.forEach(m => {
            ctx.beginPath();
            ctx.ellipse(s * m[0], s * m[1], s * m[2], s * m[2] * 0.8, 0.4, 0, Math.PI * 2);
            ctx.fill();
        });
        ctx.fillStyle = 'rgba(60,62,70,0.18)';
        for (let i = 0; i < 26; i++) {
            const a = (i * 2.399) % (Math.PI * 2), rr = (0.15 + ((i * 0.617) % 0.78)) * r;
            ctx.beginPath();
            ctx.arc(cx + Math.cos(a) * rr, cy + Math.sin(a) * rr, 2 + (i % 5), 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.restore();
        moonPhaseTex.needsUpdate = true;
    }

    const skyMoonMat = new THREE.SpriteMaterial({ map: moonPhaseTex, transparent: true, fog: false, depthWrite: false });
    const skyMoon = new THREE.Sprite(skyMoonMat);

    // --- Night stars: a local dome that fades in after sunset (and during
    //     totality!). The deep-space starfield is hidden by ground fog. ---
    function makeStarDome(count, size, brightness) {
        const pos = new Float32Array(count * 3);
        for (let i = 0; i < count; i++) {
            const t = Math.random() * Math.PI * 2;
            const ph = Math.acos(Math.random() * 0.98 + 0.02); // upper hemisphere only
            pos[i * 3] = SKY_DIST_STARS * Math.sin(ph) * Math.cos(t);
            pos[i * 3 + 1] = SKY_DIST_STARS * Math.cos(ph);
            pos[i * 3 + 2] = SKY_DIST_STARS * Math.sin(ph) * Math.sin(t);
        }
        const g = new THREE.BufferGeometry();
        g.setAttribute('position', new THREE.BufferAttribute(pos, 3));
        const m = new THREE.PointsMaterial({ color: 0xffffff, size: size, sizeAttenuation: true, transparent: true, opacity: 0, fog: false, depthWrite: false });
        m.userData = { maxOpacity: brightness };
        const pts = new THREE.Points(g, m);
        skyGroup.add(pts);
        return pts;
    }
    const starDomes = [makeStarDome(450, 26, 0.55), makeStarDome(110, 48, 0.95)];

    // --- Sky clock UI ---
    const skyStatusEl = document.getElementById('sky-status');
    const skySpeedBtn = document.getElementById('sky-speed');
    const SKY_SPEEDS = [1, 8, 30];
    let skySpeedIdx = 0;
    skySpeedBtn.addEventListener('click', () => {
        skySpeedIdx = (skySpeedIdx + 1) % SKY_SPEEDS.length;
        SKY.speed = SKY_SPEEDS[skySpeedIdx];
        skySpeedBtn.textContent = '⏩ ×' + SKY.speed;
    });

    const PHASE_NAMES = ['NEW MOON 🌑', 'WAXING CRESCENT 🌒', 'FIRST QUARTER 🌓', 'WAXING GIBBOUS 🌔', 'FULL MOON 🌕', 'WANING GIBBOUS 🌖', 'LAST QUARTER 🌗', 'WANING CRESCENT 🌘'];
    function timeOfDayName(a, moonUp) {
        a = ((a % (Math.PI * 2)) + Math.PI * 2) % (Math.PI * 2);
        if (a < 0.35) return 'SUNRISE 🌅';
        if (a < 1.2) return 'MORNING ☀️';
        if (a < 1.95) return 'MIDDAY ☀️';
        if (a < 2.79) return 'AFTERNOON ☀️';
        if (a < Math.PI + 0.18) return 'SUNSET 🌇';
        return moonUp ? 'NIGHT 🌙' : 'NIGHT ✨';
    }

    const C_DAY = new THREE.Color(0x4a90d9), C_DAY_H = new THREE.Color(0x87ceeb);
    const C_SET = new THREE.Color(0x2a3560), C_SET_H = new THREE.Color(0xff8c4a);
    const C_NIGHT = new THREE.Color(0x05060f), C_NIGHT_H = new THREE.Color(0x0b1024);
    const C_ECL = new THREE.Color(0x0a0a18), C_ECL_H = new THREE.Color(0x33203a);
    const tmpColA = new THREE.Color(), tmpColB = new THREE.Color();
    const skySunDir = new THREE.Vector3(), skyMoonDir = new THREE.Vector3();

    function updateGroundSky(dtMs) {
        // Time slows 3x while an eclipse is in progress so it's easy to watch
        const slowMo = SKY.eclipse > 0.02 ? 0.3 : 1;
        SKY.time += dtMs * SKY.speed * slowMo;

        const dayAngle = SKY.startAngle + (SKY.time / SKY.dayLength) * Math.PI * 2;
        const phase = ((SKY.startPhase + SKY.time / SKY.moonCycle) % 1 + 1) % 1;
        const moonAngle = dayAngle - phase * Math.PI * 2;

        skySunDir.set(Math.cos(dayAngle), Math.sin(dayAngle), -0.35).normalize();
        skyMoonDir.set(Math.cos(moonAngle), Math.sin(moonAngle), -0.35).normalize();
        const sunElev = skySunDir.y, moonElev = skyMoonDir.y;

        skySunDisk.position.copy(skySunDir).multiplyScalar(SKY_DIST_SUN);
        skySunGlow.position.copy(skySunDir).multiplyScalar(SKY_DIST_SUN);
        skyMoon.position.copy(skyMoonDir).multiplyScalar(SKY_DIST_MOON);
        const visS = sunElev > -0.06, visM = moonElev > -0.06;
        skySunDisk.visible = visS; skySunGlow.visible = visS; skyMoon.visible = visM;

        // Eclipse: angular overlap between sun and moon
        const rS = SUN_DISK_R / SKY_DIST_SUN, rM = (skyMoon.scale.x * 0.5 - 8) / SKY_DIST_MOON;
        const sep = skySunDir.angleTo(skyMoonDir);
        let ecl = 0, cover = 0;
        if (visS && sep < rS + rM) {
            cover = Math.min(1, (rS + rM - sep) / (2 * Math.min(rS, rM)));
            ecl = cover * cover;
        }
        SKY.eclipse = ecl;

        // Brightness factors from sun elevation
        const dayF = Math.min(1, Math.max(0, (sunElev + 0.04) / 0.4));
        const nightF = 1 - Math.min(1, Math.max(0, (sunElev + 0.16) / 0.3));

        // Sky + horizon colors: day → sunset → night, darkened by eclipse
        if (sunElev > 0.12) {
            tmpColA.copy(C_DAY); tmpColB.copy(C_DAY_H);
        } else if (sunElev > -0.16) {
            const t = (sunElev + 0.16) / 0.28;
            tmpColA.copy(C_NIGHT).lerp(C_SET, Math.min(1, t * 1.5)).lerp(C_DAY, t * t);
            tmpColB.copy(C_NIGHT_H).lerp(C_SET_H, Math.min(1, t * 1.6)).lerp(C_DAY_H, t * t);
        } else {
            tmpColA.copy(C_NIGHT); tmpColB.copy(C_NIGHT_H);
        }
        if (ecl > 0.01) { tmpColA.lerp(C_ECL, ecl); tmpColB.lerp(C_ECL_H, ecl * 0.85); }
        scene.background = tmpColA;
        const fogMult = 1 + ecl * 2;
        scene.fog = new THREE.Fog(tmpColB.clone(), 400 * fogMult, 1200 * fogMult);

        // Sunlight on the ground (warm near the horizon), moonlight at night
        const warm = Math.min(1, Math.max(0, sunElev * 4));
        const illum = 0.5 - 0.5 * Math.cos(phase * Math.PI * 2); // lit fraction of the moon
        if (dayF > 0.08) {
            groundSun.position.copy(skySunDir).multiplyScalar(800);
            groundSun.color.setRGB(1, 0.65 + 0.33 * warm, 0.45 + 0.5 * warm);
            groundSun.intensity = (0.15 + 1.35 * dayF) * (1 - 0.93 * ecl);
        } else if (visM) {
            groundSun.position.copy(skyMoonDir).multiplyScalar(800);
            groundSun.color.setRGB(0.65, 0.72, 1);
            groundSun.intensity = 0.05 + 0.18 * illum;
        } else {
            groundSun.intensity = 0.04;
        }
        groundHemi.intensity = (0.08 + 0.52 * dayF) * (1 - 0.7 * ecl);
        ambientLight.intensity = (0.22 + 0.78 * dayF) * (1 - 0.7 * ecl);

        // Stars come out at night — and during totality!
        const starOp = Math.max(nightF, ecl > 0.8 ? (ecl - 0.8) * 5 : 0);
        starDomes.forEach(d => {
            d.material.opacity = d.material.userData.maxOpacity * Math.min(1, starOp);
            d.rotation.z = dayAngle * 0.08;
        });

        // Trees dim with the light
        const tf = Math.max(0.10, (0.12 + 0.88 * dayF) * (1 - 0.8 * ecl));
        for (let i = 0; i < treeSprites.length; i++) {
            treeSprites[i].material.color.setRGB(tf, tf, Math.min(1, tf * 1.12));
        }

        // Sun disk + glow appearance (orange near horizon, corona in totality)
        skySunDisk.material.color.setRGB(1, 0.93 + 0.07 * warm, 0.75 + 0.22 * warm);
        skySunGlowMat.color.setRGB(1, 0.72 + 0.26 * warm, 0.5 + 0.42 * warm);
        skySunGlowMat.opacity = 0.55 + 0.35 * dayF;
        if (ecl > 0.85) { skySunGlowMat.opacity = 1.0; skySunGlowMat.color.setRGB(0.85, 0.92, 1); }

        // Redraw the moon's phase texture only when it visibly changes
        const darkAlpha = 0.22 + 0.73 * Math.max(nightF, ecl);
        if (Math.abs(phase - lastDrawnPhase) > 0.004 || Math.abs(darkAlpha - lastDrawnAlpha) > 0.06) {
            drawMoonPhase(phase, darkAlpha);
            lastDrawnPhase = phase; lastDrawnAlpha = darkAlpha;
        }

        // Status line for the sky
        if (ecl > 0.03) {
            skyStatusEl.style.color = '#ffaa33';
            skyStatusEl.innerText = ecl > 0.92
                ? '🌑 TOTAL SOLAR ECLIPSE — LOOK UP!'
                : '🌒 SOLAR ECLIPSE — ' + Math.round(cover * 100) + '% COVERED';
        } else {
            skyStatusEl.style.color = '#ffcc66';
            const phaseIdx = Math.round(phase * 8) % 8;
            skyStatusEl.innerText = timeOfDayName(dayAngle, visM) + '  ·  ' + PHASE_NAMES[phaseIdx];
        }
    }

    function europaIceTexture() {
        return makeTexture(512, 512, (ctx, w, h) => {
            const g = ctx.createRadialGradient(w / 2, h / 2, 40, w / 2, h / 2, w * 0.7);
            g.addColorStop(0, '#dceef7'); g.addColorStop(0.6, '#c7dfee'); g.addColorStop(1, '#b2cfe2');
            ctx.fillStyle = g; ctx.fillRect(0, 0, w, h);
            // frost noise
            for (let i = 0; i < 1500; i++) {
                const v = 190 + Math.random() * 60;
                ctx.fillStyle = 'rgba(' + (v - 20) + ',' + v + ',255,' + (0.05 + Math.random() * 0.08) + ')';
                ctx.fillRect(Math.random() * w, Math.random() * h, 1 + Math.random() * 3, 1 + Math.random() * 3);
            }
            // lineae — Europa's famous reddish-brown cracks
            for (let i = 0; i < 26; i++) {
                const x0 = Math.random() * w, y0 = Math.random() * h, a = Math.random() * Math.PI;
                const len = 150 + Math.random() * 350;
                ctx.strokeStyle = 'rgba(' + (140 + Math.random() * 40) + ',' + (85 + Math.random() * 25) + ',' + (55 + Math.random() * 20) + ',' + (0.25 + Math.random() * 0.3) + ')';
                ctx.lineWidth = 1 + Math.random() * 3;
                ctx.beginPath(); ctx.moveTo(x0, y0);
                ctx.bezierCurveTo(
                    x0 + Math.cos(a) * len * 0.3 + (Math.random() - 0.5) * 60, y0 + Math.sin(a) * len * 0.3 + (Math.random() - 0.5) * 60,
                    x0 + Math.cos(a) * len * 0.7 + (Math.random() - 0.5) * 60, y0 + Math.sin(a) * len * 0.7 + (Math.random() - 0.5) * 60,
                    x0 + Math.cos(a) * len, y0 + Math.sin(a) * len);
                ctx.stroke();
            }
            // fine blue fracture lines
            for (let i = 0; i < 40; i++) {
                ctx.strokeStyle = 'rgba(110,150,190,' + (0.12 + Math.random() * 0.15) + ')';
                ctx.lineWidth = 0.5 + Math.random();
                const x0 = Math.random() * w, y0 = Math.random() * h, a = Math.random() * Math.PI;
                const len = 60 + Math.random() * 180;
                ctx.beginPath(); ctx.moveTo(x0, y0);
                ctx.lineTo(x0 + Math.cos(a) * len, y0 + Math.sin(a) * len); ctx.stroke();
            }
        });
    }

    function landOnEuropa() {
        if (!europaBuilt) buildEuropaScenes();
        gamePhase = 'europa';
        systemGroup.visible = false;
        sunPointLight.intensity = 0;
        ambientLight.color.setHex(0x6677aa); ambientLight.intensity = 0.5;
        europaGroup.visible = true; oceanGroup.visible = false;
        subLight.intensity = 0;
        europaLocalPos.set(0, 5, 55);
        camYaw = Math.PI; camPitch = 0;
        landedPlanet = null; nearestPlanet = null; nearEuropa = false;
        actionBtn.style.display = 'none';
    }

    function returnToOrbit() {
        gamePhase = 'space';
        systemGroup.visible = true;
        sunPointLight.intensity = 1.3;
        ambientLight.color.setHex(0x404040); ambientLight.intensity = 1.0;
        europaGroup.visible = false; oceanGroup.visible = false;
        subLight.intensity = 0;
        scene.fog = null; scene.background = spaceBlack;
        // Reposition Jupiter + Europa for "now", then park the ship just above
        const t = Date.now();
        jupiterP.grp.position.x = Math.cos(jupiterP.angle + t * jupiterP.orbitSpeed) * jupiterP.dist;
        jupiterP.grp.position.z = Math.sin(jupiterP.angle + t * jupiterP.orbitSpeed) * jupiterP.dist;
        const eu = jupiterP.moons[1];
        const ma = (t - (eu.pause || 0)) * eu.speed;
        eu.mesh.position.x = Math.cos(ma) * eu.orbitR;
        eu.mesh.position.z = Math.sin(ma) * eu.orbitR;
        systemGroup.updateMatrixWorld(true);
        eu.mesh.getWorldPosition(europaWorld);
        camera.position.copy(europaWorld);
        camera.position.y += EUROPA_RADIUS + 250;
        camPitch = -0.5;
        actionBtn.style.display = 'none';
    }

    function startDescent() {
        gamePhase = 'descending';
        transT = Date.now();
        actionBtn.style.display = 'none';
    }

    function startAscent() {
        gamePhase = 'ascending';
        transT = Date.now();
        actionBtn.style.display = 'none';
        subLight.intensity = 0;
    }


    /* ================================================================
       SURFACE WORLDS — a generic landable-surface system.
       Each world gets its own pocket scene, a walkable plain, your
       parked rocket, and one true phenomenon to discover.
       ================================================================ */
    const SURFACE = { current: null, defs: {} };
    const surfLocalPos = new THREE.Vector3(0, 5, 55);
    let nearSurfShip = false, nearMoonBody = false, nearEnceladus = false;
    let earthMoonPause = 0;

    function addStarDome(group, opacity) {
        const count = 650, pos = new Float32Array(count * 3);
        for (let i = 0; i < count; i++) {
            const t = Math.random() * Math.PI * 2;
            const ph = Math.acos(Math.random() * 0.98 + 0.02);
            pos[i * 3] = 4600 * Math.sin(ph) * Math.cos(t);
            pos[i * 3 + 1] = 4600 * Math.cos(ph);
            pos[i * 3 + 2] = 4600 * Math.sin(ph) * Math.sin(t);
        }
        const g = new THREE.BufferGeometry();
        g.setAttribute('position', new THREE.BufferAttribute(pos, 3));
        group.add(new THREE.Points(g, new THREE.PointsMaterial({
            color: 0xffffff, size: 30, sizeAttenuation: true, transparent: true,
            opacity: opacity, fog: false, depthWrite: false
        })));
    }

    function buildShipAt(group, x, z) {
        const darkMetal = new THREE.MeshStandardMaterial({ color: 0x3a4148, roughness: 0.6, metalness: 0.5 });
        const pad = new THREE.Mesh(new THREE.CylinderGeometry(20, 20, 0.8, 28), darkMetal);
        pad.position.set(x, 0.4, z); group.add(pad);
        const padRing = new THREE.Mesh(new THREE.RingGeometry(15, 17, 28),
            new THREE.MeshBasicMaterial({ color: 0xcccc00, side: THREE.DoubleSide }));
        padRing.rotation.x = -Math.PI / 2; padRing.position.set(x, 0.85, z); group.add(padRing);
        const ship = new THREE.Group(); ship.position.set(x, 0.8, z);
        const sBody = new THREE.Mesh(new THREE.CylinderGeometry(2.6, 3, 24, 14),
            new THREE.MeshStandardMaterial({ color: 0xe8e8e8, roughness: 0.3, metalness: 0.2 }));
        sBody.position.y = 13; ship.add(sBody);
        const sNose = new THREE.Mesh(new THREE.ConeGeometry(2.6, 7, 14),
            new THREE.MeshStandardMaterial({ color: 0xcc2222, roughness: 0.4, metalness: 0.3 }));
        sNose.position.y = 28.5; ship.add(sNose);
        for (let i = 0; i < 4; i++) {
            const a = (i / 4) * Math.PI * 2;
            const fin = new THREE.Mesh(new THREE.BoxGeometry(0.5, 7, 4),
                new THREE.MeshStandardMaterial({ color: 0xcc2222, roughness: 0.5 }));
            fin.position.set(Math.sin(a) * 3.4, 3.5, Math.cos(a) * 3.4);
            fin.rotation.y = a; ship.add(fin);
        }
        group.add(ship);
    }

    function surfaceScaffold(def, groundTexFn, opts) {
        const g = new THREE.Group();
        g.position.copy(def.pos);
        scene.add(g);
        def.group = g;
        const tex = groundTexFn();
        tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
        tex.repeat.set(opts.repeat || 8, opts.repeat || 8);
        const gr = new THREE.Mesh(new THREE.PlaneGeometry(6000, 6000),
            new THREE.MeshStandardMaterial({ map: tex, roughness: opts.rough != null ? opts.rough : 0.92 }));
        gr.rotation.x = -Math.PI / 2;
        g.add(gr);
        if (opts.stars) addStarDome(g, opts.stars);
        const tgt = new THREE.Object3D(); g.add(tgt);
        const sun = new THREE.DirectionalLight(opts.lightColor || 0xffffff, opts.lightI != null ? opts.lightI : 1.0);
        sun.position.copy(opts.lightFrom || new THREE.Vector3(800, 900, 300));
        sun.target = tgt; g.add(sun);
        def.sunLight = sun;
        if (!opts.noShip) buildShipAt(g, 0, 95);
        return g;
    }

    function scatterRocks(group, n, color, maxDist, emissiveHex) {
        for (let i = 0; i < n; i++) {
            const a = Math.random() * Math.PI * 2, d = 120 + Math.random() * maxDist;
            const s = 4 + Math.random() * 16;
            const m = new THREE.Mesh(new THREE.SphereGeometry(s, 7, 6),
                new THREE.MeshStandardMaterial({ color: color, roughness: 0.9, flatShading: true, emissive: emissiveHex || 0x000000 }));
            m.position.set(Math.cos(a) * d, s * 0.35, Math.sin(a) * d);
            m.scale.y = 0.45 + Math.random() * 0.5;
            group.add(m);
        }
    }

    function planetReturn(name) {
        const p = planets.find(q => q.name === name);
        const t = Date.now();
        p.grp.position.x = Math.cos(p.angle + t * p.orbitSpeed) * p.dist;
        p.grp.position.z = Math.sin(p.angle + t * p.orbitSpeed) * p.dist;
        systemGroup.updateMatrixWorld(true);
        p.mesh.getWorldPosition(europaWorld);
        camera.position.copy(europaWorld);
        camera.position.y += p.radius + 300;
    }

    function enterSurface(name) {
        const def = SURFACE.defs[name];
        if (!def.built) { def.build(); def.built = true; }
        SURFACE.current = def;
        gamePhase = 'surface';
        systemGroup.visible = false;
        sunPointLight.intensity = 0;
        ambientLight.color.setHex(def.ambient); ambientLight.intensity = def.ambientI;
        def.group.visible = true;
        surfLocalPos.set(0, 5, 55);
        camYaw = Math.PI; camPitch = 0;
        landedPlanet = null; nearestPlanet = null;
        actionBtn.style.display = 'none';
        if (def.onEnter) def.onEnter();
    }

    function exitSurfaceToOrbit() {
        const def = SURFACE.current;
        def.group.visible = false;
        SURFACE.current = null;
        gamePhase = 'space';
        systemGroup.visible = true;
        sunPointLight.intensity = 1.3;
        ambientLight.color.setHex(0x404040); ambientLight.intensity = 1.0;
        scene.fog = null; scene.background = spaceBlack;
        def.placeShip();
        camPitch = -0.5;
        actionBtn.style.display = 'none';
    }

    /* ================================================================

       sunlight and solar wind) always points away from the sun, and
       grows much longer near perihelion.

        new THREE.MeshStandardMaterial({ color: 0xb8c4cc, roughness: 0.85, flatShading: true })));

        map: glowTexture(), color: 0xbfe2ff, transparent: true, opacity: 0.8,
        blending: THREE.AdditiveBlending, depthWrite: false, fog: false
