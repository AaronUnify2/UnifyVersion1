<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frequently Asked Questions — Southern Downs Regional Council</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: Arial, Helvetica, sans-serif;
  font-size: 15px;
  color: #111;
  background: #fff;
  padding: 28px 20px 60px;
  max-width: 860px;
}

h1 {
  font-size: 42px;
  font-weight: 900;
  margin-bottom: 16px;
  letter-spacing: -1px;
}

.demo-notice {
  font-size: 12px;
  color: #888;
  font-style: italic;
  margin-bottom: 24px;
}

.tab-bar {
  display: flex;
  flex-wrap: wrap;
  border-bottom: 2px solid #ccc;
  margin-bottom: 24px;
}

.tab-btn {
  display: inline-block;
  padding: 8px 18px 9px;
  border: none;
  border-bottom: 3px solid transparent;
  margin-bottom: -2px;
  background: none;
  font-family: Arial, Helvetica, sans-serif;
  font-size: 14px;
  font-weight: 400;
  color: #2d2d7a;
  cursor: pointer;
  white-space: nowrap;
  transition: border-color 0.12s;
}
.tab-btn:hover { text-decoration: underline; border-bottom-color: #aaa; }
.tab-btn.active {
  color: #111;
  font-weight: 700;
  text-decoration: none;
  border-bottom-color: #2d2d7a;
  cursor: default;
}
.tab-btn.new-tab::after {
  content: "NEW";
  display: inline-block;
  font-size: 9px;
  font-weight: 700;
  letter-spacing: 0.5px;
  background: #2d2d7a;
  color: #fff;
  padding: 1px 5px;
  margin-left: 6px;
  border-radius: 2px;
  vertical-align: 1px;
}

.tab-panel { display: none; }
.tab-panel.active { display: block; }

/* ── Intro block for the Building Rural tab ───────────────── */
.tab-intro {
  background: #f6f6fb;
  border-left: 3px solid #2d2d7a;
  padding: 14px 18px;
  margin-bottom: 18px;
  font-size: 14px;
  line-height: 1.6;
  color: #222;
}
.tab-intro strong { color: #111; }
.tab-intro p { margin-bottom: 8px; }
.tab-intro p:last-child { margin-bottom: 0; }

.faq-list { list-style: none; }

.faq-item {
  border: 1px solid #ccc;
  margin-bottom: 6px;
}

.faq-q {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 16px;
  padding: 18px 20px;
  cursor: pointer;
  background: #fff;
  user-select: none;
}
.faq-q:hover { background: #f8f8f8; }
.faq-item.open .faq-q { background: #f8f8f8; }

.faq-q-text {
  font-size: 15px;
  font-weight: 700;
  color: #111;
  line-height: 1.45;
  flex: 1;
}

.faq-chevron {
  font-size: 18px;
  color: #2d2d7a;
  flex-shrink: 0;
  transition: transform 0.22s;
  line-height: 1;
}
.faq-item.open .faq-chevron { transform: rotate(180deg); }

.faq-a {
  max-height: 0;
  overflow: hidden;
  transition: max-height 0.32s ease;
}
.faq-item.open .faq-a { max-height: 3600px; }

.faq-a-inner {
  padding: 4px 20px 20px;
  font-size: 14px;
  color: #333;
  line-height: 1.7;
  border-top: 1px solid #e8e8e8;
}
.faq-a-inner p { margin-bottom: 10px; }
.faq-a-inner p:last-child { margin-bottom: 0; }
.faq-a-inner ol, .faq-a-inner ul { margin: 8px 0 10px 22px; }
.faq-a-inner li { margin-bottom: 5px; }
.faq-a-inner a { color: #2d2d7a; }
.faq-a-inner a:hover { text-decoration: underline; }

.faq-a-inner .note {
  background: #f0f0f8;
  border-left: 3px solid #2d2d7a;
  padding: 8px 12px;
  font-size: 13.5px;
  margin: 10px 0;
  color: #333;
}
.faq-a-inner .warn {
  background: #fff8e6;
  border-left: 3px solid #e0a800;
  padding: 8px 12px;
  font-size: 13.5px;
  margin: 10px 0;
  color: #555;
}
.faq-a-inner .term {
  background: #eef4ee;
  border-left: 3px solid #3a7a3a;
  padding: 8px 12px;
  font-size: 13.5px;
  margin: 10px 0;
  color: #234;
}
.faq-a-inner .term strong { color: #111; }

/* Setback comparison table used in the Building Rural tab */
.setback-table {
  width: 100%;
  border-collapse: collapse;
  margin: 10px 0 14px;
  font-size: 13.5px;
}
.setback-table th,
.setback-table td {
  border: 1px solid #c7c7d6;
  padding: 8px 12px;
  vertical-align: top;
  text-align: left;
  line-height: 1.5;
}
.setback-table thead th {
  background: #f0f0f8;
  color: #2d2d7a;
  font-weight: 700;
  font-size: 12.5px;
  letter-spacing: 0.3px;
  text-transform: uppercase;
}
.setback-table tbody td:first-child {
  background: #fafafc;
  font-weight: 700;
  color: #111;
  width: 32%;
}

/* Facility / compound tables used in the Waste & Recycling tab */
.facility-table {
  width: 100%;
  border-collapse: collapse;
  margin: 10px 0 14px;
  font-size: 13.5px;
}
.facility-table th,
.facility-table td {
  border: 1px solid #c7c7d6;
  padding: 7px 10px;
  vertical-align: top;
  text-align: left;
  line-height: 1.45;
}
.facility-table thead th {
  background: #f0f0f8;
  color: #2d2d7a;
  font-weight: 700;
  font-size: 12px;
  letter-spacing: 0.3px;
  text-transform: uppercase;
}
.facility-table tbody td:first-child {
  font-weight: 700;
  color: #111;
  background: #fafafc;
  white-space: nowrap;
}

/* Simple horizontal stepper used in the Building Rural process overview */
.stepper {
  display: flex;
  flex-wrap: wrap;
  gap: 6px;
  margin: 12px 0 14px;
  font-size: 12.5px;
}
.stepper .step {
  flex: 1 1 0;
  min-width: 120px;
  background: #fff;
  border: 1px solid #c7c7d6;
  border-left: 3px solid #2d2d7a;
  padding: 7px 10px;
  line-height: 1.35;
  color: #222;
}
.stepper .step b { display: block; font-size: 11px; color: #2d2d7a; letter-spacing: 0.4px; margin-bottom: 2px; }

/* Sub-heading dividers used inside an FAQ list to group questions by stage */
.faq-group-heading {
  list-style: none;
  margin: 22px 0 8px;
  padding: 8px 0 6px;
  border-top: 1px solid #ccc;
  font-size: 11px;
  font-weight: 700;
  letter-spacing: 1px;
  text-transform: uppercase;
  color: #2d2d7a;
}
.faq-list > .faq-group-heading:first-child {
  margin-top: 0;
  padding-top: 0;
  border-top: none;
}

.panel-footer {
  margin-top: 20px;
  padding-top: 12px;
  border-top: 1px solid #ddd;
  font-size: 13px;
  color: #666;
}
.panel-footer a { color: #2d2d7a; margin: 0 3px; }

.last-reviewed {
  margin-top: 8px;
  font-size: 12px;
  color: #999;
  font-style: italic;
}
</style>
</head>
<body>

<!-- Tabs and panels are built from FAQ.json at load time. -->
<div class="tab-bar" id="tabBar"></div>
<div id="panels"></div>
<p id="loadError" style="display:none; color:#a00; font-size:14px;"></p>

<script>
// ─────────────────────────────────────────────────────────────
//  All FAQ content lives in FAQ.json.
//  To update questions/answers, edit FAQ.json — no need to touch
//  this page. (The page must be served over http/https so the
//  browser is allowed to fetch the JSON — see the note below.)
// ─────────────────────────────────────────────────────────────

function el(tag, className, html) {
  var node = document.createElement(tag);
  if (className) node.className = className;
  if (html != null) node.innerHTML = html;
  return node;
}

function buildTab(tab, isFirst) {
  var btn = el('button', 'tab-btn' + (isFirst ? ' active' : '') + (tab.new ? ' new-tab' : ''));
  btn.innerHTML = tab.label;
  btn.setAttribute('data-tab', tab.id);
  btn.addEventListener('click', function () { switchTab(tab.id); });
  return btn;
}

function buildPanel(tab, isFirst) {
  var panel = el('div', 'tab-panel' + (isFirst ? ' active' : ''));
  panel.id = 'tab-' + tab.id;

  if (tab.intro) {
    panel.appendChild(el('div', 'tab-intro', tab.intro));
  }

  if (tab.stepper && tab.stepper.length) {
    var stepper = el('div', 'stepper');
    tab.stepper.forEach(function (s) {
      var step = el('div', 'step');
      step.innerHTML = '<b>' + s.label + '</b>' + s.text;
      stepper.appendChild(step);
    });
    panel.appendChild(stepper);
  }

  var list = el('ul', 'faq-list');
  (tab.items || []).forEach(function (item) {
    if (item.type === 'group') {
      list.appendChild(el('li', 'faq-group-heading', item.title));
    } else {
      list.appendChild(buildFaqItem(item));
    }
  });
  panel.appendChild(list);

  if (tab.footer) {
    panel.appendChild(el('div', 'panel-footer', tab.footer));
  }
  if (tab.lastReviewed) {
    panel.appendChild(el('p', 'last-reviewed', 'Last reviewed: ' + tab.lastReviewed));
  }
  return panel;
}

function buildFaqItem(item) {
  var li = el('li', 'faq-item');

  var q = el('div', 'faq-q');
  q.appendChild(el('div', 'faq-q-text', item.q));
  var chev = el('div', 'faq-chevron');
  chev.innerHTML = '\u2304';
  q.appendChild(chev);
  q.addEventListener('click', function () { toggleFaq(q); });

  var a = el('div', 'faq-a');
  a.appendChild(el('div', 'faq-a-inner', item.a));

  li.appendChild(q);
  li.appendChild(a);
  return li;
}

function switchTab(tabId) {
  document.querySelectorAll('.tab-btn').forEach(function (btn) {
    btn.classList.toggle('active', btn.dataset.tab === tabId);
  });
  document.querySelectorAll('.tab-panel').forEach(function (panel) {
    panel.classList.toggle('active', panel.id === 'tab-' + tabId);
  });
  document.querySelectorAll('#tab-' + tabId + ' .faq-item').forEach(function (item) {
    item.classList.remove('open');
  });
}

function toggleFaq(qEl) {
  var item = qEl.closest('.faq-item');
  var wasOpen = item.classList.contains('open');
  item.closest('.faq-list').querySelectorAll('.faq-item').forEach(function (i) {
    i.classList.remove('open');
  });
  if (!wasOpen) { item.classList.add('open'); }
}

function render(data) {
  var tabBar = document.getElementById('tabBar');
  var panels = document.getElementById('panels');
  tabBar.innerHTML = '';
  panels.innerHTML = '';
  (data.tabs || []).forEach(function (tab, idx) {
    var isFirst = idx === 0;
    tabBar.appendChild(buildTab(tab, isFirst));
    panels.appendChild(buildPanel(tab, isFirst));
  });
  applyHashTab();
  resolveVariables(data);
}

// Fill in content variables (fees, URLs, times…) from the top-level
// "variables" list in FAQ.json. The list is the single source of truth:
// any <span class="faq-var" data-var="id"> gets its text from it, and any
// element with data-var-href gets its link address from it. Missing ids
// keep whatever fallback text/href is already in the HTML.
function resolveVariables(data) {
  var map = {};
  (data.variables || []).forEach(function (v) { if (v && v.id != null) map[v.id] = v.value; });
  var els = document.querySelectorAll('[data-var]');
  Array.prototype.forEach.call(els, function (s) {
    var val = map[s.getAttribute('data-var')];
    if (val != null) s.textContent = val;
  });
  var links = document.querySelectorAll('[data-var-href]');
  Array.prototype.forEach.call(links, function (a) {
    var val = map[a.getAttribute('data-var-href')];
    if (val != null) a.setAttribute('href', val);
  });
}

// If the URL ends in #tabid (e.g. FAQ.html#waste), open that tab.
// Unknown or missing hash simply leaves the first tab active.
function applyHashTab() {
  var id = decodeURIComponent((location.hash || '').replace(/^#/, '')).trim();
  if (id && document.getElementById('tab-' + id)) {
    switchTab(id);
  }
}

window.addEventListener('hashchange', applyHashTab);

fetch('FAQ.json')
  .then(function (res) {
    if (!res.ok) throw new Error('HTTP ' + res.status + ' loading FAQ.json');
    return res.json();
  })
  .then(render)
  .catch(function (err) {
    var box = document.getElementById('loadError');
    box.style.display = 'block';
    box.textContent =
      'Could not load FAQ.json (' + err.message + '). ' +
      'This page needs to be opened through a web server (http://), not directly from the file system.';
    console.error(err);
  });
</script>
</body>
</html>
