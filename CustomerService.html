    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script type="module">
        import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';

        window._mermaid = mermaid;

        mermaid.initialize({
            startOnLoad: false,
            theme: 'default',
            flowchart: {
                useMaxWidth: false,
                htmlLabels: true,
                curve: 'basis',
                nodeSpacing: 80,
                rankSpacing: 120,
                padding: 25
            },
            themeVariables: {
                fontSize: '32px',
                fontFamily: 'Arial, sans-serif'
            }
        });

        window.applyPostProcessing = function() {
            const svg = document.querySelector('#mermaidDiagram svg');
            if (!svg) return;

            const styleEl = document.createElementNS('http://www.w3.org/2000/svg', 'style');
            styleEl.textContent = `
                foreignObject div, foreignObject span, foreignObject p,
                foreignObject b, foreignObject i, foreignObject u,
                .nodeLabel, .nodeLabel * {
                    font-size: 26px !important;
                    line-height: 1.35 !important;
                    font-family: Arial, sans-serif !important;
                }
                .nodeLabel { text-align: left !important; }
                .nodeLabel * { text-align: left !important; }
                .edgeLabel foreignObject div, .edgeLabel .nodeLabel, .edgeLabel .nodeLabel * {
                    font-size: 22px !important;
                    font-weight: 700 !important;
                    text-align: center !important;
                }
            `;
            svg.insertBefore(styleEl, svg.firstChild);

            svg.querySelectorAll('text').forEach(el => { el.style.fontSize = '26px'; });

            svg.querySelectorAll('.nodeLabel').forEach(label => {
                const inner = label.querySelector('div') || label;
                if (!inner) return;
                const html = inner.innerHTML;
                const m = html.match(/^(<b>.*?<\/b>)(<br\/>|<br>)?(.*)/s);
                if (m) {
                    inner.innerHTML =
                        '<div style="text-align:center;font-weight:bold;margin-bottom:6px;">' + m[1] + '</div>' +
                        '<div style="text-align:left;padding-left:8px;">' + (m[3]||'') + '</div>';
                } else {
                    inner.style.textAlign = 'left';
                    inner.style.paddingLeft = '8px';
                }
            });

            svg.querySelectorAll('foreignObject').forEach(fo => {
                const div = fo.querySelector('div');
                if (div) {
                    const rect = div.getBoundingClientRect();
                    fo.setAttribute('width', Math.ceil(rect.width) + 20);
                    fo.setAttribute('height', Math.ceil(rect.height) + 20);
                }
            });

            const bbox = svg.getBBox();
            svg.setAttribute('viewBox', `${bbox.x-20} ${bbox.y-20} ${bbox.width+40} ${bbox.height+40}`);
            svg.setAttribute('width', bbox.width + 40);
            svg.setAttribute('height', bbox.height + 40);

            // ── Attach click listeners to context toggle spans ───────────
            svg.querySelectorAll('[data-context]').forEach(el => {
                el.style.cursor = 'pointer';
                el.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const key = el.getAttribute('data-context');
                    if (!window._openContext) window._openContext = new Set();
                    if (window._openContext.has(key)) {
                        window._openContext.delete(key);
                    } else {
                        window._openContext.add(key);
                    }
                    const dc = document.getElementById('diagramContainer');
                    const scrollLeft = dc.scrollLeft;
                    const scrollTop  = dc.scrollTop;
                    window.rebuildDiagram({ preserveView: true }).then(() => {
                        dc.scrollLeft = scrollLeft;
                        dc.scrollTop  = scrollTop;
                    });
                });
            });
        };

        window.renderDiagram = async function(source) {
            const wrapper = document.getElementById('diagramContainer');
            const old = document.getElementById('mermaidDiagram');
            if (old) old.remove();

            const fresh = document.createElement('div');
            fresh.className = 'mermaid';
            fresh.id = 'mermaidDiagram';
            fresh.textContent = source;
            wrapper.appendChild(fresh);

            await window._mermaid.run({ nodes: [fresh] });
            window.applyPostProcessing();
        };

        window.addEventListener('load', () => {
            window.rebuildDiagram();
        });
    </script>

<script>
    // ── Open context state ───────────────────────────────────────────────
    window._openContext = new Set();

    // ── Context node definitions ─────────────────────────────────────────
    const CONTEXT_NODES = {
        'PlanGPart1': {
            parentId: 'PlanGPart1',
            nodeId: 'PlanGPart1_ctx',
            label: `<b>📖 What is the Planning Scheme?</b><br/><br/>📌 <a href='https://www.sdrc.qld.gov.au/doing-business/planning---development/strategic-planning' target='_blank'>Southern Downs Planning Scheme</a><br/><br/>A legally binding document governing land use and development in the local government area over the long term (typically 20 years). Defines zoning, building heights, and development rules to balance community needs, economic growth, and environmental protection.<br/><br/>Each Queensland council prepares its own scheme in consultation with the State Government and community.<br/><br/>Aims to: ensure land is available for housing, services, and business; maximise liveability; plan infrastructure efficiently; protect natural areas and heritage; build resilience to floods and bushfires; and reflect the community's vision for the region.`
        },
        'PlanCanI': {
            parentId: 'PlanCanI',
            nodeId: 'PlanCanI_ctx',
            label: `<b>📖 Background &amp; Context — Can I build here?</b><br/><br/>There are two types of approvals for construction: <b>building approval</b> and <b>planning approval</b>. Most new structures require building approval. A shed under 10m2 does not require building approval, but must still comply with siting and boundary clearance rules.<br/><br/>Whether planning approval is required depends on many factors — the most common reason is that the construction cannot meet the required setbacks of the Southern Downs Planning Scheme.<br/><br/><u>Common site constraints:</u><br/>- Underground infrastructure (e.g. sewer line)<br/>- Lack of constructed road access to the property<br/>- Bushfire Zone | Flood Zone<br/><br/><u>Setbacks - Dwellings:</u><br/>Residential/township: 6m front, 1.5m side &amp; rear (QDC MP 1.2)<br/>Rural: 60m from side/rear lot boundaries; 60m from gravel/unmade road; 6m from sealed road<br/>Rural residential: Refer to Southern Downs Planning Scheme<br/><br/><u>Setbacks - Sheds:</u><br/>Residential/township: 6m front, 1.5m side &amp; rear<br/>Rural/specific: typically 4.5-6m - refer to Queensland Development Code`
        },
        'PlanExist': {
            parentId: 'PlanExist',
            nodeId: 'PlanExist_ctx',
            label: `<b>📖 Why we always transfer — Existing Applications</b><br/><br/>Planning applications are complex and highly case-specific. Only the planner managing a file has the full context needed to answer accurately — application history, conditions, referral agency responses, and any outstanding issues.<br/><br/>Attempting to answer without that context risks giving incorrect advice that could have serious consequences for the applicant.`
        },
        'PlanPreLodge': {
            parentId: 'PlanPreLodge',
            nodeId: 'PlanPreLodge_ctx',
            label: `<b>📖 General Enquiries vs Pre-Lodgement Meetings</b><br/><br/><b>General Enquiries (no fee):</b><br/>For information of a general nature - opportunities and constraints of a site; clarifying the location of a building; potential use of a specific parcel of land. Transfer to the planning team.<br/><br/><b>Pre-Lodgement Meeting ($300 - 60 min, RC192):</b><br/>A paid service for applicants who already have a clear development goal. Provides tailored advice on a specific proposal before a formal Development Application is lodged. Helps applicants understand key areas of assessment and required supporting documents in advance.<br/><br/>This service is for people who know what and where they want to develop - not for general site enquiries.`
        },
        'PlanObjection': {
            parentId: 'PlanObjection',
            nodeId: 'PlanObjection_ctx',
            label: `<b>📖 Why this matters — Appeal rights</b><br/><br/>Submissions that do not meet all of the checklist criteria are <b>not considered properly made</b> and submitters will not have third-party appeal rights.<br/><br/>If a submission is properly made and Council approves the application, the submitter has the right to appeal Council's decision in the Planning and Environment Court.<br/><br/>If Council refuses the application, all submitters (properly made or not) are notified after the decision is made and receive a copy of the Decision Notice.`
        },
        'AnimalAttack': {
            parentId: 'AnimalAttack',
            nodeId: 'AnimalAttack_ctx',
            label: `<b>📖 After a Dog Attack — Possible outcomes</b><br/><br/>Following a reported attack, Local Laws officers will investigate. Possible outcomes:<br/><br/><b>Dangerous Dog Declaration:</b><br/>May be issued where a dog has attacked, bitten, or rushed at a person or animal. Requirements imposed on the owner include: microchipping, desexing, approved enclosure, muzzle in public, and a warning sign on the premises. The owner may appeal within 28 days to the Magistrates Court.<br/><br/><b>Destruction Order:</b><br/>May be issued in severe or repeat cases, or where the owner fails to comply with a Dangerous Dog Declaration.<br/><br/><b>Advising the victim:</b><br/>- Seek medical attention if injured<br/>- A police report may be appropriate for serious incidents<br/>- Retain evidence: photos, witness details, and vet reports if a pet was also injured`
        },
        'BarkNew': {
            parentId: 'BarkNew',
            nodeId: 'BarkNew_ctx',
            label: `<b>📖 Why we require a diary — Legal framework</b><br/><br/>Council needs documented evidence before taking enforcement action. A single complaint without a diary cannot result in formal action.<br/><br/>The diary establishes a pattern of nuisance over time, which is required to demonstrate an ongoing problem.<br/><br/><b>Escalation path:</b><br/>1. Customer encouraged to contact the dog owner directly first<br/>2. Customer completes diary over 10 days and emails to Local Laws<br/>3. Local Laws contacts dog owner and issues written warning<br/>4. If behaviour continues: infringement notice may be issued<br/>5. Non-compliance: infringement notice which if unpaid can lead to court action<br/><br/>Set realistic expectations with the customer — the process takes time and council's primary goal is behavioural correction, not punishment.`
        },
        'RatesSale': {
            parentId: 'RatesSale',
            nodeId: 'RatesSale_ctx',
            label: `<b>📖 Property Valuations — Background</b><br/><br/>Properties are valued by the State Government (Department of Resources), not council. Valuations are updated annually and form the basis of the General Rate calculation.<br/><br/>Owners who believe their valuation is incorrect have 60 days from the date of their valuation notice to lodge a formal objection with the Department of Resources. Council cannot intervene in this process.<br/><br/><u>Why rates increase after subdivision or sale of bulk-assessed land:</u><br/>When bulk-assessed lots are sold individually, each receives its own Property ID and is independently valued. The per-lot valuation is typically higher than a proportional share of the bulk-assessed value, resulting in a higher rates charge.<br/><br/>This is a State Government valuation outcome — council has no discretion to reduce it. Customers who dispute their new valuation should contact the Department of Resources.`
        },
        'RatesPayAgree': {
            parentId: 'RatesPayAgree',
            nodeId: 'RatesPayAgree_ctx',
            label: `<b>📖 Payment Agreements — Policy context</b><br/><br/><b>If a customer defaults:</b><br/>If the customer fails to maintain agreed payments, the payment agreement is void and all outstanding rates become immediately payable. Council may proceed to debt recovery, including referral to an external collector and ultimately a caveat on the property.<br/><br/><b>Customers in genuine hardship:</b><br/>Customers experiencing ongoing financial difficulty beyond a standard payment agreement should be encouraged to contact the revenue team directly. Customer service should not make commitments beyond the standard process.<br/><br/><b>Rate recovery codes — what they mean:</b><br/>- General: standard account in good standing<br/>- FirstREM / FinalREM: reminder notice issued, account overdue<br/>- ARR: referred to external debt recovery (Recoveries &amp; Reconstructions) — do not negotiate, transfer to R&amp;R: 1300 556 863`
        },
        'BuildingNew': {
            parentId: 'BuildingNew',
            nodeId: 'BuildingNew_ctx',
            label: `<b>📖 What building work requires approval?</b><br/><br/><u>Generally requires building approval:</u><br/>New dwellings, extensions, garages, carports, sheds over 10m2, swimming pools, retaining walls over 1m, patios/decks attached to the dwelling, and most commercial construction.<br/><br/><u>Generally does not require building approval:</u><br/>Garden sheds under 10m2, some fencing, some landscaping. However, even exempt structures must still comply with siting and boundary setback requirements under the Queensland Development Code.<br/><br/><u>Private Certifier vs Council:</u><br/>Customers may engage a private building certifier who manages the application, arranges inspections, and liaises with council on their behalf. Most customers undertaking larger projects choose this route. Council fees are the same either way — the certifier charges their own fee on top.`
        },
        'BuildingAdmin': {
            parentId: 'BuildingAdmin',
            nodeId: 'BuildingAdmin_ctx',
            label: `<b>📖 Building plan copyright — Background</b><br/><br/>Building plans are a creative work protected by copyright. The copyright belongs to whoever created the plans (architect, draftsperson, or design team) — not the property owner, even if the owner paid for construction.<br/><br/>Copyright lasts for the creator's lifetime plus 70 years. Council cannot release plans without written consent from the copyright owner, or until the copyright has expired.<br/><br/><u>Common scenarios:</u><br/>- Plans by a known draftsperson or firm: contact that person or their estate for consent<br/>- Plans drawn by Len Rigg: standing permission has been granted by his estate — council may release these<br/>- Plans with unknown or long-deceased creator: copyright may have expired — seek guidance from the building team before releasing<br/><br/>The property owner's right to maintain their property does not transfer copyright ownership.`
        },
        'WasteBin': {
            parentId: 'WasteBin',
            nodeId: 'WasteBin_ctx',
            label: `<b>📖 Cleanaway contract — Background</b><br/><br/>Cleanaway is contracted by SDRC to provide domestic waste and recycling collection. Council does not directly manage collection operations — Cleanaway is the point of contact for all standard service issues.<br/><br/>All bin service requests go through the Cleanaway portal. Do not lodge a Merit for standard bin issues (missed pickup, damaged bin, missing bin) — these must go through Cleanaway directly.<br/><br/><u>Complaints about recurring issues or driver conduct:</u><br/>Lodge a Merit (Keyword: Complaint) — these are actioned by the Council's Waste Team, not Cleanaway.<br/><br/><u>If a Cleanaway request goes unresolved:</u><br/>Lodge a Merit (Keyword: Complaint) so council can follow up with Cleanaway on the customer's behalf.`
        },
        'WasteFacilities': {
            parentId: 'WasteFacilities',
            nodeId: 'WasteFacilities_ctx',
            label: `<b>📖 Facility charges &amp; accepted materials</b><br/><br/><u>Generally accepted at no charge:</u><br/>Green/garden waste, clean recyclables (paper, cardboard, glass, plastics 1 and 2), and e-waste at designated sites.<br/><br/><u>Fees typically apply to:</u><br/>General household waste, mattresses, tyres, large whitegoods. Fees are set annually in the Fees &amp; Charges schedule.<br/><br/><u>Asbestos — special requirements:</u><br/>Asbestos must be double-bagged in 200-micron plastic, clearly labelled, and the customer must pre-book with council before attending the facility. Facility staff cannot accept asbestos that has not been pre-booked. Direct customers to the Asbestos Disposal Guidelines for full requirements.<br/><br/><u>Landfill levy:</u><br/>A State Government charge included in the cost of general waste disposal. Council must pass this on and has no discretion to waive it.`
        }
    };

    // ── Diagram source sections ──────────────────────────────────────────
    const HEADER = `flowchart TD
    Start(["📞 Incoming Call"]) --> Greeting["<b>GREETING</b><br/><i>Southern Downs Regional Council,<br/>this is Name speaking.<br/>How can I help you today?</i>"]
    
    Greeting --> Verify["<b>CALL OPEN</b><br/>1. Listen to the customer as they tell you their reason for calling - take notes as they speak<br/>2. Ask follow up questions until you are confident you understand the reason why they are calling<br/>3. Offer customer a service or information relevant to their reason for calling - allow customer to confirm before proceeding<br/>4. If necessary verify customer details: Name, Address, Mobile and Email - match details in TechOne"]

    ActionDecision -->|Email Form| FormBox["<b>📧 EMAIL FORM</b><br/><br/>1. Find form: Eli FORMS<br/>2. Confirm customer email address<br/>3. Attach form to email<br/>4. Instruct customer: if emailing back,<br/>send to records@sdrc.qld.gov.au<br/>for records to process application<br/><br/>📌 Eli: FORMS"]
    
    ActionDecision -->|Process Payment| BPOINTBox["<b>💳 PROCESS PAYMENT - BPOINT</b><br/><br/>Ref 1: Customer Name<br/>Ref 2: Customer Address<br/>Ref 3: Reference Number<br/>(Application/Licence/Property ID)<br/>Merchant ID: Property ID<br/><br/>Email receipt to customer<br/>(confirm email address)<br/><br/>For quick reference of RC codes:<br/>📌 Eli: General Ledger Account Mnemonics (CTRL+F to search)<br/>📌 Eli: BPOINT Guide"]
    
    ActionDecision -->|Transfer / Callback| TransferBox["<b>📲 TRANSFER / RETURN CALL</b><br/><br/>1. Establish context: Ask who &amp; why<br/><br/>2a. SDRC Staff/Department:<br/>By Name: Search The Pulse Staff List<br/>By Role: Eli Who to call - What they do<br/>Call to check availability<br/>If available: establish context, transfer<br/>If unavailable: arrange callback via<br/>Merit or email to staff/department<br/><br/>2b. Other Organisation:<br/>Provide contact details<br/>Eli Other Contacts<br/><br/>📌 Eli: Internal Directory"]
    
    ActionDecision -->|Info Provided| NoAction["<b>✅ INFO PROVIDED</b><br/><br/>Customer has answer<br/>or referral contact"]

    const SECTIONS = {

    'rates': `    PropDecision -->|Rates| RatesDecision{"Balance/Payment,<br/>Agreement, Admin,<br/>Property Sale, Info,<br/>or Privacy?"}
    RatesDecision -->|Property Sale| RatesSale["<b>💰 RATES - Property Sale</b><br/><br/><u>Settlement:</u><br/>During a typical settlement, solicitors adjust the sale price so the rates for the current period are shared between vendor and purchaser in proportion to their respective periods of ownership. Neither party needs to contact council — the transfer of name on the property is handled automatically by the Titles Office.<br/><br/><u>Bulk Assessed Properties:</u><br/>In rural zones it is common for a single Property ID to cover multiple lots. In Intramaps, the selected lot boundary shows in red and related bulk-assessed lots show in orange — these share a PID and appear on the same rates notice.<br/><br/>When land is bulk assessed, the Titles Office values it as a single large lot, resulting in a lower valuation and lower rates. When individual lots within a bulk-assessed property are sold, each sold lot receives a new PID and is revalued independently — typically resulting in a higher rates charge.<br/><br/>Because settlement contracts generally do not allow time for revaluation and a supplementary rates notice to be issued, the standard process is for the vendor to ensure all rates owing on the property are paid in full prior to settlement.<br/><br/><span data-context='RatesSale' style='display:inline-block;margin-top:10px;padding:3px 10px;background:#eff6ff;border:1px solid #93c5fd;border-radius:4px;color:#1d4ed8;'>📖 Valuations explained</span>"]
    RatesDecision -->|Balance / Payment| RatesBalPay["<b>💰 RATES - Balance &amp; Payment</b><br/><br/><u>Rates Balance:</u><br/>Look up property in TechOne - navigate to the rates tab and provide the Total Payable balance.<br/><br/>If customer queries the balance:<br/>[ ] Check the correct Property ID was pasted into TechOne<br/>[ ] Total Payable Balance reflects the total if the customer pays today<br/>[ ] Before the due date, the Total Payable balance includes the discount<br/>[ ] If customer has made payment via BPAY/direct debit/bank transfer it may take time to show - check most recent rates notice and transaction history<br/>[ ] Offer to provide a copy of the most recent rates notice<br/><br/><u>Solicitor Exception:</u><br/>If a solicitor calls to confirm the current balance for a property sale, check whether a rates search application has been submitted. If yes, provide the balance to the solicitor.<br/><br/><u>Rates Payment:</u><br/>1. Use Property ID in TechOne - verbally confirm Total Payable Balance<br/>2. Process payment in BPOINT<br/><br/>📌 Eli: Rates Process"]
    RatesDecision -->|Payment Agreement| RatesPayAgree["<b>💰 RATES - Payment Agreement</b><br/><br/>1. Look up property on TechOne<br/>2. Verify caller identity<br/>3. Check rate recovery code:<br/>[ ] General/FirstREM/FinalREM: proceed<br/>[ ] ARR: refer to R&amp;R: 1300 556 863<br/>[ ] Other: arrange callback from revenue department<br/>4. Generate spreadsheet - run XLOne report in TechOne<br/>5. Follow spreadsheet process with customer<br/>6. Save spreadsheet to pre-approved agreements folder: PID - SURNAME<br/>7. Email copy of spreadsheet to revenue (if customer rejected both payment options, inform revenue in email)<br/>8. Customer to await confirmation email from revenue<br/><br/>📌 Eli: Payment Agreement<br/><br/><span data-context='RatesPayAgree' style='display:inline-block;margin-top:10px;padding:3px 10px;background:#eff6ff;border:1px solid #93c5fd;border-radius:4px;color:#1d4ed8;'>📖 Payment agreement policy</span>"]
    RatesDecision -->|Admin| RatesAdmin["<b>💰 RATES - Admin</b><br/><br/><u>Copy of Rates Notice:</u><br/>1. Verify identity<br/>2. Search Property ID in Payreq<br/>3. Email most recent rates notice PDF to customer<br/>4. If customer requires rates notice from previous FY: look up fee in Fees &amp; Charges<br/><br/><u>Direct Debit:</u><br/>New: Email Form - Direct Debit Request<br/>Alter: Email Form - DD Alteration/Cancellation<br/><br/><u>Pensioner Rates Subsidy:</u><br/>1. Confirm address on pension card matches customer address in TechOne<br/>2. Email Form - Pension Subsidy Application - request customer attach a copy of pension card<br/>3. Customer may attend front counter to fill out form in person - we will photocopy their card<br/><br/><u>Sign up for Email Rates Notices:</u><br/>1. Refer customer to second page of rates notice - Go Paperless QR code<br/>2. Or search Go Paperless on SDRC website - create a Payreq account<br/>3. Customer must provide the name on the rates notice and their BPAY Reference number<br/>4. Customer must ensure email address used to sign up for Payreq matches the one on file in TechOne<br/><br/>📌 Eli: Rates<br/>📌 Eli: Direct Debit<br/>📌 Eli: SDRC - Go Paperless"]
    RatesDecision -->|Understanding Rates| RatesExplain["<b>💰 RATES - Understanding Your Rates</b><br/><br/>- <b>Water Access Charge:</b> Levied on all properties with the ability to connect to the water main, even if not currently connected<br/>- <b>Domestic &amp; Recycling Waste Collection:</b> Charge for the bin service<br/>- <b>Waste Management Charge:</b> Applied to all properties in the Southern Downs - covers council waste management facilities and rehabilitation of closed landfill sites<br/><br/>📌 <a href='https://www.sdrc.qld.gov.au/payments-services/property-rates-charges/rates-charges-explained' target='_blank'>Rates Charges Explained - SDRC</a>"]

    RatesDecision -->|Privacy / Info| RatesPrivacy["<b>💰 RATES - Privacy &amp; Information Requests</b><br/><br/>Information that can be provided to non-property owners:<br/>- Information available on the public Online Mapping tool<br/>- Postal addresses of property owners<br/>- Information available on the public Application Tracking Tool<br/><br/>📌 <a href='https://sdrc-web.t1cloud.com/T1PRDefault/WebApps/eProperty/P1/eTrack/eTrackApplicationSearch.aspx?r=P1.WEBGUEST&amp;f=$P1.ETR.SEARCH.ENQ' target='_blank'>Application Tracking Tool</a><br/><br/>When in doubt, ask a supervisor."]

    'building': `    PropDecision -->|Building| BuildingDecision{"New, Existing,<br/>Inspection, Plans,<br/>Pay Fees, or Privacy?"}
    BuildingDecision -->|New| BuildingNew["<b>🏗️ BUILDING - New</b><br/><br/>1. Provide Factsheets: Building Info Sheets - SDRC<br/>2. Arrange callback: Merit Building - Follow Process, provide customer with Merit #<br/><br/><u>Building Approval Not Required?</u><br/>Some structures may not require building approval under Schedule 2 of the Building Regulation 2021 (Qld). Common examples include structures under 3m high that are not fences, retaining walls, or swimming pools; sun hoods under 2m2; tents under 100m2; and certain rural agricultural structures set back 200m from roads and boundaries.<br/><br/>Do not confirm over the phone that building approval is not required — project-specific details matter and advice given without full context could be incorrect. Provide general information, refer the customer to the Schedule 2 link below, and offer to arrange a callback with the building team if they feel it is necessary.<br/><br/>📌 <a href='https://www.sdrc.qld.gov.au/doing-business/planning-development/building/building-info-sheets' target='_blank'>SDRC Website - Building info sheets</a><br/>📌 <a href='https://www.planning.qld.gov.au/planning-framework/development-assessment/development-assessment-process/forms-and-templates' target='_blank'>DA Form 2 - With examples</a><br/>📌 <a href='https://www.legislation.qld.gov.au/view/html/inforce/current/sl-2021-0126#sch.2' target='_blank'>Building Regulation 2021 - Schedule 2 (Qld)</a><br/><br/><span data-context='BuildingNew' style='display:inline-block;margin-top:10px;padding:3px 10px;background:#eff6ff;border:1px solid #93c5fd;border-radius:4px;color:#1d4ed8;'>📖 What needs approval?</span>"]
    BuildingDecision -->|Existing| BuildingExist["<b>🏗️ BUILDING - Existing</b><br/><br/>1. Check if customer is using a private certifier - if so, refer them back to their certifier<br/>2. If no private certifier: look up BLD number in ECM/TechOne to find most recent correspondence<br/>Transfer to relevant person:<br/>- Question regarding application: Built Environment Technical Officer<br/>- Question regarding certification or inspection: Building Certifier<br/>3. If unavailable - arrange callback:<br/>Merit Building - Follow Process, provide customer with Merit #<br/><br/>📌 Eli: Building Applications"]
    BuildingDecision -->|Inspection| BuildingInspec["<b>🏗️ BUILDING - Inspection</b><br/><br/>Determine inspection type:<br/>1. Footing/Foundation<br/>2. Slab<br/>3. Frame<br/>4. Final<br/><br/>Follow email template to notify Building Certifier<br/><br/>📌 Eli: Building Inspections"]
    BuildingDecision -->|Plans| BuildingPlans["<b>🏗️ BUILDING - Copy of Building Plans</b><br/><br/>Only the property owner may request a copy of their house plans. Plans are only released with permission from the copyright owner.<br/><br/>1. Check if council has plans on file — note: some properties pre-date the modern building approval process and plans may not exist<br/>2. Obtain written permission from the copyright owner — note: the Estate of Len Rigg has provided standing permission for plans produced during his career<br/>3. Customer to pay applicable fee — refer to Fees &amp; Charges: Copy of Development Approval Documents<br/>4. Contact building team to release documents<br/><br/><span data-context='BuildingAdmin' style='display:inline-block;margin-top:10px;padding:3px 10px;background:#eff6ff;border:1px solid #93c5fd;border-radius:4px;color:#1d4ed8;'>📖 Plan copyright</span>"]

    BuildingDecision -->|Pay Application Fees| BuildingPayFees["<b>🏗️ BUILDING - Pay Application Fees</b><br/><br/>1. Confirm the fee with the customer before processing payment — search the Application Number in the Regulatory/Applications tab in TechOne<br/>2. Process payment in BPOINT<br/><br/>Note: Application fees are not refunded if the application is denied."]
    BuildingDecision -->|Privacy / Info| BuildingPrivacy["<b>🏗️ BUILDING - Privacy &amp; Information Requests</b><br/><br/>Information that can be provided to non-property owners:<br/>- Information available on the public Online Mapping tool<br/>- Information available on the public Application Tracking Tool<br/><br/>📌 <a href='https://sdrc-web.t1cloud.com/T1PRDefault/WebApps/eProperty/P1/eTrack/eTrackApplicationSearch.aspx?r=P1.WEBGUEST&amp;f=$P1.ETR.SEARCH.ENQ' target='_blank'>Application Tracking Tool</a><br/><br/>When in doubt, ask a supervisor."]

    'buildingguide': `    PropDecision -->|Building Approval General Process| BGuide1["<b>📚 BUILDING GUIDE - Before You Begin</b><br/><br/>If you have a construction project in mind, a good starting point is to obtain quotes from multiple licensed contractors. A contractor can advise on materials and methods, provide a rough schedule, and give a cost estimate.<br/><br/>Licensed contractors are bound by state legislation to complete work to a standard that will pass inspection. Getting a quote can help identify the most practical approach, which will assist with preparing your building application.<br/><br/>Note: No work of any description is to be commenced until your building application is approved."]
    BGuide1 --> BGuide2["<b>📚 BUILDING GUIDE - Application Requirements</b><br/><br/>Your application will require a <b>DA Form 2</b>, plus supporting documents. Offer to email the customer the relevant fact sheet.<br/><br/>Typical supporting documents:<br/>[ ] Site Plan, Floor Plan, Elevations and Structural Details<br/>[ ] Footing/Slab Design and Form 15 (signed by RPEQ registered engineer)<br/>[ ] Energy Efficiency Report (Class 1a dwellings)<br/>[ ] Soil Test Report (Class 1a dwellings)<br/>[ ] QBCC Insurance Certificate — mandatory for residential construction valued over $3,300<br/>OR QBCC Owner Builder Permit — if building yourself, value $11,000 or more (once per 6-year period)<br/>[ ] QLeave Payment Receipt — if value of building work over $150,000 excl. GST. Must be registered before construction begins. Council cannot issue Building Approval until this receipt is sighted.<br/><br/>Note: Additional information may be required for bushfire attack level, flood zone, termite protection, lighting, water tanks etc.<br/><br/>📌 <a href='https://www.sdrc.qld.gov.au/doing-business/planning-development/building/building-info-sheets' target='_blank'>SDRC Website - Building info sheets</a><br/>📌 <a href='https://www.planning.qld.gov.au/planning-framework/development-assessment/development-assessment-process/forms-and-templates' target='_blank'>DA Form 2 - With examples</a>"]
    BGuide2 --> BGuide3["<b>📚 BUILDING GUIDE - Private Building Certifier</b><br/><br/>It is possible to engage a private building certifier to prepare and lodge the application on your behalf. Most customers undertaking larger projects choose this option.<br/><br/>The certifier will assist with documentation and can subcontract additional professionals as required (architects, engineers, surveyors, soil tests, energy efficiency reports, bushfire attack level reports etc.).<br/><br/>Post-lodgement, the certifier will liaise with council on your behalf and conduct on-site inspections throughout construction."]
    BGuide3 --> BGuide4["<b>📚 BUILDING GUIDE - Construction Inspections</b><br/><br/>Inspections are required at each of the following stages:<br/>1. Footing/Foundation<br/>2. Slab<br/>3. Frame<br/>4. Final<br/><br/>Each stage must be signed off before the next commences.<br/><br/>Once the final inspection is passed, a Form 21 Final Certificate is issued. In the case of new dwellings, the property may not be inhabited until this certificate has been issued."]
    BGuide4 --> BGuide5["<b>📚 BUILDING GUIDE - Failed Inspection / Defective Work</b><br/><br/>The QBCC can issue a formal Direction to Rectify, requiring the builder to fix the work at their own cost within a set timeframe. Non-compliance may result in significant fines and licence suspension.<br/><br/>If a builder refuses or fails to rectify defective work, the QBCC can assist the homeowner through other means, including the Queensland Home Warranty Scheme.<br/><br/>SDRC customer service staff can assist in directing specific building queries to the council building team."]

    PlumbingDecision -->|Do I need approval?| PlumbNew["<b>🔧 PLUMBING - Do I need approval?</b><br/><br/>1. Unregulated work - No approval required: Homeowners may fix minor plumbing maintenance issues without requiring a licensed tradesperson or council approval.<br/>📌 <a href='https://www.sdrc.qld.gov.au/doing-business/plumbing---drainage/plumbing-approvals/unregulated-work' target='_blank'>SDRC - Unregulated Work</a><br/><br/>2. Minor work - No approval required: Minor work does not require council approval but must be performed by an appropriately licensed person.<br/>📌 <a href='https://www.sdrc.qld.gov.au/doing-business/plumbing-drainage/plumbing-approvals/minor-work-plumbing' target='_blank'>SDRC - Minor Work</a><br/><br/>3. Notifiable work - No approval required: Your licensed plumber will notify the council on your behalf.<br/><br/>4. Compliance assessable work - Yes, approval and inspections required: Typically a plumber or building certifier will submit the necessary applications.<br/><br/>5. If necessary arrange callback from plumbing team:<br/>[ ] Merit Plumbing - Follow Process<br/>[ ] Provide customer with Merit #<br/><br/>📌 Eli: Plumbing FAQ"]
    PlumbingDecision -->|Existing| PlumbExist["<b>🔧 PLUMBING - Existing</b><br/><br/><u>Existing Application:</u><br/>1. Transfer to relevant person<br/>2. If unavailable - arrange callback:<br/>[ ] Merit Plumbing - Follow Process<br/>[ ] Provide customer with Merit #<br/><br/>📌 Eli: Plumbing Applications"]
    PlumbingDecision -->|Water/Sewer| PlumbConnect["<b>🔧 PLUMBING - New Connections</b><br/><br/><u>Connect to Sewer/Water:</u><br/>1. Check Intramaps Water &amp; Sewerage Module<br/>2. Use Intramaps to determine standard or non-standard connection - all four must = YES for standard:<br/>[ ] Within 100m of 100mm main: use Water module + measurement tool in Intramaps<br/>[ ] In declared Catchment Area: use overlay in Waste Water module<br/>[ ] Has Vacant Access Charges: check water charge in property cadastre menu<br/>[ ] Single lot/duplex/secondary/subdivision<br/><br/>3. If Standard: Email Form - Application for Water or Sewer Services<br/>4. If Non-Standard: Email Form - Private Works (Water &amp; Sewerage Forms - SDRC)<br/><br/>📌 Eli: New Water/Sewer Connection"]
    PlumbingDecision -->|Inspection| PlumbInspec["<b>🔧 PLUMBING - Inspection</b><br/><br/><u>Booking Plumbing Inspections:</u><br/>1. Obtain from customer:<br/>- PD number<br/>- Structure type<br/>- Location<br/>- Preferred start time<br/>- Inspection type:<br/>[ ] Under slab (sub-drain)<br/>[ ] Stack/elevated pipework to be covered<br/>[ ] Drainage (sanitary house drain)<br/>[ ] Water services (rough in)<br/>[ ] Final plumbing inspection<br/><br/>Also obtain:<br/>- Plumbing assessment/approval number<br/>- Responsible person name and contact details<br/><br/>2. Check plumbing inspector calendar for availability - allow 30 min between inspections for travel<br/>3. Add inspection to calendar<br/>4. Notify inspectors by email<br/><br/>📌 Eli: Plumbing Inspections"]

    PlumbNew --> ActionDecision
    PlumbExist --> ActionDecision
    PlumbConnect --> ActionDecision
    PlumbInspec --> ActionDecision`,

    'planning': `    PropDecision -->|Planning| PlanningDecision{"<b>Planning</b>"}
    PlanningDecision -->|What is Town Planning?| PlanIntro["<b>📐 PLANNING - What is Town Planning?</b><br/><br/>Town planning manages how land is used to create functional, sustainable communities — guiding growth, reducing congestion, protecting the environment, and ensuring access to services.<br/><br/><u>Your Role</u><br/>You will regularly speak to customers about planning matters. You can help by:<br/>1. Providing factsheets and working through SDRC's publicly available checklists<br/>2. Explaining terminology and application requirements<br/>3. Referring customers to private town planners, surveyors, or other experts<br/>4. Transferring technical queries about specific properties to the planning team<br/><br/>Common customer questions:<br/>Do I need planning approval? / Can I subdivide? / What is the difference between planning and building approval? / What is the status of my application?"]
    PlanningDecision -->|Can I build?| PlanCanI["<b>📐 PLANNING - Can I build here?</b><br/><br/><u>Action</u><br/>1. Use the relevant checklist to determine if planning approval is required<br/>2. Share the Online Mapping link so the customer can check overlays for their property<br/>3. Work through the checklist with the customer if time permits<br/>4. For anything beyond the checklist level: contact the Duty Planner<br/><br/>📋 <a href='https://www.sdrc.qld.gov.au/ArticleDocuments/527/Building%20a%20House%20in%20Rural%20Zone.pdf.aspx' target='_blank'>House - Rural Zone checklist</a><br/>📋 <a href='https://www.sdrc.qld.gov.au/ArticleDocuments/527/Dual%20occupancy%20(second%20dwelling)%20in%20the%20Rural%20Zone.pdf.aspx' target='_blank'>Dual occupancy - Rural Zone checklist</a><br/>📋 <a href='https://www.sdrc.qld.gov.au/ArticleDocuments/527/Dual%20occupancy%20(Duplex)%20in%20the%20Residential%20and%20Rural%20residential%20Zones.pdf.aspx' target='_blank'>Dual Occupancy - Residential/Rural Residential checklist</a><br/><br/>📌 <a href='https://sdrc.spatial.t1cloud.com/spatial/intramaps/?configId=15145eaf-c419-4c91-aa46-f0b9d5637836&amp;project=Online%20Mapping' target='_blank'>Online Mapping</a> | 📌 <a href='https://www.sdrc.qld.gov.au/doing-business/planning---development/strategic-planning' target='_blank'>Southern Downs Planning Scheme</a><br/><br/><span data-context='PlanCanI' style='display:inline-block;margin-top:10px;padding:3px 10px;background:#eff6ff;border:1px solid #93c5fd;border-radius:4px;color:#1d4ed8;'>📖 Background &amp; Context</span>"]
    PlanningDecision -->|Existing| PlanExist["<b>📐 PLANNING - Existing Application</b><br/><br/><u>Action</u><br/>1. Take details of the query<br/>2. Transfer to the planner working on the application<br/>3. If unavailable: lodge Merit Planning - Follow Process, provide Merit # and advise callback within max 5 business days<br/><br/>📌 Eli: Planning Applications<br/><br/><span data-context='PlanExist' style='display:inline-block;margin-top:10px;padding:3px 10px;background:#eff6ff;border:1px solid #93c5fd;border-radius:4px;color:#1d4ed8;'>📖 Why we always transfer</span>"]
    PlanningDecision -->|Payment| PlanPayment["<b>📐 PLANNING - Pay Application Fees</b><br/><br/>1. Confirm the fee with the customer before processing payment — search the Application Number in ECM<br/>2. Process payment in BPOINT<br/>3. Email receipt to the planning team<br/><br/>Note: Application fees are not refunded if the application is denied.<br/><br/>📌 Eli: Planning Applications"]
    PlanningDecision -->|Pre-Lodgement/Enquiry| PlanPreLodge["<b>📐 PLANNING - Pre-Lodgement Meeting &amp; Enquiries</b><br/><br/><u>Action</u><br/>1. Determine whether the customer needs a general enquiry or a pre-lodgement meeting<br/>2. General enquiry: transfer to the planning team, or arrange a callback via Merit if unavailable<br/>3. Pre-lodgement meeting: process $300 payment (RC192) via BPOINT, then arrange booking with planning team<br/><br/>📌 Eli: Planning Applications<br/><br/><span data-context='PlanPreLodge' style='display:inline-block;margin-top:10px;padding:3px 10px;background:#eff6ff;border:1px solid #93c5fd;border-radius:4px;color:#1d4ed8;'>📖 Enquiry vs Pre-Lodgement</span>"]
    PlanningDecision -->|Objection| PlanObjection["<b>📐 PLANNING - Objection to Planning Application</b><br/><br/><u>Action - run through checklist with customer</u><br/>To be a properly made submission it must:<br/><br/>[ ] Be in writing and signed by each person making the submission<br/>[ ] Be received during the public notification period<br/>[ ] Include the name and address of all submitters<br/>[ ] Include the grounds of the submission, and the facts and circumstances relied upon in support of those grounds<br/>[ ] Include one (1) postal or electronic address for all submission-makers<br/>[ ] Be addressed to the assessment manager: Southern Downs Regional Council<br/><br/>📌 Eli: Planning Applications<br/><br/><span data-context='PlanObjection' style='display:inline-block;margin-top:10px;padding:3px 10px;background:#eff6ff;border:1px solid #93c5fd;border-radius:4px;color:#1d4ed8;'>📖 Why this matters</span>"]

    PlanningDecision -->|Privacy / Info| PlanningPrivacy["<b>📐 PLANNING - Privacy &amp; Information Requests</b><br/><br/>Information that can be provided to non-property owners:<br/>- Information available on the public Online Mapping tool<br/>- Information available on the public Application Tracking Tool<br/><br/>📌 <a href='https://sdrc-web.t1cloud.com/T1PRDefault/WebApps/eProperty/P1/eTrack/eTrackApplicationSearch.aspx?r=P1.WEBGUEST&amp;f=$P1.ETR.SEARCH.ENQ' target='_blank'>Application Tracking Tool</a><br/><br/>When in doubt, ask a supervisor."]

    PlanCanI --> ActionDecision

    'planningguide': `    PropDecision -->|Planning Application Process| PlanGTypes["<b>📚 PLANNING GUIDE - Types of Development &amp; Applications</b><br/><br/><u>Can this development proceed?</u><br/>1. <b>Prohibited</b> — Not permitted under any circumstances. Only the state government can designate development as prohibited.<br/>2. <b>Accepted</b> — Can proceed without any planning approval.<br/>3. <b>Assessable</b> — Requires planning approval from Council before it can proceed.<br/><br/><u>If assessable, what type of assessment applies?</u><br/>- <b>Code Assessment</b> — Assessed against planning scheme codes. No public notification required. The more straightforward pathway.<br/>- <b>Impact Assessment</b> — For proposals that may impact adjoining land uses. Requires public notification by the applicant. Submissions from the public are possible.<br/><br/><u>What type of application does the customer need?</u><br/>- <b>Reconfiguration (RC)</b> — Changing lot boundaries: subdivision, amalgamation, boundary realignment, or access easements. Subdivision creates two or more separate lots, each with its own title.<br/>- <b>Material Change of Use (MCU)</b> — Changing a property's fundamental purpose. Common Southern Downs examples: short-term accommodation, house sites that can't meet setback requirements, some second dwellings.<br/><br/><span data-context='PlanGPart1' style='display:inline-block;margin-top:10px;padding:3px 10px;background:#eff6ff;border:1px solid #93c5fd;border-radius:4px;color:#1d4ed8;'>📖 What is the Planning Scheme?</span>"]
    PlanGTypes --> PlanGPre["<b>📚 PLANNING GUIDE - Pre-Application Activities</b><br/><br/><u>General Enquiries (no fee):</u><br/>Members of the public can contact the planning team for general information of a general nature, such as:<br/>- Opportunities and constraints of a specific site<br/>- Clarifying the location of a building<br/>- Details regarding a potential use of a parcel of land<br/><br/><u>Pre-Lodgement Meeting ($300 - 60 min, RC192):</u><br/>A paid service for applicants who have a clear development goal. Provides tailored advice on a specific proposal before a formal Development Application is lodged.<br/><br/>Helps applicants understand key areas of assessment and required supporting documents in advance."]
    PlanGPre --> PlanGPart1["<b>📚 PLANNING GUIDE - Part 1: Application</b><br/><i>Council has 10 business days to confirm the application is properly made</i><br/><br/>To be properly made, an application requires:<br/>[ ] Cover Letter<br/>[ ] DA Form 1<br/>[ ] Plans<br/>[ ] Assessment against Planning Scheme<br/>[ ] Owner's Consent<br/>[ ] Application Fee<br/><br/>Council issues an Action Notice and Confirmation Notice upon acceptance."]
    PlanGPart1 --> PlanGRef["<b>📚 PLANNING GUIDE - Part 2: Referral</b><br/><i>If applicable — 10 business days. Applicant submits to the referral agency, not council.</i><br/><br/>State Assessment Referral Agency (SARA) is Queensland's state government agency responsible for assessing development applications that affect state interests.<br/><br/>Common referral triggers:<br/>- State Controlled Road<br/>- Regulated Vegetation"]
    PlanGRef --> PlanGIR["<b>📚 PLANNING GUIDE - Part 3: Information Request</b><br/><i>If applicable — 10 business days. Applicant has 3 months to respond.</i><br/><br/>Council may request any further information not included in the original application.<br/><br/>Examples: Traffic impact assessment, engineering reports, or additional supporting documents.<br/><br/>Note: Timeframes can be extended."]
    PlanGIR --> PlanGPart4["<b>📚 PLANNING GUIDE - Part 4: Public Notification</b><br/><i>Impact Assessment only — 15 business days</i><br/><br/>The applicant is responsible for undertaking public notification. Requirements:<br/>[ ] Sign on all frontages (signs provided by council)<br/>[ ] Notice in newspaper<br/>[ ] Notice to adjoining owners<br/><br/>Members of the public may submit either an objection to or a submission in support of the application during the notification period.<br/><br/>If submissions objecting to the application are received:<br/>- Council has 10 bd to consider submissions<br/>- Applicant is sent all submissions and has 10 bd to provide a response to Council<br/>- Receiving submissions triggers the application going to Council rather than a delegated officer for decision<br/><br/>Note: Timeframes can be extended."]
    PlanGPart4 --> PlanGPart5["<b>📚 PLANNING GUIDE - Part 5: Decision</b><br/><i>35 business days (reduced by time already elapsed)</i><br/><br/><u>Delegated:</u><br/>Planning Department makes the decision.<br/><br/><u>Council Decision:</u><br/>Required where submissions objecting to the application have been received. Applicant may request a deputation at a Committee Information Session (CIS).<br/><br/>Customer receives a Decision Notice upon conclusion of the applicant's 20-business-day appeal period.<br/><br/><u>For members of public who submitted an objection:</u><br/>- Properly made submission + application approved: submitter has right of appeal to the Planning &amp; Environment Court<br/>- Application refused: all submitters notified and receive a copy of the Decision Notice"]
    PlanGPart5 --> PlanGPost["<b>📚 PLANNING GUIDE - Post Decision</b><br/><br/>- Compliance with conditions of approval<br/>- Planning &amp; Environment Court appeal (if applicable)<br/>- Preparation of survey plans<br/><br/><u>Approval periods:</u><br/>- MCU (Material Change of Use): 6 years<br/>- RC (Reconfiguring a Lot): 4 years<br/>- BA + OPW (Building/Operational Works): 2 years"]

    style PlanGTypes fill:#fef9c3,stroke:#d97706,stroke-width:2px
    style PlanGPre fill:#fef9c3,stroke:#d97706,stroke-width:2px
    style PlanGPart1 fill:#fef9c3,stroke:#d97706,stroke-width:2px
    style PlanGRef fill:#fef9c3,stroke:#d97706,stroke-width:2px
    style PlanGIR fill:#fef9c3,stroke:#d97706,stroke-width:2px
    style PlanGPart4 fill:#fef9c3,stroke:#d97706,stroke-width:2px
    style PlanGPart5 fill:#fef9c3,stroke:#d97706,stroke-width:2px
    style PlanGPost fill:#fef9c3,stroke:#d97706,stroke-width:2px

    'animals': `    CommDecision -->|Animals| AnimalType{"Issue Type?"}
    AnimalType -->|Stray / Found| AnimalStrayFound["<b>🐕 ANIMALS - Stray / Found</b><br/><br/>Customer service is the point of contact for straying and found animals in the community.<br/><br/><u>Customer reports a straying dog:</u><br/>1. Lodge Merit (Keyword: Stray) — record: Location, Breed, Direction of travel, Time, Collar Style, Orange Registration Tag visible (Y/N), any other relevant details<br/>[ ] Do not ask customer to engage the dog — risk of attack. Log as much information as possible and advise Local Laws will attend ASAP<br/>[ ] Breed unknown: size (S/M/L) and colour is sufficient<br/>[ ] Use Intramaps — Environment &amp; Regulatory Module, Regulatory Control Areas Overlay to determine Northern/Central/Southern<br/>2. Report to appropriate Local Laws Officer — use the Local Laws availability email to determine who to contact<br/><br/><u>Customer reports a found animal:</u><br/>Lodge Merit (Keyword: Found) — record: Location, Breed, Time Found, Collar Style, number on Orange Registration Tag<br/>[ ] Use Intramaps — Environment &amp; Regulatory Module, Regulatory Control Areas Overlay to determine Northern/Central/Southern<br/>Confirm with customer whether they would like to:<br/>- Continue to hold the animal until the owner is contacted<br/>- Have a Local Laws Officer collect the animal<br/>- Drop the animal to the pound<br/>If customer is holding the animal, confirm whether they are comfortable with council providing their contact number to the owner to arrange pickup.<br/><br/>Add to spreadsheet register: S:\Customer Service\Shared All\Animals - Lost and Found Register<br/>Notify CS Group + Local Laws via email<br/>[ ] Subject: Found Cat/Dog – Stanthorpe/Warwick/Other Suburb Area<br/>[ ] Copy and paste spreadsheet row into email, add signature and send<br/><br/>📌 Eli: Stray Dog<br/>📌 Shared Drive: Lost Animals Register"]
    AnimalType -->|Lost / Impounded| AnimalLostImpound["<b>🐕 ANIMALS - Lost / Impounded</b><br/><br/>Lost animals can be a major source of distress for customers. This process is thorough to maximise the chance the animal is returned safely.<br/><br/><u>Customer reports a lost animal:</u><br/>1. Add to spreadsheet register: S:\Customer Service\Shared All\Animals - Lost and Found Register<br/>[ ] Check latest entries to confirm if the animal has already been reported as found<br/>2. Lodge Merit (Keyword: Lost) — record: Location last seen, Breed, Time Noticed Missing, Collar Style, number on Orange Registration Tag<br/>[ ] Use Intramaps — Environment &amp; Regulatory Module, Regulatory Control Areas Overlay to determine Northern/Central/Southern<br/>[ ] When found, Local Laws will contact the customer using the contact details in the Merit<br/>3. Check the impoundments spreadsheet to confirm the animal has not been impounded: S:\Customer Service\Shared All\Animals - Impoundments - Warwick - from 1 Jan 2019<br/>4. Notify CS Group + Local Laws via email<br/>[ ] Subject: Lost Cat/Dog – Stanthorpe/Warwick/Other Suburb Area<br/>[ ] Copy and paste spreadsheet row into email, add signature and send<br/><br/><u>Customer calling about an impounded animal:</u><br/>The most common version of this call is a customer following up on a Local Laws voicemail advising their dog has been impounded.<br/>1. Check impoundments register: S:\Customer Service\Shared All\Animals - Impoundments - Warwick - from 1 Jan 2019<br/>2. Contact Local Laws Officer to:<br/>[ ] Arrange collection time<br/>[ ] Confirm release fee<br/>[ ] Confirm if dog must be registered before release<br/><br/>📌 Eli: Impounded Animals<br/>📌 Shared Drive: Lost Animals Register"]
    AnimalType -->|Registration/Keeping| AnimalReg["<b>🐕 ANIMALS - Registration &amp; Keeping of Animals</b><br/><br/><u>Dog Registration:</u><br/>1. Email Form: Application for Dog Registration<br/>2. If applicable, request customer attach:<br/>[ ] Proof of desexing<br/>[ ] Pension card<br/>[ ] Dog Breeder Supply Number<br/>[ ] Proof of Service Dog status<br/><br/><u>Type/Number of Animals Allowed on Property:</u><br/>The number and type of animals permitted on a property is determined by local bylaws and the planning scheme, and varies by property.<br/><br/>Refer to the Keeping of Animals Factsheet for permitted numbers by animal type.<br/>📌 <a href='https://www.sdrc.qld.gov.au/ArticleDocuments/702/Keeping_Animals_Fact_Sheet.pdf.aspx' target='_blank'>Keeping of Animals Factsheet</a><br/><br/>To keep additional animals beyond the permitted number, the customer must submit a Keeping of Animals Application. The Local Laws Coordinator will approve or deny.<br/><br/>📌 Eli: Dog Registration<br/>📌 Eli: Keeping Animals"]
    AnimalType -->|Barking| BarkingType{"New or Ongoing?"}
    BarkingType -->|New| BarkNew["<b>🐕 ANIMALS - Barking (New)</b><br/><br/>Customers making a noise complaint about a barking dog can be among the most stressed callers. Loss of sleep is a major source of stress and customers often call at their breaking point — take your time with this one.<br/><br/>1. Encourage the customer to make direct contact with the dog owner — a letter template is available on page 1 of the Noise Nuisance Diary Factsheet<br/>2. Lodge Merit (Keyword: Barking) — follow process, provide customer with Merit #<br/>3. Provide Barking Dogs Factsheet and Noise Diary to customer<br/>4. Advise customer that when the completed diary is received, Local Laws will investigate using the information in the diary — the dog owner will be given time to correct the behaviour<br/><br/>📌 <a href='https://www.sdrc.qld.gov.au/ArticleDocuments/702/Barking_Dogs_Fact_Sheet.pdf.aspx' target='_blank'>Barking Dogs Fact Sheet and Noise Nuisance Diary</a><br/>📌 Eli: Barking Dog<br/><br/><span data-context='BarkNew' style='display:inline-block;margin-top:10px;padding:3px 10px;background:#eff6ff;border:1px solid #93c5fd;border-radius:4px;color:#1d4ed8;'>📖 Why we require a diary</span>"]
    BarkingType -->|Ongoing| BarkOngo["<b>🐕 ANIMALS - Barking (Ongoing)</b><br/><br/>1. Add a note to the existing Merit that another complaint has been received<br/>2. Include customer return phone number<br/><br/>📌 <a href='https://www.sdrc.qld.gov.au/ArticleDocuments/702/Barking_Dogs_Fact_Sheet.pdf.aspx' target='_blank'>Barking Dogs Fact Sheet and Noise Nuisance Diary</a><br/>📌 Eli: Barking Dog"]
    AnimalType -->|Surrender| AnimalSurrender["<b>🐕 ANIMALS - Surrender of Dogs/Cats</b><br/><br/>1. Email Form: Owners Consent to Privately Impound Dog or Cat<br/>[ ] If customer prefers, a Local Laws Officer can provide the Surrender Form during drop off<br/>2. Take impoundment fee over phone (Fees &amp; Charges: Private Impounding)<br/>[ ] No fee applies for surrendering feral cats — Local Laws Officer will check the cat for a microchip before impounding<br/>[ ] Email receipt to customer and Local Laws<br/>3. Call Local Laws Officer to arrange a mutually suitable surrender time — confirm if the Local Laws Officer would like to speak to the customer directly<br/><br/>📌 Eli: Private Impoundment"]
    AnimalType -->|Cat Trap Hire| AnimalCatTrap["<b>🐕 ANIMALS - Cat Trap Hire</b><br/><br/>1. Email Forms: Application for Hire of Cat/Fox Trap + Refund or Transfer Payment Request Form<br/>2. Complete receipt with Weekly Hire Fee &amp; Bond — refer to Fees &amp; Charges (CTRL+F: Trap)<br/>3. Provide customer with Instructions for Use of Cat Trap<br/>4. Complete spreadsheet: S:\Customer Service\Shared All\Animals\Lost &amp; Found Register — click on Fox &amp; Cat Trap Tab<br/><br/>📌 Eli: Cat Trap Hire"]
    AnimalType -->|Attack/Menacing| AnimalAttack["<b>🐕 ANIMALS - Dog Attack/Menacing</b><br/><br/>If the customer is still in danger of attack, advise them to prioritise their safety before proceeding with the call — especially if someone requires emergency medical attention.<br/><br/>Lodge Merit (Keyword: Attack) — record the following so Local Laws can attend ASAP. A more detailed statement will be taken on the Statement of Dog Attack Form.<br/><br/>[ ] Where exactly did the attack take place?<br/>[ ] Is the dog still in the area? If not, record last known location and direction of travel<br/>[ ] Dog description: Breed, Size, Colour, Collar<br/>[ ] What time did the attack occur? (date and time)<br/>[ ] Was medical treatment required?<br/><br/>Email Form: Statement of Dog Attack Form<br/><br/>📌 Eli: Dog Attack<br/><br/><span data-context='AnimalAttack' style='display:inline-block;margin-top:10px;padding:3px 10px;background:#eff6ff;border:1px solid #93c5fd;border-radius:4px;color:#1d4ed8;'>📖 After an attack</span>"]
    AnimalType -->|Wildlife/Cruelty| AnimalWildlife["<b>🐕 ANIMALS - Wildlife &amp; Cruelty</b><br/><br/><u>Animal Cruelty/Welfare:</u><br/>Emergency: Police 000<br/>Non-emergency: RSPCA 1300 264 625<br/>or rspca.org.au/report-animal-cruelty<br/><br/><u>Wildlife Removal:</u><br/>Provide appropriate wildlife carer contact details to customer<br/><br/>📌 Eli: Wildlife Removal"]
    AnimalType -->|Pest| AnimalKeepPest["<b>🐕 ANIMALS - Pest Animals</b><br/><br/>1. Lodge Merit (Keyword: Pest Animal) — instruct customer to await callback from Local Laws Officer, provide customer with Merit #<br/>2. For immediate information email customer the State Government Invasive Animals Fact Sheet<br/><br/>📌 <a href='https://www.business.qld.gov.au/industries/farms-fishing-forestry/agriculture/land-management/health-pests-weeds-diseases/pests/invasive-animals/fact-sheets' target='_blank'>Invasive Animals Fact Sheets — Queensland Government</a><br/>📌 Eli: Keeping Animals"]

    AnimalStrayFound --> ActionDecision
    AnimalLostImpound --> ActionDecision
    AnimalReg --> ActionDecision
    BarkNew --> ActionDecision
    BarkOngo --> ActionDecision
    AnimalSurrender --> ActionDecision
    AnimalCatTrap --> ActionDecision
    AnimalAttack --> ActionDecision
    AnimalWildlife --> ActionDecision
    AnimalKeepPest --> ActionDecision`,

    'environmental': `    CommDecision -->|Environmental| EnvStart["<b>🌿 ENV NUISANCE - Initial Assessment</b><br/><br/>1. Determine whether council has jurisdiction - refer to Eli: Environmental Nuisance &amp; Pollution and the SDRC website<br/>2. If council does not have jurisdiction: direct customer to the appropriate authority<br/>3. If council has jurisdiction: encourage the customer to contact the polluter directly and attempt to resolve without council involvement first<br/><br/>📌 Eli: Jurisdiction Check"]
    EnvStart --> EnvLodge["<b>🌿 ENV NUISANCE - Lodge</b><br/><br/>1. Lodge Merit Environment - select the appropriate option<br/>2. If the nuisance is ongoing, provide the Environmental Nuisance Diary for the customer to complete as evidence<br/>3. Instruct the customer to email the completed diary (after 14 days) quoting the Merit number in the subject line<br/><br/>📌 <a href='https://www.sdrc.qld.gov.au/ArticleDocuments/1232/Environmental%20Nuisance%20Diary%20V1%20Nov%202022.pdf.aspx' target='_blank'>Environmental Nuisance Diary</a><br/>📌 Eli: Nuisance Diary"]

    EnvLodge --> ActionDecision`,

    WasteType -->|Bin Issues| WasteBin["<b>🗑️ WASTE - Bin Issues</b><br/><br/>SDRC Customer Service is the point of contact for domestic rubbish and recycling collection issues. All requests are lodged through the Cleanaway request portal.<br/><br/>[ ] Missed collection: Lodge a Cleanaway request<br/>[ ] Damaged bin: Lodge a Cleanaway request<br/>[ ] Missing/stolen bin: Lodge a Cleanaway request<br/><br/><u>Confirm Bin Day:</u><br/>Search property address in Intramaps — bin day is displayed in the cadastre menu. Days may change during public holidays; contact the waste team for updated schedule.<br/><br/><u>Status of Cleanaway Request:</u><br/>Search the customer address in the Jobs tab on the Cleanaway Live Collection page to check if a request has been scheduled.<br/><br/>📌 Eli: Cleanaway Requests<br/><br/><span data-context='WasteBin' style='display:inline-block;margin-top:10px;padding:3px 10px;background:#eff6ff;border:1px solid #93c5fd;border-radius:4px;color:#1d4ed8;'>📖 Cleanaway contract</span>"]

    // ── Auto line-wrap ───────────────────────────────────────────────────
    // Wraps plain text inside Mermaid node labels at word boundaries so no
    // single visual line exceeds maxLen characters. Skips HTML tags and any
    // segment that contains a URL (href=) so links are never broken.

    function wrapTextSegment(segment, maxLen) {
        if (segment.length <= maxLen) return segment;
        if (/href=/.test(segment)) return segment; // never break URL lines

        const tokens = segment.split(/(<[^>]+>)/); // split on HTML tags
        let output = '';
        let lineLen = 0;

        for (const tok of tokens) {
            if (tok.startsWith('<')) {
                output += tok; // tag — output as-is, don't count length
            } else {
                const words = tok.split(' ');
                for (let w = 0; w < words.length; w++) {
                    const word = words[w];
                    if (!word) {
                        if (lineLen > 0) { output += ' '; lineLen++; }
                        continue;
                    }
                    const addSpace = lineLen > 0;
                    const needed = word.length + (addSpace ? 1 : 0);
                    if (lineLen > 0 && lineLen + needed > maxLen) {
                        output += '<br/>';
                        lineLen = 0;
                        output += word;
                        lineLen = word.length;
                    } else {
                        if (addSpace) { output += ' '; lineLen++; }
                        output += word;
                        lineLen += word.length;
                    }
                }
            }
        }
        return output;
    }

    function wrapHtmlLines(html, maxLen) {
        // Split preserving existing <br/> tags, then wrap each segment
        const parts = html.split(/(<br\s*\/?>)/i);
        return parts.map(p => /<br\s*\/?>/i.test(p) ? p : wrapTextSegment(p, maxLen)).join('');
    }

    function wrapSource(source, maxLen) {
        maxLen = maxLen || 72;
        // Match node label content between [" and "]
        return source.replace(/\["([\s\S]*?)"\]/g, (match, content) =>
            '["' + wrapHtmlLines(content, maxLen) + '"]'
        );
    }

    // ── Rebuild & render ─────────────────────────────────────────────────
    let renderTimer = null;

    // rebuildFresh: called by checkboxes & toggleCat — clears open context panels
    window.rebuildFresh = function() {
        window._openContext = new Set();
        window.rebuildDiagram();
    };

    // rebuildDiagram: returns a Promise so callers can chain .then()
    window.rebuildDiagram = function(opts) {
        opts = opts || {};
        clearTimeout(renderTimer);
        document.getElementById('statusBar').classList.add('show');

        return new Promise(resolve => {
            renderTimer = setTimeout(async () => {
                const checked = Object.keys(SECTIONS).filter(k => {
                    const cb = document.getElementById('cb_' + k);
                    return cb && cb.checked;
                });

                if (checked.length === 0) {
                    document.getElementById('mermaidDiagram').innerHTML =
                        '<div class="rendering-msg">☑️ Select at least one service to display the diagram.</div>';
                    document.getElementById('statusBar').classList.remove('show');
                    resolve();
                    return;
                }

                // Which categories are needed?
                const neededCats = [...new Set(checked.map(k => SERVICE_CAT[k]))];
                const catLines = neededCats.map(c => CAT_ENTRIES[c]).join('\n');

                // Build body sections
                let bodyLines = checked.map(k => SECTIONS[k]).join('\n\n');

                // Append any open context nodes as new diagram nodes below their parent
                if (window._openContext && window._openContext.size > 0) {
                    window._openContext.forEach(key => {
                        const ctx = CONTEXT_NODES[key];
                        if (ctx) {
                            bodyLines += `\n    ${ctx.nodeId}["${ctx.label}"]`;
                            bodyLines += `\n    ${ctx.parentId} -.->|context| ${ctx.nodeId}`;
                            bodyLines += `\n    ${ctx.nodeId} -.-> ActionDecision`;
                            bodyLines += `\n    style ${ctx.nodeId} fill:#eff6ff,stroke:#93c5fd,stroke-width:2px`;
                        }
                    });
                }

                const source = wrapSource(HEADER + '\n' + catLines + '\n\n' + bodyLines + '\n\n' + TAIL);

                await window.renderDiagram(source);
                document.getElementById('statusBar').classList.remove('show');
                if (!opts.preserveView) initialFit();
                resolve();
            }, 300);
        });
    };

    // ── Category toggle ──────────────────────────────────────────────────
    window.toggleCat = function(cat, state) {
        document.querySelectorAll(`input[data-cat="${cat}"]`).forEach(cb => {
            cb.checked = state;
        });
        rebuildFresh();
    };

    // ── Zoom ─────────────────────────────────────────────────────────────
    let currentZoom = 100;
    const zoomStep = 15;

    function updateZoom() {
        const el = document.getElementById('mermaidDiagram');
        el.style.transform = `scale(${currentZoom / 100})`;
        document.getElementById('zoomLevel').textContent = currentZoom;
        const ov = document.getElementById('overlayZoomLevel');
        if (ov) ov.textContent = currentZoom + '%';
    }
    function zoomIn()    { if (currentZoom < 200) { currentZoom += zoomStep; updateZoom(); } }
    function zoomOut()   { if (currentZoom > 25)  { currentZoom -= zoomStep; updateZoom(); } }
    function resetZoom() { currentZoom = 100; updateZoom(); }
    function fitToScreen() { initialFit(); }
    function initialFit() {
        const dc = document.getElementById('diagramContainer');
        currentZoom = 30;
        updateZoom();
        dc.scrollTop  = 0;
        dc.scrollLeft = 0;
        document.getElementById('zoomLevel').textContent = currentZoom;
    }

    // ── Save as SVG ───────────────────────────────────────────────────────
    function getSvgData() {
        const container = document.getElementById('mermaidDiagram');
        const svg = container.querySelector('svg');
        if (!svg) return null;
        const origTransform = container.style.transform;
        container.style.transform = 'none';
        const svgClone = svg.cloneNode(true);
        const svgWidth  = parseFloat(svg.getAttribute('width')  || svg.viewBox.baseVal.width  || 2000);
        const svgHeight = parseFloat(svg.getAttribute('height') || svg.viewBox.baseVal.height || 3000);
        svgClone.setAttribute('width',  svgWidth);
        svgClone.setAttribute('height', svgHeight);
        container.style.transform = origTransform;
        return { svgClone, svgWidth, svgHeight };
    }

    function saveSVG() {
        const statusEl = document.getElementById('svgStatus');
        const data = getSvgData();
        if (!data) { statusEl.textContent = '⚠️ No diagram rendered yet.'; return; }
        const { svgClone } = data;
        const serialiser = new XMLSerializer();
        const svgString = serialiser.serializeToString(svgClone);
        const blob = new Blob([svgString], { type: 'image/svg+xml;charset=utf-8' });
        const link = document.createElement('a');
        link.download = 'SDRC_CallFlow.svg';
        link.href = URL.createObjectURL(blob);
        link.click();
        statusEl.textContent = '✅ SVG downloaded! Open in Chrome to print, or in Inkscape/Illustrator to export PNG at any size.';
    }

    // ── Pan & scroll ─────────────────────────────────────────────────────
    const dc = document.getElementById('diagramContainer');
    let isDragging = false, startX, startY, scrollLeft, scrollTop;
    dc.addEventListener('mousedown', e => {
        isDragging = true;
        startX = e.pageX - dc.offsetLeft; startY = e.pageY - dc.offsetTop;
        scrollLeft = dc.scrollLeft; scrollTop = dc.scrollTop;
    });
    dc.addEventListener('mouseleave', () => isDragging = false);
    dc.addEventListener('mouseup',    () => isDragging = false);
    dc.addEventListener('mousemove', e => {
        if (!isDragging) return;
        e.preventDefault();
        dc.scrollLeft = scrollLeft - (e.pageX - dc.offsetLeft - startX) * 1.5;
        dc.scrollTop  = scrollTop  - (e.pageY - dc.offsetTop  - startY) * 1.5;
    });
    dc.addEventListener('wheel', e => {
        if (e.ctrlKey) { e.preventDefault(); e.deltaY < 0 ? zoomIn() : zoomOut(); }
    }, { passive: false });

    document.addEventListener('keydown', e => {
        if (e.ctrlKey && (e.key === '=' || e.key === '+')) { e.preventDefault(); zoomIn(); }
        if (e.ctrlKey && e.key === '-') { e.preventDefault(); zoomOut(); }
        if (e.ctrlKey && e.key === '0') { e.preventDefault(); resetZoom(); }
    });
</script>
</body>
</html>
