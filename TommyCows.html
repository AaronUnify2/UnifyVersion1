<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>The Day Dad Bought the Cows — A Storybook Game</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { width:100%; height:100%; overflow:hidden; touch-action:none; background:#b8e0f2;
    font-family:"Comic Sans MS","Chalkboard SE","Marker Felt","Trebuchet MS",sans-serif; }
  #c { position:fixed; inset:0; display:block; }

  /* ---- narration card ---- */
  #narration {
    position:fixed; top:max(12px, env(safe-area-inset-top)); left:50%; transform:translateX(-50%);
    width:min(92vw,560px); background:#FFF8E4; border:3px solid #7a5230; border-radius:18px;
    padding:12px 16px; font-family:Georgia,'Times New Roman',serif; font-style:italic;
    font-size:clamp(16px,4.4vw,21px); color:#46310f; line-height:1.35; text-align:center;
    box-shadow:0 4px 0 #00000022; opacity:0; transition:opacity .4s; pointer-events:none; z-index:5;
  }
  #narration .who { font-style:normal; font-size:1.25em; margin-right:6px; }

  /* ---- badge ---- */
  #badge {
    position:fixed; left:10px; bottom:max(14px, env(safe-area-inset-bottom)); z-index:5;
    background:#ffffffd9; border:3px solid #7a5230; border-radius:14px; padding:6px 12px;
    font-weight:bold; color:#5d3f15; font-size:clamp(14px,4vw,18px); display:none; letter-spacing:1px;
  }

  /* ---- fullscreen toggle ---- */
  #fsBtn {
    position:fixed; right:10px; bottom:max(14px, env(safe-area-inset-bottom)); z-index:7;
    width:48px; height:48px; border:3px solid #7a5230; border-radius:14px;
    background:#ffffffd9; color:#5d3f15; font-size:22px; line-height:1; cursor:pointer;
    font-family:inherit; box-shadow:0 3px 0 #00000022;
  }
  #fsBtn:active { transform:translateY(2px); box-shadow:none; }

  /* ---- big action button ---- */
  #btn {
    position:fixed; bottom:max(18px, env(safe-area-inset-bottom)); left:50%; transform:translateX(-50%);
    min-width:min(70vw,330px); padding:16px 26px; border:none; border-radius:999px;
    background:linear-gradient(#ffa14f,#ec7016); color:#fff;
    font-family:inherit; font-size:clamp(18px,5.2vw,24px); font-weight:bold; letter-spacing:.3px;
    box-shadow:0 6px 0 #a8470a, 0 10px 18px #0003; cursor:pointer; z-index:11;
    transition:transform .08s, box-shadow .08s, opacity .3s; text-shadow:0 2px 0 #0002;
    user-select:none; -webkit-user-select:none; -webkit-touch-callout:none;
  }
  #btn:active { transform:translateX(-50%) translateY(4px); box-shadow:0 2px 0 #a8470a, 0 5px 10px #0003; }
  #btn.hidden { opacity:0; pointer-events:none; }
  #btn.blue { background:linear-gradient(#6fc3ef,#2f7fc4); box-shadow:0 6px 0 #1f5a8e, 0 10px 18px #0003; }
  #btn.blue:active { box-shadow:0 2px 0 #1f5a8e, 0 5px 10px #0003; }
  #btn.gold { background:linear-gradient(#ffd25a,#e8a613); box-shadow:0 6px 0 #a8720a, 0 10px 18px #0003; color:#5d3f15; text-shadow:none; }
  #btn.gold:active { box-shadow:0 2px 0 #a8720a, 0 5px 10px #0003; }
  #btn.green { background:linear-gradient(#8fd06a,#4a9a3e); box-shadow:0 6px 0 #2f6b28, 0 10px 18px #0003; }
  #btn.green:active { box-shadow:0 2px 0 #2f6b28, 0 5px 10px #0003; }
  #btn.holding { animation:holdGlow 0.8s ease-in-out infinite; }
  @keyframes holdGlow { 0%,100%{filter:brightness(1)} 50%{filter:brightness(1.18)} }
  @media (prefers-reduced-motion: reduce) { #btn.holding { animation:none; } }

  /* ---- hold progress bar ---- */
  #holdBar { position:fixed; bottom:calc(max(18px, env(safe-area-inset-bottom)) + 74px);
    left:50%; transform:translateX(-50%); width:min(70vw,330px); height:16px;
    background:#00000038; border:3px solid #ffffffd0; border-radius:999px; z-index:11;
    display:none; overflow:hidden; }
  #holdFill { height:100%; width:0; border-radius:999px;
    background:linear-gradient(90deg,#8fd06a,#4a9a3e); }

  /* ---- tap-the-world hint ---- */
  #tapHint { position:fixed; left:0; top:0; width:120px; height:120px; margin:-60px 0 0 -60px;
    pointer-events:none; z-index:6; display:none; }
  #tapHint .ring { position:absolute; inset:10px; border:5px solid #ffd54f; border-radius:50%;
    box-shadow:0 0 14px #ffd54fcc, inset 0 0 10px #ffd54f88; animation:pulseRing 1.1s ease-out infinite; }
  #tapHint .finger { position:absolute; left:50%; top:74%; font-size:40px;
    animation:bobFinger 0.9s ease-in-out infinite; text-shadow:0 2px 6px #0004; }
  @keyframes pulseRing { 0%{transform:scale(.7);opacity:1} 100%{transform:scale(1.3);opacity:0} }
  @keyframes bobFinger { 0%,100%{transform:translate(-50%,0)} 50%{transform:translate(-50%,-12px)} }

  /* ---- pull slider (open the ramp!) ---- */
  #pull { position:fixed; bottom:max(18px, env(safe-area-inset-bottom)); left:50%; transform:translateX(-50%);
    width:min(86vw,440px); z-index:11; transition:opacity .3s; }
  #pull.hidden { opacity:0; pointer-events:none; }
  #pullLabel { text-align:center; color:#fff; font-weight:bold; font-size:clamp(17px,4.8vw,22px);
    text-shadow:0 2px 0 #0007, 0 0 12px #0005; margin-bottom:8px; }
  #pullTrack { position:relative; height:66px; background:#00000038; border:3px solid #ffffffd0;
    border-radius:999px; touch-action:none; overflow:visible; }
  #pullChevrons { position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    gap:20px; color:#ffffffb0; font-size:30px; font-weight:bold; pointer-events:none; }
  #pullFill { position:absolute; left:0; top:0; bottom:0; width:0; border-radius:999px;
    background:linear-gradient(90deg,#ffb24f99,#ec7016aa); pointer-events:none; }
  #pullHandle { position:absolute; top:50%; left:3px; width:76px; height:76px; margin-top:-38px;
    background:radial-gradient(circle at 35% 30%, #c98c4e, #8a5a33 70%); border:4px solid #5d3a1c;
    border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:36px;
    box-shadow:0 4px 10px #0006; pointer-events:none; }

  /* ---- name pop (hello, Daisy!) ---- */
  #namePop { position:fixed; left:0; top:0; transform:translate(-50%,-100%); z-index:7;
    background:#fff8e4; border:3px solid #7a5230; border-radius:999px; padding:8px 18px;
    font-weight:bold; color:#5d3f15; font-size:clamp(18px,5vw,24px); pointer-events:none;
    opacity:0; white-space:nowrap; box-shadow:0 4px 0 #00000022; }
  #namePop.show { animation:namePop 1.4s ease-out forwards; }
  @keyframes namePop {
    0% { opacity:0; transform:translate(-50%,-80%) scale(.5); }
    18% { opacity:1; transform:translate(-50%,-115%) scale(1.12); }
    30% { transform:translate(-50%,-110%) scale(1); }
    75% { opacity:1; }
    100% { opacity:0; transform:translate(-50%,-150%) scale(1); }
  }
  @media (prefers-reduced-motion: reduce) { #namePop.show { animation:none; opacity:1; } }

  /* ---- night fade & moon card ---- */
  #fade { position:fixed; inset:0; background:#0a1030; opacity:0; pointer-events:none; transition:opacity 1.4s; z-index:8; }
  #nightText {
    position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center;
    color:#fff; z-index:9; opacity:0; pointer-events:none; transition:opacity .8s; text-align:center; padding:0 7vw;
  }
  #nightText .moon { font-size:clamp(44px,14vw,80px); }
  #nightText .stars { font-size:clamp(22px,7vw,38px); letter-spacing:12px; margin-top:6px;
    animation:twinkle 2.2s ease-in-out infinite; }
  @keyframes twinkle { 0%,100%{opacity:.55} 50%{opacity:1} }
  @media (prefers-reduced-motion: reduce) { #nightText .stars { animation:none; } }
  #nightText .line { font-family:Georgia,serif; font-style:italic; font-size:clamp(18px,5.5vw,26px); margin-top:14px; }

  /* ---- title & end screens ---- */
  .screen {
    position:fixed; inset:0; z-index:10; display:flex; flex-direction:column; align-items:center;
    justify-content:center; text-align:center; padding:5vw; transition:opacity .7s;
    background:linear-gradient(#cdeaf7 0%, #f6e7b6 50%, #b9d77f 100%);
  }
  .screen.gone { opacity:0; pointer-events:none; }
  .screen .cast { font-size:clamp(26px,7.5vw,46px); letter-spacing:3px; }
  .screen h1 {
    font-family:Georgia,serif; color:#b35a10; font-size:clamp(30px,8.6vw,52px);
    line-height:1.12; margin:14px 0 6px; text-shadow:0 3px 0 #ffffff88;
  }
  .screen p { color:#6b5230; font-size:clamp(15px,4.4vw,19px); margin-bottom:26px; font-family:Georgia,serif; font-style:italic; }
  .screen button {
    padding:16px 34px; border:none; border-radius:999px; font-family:inherit; font-weight:bold;
    font-size:clamp(19px,5.4vw,24px); color:#fff; cursor:pointer;
    background:linear-gradient(#ffa14f,#ec7016); box-shadow:0 6px 0 #a8470a, 0 10px 18px #0003;
  }
  .screen button:active { transform:translateY(4px); box-shadow:0 2px 0 #a8470a; }
  #endScreen { background:linear-gradient(#cdeaf7 0%, #b9d77f 60%, #8fbf5a 100%); }
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="narration"><span class="who"></span><span class="txt"></span></div>
<div id="badge"></div>
<button id="fsBtn" title="Fullscreen">⛶</button>
<button id="btn" class="hidden"></button>
<div id="holdBar"><div id="holdFill"></div></div>
<div id="tapHint"><div class="ring"></div><div class="finger">👆</div></div>

<div id="pull" class="hidden">
  <div id="pullLabel">Slide to open! ➜</div>
  <div id="pullTrack">
    <div id="pullFill"></div>
    <div id="pullChevrons">›&nbsp;›&nbsp;›</div>
    <div id="pullHandle">✊</div>
  </div>
</div>

<div id="namePop"></div>

<div id="fade"></div>
<div id="nightText">
  <div class="moon">🌙</div>
  <div class="stars">✨ ⭐ ✨</div>
  <div class="line"></div>
</div>

<div id="titleScreen" class="screen">
  <div class="cast">👨‍🌾🌱🚜🐄🐄🐔🦆👦</div>
  <h1>The Day Dad<br>Bought the Cows</h1>
  <p>A storybook from our very own farm</p>
  <button id="beginBtn">📖 Begin the story</button>
</div>

<div id="endScreen" class="screen gone">
  <div class="cast">🐄 💚 👨‍👩‍👦</div>
  <h1>The End</h1>
  <p>…and Dad never pushed the mower again.<br>More grass for the cows — and more time<br>for Mum and Tommy. Goodnight, moo! 🌙</p>
  <button id="againBtn">↺ Read it again</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/* =========================================================
   THE DAY DAD BOUGHT THE COWS — our very own farm
   Starring: Dad and his poor old push mower, Fergie and
   the slasher, four hungry cows, the chooks, the duck,
   Teddy the truck-chaser, and Tommy & Mum.
   ========================================================= */

/* ---------- tiny sound kit ---------- */
let AC = null;
function audio() {
  if (!AC) { try { AC = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){} }
  if (AC && AC.state === 'suspended') AC.resume();
  return AC;
}
function tone(freq, dur, type, vol, slideTo) {
  const ac = audio(); if (!ac) return;
  const o = ac.createOscillator(), g = ac.createGain();
  o.type = type || 'sine'; o.frequency.setValueAtTime(freq, ac.currentTime);
  if (slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, ac.currentTime + dur);
  g.gain.setValueAtTime(vol || 0.18, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur + 0.001);
  o.connect(g).connect(ac.destination); o.start(); o.stop(ac.currentTime + dur + 0.05);
}
function noise(dur, vol, freq) {
  const ac = audio(); if (!ac) return;
  const len = Math.floor(ac.sampleRate * dur);
  const buf = ac.createBuffer(1, len, ac.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / len);
  const src = ac.createBufferSource(); src.buffer = buf;
  const f = ac.createBiquadFilter(); f.type = 'bandpass'; f.frequency.value = freq || 700; f.Q.value = 0.6;
  const g = ac.createGain(); g.gain.value = vol || 0.25;
  src.connect(f).connect(g).connect(ac.destination); src.start();
}
const sndClick  = () => tone(1200, 0.07, 'square', 0.1);
const sndDing   = () => { tone(660,0.3,'triangle',0.12); setTimeout(()=>tone(880,0.4,'triangle',0.12),140); };
const sndBoing  = (n) => tone(180 + n*60, 0.3, 'sine', 0.22, 460 + n*120);
const sndBark   = () => { tone(260, 0.09, 'square', 0.2, 170); setTimeout(()=>tone(260,0.09,'square',0.2,170),160); };
const sndQuack  = () => { tone(330, 0.16, 'sawtooth', 0.18, 200); setTimeout(()=>tone(310,0.16,'sawtooth',0.16,190),220); };
const sndPutt   = () => tone(58 + Math.random()*10, 0.09, 'square', 0.13);
const sndRev    = () => { tone(55, 0.9, 'sawtooth', 0.2, 140); noise(0.8, 0.18, 160); };
const sndGiggle = () => { tone(700,0.1,'sine',0.14,900); setTimeout(()=>tone(800,0.1,'sine',0.14,1000),130); setTimeout(()=>tone(900,0.12,'sine',0.14,1150),260); };
const sndCluck  = () => tone(560 + Math.random()*200, 0.08, 'square', 0.12, 320);
const sndMow    = () => { noise(0.14, 0.05, 950); if (Math.random() < 0.3) tone(180, 0.1, 'sawtooth', 0.04, 160); };
const sndPuff   = () => noise(0.18, 0.09, 1500);
const sndSnip   = () => tone(900 + Math.random()*300, 0.05, 'square', 0.05);
const sndPop    = () => tone(320, 0.12, 'sine', 0.2, 640);
const sndMunch  = () => noise(0.16, 0.09, 480);
const sndMoo    = () => { tone(210, 0.75, 'sawtooth', 0.13, 130); tone(105, 0.75, 'sine', 0.1, 70); };
const sndHorn   = () => { tone(420, 0.3, 'square', 0.14); setTimeout(()=>tone(420,0.45,'square',0.14),350); };
const sndCreak  = () => tone(300, 0.6, 'sawtooth', 0.07, 120);
const sndTruck  = () => tone(48 + Math.random()*8, 0.11, 'square', 0.14);
const sndStrain = () => { tone(85, 0.45, 'sawtooth', 0.13, 65); noise(0.35, 0.12, 220); };
const sndPopBig = () => { noise(0.35, 0.4, 600); tone(220, 0.5, 'square', 0.22, 950); };
const sndTwinkle = () => { tone(1180,0.25,'triangle',0.09); setTimeout(()=>tone(1560,0.3,'triangle',0.08),120); };
const sndLullaby = () => { [523,494,440,392].forEach((f,i)=>setTimeout(()=>tone(f,0.55,'triangle',0.09),i*420)); };
function cluckChorus(n) {
  for (let k = 0; k < (n || 6); k++) {
    setTimeout(() => tone(520 + Math.random()*300, 0.07, 'square', 0.11, 300), k * 130 + Math.random()*60);
  }
}

/* ---------- three.js scene ---------- */
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xb8e0f2);
scene.fog = new THREE.Fog(0xb8e0f2, 42, 115);

const camera = new THREE.PerspectiveCamera(50, 1, 0.1, 300);
let camExtra = 0;
function sizeIt() {
  const w = window.innerWidth, h = window.innerHeight;
  renderer.setSize(w, h); camera.aspect = w / h; camera.updateProjectionMatrix();
  const need = 10.5 / (Math.tan(25 * Math.PI / 180) * camera.aspect);
  camExtra = Math.min(Math.max(need + 3.6 - 12.6, 0), 24);
}
window.addEventListener('resize', sizeIt); sizeIt();

const hemi = new THREE.HemisphereLight(0xfff7df, 0x8aa362, 0.95); scene.add(hemi);
const sunL = new THREE.DirectionalLight(0xfff2cf, 0.85); sunL.position.set(5, 12, 8); scene.add(sunL);

function lam(color) { return new THREE.MeshLambertMaterial({ color }); }

/* ---------- the wide green paddock ---------- */
const ground = new THREE.Mesh(new THREE.PlaneGeometry(180, 100), lam(0xa9c96a));
ground.rotation.x = -Math.PI / 2; scene.add(ground);
const paddock = new THREE.Mesh(new THREE.PlaneGeometry(21, 12), lam(0x9dc45f));
paddock.rotation.x = -Math.PI / 2; paddock.position.set(0, 0.01, 0.6); scene.add(paddock);

function gum(x, z, s) {
  const g = new THREE.Group();
  const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.16, 0.22, 2.4, 8), lam(0xcfc4ae));
  trunk.position.y = 1.2; g.add(trunk);
  [[0,3.0,0],[-0.7,2.5,0.2],[0.7,2.6,-0.2]].forEach(p => {
    const leaf = new THREE.Mesh(new THREE.SphereGeometry(0.85, 12, 10), lam(0x6e8f5e));
    leaf.position.set(p[0], p[1], p[2]); g.add(leaf);
  });
  g.position.set(x, 0, z); g.scale.setScalar(s || 1); scene.add(g);
}
[[-20,-13,1.3],[-16,-16,1.0],[18,-12,1.3],[23,-14,1.1],[6,-17,0.9],[-6,-16,1.15],[12,-15,1.0]].forEach(t => gum(t[0], t[1], t[2]));

/* fence along the back */
for (let i = 0; i < 14; i++) {
  const post = new THREE.Mesh(new THREE.CylinderGeometry(0.09, 0.1, 1.1, 6), lam(0x9a6a3a));
  post.position.set(-18 + i * 3.2, 0.55, -10.5); scene.add(post);
}
const railTop = new THREE.Mesh(new THREE.BoxGeometry(45, 0.12, 0.12), lam(0x9a6a3a));
railTop.position.set(2, 0.95, -10.5); scene.add(railTop);
const railBot = railTop.clone(); railBot.position.y = 0.55; scene.add(railBot);

/* the house and shed, tucked away in the background beyond the fence */
const HOUSE_X = -11;
const house = new THREE.Group(); scene.add(house);
const hbody = new THREE.Mesh(new THREE.BoxGeometry(5.4, 2.7, 3.8), lam(0xe8e2d2));
hbody.position.set(HOUSE_X, 1.35, -13.5); house.add(hbody);
const roofSlab = new THREE.Mesh(new THREE.BoxGeometry(6.1, 0.18, 4.5), lam(0x8a3d33));
roofSlab.rotation.x = 0.26; roofSlab.position.set(HOUSE_X, 3.3, -13.5); house.add(roofSlab);
[[HOUSE_X - 1.6],[HOUSE_X + 1.6]].forEach(p => {
  const w = new THREE.Mesh(new THREE.BoxGeometry(0.9, 0.8, 0.07), new THREE.MeshBasicMaterial({ color: 0xbfe6ff }));
  w.position.set(p[0], 1.6, -11.55); house.add(w);
});
const hdoor = new THREE.Mesh(new THREE.BoxGeometry(0.95, 1.8, 0.09), lam(0x6f4a26));
hdoor.position.set(HOUSE_X, 0.9, -11.55); house.add(hdoor);
const tank = new THREE.Group();
const tankBody = new THREE.Mesh(new THREE.CylinderGeometry(1.0, 1.0, 2.0, 16), lam(0xa8adb3));
tankBody.position.y = 1.0; tank.add(tankBody);
tank.position.set(HOUSE_X - 4.2, 0, -13.2); scene.add(tank);
const shed = new THREE.Group();
const shedBody = new THREE.Mesh(new THREE.BoxGeometry(4.5, 2.4, 3.4), lam(0x9aa0a6)); shedBody.position.y = 1.2; shed.add(shedBody);
const shedRoof = new THREE.Mesh(new THREE.BoxGeometry(4.9, 0.18, 3.8), lam(0x6e747c)); shedRoof.position.y = 2.5; shedRoof.rotation.z = 0.08; shed.add(shedRoof);
shed.position.set(12, 0, -13.5); scene.add(shed);

/* clouds & sun */
const clouds = [];
const cloudMat = lam(0xffffff);
for (let i = 0; i < 6; i++) {
  const c = new THREE.Group();
  for (let j = 0; j < 3; j++) {
    const p = new THREE.Mesh(new THREE.SphereGeometry(1.1 + Math.random(), 12, 10), cloudMat);
    p.position.set(j * 1.4 - 1.4, Math.random()*0.4, 0); c.add(p);
  }
  c.position.set(-28 + i * 12, 12 + Math.random()*4, -26 - Math.random()*6);
  scene.add(c); clouds.push(c);
}
const sunBall = new THREE.Mesh(new THREE.SphereGeometry(2.2, 16, 14),
  new THREE.MeshBasicMaterial({ color: 0xffe27a }));
sunBall.position.set(14, 12, -30); scene.add(sunBall);

function blobShadow(r) {
  const m = new THREE.Mesh(new THREE.CircleGeometry(r, 20),
    new THREE.MeshBasicMaterial({ color: 0x4a5e23, transparent: true, opacity: 0.26 }));
  m.rotation.x = -Math.PI / 2; m.position.y = 0.02; return m;
}

/* ---------- the grass! rows and rows of it ---------- */
const ROW_ZS = [5.2, 4.0, 2.8, 1.6, 0.4, -0.8, -2.0, -3.2];
const COL_XS = [];
for (let i = 0; i < 11; i++) COL_XS.push(-8 + i * 1.6);
const tufts = [];
ROW_ZS.forEach(z => COL_XS.forEach(x => {
  const t = new THREE.Mesh(new THREE.ConeGeometry(0.17, 0.6, 6), lam(0x7fb648));
  t.position.set(x + (Math.random()-0.5)*0.5, 0.3, z + (Math.random()-0.5)*0.35);
  t.rotation.y = Math.random() * 3;
  scene.add(t);
  tufts.push({ m: t, tall: true, x: t.position.x, z: t.position.z });
}));
function cutTuft(t, quiet) {
  if (!t.tall) return;
  t.tall = false;
  tween(0.25, p => { t.m.scale.y = 1 - 0.82 * easeOut(p); });
  if (!quiet) clippings(new THREE.Vector3(t.x, 0.5, t.z));
}
function tallCount() { return tufts.filter(t => t.tall).length; }
function regrowAll(cb) {
  let i = 0;
  const order = tufts.slice().sort(() => Math.random() - 0.5);
  const iv = setInterval(() => {
    for (let k = 0; k < 6 && i < order.length; k++, i++) {
      const t = order[i];
      t.tall = true;
      tween(0.4, p => { t.m.scale.y = 0.18 + 0.82 * easeOut(p); });
      if (Math.random() < 0.18) sparkle(new THREE.Vector3(t.x, 0.75, t.z), 0xb6f07f);
    }
    if (Math.random() < 0.4) sndBoing(Math.floor(Math.random()*3));
    if (Math.random() < 0.15) sndTwinkle();
    if (i >= order.length) { clearInterval(iv); cb && cb(); }
  }, 130);
}

/* ---------- HOLD-to-mow machine ---------- */
let holdRun = null, holding = false;
btn.addEventListener('pointerdown', e => {
  audio();
  if (!holdRun) return;
  holding = true;
  btn.classList.add('holding');
});
['pointerup', 'pointercancel', 'pointerleave'].forEach(ev =>
  btn.addEventListener(ev, () => { holding = false; btn.classList.remove('holding'); }));
window.addEventListener('pointerup', () => { holding = false; btn.classList.remove('holding'); });

function startHold(label, opts) {
  /* opts: rows [{z}], startLeft, speed, cutR, mode 'push'|'rig', done */
  holdRun = Object.assign({
    row: 0, x: opts.startLeft ? -9 : 9, dir: opts.startLeft ? 1 : -1,
    sndT: 0, puffT: 0, total: opts.rows.length * 18, cutSoFar: 0,
  }, opts);
  holding = false;
  setBtn(label, null, 'green');
  btn.classList.remove('hidden');
  holdBar.style.display = 'block';
  holdFill.style.width = '0%';
  placeHoldEntity();
}
function placeHoldEntity() {
  const R = holdRun;
  const z = R.rows[R.row].z;
  if (R.mode === 'push') {
    dad.position.set(R.x, 0, z + 0.55);
    faceToward(dad, new THREE.Vector3(R.x + R.dir * 5, 0, z + 0.55));
    mower.visible = true;
    mower.position.set(R.x + R.dir * 0.7, 0, z);
    mower.rotation.y = dad.rotation.y;
  } else {
    rig.visible = true;
    rig.position.set(R.x, 0, z);
    rig.rotation.y = R.dir > 0 ? 0 : Math.PI;
  }
}
function stepHold(dt) {
  const R = holdRun; if (!R) return;
  if (!holding) { wheelSpin = 0; return; }
  R.x += R.dir * R.speed * dt;
  const z = R.rows[R.row].z;
  if (R.mode === 'push') {
    dad.position.set(R.x, Math.abs(Math.sin(bobT * 9)) * 0.07, z + 0.55);
    mower.position.set(R.x + R.dir * 0.7, 0, z);
    R.sndT += dt;
    if (R.sndT > 0.16) { R.sndT = 0; sndMow(); }
    R.puffT += dt;
    if (R.puffT > 2.2) { R.puffT = 0; sndPuff(); smokePuff(dad.position.clone().add(new THREE.Vector3(0, 2.1, 0)), 0xffffff); }
  } else {
    rig.position.x = R.x;
    wheelSpin = 6;
    engineOn = true;
    R.sndT += dt;
    if (R.sndT > 0.6) { R.sndT = 0; sndSnip(); }
  }
  /* cut everything within reach */
  const cutAt = R.mode === 'push' ? R.x + R.dir * 0.7 : R.x - R.dir * 2.3;
  tufts.forEach(t => {
    if (t.tall && Math.abs(t.z - z) <= R.cutR && Math.abs(t.x - cutAt) < 0.9) {
      cutTuft(t);
      R.cutSoFar++;
      if (R.cutSoFar % 3 === 0) sndPop();
    }
  });
  /* progress bar */
  const rowDone = (R.dir > 0 ? R.x + 9 : 9 - R.x) / 18;
  holdFill.style.width = Math.round(((R.row + Math.min(rowDone, 1)) / R.rows.length) * 100) + '%';
  /* end of the row? */
  if (Math.abs(R.x) > 9) {
    R.row++;
    if (R.row >= R.rows.length) {
      const done = R.done;
      holdRun = null; holding = false;
      btn.classList.remove('holding');
      hideBtn();
      holdBar.style.display = 'none';
      wheelSpin = 0; engineOn = false;
      done && done();
      return;
    }
    R.x = Math.sign(R.x) * 9;
    R.dir = -R.dir;
    sndClick();
    placeHoldEntity();
  }
}

/* ---------- tap-the-world targets (several at once, like the Pigs book) ---------- */
const tapHint = document.getElementById('tapHint');
let tapTargets = [];   // [{ getPos: () => Vector3, action, sticky }]
let hintIdx = 0, hintCycleT = 0;
function setTapTargets(arr) { hideBtn(); tapTargets = arr; hintIdx = 0; hintCycleT = 0; tapHint.style.display = arr.length ? 'block' : 'none'; }
function setTapTarget(getPos, action) { setTapTargets([{ getPos, action }]); }
function clearTapTargets() { tapTargets = []; tapHint.style.display = 'none'; }
function projectToScreen(pos) {
  const v = pos.clone().project(camera);
  return { x: (v.x * 0.5 + 0.5) * window.innerWidth, y: (-v.y * 0.5 + 0.5) * window.innerHeight, behind: v.z > 1 };
}
canvas.addEventListener('pointerdown', e => {
  audio();
  if (!tapTargets.length) return;
  const r = Math.max(85, window.innerWidth * 0.13);
  for (const t of tapTargets) {
    const s = projectToScreen(t.getPos());
    if (!s.behind && Math.hypot(e.clientX - s.x, e.clientY - s.y) < r) {
      if (t.sticky) { t.action(); }              // pat away, as often as you like!
      else { const a = t.action; clearTapTargets(); a(); }
      return;
    }
  }
});

/* ---------- SLIDE-to-pull machine (from the Enormous Carrot book) ---------- */
const pullEl = document.getElementById('pull');
const pullLabel = document.getElementById('pullLabel');
const pullTrack = document.getElementById('pullTrack');
const pullFill = document.getElementById('pullFill');
const pullHandle = document.getElementById('pullHandle');
let pullActive = false, pullProgress = 0, dragging = false, pullZone = 0, pullDone = null, pullSlideFn = null;

function layoutHandle() {
  const w = pullTrack.clientWidth - 82;
  pullHandle.style.left = (3 + pullProgress * w) + 'px';
  pullFill.style.width = Math.round(pullProgress * 100) + '%';
}
function showPull(label, done, onSlide) {
  hideBtn();
  pullLabel.textContent = label || 'Slide to PULL! ➜';
  pullProgress = 0; pullZone = 0; pullActive = true;
  pullDone = done; pullSlideFn = onSlide || null;
  pullEl.classList.remove('hidden');
  layoutHandle();
}
function hidePull() { pullActive = false; dragging = false; pullDone = null; pullSlideFn = null; pullEl.classList.add('hidden'); }

function trackProgress(e) {
  const rect = pullTrack.getBoundingClientRect();
  return (e.clientX - rect.left - 41) / (rect.width - 82);
}
pullTrack.addEventListener('pointerdown', e => {
  audio();
  if (!pullActive) return;
  /* must grab near the handle — no cheeky taps at the finish line! */
  const rect = pullTrack.getBoundingClientRect();
  const handleX = rect.left + 41 + pullProgress * (rect.width - 82);
  if (Math.abs(e.clientX - handleX) > 90) return;
  dragging = true;
  pullTrack.setPointerCapture(e.pointerId);
});
pullTrack.addEventListener('pointermove', e => {
  if (!dragging || !pullActive) return;
  pullProgress = Math.min(Math.max(trackProgress(e), 0), 1);
  layoutHandle();
  if (pullSlideFn) pullSlideFn(pullProgress);
  const zone = Math.floor(pullProgress * 4);
  if (zone > pullZone) { pullZone = zone; sndStrain(); }
  if (pullProgress >= 0.97) finishDrag();
});
['pointerup', 'pointercancel'].forEach(ev => pullTrack.addEventListener(ev, () => {
  if (!dragging) return;
  dragging = false;
  if (pullActive && pullProgress > 0.04 && pullProgress < 0.97) slipBack();
}));
function slipBack() {
  tone(420, 0.35, 'sine', 0.14, 130);   // whoops — it slipped!
  const from = pullProgress;
  tween(0.35, p => {
    pullProgress = from * (1 - easeOut(p)); layoutHandle();
    if (pullSlideFn) pullSlideFn(pullProgress);
  }, () => { pullProgress = 0; pullZone = 0; layoutHandle(); if (pullSlideFn) pullSlideFn(0); });
}
function finishDrag() {
  dragging = false; pullActive = false;
  const done = pullDone;
  pullProgress = 0; pullZone = 0; layoutHandle();
  hidePull();
  done && done();
}

    cluckChorus(5); sndQuack();
    say([
      { who: '🐔', text: 'And along behind came the chooks and the duck, gobbling up all the seeds and beetles the cows left behind. Not a scrap was wasted!', snd: () => cluckChorus(4) },
      { who: '👨‍🌾', text: 'Dad leaned on the fence and watched them go. “Best mowers I ever bought,” he smiled. “Eating in a tidy line, and moving on all together — that’s just the way a paddock likes it.”', snd: sndMoo },
    ], bigFinish);
  });
}
function bigFinish() {
  hideNarr();
  stage = 5;
  /* Mum and Tommy come out to join him */
  mum.visible = true; mum.position.set(-15, 0, 6.4);
  tommy.visible = true; tommy.position.set(-14.4, 0, 7.4);
  const mumSpot = new THREE.Vector3(-4.8, 0, 6.4);
  const tomSpot = new THREE.Vector3(-3.9, 0, 7.2);
  faceToward(mum, mumSpot); faceToward(tommy, tomSpot);
  walkTo(mum, mumSpot, 2.8, null);
  walkTo(tommy, tomSpot, 3.2, () => {
    sndGiggle();
    say([
      { who: '👨‍🌾', text: '“And do you know the best bit?” said Dad, scooping Tommy up high. “No more mowing for ME…”' },
      { who: '👨‍🌾', text: '“…which means more time for the people I love best of all.”', snd: sndGiggle },
      { who: '📖', text: 'So the cows munched, and the chooks pecked, and Dad and Mum and Tommy played in the paddock until the stars came out.', snd: sndMoo },
    ], () => {
      hideNarr();
      [dad, mum, tommy, teddy].forEach((c, i) => { c.userData.party = true; c.userData.pi = i; });
      dropConfetti(); sndDing(); sndMoo(); cluckChorus(6);
      setTimeout(patTheCows, 2200);
    }, '▸');
  });
}

/* ---------- pat the cows goodnight! ---------- */
const PAT_NAMES = ['🐄 Daisy!', '🐄 Buttercup!', '🐄 Clover!', '🐄 Little Patch!'];
function patTheCows() {
  showNarr('💚', 'Tap the cows and Teddy to pat them goodnight! 👆');
  const targets = cows.map((c, i) => ({
    sticky: true,
    getPos: () => c.g.position.clone().setY(1.3),
    action: () => {
      sndMoo(); sndTwinkle();
      namePop(PAT_NAMES[i], c.g.position.clone().setY(1.9));
      sparkle(c.g.position.clone().setY(1.4), 0xffc2d6);
      /* a happy little wiggle */
      const g = c.g, y0 = 0;
      tween(0.4, p => { g.position.y = Math.sin(p * Math.PI) * 0.22; }, () => { g.position.y = y0; });
    }
  }));
  targets.push({
    sticky: true,
    getPos: () => teddy.position.clone().setY(1.0),
    action: () => {
      sndBark(); sndTwinkle();
      namePop('🐶 Teddy!', teddy.position.clone().setY(1.5));
      sparkle(teddy.position.clone().setY(1.0), 0xffe066);
      if (Math.random() < 0.5) sndGiggle();
    }
  });
  setTapTargets(targets);
  setBtn('🌙 Time for bed ▸', goodnight, 'gold');
}
function goodnight() {
  clearTapTargets();
  hideNarr();
  nightFade(
    'So the cows munched under the stars, and the chooks tucked up their heads, and the whole farm fell fast asleep. Goodnight, cows!',
    '⭐ The End ▸',
    () => {
      document.getElementById('endScreen').classList.remove('gone');
      setTimeout(() => { fade.style.opacity = 0; }, 800);
    });
}

/* ---------- cow brains (very small, but very orderly) ---------- */
function stepCows(dt) {
  /* the mob line: nobody gets too far ahead of the rearmost grazer */
  let rearX = -1e9;
  cows.forEach(c => {
    if (c.state === 'idle' || c.state === 'walk' || c.state === 'eat' || c.state === 'wait') {
      rearX = Math.max(rearX, c.g.position.x);
    }
  });
  cows.forEach((c, ci) => {
    if (c.state === 'idle') {
      /* am I ahead of the mob? then wait politely, chewing */
      if (c.g.position.x < rearX - 2.6) {
        c.state = 'wait'; c.eatT = 0.7 + Math.random() * 0.5;
        return;
      }
      /* next grass in MY lane, always the rightmost — nice tidy stripes */
      let best = null;
      laneLists[ci].forEach(t => { if (t.tall && (!best || t.x > best.x)) best = t; });
      if (!best) { c.state = 'rest'; return; }
      c.target = best;
      c.state = 'walk';
      faceToward(c.g, new THREE.Vector3(best.x, 0, best.z));
    } else if (c.state === 'wait') {
      c.g.userData.head.rotation.x = 0.3 + Math.sin(bobT * 5 + ci) * 0.08;   // chewing her cud
      c.eatT -= dt;
      if (c.eatT <= 0) { c.g.userData.head.rotation.x = 0; c.state = 'idle'; }
    } else if (c.state === 'walk') {
      const t = c.target;
      if (!t || !t.tall) { c.state = 'idle'; return; }
      const dx = t.x - c.g.position.x, dz = t.z - c.g.position.z;
      const dist = Math.hypot(dx, dz);
      if (dist < 0.55) {
        c.state = 'eat'; c.eatT = 1.0 + Math.random() * 0.5;
      } else {
        const sp = 0.95 * dt;
        c.g.position.x += dx / dist * sp;
        c.g.position.z += dz / dist * sp;
      }
    } else if (c.state === 'eat') {
      c.g.userData.head.rotation.x = 0.9 + Math.sin(bobT * 7) * 0.12;
      c.eatT -= dt;
      if (c.eatT <= 0) {
        c.g.userData.head.rotation.x = 0;
        if (c.target && c.target.tall) {
          cutTuft(c.target, true);
          sndMunch();
          if (Math.random() < 0.12) sndMoo();
        }
        c.state = 'idle';
      }
    } else if (c.state === 'rest') {
      /* her lane's all eaten — happy swaying and the odd moo */
      c.wanderT += dt;
      if (c.wanderT > 6) { c.wanderT = 0; if (Math.random() < 0.5) sndMoo(); }
    }
  });
  /* the clean-up crew follows along behind */
  if (followersOn) {
    const flw = hens.concat([duck]);
    flw.forEach((f, i) => {
      if (!f.visible || f.userData.follow === undefined) return;
      const cow = cows[f.userData.follow].g;
      const tx = cow.position.x - Math.sin(cow.rotation.y) * 1.3 + (i % 2 ? 0.5 : -0.5);
      const tz = cow.position.z - Math.cos(cow.rotation.y) * 1.3 + (i % 3 ? 0.4 : -0.3);
      f.position.x += (tx - f.position.x) * Math.min(dt * 1.6, 1);
      f.position.z += (tz - f.position.z) * Math.min(dt * 1.6, 1);
      f.rotation.y = cow.rotation.y + Math.sin(bobT + i) * 0.4;
    });
  }
}

/* ---------- fullscreen toggle ---------- */
const fsBtn = document.getElementById('fsBtn');
const fsRoot = document.documentElement;
const fsSupported = !!(fsRoot.requestFullscreen || fsRoot.webkitRequestFullscreen);
if (!fsSupported) fsBtn.style.display = 'none';
function inFullscreen() { return !!(document.fullscreenElement || document.webkitFullscreenElement); }
fsBtn.addEventListener('click', () => {
  audio(); sndClick();
  if (inFullscreen()) {
    (document.exitFullscreen || document.webkitExitFullscreen).call(document);
  } else {
    (fsRoot.requestFullscreen || fsRoot.webkitRequestFullscreen).call(fsRoot);
  }
});
['fullscreenchange', 'webkitfullscreenchange'].forEach(ev =>
  document.addEventListener(ev, () => {
    fsBtn.title = inFullscreen() ? 'Exit fullscreen' : 'Fullscreen';
    sizeIt();
  })
);

/* ---------- title / restart ---------- */
document.getElementById('beginBtn').addEventListener('click', () => {
  audio(); sndDing();
  document.getElementById('titleScreen').classList.add('gone');
  startStory();
});
document.getElementById('againBtn').addEventListener('click', () => {
  audio(); sndClick();
  document.getElementById('endScreen').classList.add('gone');
  startStory();
});

/* ---------- main loop ---------- */
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  bobT += dt;

  for (let i = tweens.length - 1; i >= 0; i--) {
    const tw = tweens[i];
    tw.t += dt;
    const p = Math.min(tw.t / tw.dur, 1);
    tw.fn(p);
    if (p >= 1) { tweens.splice(i, 1); if (tw.done) tw.done(); }
  }
  for (let i = walkers.length - 1; i >= 0; i--) {
    const w = walkers[i];
    const dx = w.target.x - w.obj.position.x;
    const dz = w.target.z - w.obj.position.z;
    const dist = Math.hypot(dx, dz);
    const step = w.speed * dt;
    w.t += dt;
    if (dist <= step) {
      w.obj.position.set(w.target.x, 0, w.target.z);
      walkers.splice(i, 1); if (w.done) w.done();
    } else {
      w.obj.position.x += dx / dist * step;
      w.obj.position.z += dz / dist * step;
      if (w.hop) w.obj.position.y = Math.abs(Math.sin(w.t * 10)) * w.hopH;
    }
  }

  stepHold(dt);
  if (storyOn && stage >= 4) stepCows(dt);
  if (storyOn) updateBadge();

  if (tapTargets.length) {
    hintCycleT += dt;
    if (hintCycleT > 1.5) { hintCycleT = 0; hintIdx = (hintIdx + 1) % tapTargets.length; }
    const s = projectToScreen(tapTargets[hintIdx % tapTargets.length].getPos());
    if (!s.behind) { tapHint.style.left = s.x + 'px'; tapHint.style.top = s.y + 'px'; }
  }

  if (engineOn) {
    engineT += dt;
    if (engineT > 0.16) {
      engineT = 0; sndPutt();
      if (Math.random() < 0.5) smokePuff(tractor.userData.exhaust.clone().applyMatrix4(tractor.matrixWorld), 0x8a8f98);
    }
  }
  if (wheelSpin) tractor.userData.wheels.forEach(w => { w.rotation.z -= wheelSpin * dt; });
  if (truckEngine) {
    truckT += dt;
    if (truckT > 0.13) {
      truckT = 0; sndTruck();
      smokePuff(truck.localToWorld(new THREE.Vector3(3.0, 1.9, -0.6)), 0x8a8f98);
    }
    truckWheels.forEach(w => { w.rotation.z -= 5 * dt; });
  }

  const target = new THREE.Vector3(
    camHome.x + Math.sin(bobT * 0.25) * 0.3,
    camHome.y + camExtra * 0.18,
    camHome.z + camExtra);
  camera.position.lerp(target, 0.05);
  let look = new THREE.Vector3(camHome.lookX, camHome.lookY, 0);
  if (shakeT > 0) { shakeT -= dt; look.x += (Math.random()-0.5) * 0.3; look.y += (Math.random()-0.5) * 0.3; }
  camera.lookAt(look);

  /* idles & party hops */
  [dad, mum, tommy, teddy, duck].forEach(c => {
    if (!c.visible) return;
    if (walkers.find(w => w.obj === c)) return;
    if (c.userData.party) {
      c.position.y = Math.abs(Math.sin(bobT * 5 + c.userData.pi * 1.1)) * (c === tommy ? 0.3 : 0.18);
    }
  });
  hens.forEach((h, i) => { if (h.visible && !followersOn) h.rotation.x = Math.max(Math.sin(bobT * 2.2 + i * 2.4), 0) * 0.35; });
  if (followersOn) hens.concat([duck]).forEach((h, i) => {
    h.rotation.x = Math.max(Math.sin(bobT * 3.0 + i * 2.1), 0) * 0.4;
  });
  if (teddy.visible && teddy.userData.tail) teddy.userData.tail.position.x = Math.sin(bobT * 9) * 0.06;
  cows.forEach((c, i) => {
    if (!c.g.visible) return;
    if (c.g.userData.tail) c.g.userData.tail.rotation.z = Math.sin(bobT * 2.4 + i * 1.7) * 0.35;
  });

  for (let i = puffs.length - 1; i >= 0; i--) {
    const p = puffs[i];
    p.position.addScaledVector(p.userData.v, dt);
    p.userData.life -= dt;
    p.material.opacity = Math.max(p.userData.life, 0);
    if (p.userData.life <= 0 || p.position.y < 0) { scene.remove(p); puffs.splice(i, 1); }
  }
  for (let i = confetti.length - 1; i >= 0; i--) {
    const c = confetti[i];
    c.position.y -= c.userData.v * dt;
    c.rotation.x += c.userData.r * dt; c.rotation.y += c.userData.r * 0.7 * dt;
    if (c.position.y < 0.05) c.position.y = 7 + Math.random()*4;
  }
  clouds.forEach((c, i) => { c.position.x += dt * (0.14 + i * 0.03); if (c.position.x > 60) c.position.x = -40; });

  renderer.render(scene, camera);
}
animate();
</script>
