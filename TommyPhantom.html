<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>The Prince and The Lantern</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;background:#0a0810;overflow:hidden;font-family:'Lora',serif;}
  #app{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 40%,#161018,#0a0810 80%);}

  /* stage holds the canvas */
  #stage{position:relative;width:100%;max-width:760px;display:flex;flex-direction:column;align-items:center;padding:0 12px;}
  canvas{width:100%;height:auto;display:block;border-radius:10px;box-shadow:0 10px 50px rgba(0,0,0,0.7);background:#08060a;}

  /* story text below the illustration */
  #textwrap{width:100%;max-width:680px;padding:20px 22px 8px;min-height:120px;display:flex;align-items:flex-start;justify-content:center;}
  #text{font-size:clamp(16px,4.4vw,21px);line-height:1.6;color:#e8dcc8;text-align:center;font-weight:400;text-shadow:0 1px 8px rgba(0,0,0,0.5);transition:opacity .35s ease;}

  /* title & end screens */
  .screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px;background:radial-gradient(ellipse at 50% 45%,#1a1220,#0a0810 85%);transition:opacity .5s ease;z-index:5;}
  .screen h1{font-family:'Special Elite',monospace;color:#f0d9a8;font-size:clamp(30px,8vw,52px);line-height:1.15;letter-spacing:1px;text-shadow:0 2px 20px rgba(255,180,90,0.25);margin-bottom:18px;}
  .screen .sub{color:#b89a78;font-size:clamp(14px,4vw,18px);font-style:italic;margin-bottom:40px;letter-spacing:.5px;}
  .screen .tap{color:#8a7358;font-size:13px;letter-spacing:2px;text-transform:uppercase;opacity:.8;animation:pulse 2.4s ease-in-out infinite;}
  .screen .lanterntitle{font-size:44px;margin-bottom:26px;filter:drop-shadow(0 0 22px rgba(255,180,90,.6));}
  @keyframes pulse{0%,100%{opacity:.4}50%{opacity:.9}}
  .screen.hidden{opacity:0;pointer-events:none;}

  /* nav zones (invisible tap areas) */
  .navzone{position:fixed;top:0;bottom:0;width:32%;z-index:8;}
  #prev{left:0;} #next{right:0;}

  /* on-screen arrows (subtle) */
  .arrow{position:fixed;top:50%;transform:translateY(-50%);z-index:9;color:rgba(240,217,168,.35);font-size:34px;font-family:'Special Elite',monospace;user-select:none;transition:color .2s;pointer-events:none;}
  #prevArrow{left:14px;} #nextArrow{right:14px;}

  /* progress dots */
  #progress{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);display:flex;gap:6px;z-index:9;}
  .dot{width:6px;height:6px;border-radius:50%;background:rgba(232,220,200,.22);transition:background .3s,transform .3s;}
  .dot.on{background:#f0c070;transform:scale(1.35);}

  /* page counter */
  #counter{position:fixed;top:12px;right:54px;z-index:9;color:rgba(232,220,200,.4);font-size:12px;letter-spacing:1px;font-family:'Special Elite',monospace;}
  #homelink{position:fixed;top:12px;left:16px;z-index:10;color:rgba(232,220,200,.4);font-size:12px;letter-spacing:1px;font-family:'Special Elite',monospace;text-decoration:none;}
  #homelink:hover{color:#f0c070;}
  #fsBtn{position:fixed;top:10px;right:16px;z-index:11;width:30px;height:30px;display:flex;align-items:center;justify-content:center;background:rgba(20,14,24,.5);border:1px solid rgba(232,220,200,.18);border-radius:7px;color:rgba(232,220,200,.55);cursor:pointer;transition:color .2s,border-color .2s,background .2s;padding:0;}
  #fsBtn:hover{color:#f0c070;border-color:rgba(240,192,112,.5);background:rgba(30,20,10,.6);}
  #fsBtn svg{width:16px;height:16px;display:block;}
  /* when fullscreen, nudge the counter left so it doesn't collide with the button */
  :fullscreen #counter{right:54px;}
  :-webkit-full-screen #counter{right:54px;}
</style></head>
<body>
<div id="app">
  <div id="stage">
    <canvas id="c" width="720" height="480"></canvas>
    <div id="textwrap"><p id="text"></p></div>
  </div>

  <!-- Title screen -->
  <div class="screen" id="titleScreen">
    <div class="lanterntitle">&#128367;</div>
    <h1>The Prince<br>&amp; The Lantern</h1>
    <div class="sub">a tale for the brave and the curious</div>
    <div class="tap">tap to begin</div>
  </div>

  <!-- End screen -->
  <div class="screen hidden" id="endScreen">
    <h1>The End</h1>
    <div class="sub">well then &mdash; let's go and look</div>
    <div class="tap">tap to read again</div>
  </div>
</div>

<a id="homelink" href="#">&#8592; home</a>
<div id="counter"></div>
<button id="fsBtn" aria-label="Toggle fullscreen" title="Fullscreen">
  <svg id="fsIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M4 9V4h5M20 9V4h-5M4 15v5h5M20 15v5h-5"/>
  </svg>
</button>
<div class="navzone" id="prev"></div>
<div class="navzone" id="next"></div>
<div class="arrow" id="prevArrow">&#10094;</div>
<div class="arrow" id="nextArrow">&#10095;</div>
<div id="progress"></div>

<script>

const cv=document.getElementById('c'),ctx=cv.getContext('2d');const W=cv.width,H=cv.height;
const grain=(()=>{const g=document.createElement('canvas');g.width=W;g.height=H;const gx=g.getContext('2d');const id=gx.createImageData(W,H);for(let i=0;i<id.data.length;i+=4){const v=200+Math.random()*55;id.data[i]=id.data[i+1]=id.data[i+2]=v;id.data[i+3]=Math.random()*13;}gx.putImageData(id,0,0);return g;})();
const fog=[];for(let i=0;i<30;i++)fog.push({x:Math.random()*W,y:H*0.4+Math.random()*H*0.55,r:90+Math.random()*150,sp:0.08+Math.random()*0.2,ph:Math.random()*7});
function flickVal(t){return 0.5+Math.sin(t*0.008)*0.25+Math.sin(t*0.021)*0.15+(Math.random()-0.5)*0.1;}
function nightBase(top,mid,bot){const b=ctx.createLinearGradient(0,0,0,H);b.addColorStop(0,top);b.addColorStop(0.6,mid);b.addColorStop(1,bot);ctx.fillStyle=b;ctx.fillRect(0,0,W,H);}
function warmGlow(x,y,rad,a,t){const f=flickVal(t);let g=ctx.createRadialGradient(x,y,3,x,y,rad*(0.9+f*0.15));g.addColorStop(0,'rgba(255,200,125,'+(a*(0.85+f*0.2))+')');g.addColorStop(0.4,'rgba(240,150,70,'+(a*0.4)+')');g.addColorStop(1,'rgba(240,150,70,0)');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);}
function lanternObj(LX,LY,f){let core=ctx.createRadialGradient(LX,LY,0,LX,LY,15);core.addColorStop(0,'#fff4d6');core.addColorStop(0.4,'#ffcf7a');core.addColorStop(1,'rgba(255,150,60,0)');ctx.fillStyle=core;ctx.beginPath();ctx.arc(LX,LY,15*(0.85+f*0.3),0,7);ctx.fill();ctx.strokeStyle='rgba(20,14,8,0.95)';ctx.lineWidth=1.6;ctx.strokeRect(LX-6,LY-8,12,16);ctx.beginPath();ctx.moveTo(LX,LY-8);ctx.lineTo(LX,LY-14);ctx.stroke();let fl=ctx.createRadialGradient(LX,LY,0,LX,LY,5);fl.addColorStop(0,'#fffefb');fl.addColorStop(1,'rgba(255,200,110,0)');ctx.fillStyle=fl;ctx.beginPath();ctx.arc(LX,LY,5,0,7);ctx.fill();}
function drawFog(t,spd){spd=spd===undefined?1:spd;fog.forEach(p=>{const x=(p.x+t*p.sp*spd)%(W+320)-160;const a=0.04+0.05*Math.sin(t*0.004*spd+p.ph);let fg=ctx.createRadialGradient(x,p.y,0,x,p.y,p.r);fg.addColorStop(0,'rgba(150,160,175,'+a+')');fg.addColorStop(1,'rgba(150,160,175,0)');ctx.fillStyle=fg;ctx.beginPath();ctx.arc(x,p.y,p.r,0,7);ctx.fill();});}
function vignette(strength){let vg=ctx.createRadialGradient(W/2,H/2,H*0.32,W/2,H/2,H*0.95);vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(0,0,0,'+strength+')');ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);}
function paper(){ctx.globalAlpha=0.5;ctx.drawImage(grain,0,0);ctx.globalAlpha=1;}

// ===== PAGE 1 — THE BOTTLE =====
// A fisherman's small boat on dark cold water at dusk. A corked bottle bobs on the
// waves, faintly catching an eerie glow — the only point of interest in a wide cold sea.
function page1(t){
  const f=flickVal(t);
  // WARM DUSK — later in the day, the sun low and dimming (eases into page 2's dark)
  const sky=ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#241a2e');sky.addColorStop(0.35,'#4e2e30');sky.addColorStop(0.62,'#8a5236');sky.addColorStop(1,'#b0713e');
  ctx.fillStyle=sky;ctx.fillRect(0,0,W,H);
  // the setting sun very low on the horizon, dimmer and deeper now
  const sunX=W*0.5, sunY=H*0.56;
  let sunHalo=ctx.createRadialGradient(sunX,sunY,8,sunX,sunY,W*0.55);
  sunHalo.addColorStop(0,'rgba(255,205,135,0.4)');sunHalo.addColorStop(0.4,'rgba(240,160,90,0.16)');sunHalo.addColorStop(1,'rgba(220,140,80,0)');
  ctx.fillStyle=sunHalo;ctx.fillRect(0,0,W,H*0.72);
  let disc=ctx.createRadialGradient(sunX,sunY,2,sunX,sunY,32);
  disc.addColorStop(0,'rgba(255,232,180,0.75)');disc.addColorStop(0.7,'rgba(250,190,120,0.35)');disc.addColorStop(1,'rgba(250,190,120,0)');
  ctx.fillStyle=disc;ctx.beginPath();ctx.arc(sunX,sunY,32,0,7);ctx.fill();
  // sea — deeper dusk tones
  const seaY=H*0.58;
  const sea=ctx.createLinearGradient(0,seaY,0,H);sea.addColorStop(0,'#5e3826');sea.addColorStop(1,'#2a1810');
  ctx.fillStyle=sea;ctx.fillRect(0,seaY,W,H);
  // the sun's dimmer reflection on the water
  let refl=ctx.createLinearGradient(sunX,seaY,sunX,H);refl.addColorStop(0,'rgba(255,200,130,0.3)');refl.addColorStop(1,'rgba(250,180,110,0)');
  ctx.fillStyle=refl;ctx.beginPath();ctx.moveTo(sunX-12,seaY);ctx.lineTo(sunX+12,seaY);ctx.lineTo(sunX+46,H);ctx.lineTo(sunX-46,H);ctx.closePath();ctx.fill();
  // rolling wave lines, dusk-lit
  ctx.strokeStyle='rgba(255,190,130,0.11)';ctx.lineWidth=1;
  for(let i=0;i<7;i++){const y=seaY+8+i*((H-seaY)/7);ctx.beginPath();for(let x=0;x<=W;x+=12){const yy=y+Math.sin((x*0.03)+(t*0.02)+i)*2.2;x===0?ctx.moveTo(x,yy):ctx.lineTo(x,yy);}ctx.stroke();}

  // boat silhouette (right of center), simple skiff with a standing fisherman
  const bx=W*0.60,by=seaY+14+Math.sin(t*0.002)*2;
  ctx.save();ctx.translate(bx,by);
  // hull
  ctx.fillStyle='#2a1810';ctx.beginPath();ctx.moveTo(-58,0);ctx.quadraticCurveTo(0,26,58,0);ctx.quadraticCurveTo(30,10,-30,10);ctx.quadraticCurveTo(-48,8,-58,0);ctx.closePath();ctx.fill();
  // warm sunset rim on hull
  ctx.strokeStyle='rgba(255,190,110,0.4)';ctx.lineWidth=1.4;ctx.beginPath();ctx.moveTo(-58,0);ctx.quadraticCurveTo(0,26,58,0);ctx.stroke();
  // fisherman SEATED in the skiff, FLIPPED to face LEFT toward the bottle (rod points at it)
  ctx.save();ctx.scale(-1,1); // mirror horizontally — now everything left-facing
  ctx.fillStyle='#2a1810';
  // seated torso
  ctx.beginPath();ctx.moveTo(-7,2);ctx.quadraticCurveTo(-11,-20,-4,-30);ctx.quadraticCurveTo(2,-36,8,-30);ctx.quadraticCurveTo(13,-20,9,2);ctx.quadraticCurveTo(0,5,-7,2);ctx.closePath();ctx.fill();
  // head
  ctx.beginPath();ctx.arc(2,-36,6,0,7);ctx.fill();
  // warm sunset rim
  ctx.strokeStyle='rgba(255,190,110,0.45)';ctx.lineWidth=1.3;ctx.beginPath();ctx.moveTo(8,0);ctx.quadraticCurveTo(12,-20,6,-29);ctx.stroke();
  // rod — long and upright, rising toward the sky (points out over the bottle side)
  ctx.strokeStyle='#241008';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(4,-18);ctx.lineTo(44,-70);ctx.stroke();
  ctx.restore(); // end mirror
  // legs drawn OUTSIDE the mirror so they bend the natural way — toward the bow he faces (left)
  ctx.strokeStyle='#2a1810';ctx.lineCap='round';ctx.lineWidth=6;
  ctx.beginPath();ctx.moveTo(-2,2);ctx.quadraticCurveTo(-14,4,-20,2);ctx.stroke();     // thigh/shin forward to the bow
  ctx.beginPath();ctx.moveTo(2,2);ctx.quadraticCurveTo(-10,7,-18,5);ctx.stroke();      // second leg
  ctx.restore(); // end boat translate

  // THE BOTTLE — bobbing on the water left of the boat. a faint COLD wrong glow against
  // the warm sunset (the one wrong note in a warm world — the trouble that's coming)
  const btx=W*0.30, bty=seaY+22+Math.sin(t*0.003+1)*3;
  let bg=ctx.createRadialGradient(btx,bty,0,btx,bty,44);
  bg.addColorStop(0,'rgba(150,175,160,'+(0.16+f*0.06)+')');bg.addColorStop(1,'rgba(150,175,160,0)');
  ctx.fillStyle=bg;ctx.beginPath();ctx.arc(btx,bty,44,0,7);ctx.fill();
  // bottle body
  ctx.save();ctx.translate(btx,bty);ctx.rotate(-0.35+Math.sin(t*0.003)*0.05);
  ctx.fillStyle='#243026';
  ctx.beginPath();ctx.moveTo(-4,10);ctx.lineTo(4,10);ctx.lineTo(4,-6);ctx.lineTo(2,-12);ctx.lineTo(2,-18);ctx.lineTo(-2,-18);ctx.lineTo(-2,-12);ctx.lineTo(-4,-6);ctx.closePath();ctx.fill();
  // glass sheen
  ctx.strokeStyle='rgba(180,200,185,0.5)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(-3,8);ctx.lineTo(-3,-6);ctx.stroke();
  // cork
  ctx.fillStyle='#3a2c1a';ctx.fillRect(-2,-22,4,5);
  ctx.restore();

  // the fishing LINE from the rod tip down toward the bottle (he's about to hook it)
  const rodTipX = bx - 44, rodTipY = by - 70;   // mirrored rod tip in world space
  ctx.strokeStyle='rgba(255,225,165,0.3)';ctx.lineWidth=0.9;
  ctx.beginPath();ctx.moveTo(rodTipX, rodTipY);
  ctx.quadraticCurveTo(rodTipX-24, by-24, btx+4, bty-10);  // arcs down to just above the bottle
  ctx.stroke();

  // soft warm vignette (no fog yet — the world is still whole and warm)
  let vg=ctx.createRadialGradient(W/2,H*0.5,H*0.42,W/2,H*0.5,H*0.95);
  vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(30,14,0,0.34)');
  ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);
  paper();
}

// ===== PAGE 2 — THE FOG AND THE PHANTOM =====
// SYMBOLISM: the phantom is unnecessary, contagious doubt — a relic of the time before
// life flourished, an entity of decay that wills life into non-existence by conjuring
// obstacles that were never real. He is the SOURCE of the fog that will drown the land.
// He looms, ancient and mighty, over a tiny boat. Cuttlefish form: broad hooded mantle,
// cold hollow eyes, a curtain of tendrils — two reaching for the boat, the rest drifting.
function page2(t){
  const f=flickVal(t);
  nightBase('#0f1218','#0c0e14','#07080c');
  // sickly pallor billowing from the phantom (he is the source)
  const ex=W*0.40, ey=H*0.40;
  let sick=ctx.createRadialGradient(ex,ey,10,ex,ey,W*0.8);
  sick.addColorStop(0,'rgba(150,165,150,0.17)');sick.addColorStop(0.5,'rgba(125,138,150,0.07)');sick.addColorStop(1,'rgba(125,138,150,0)');
  ctx.fillStyle=sick;ctx.fillRect(0,0,W,H);

  // sea
  const seaY=H*0.64;
  const sea=ctx.createLinearGradient(0,seaY,0,H);sea.addColorStop(0,'#0a1018');sea.addColorStop(1,'#05070c');
  ctx.fillStyle=sea;ctx.fillRect(0,seaY,W,H);
  ctx.strokeStyle='rgba(120,135,150,0.10)';ctx.lineWidth=1;
  for(let i=0;i<6;i++){const y=seaY+10+i*((H-seaY)/6);ctx.beginPath();for(let x=0;x<=W;x+=12){const yy=y+Math.sin((x*0.03)+(t*0.02)+i)*2;x===0?ctx.moveTo(x,yy):ctx.lineTo(x,yy);}ctx.stroke();}

  // tiny boat pushed to the far right, dwarfed
  const bx=W*0.82,by=seaY+12+Math.sin(t*0.02)*2;
  ctx.save();ctx.translate(bx,by);ctx.scale(0.7,0.7);
  ctx.fillStyle='#090c12';ctx.beginPath();ctx.moveTo(-48,0);ctx.quadraticCurveTo(0,22,48,0);ctx.quadraticCurveTo(26,9,-26,9);ctx.quadraticCurveTo(-40,7,-48,0);ctx.closePath();ctx.fill();
  // fisherman recoiling, tiny
  ctx.fillStyle='#0b0e15';ctx.beginPath();ctx.moveTo(4,-2);ctx.quadraticCurveTo(-2,-24,4,-32);ctx.quadraticCurveTo(9,-38,14,-31);ctx.quadraticCurveTo(18,-22,16,-2);ctx.quadraticCurveTo(8,2,4,-2);ctx.closePath();ctx.fill();
  ctx.beginPath();ctx.arc(8,-36,5,0,7);ctx.fillStyle='#0d111a';ctx.fill();
  ctx.strokeStyle='rgba(120,140,175,0.3)';ctx.lineWidth=1.3;ctx.beginPath();ctx.moveTo(15,-4);ctx.quadraticCurveTo(18,-22,12,-30);ctx.stroke();
  ctx.restore();

  // ground-fog pouring across the whole surface (spreading toward the boat)
  for(let i=0;i<9;i++){
    const px=ex + (i-2)*54 + Math.sin(t*0.006+i*1.1)*30;
    const py=seaY - 6 + Math.sin(t*0.01+i)*5;
    const r=44+i*5+Math.sin(t*0.008+i)*6;
    let fg=ctx.createRadialGradient(px,py,0,px,py,r);
    fg.addColorStop(0,'rgba(178,188,192,'+(0.13+f*0.05)+')');fg.addColorStop(1,'rgba(178,188,192,0)');
    ctx.fillStyle=fg;ctx.beginPath();ctx.arc(px,py,r,0,7);ctx.fill();
  }
  // the fallen bottle at the source, tipped, still bleeding fog
  ctx.save();ctx.translate(ex-40,seaY-2);ctx.rotate(1.2);
  ctx.fillStyle='#1a2a2a';ctx.fillRect(-3,-8,6,16);ctx.fillStyle='#3a2c1a';ctx.fillRect(-2,-13,4,5);ctx.restore();

  // ================= THE PHANTOM — looming cuttlefish =================
  const cx=ex, cy=H*0.30, s=1.0;   // drawn in absolute px, big
  const sway=Math.sin(t*0.0025)*6;
  const breathe=Math.sin(t*0.004)*0.04;

  // massive cold self-glow (his might, the fog's origin)
  let cg=ctx.createRadialGradient(cx,cy+30,10,cx,cy+30,230);
  cg.addColorStop(0,'rgba(120,142,178,0.20)');cg.addColorStop(0.5,'rgba(110,130,165,0.08)');cg.addColorStop(1,'rgba(110,130,165,0)');
  ctx.fillStyle=cg;ctx.fillRect(0,0,W,H);

  ctx.save();ctx.translate(cx,cy);

  // ---- curtain of tendrils (draw BEHIND the mantle) ----
  // two reaching toward the boat (right), the rest drifting down
  const bodyGrad=ctx.createLinearGradient(0,-70,0,180);
  bodyGrad.addColorStop(0,'#404b60');bodyGrad.addColorStop(0.5,'#28303f');bodyGrad.addColorStop(1,'rgba(18,24,34,0)');
  ctx.fillStyle=bodyGrad;
  ctx.strokeStyle='rgba(150,168,200,0.28)';

  // drifting tendrils (5), fanning from the base of the mantle
  for(let i=-2;i<=2;i++){
    const baseX=i*16;
    const tip=90+Math.abs(i)*14;
    const drift=Math.sin(t*0.003+i*0.9)*14;
    ctx.lineWidth=7-Math.abs(i)*0.8;
    ctx.beginPath();
    ctx.moveTo(baseX,70);
    ctx.quadraticCurveTo(baseX+drift, 70+tip*0.5, baseX+drift*1.6, 70+tip);
    ctx.strokeStyle=bodyGrad;
    ctx.stroke();
  }
  // two REACHING tendrils toward the boat (upper-right), predatory
  ctx.lineWidth=6;
  ctx.strokeStyle='rgba(120,140,175,0.5)';
  const reach=Math.sin(t*0.004)*10;
  ctx.beginPath();
  ctx.moveTo(28,44);
  ctx.quadraticCurveTo(120+reach,20, 210+reach, 70);
  ctx.stroke();
  ctx.beginPath();
  ctx.moveTo(24,66);
  ctx.quadraticCurveTo(130-reach,70, 220+reach*0.5, 96);
  ctx.stroke();
  // little curling tips on the reaching arms
  ctx.lineWidth=3;
  ctx.beginPath();ctx.moveTo(210+reach,70);ctx.quadraticCurveTo(220+reach,64,214+reach,58);ctx.stroke();

  // ---- broad hooded MANTLE (the bulky cuttlefish upper body) ----
  ctx.save();
  ctx.scale(1+breathe,1-breathe);
  const mantle=ctx.createLinearGradient(0,-78,0,80);
  mantle.addColorStop(0,'#48546b');mantle.addColorStop(0.5,'#2c3547');mantle.addColorStop(1,'#1a2130');
  ctx.fillStyle=mantle;
  ctx.beginPath();
  // widest at the shoulders, doming to a rounded hooded crown, tapering to the tendril base
  ctx.moveTo(-52,60);
  ctx.quadraticCurveTo(-70,-6,-44,-52);      // left flank up
  ctx.quadraticCurveTo(-26,-84,0,-86);       // left dome to crown
  ctx.quadraticCurveTo(26,-84,44,-52);       // crown to right dome
  ctx.quadraticCurveTo(70,-6,52,60);         // right flank down
  ctx.quadraticCurveTo(0,78,-52,60);         // base (tendrils emerge below)
  ctx.closePath();
  ctx.fill();
  // two side-fins of the mantle (cuttlefish frill), swaying

  ctx.save();ctx.translate(-18,-30);ctx.rotate(-0.18);ctx.beginPath();ctx.ellipse(0,0,4,8,0,0,7);ctx.fill();ctx.restore();
  ctx.save();ctx.translate(18,-30);ctx.rotate(0.18);ctx.beginPath();ctx.ellipse(0,0,4,8,0,0,7);ctx.fill();ctx.restore();

  ctx.save();ctx.translate(18,-30);ctx.rotate(0.18);ctx.beginPath();ctx.ellipse(0,1,1.6,5,0,0,7);ctx.fill();ctx.restore();

  ctx.beginPath();ctx.moveTo(-30,-42);ctx.quadraticCurveTo(0,-34,30,-42);ctx.stroke();

  ctx.restore(); // end breathe scale
  ctx.restore(); // end translate

  drawFog(t);
  vignette(0.72);
  paper();
}

// ===== PAGE 3 — THE KINGDOM GOES BLIND =====
// SYMBOLISM: the fog takes the warmth, the light, and crucially the CONNECTION between
// people. Held after-state: the town is already drowned in grey. Figures stand close
// together but sealed in their own small pockets of dark, blind to one another. The
// golden threads of community that once ran between them are severed, guttering out.
// Together, and utterly alone.
function page3(t){
  const f=flickVal(t);
  // cold dead sky, no warmth left — but a little lifted so a dull moon can show
  nightBase('#141922','#10141d','#0a0d13');
  // a dull moon struggling through the fog, upper-right — cold, distant, filtered
  const moonX=W*0.72, moonY=H*0.22;

  halo.addColorStop(0,'rgba(175,188,205,0.22)');halo.addColorStop(0.4,'rgba(150,165,185,0.10)');halo.addColorStop(1,'rgba(150,165,185,0)');
  ctx.fillStyle=halo;ctx.fillRect(0,0,W,H);
  // the moon disc itself, veiled — soft, not sharp

  disc.addColorStop(0,'rgba(205,215,230,0.60)');disc.addColorStop(0.6,'rgba(180,195,215,0.28)');disc.addColorStop(1,'rgba(180,195,215,0)');
  ctx.fillStyle=disc;ctx.beginPath();ctx.arc(moonX,moonY,34,0,7);ctx.fill();
  // a couple of fog bands drifting across the moon's face (struggling through)
  ctx.save();ctx.globalAlpha=0.5;
  for(let i=0;i<3;i++){const by=moonY-16+i*14+Math.sin(t*0.004+i)*3;let b=ctx.createLinearGradient(moonX-40,by,moonX+40,by);b.addColorStop(0,'rgba(20,26,34,0)');b.addColorStop(0.5,'rgba(20,26,34,0.5)');b.addColorStop(1,'rgba(20,26,34,0)');ctx.fillStyle=b;ctx.fillRect(moonX-44,by-3,88,5);}
  ctx.restore();
  // heavy grey fog haze sitting over everything (a touch lighter now)
  let haze=ctx.createLinearGradient(0,0,0,H);
  haze.addColorStop(0,'rgba(150,162,178,0.16)');haze.addColorStop(0.5,'rgba(138,150,166,0.10)');haze.addColorStop(1,'rgba(128,140,154,0.05)');
  ctx.fillStyle=haze;ctx.fillRect(0,0,W,H);

  // ---- the sky-high bridges & town, drained to cold silhouettes ----
  const groundY=H*0.72;
  // LEFT sky-bridge — SAME design as page 13 (two pylons, arch, deck), but cold & drained
  ctx.fillStyle='#0c1017';
  const lp1=W*0.08, lp2=W*0.24, pylTop=H*0.40, deckY=H*0.42;
  ctx.fillRect(lp1,pylTop,20,groundY-pylTop);          // left pylon
  ctx.fillRect(lp2,pylTop,20,groundY-pylTop);          // right pylon
  // bold supporting arch between the two pylons
  ctx.strokeStyle='#0c1017';ctx.lineWidth=9;
  ctx.beginPath();ctx.moveTo(lp1+10,deckY);ctx.quadraticCurveTo((lp1+lp2)/2+10,deckY-46,lp2+10,deckY);ctx.stroke();
  // the deck running across the top of the pylons
  ctx.fillStyle='#0c1017';ctx.fillRect(lp1-14,pylTop-10,(lp2-lp1)+48,12);
  ctx.strokeStyle='rgba(150,172,205,0.14)';ctx.lineWidth=1.6;   // cold moon rim, not warm
  ctx.beginPath();ctx.moveTo(lp1-14,pylTop-10);ctx.lineTo(lp2+34,pylTop-10);ctx.stroke();
  // little deck railing posts
  ctx.strokeStyle='#0a0d14';ctx.lineWidth=2;
  for(let i=0;i<=6;i++){const rx=lp1-8+i*((lp2-lp1+40)/6);ctx.beginPath();ctx.moveTo(rx,pylTop-10);ctx.lineTo(rx,pylTop-17);ctx.stroke();}
  // clustered rooftops (town) mid-ground
  ctx.fillStyle='#0b0e15';
  for(let i=0;i<9;i++){const x=W*0.32+i*38;const rh=30+((i*37)%46);ctx.beginPath();ctx.moveTo(x,groundY);ctx.lineTo(x,groundY-rh);ctx.lineTo(x+15,groundY-rh-14);ctx.lineTo(x+30,groundY-rh);ctx.lineTo(x+30,groundY);ctx.closePath();ctx.fill();}
  // a second sky-bridge span on the right (matches page 13's right bridge, cold)
  ctx.strokeStyle='#0a0d14';ctx.lineWidth=7;
  ctx.beginPath();ctx.moveTo(W*0.64,groundY-70);ctx.quadraticCurveTo(W*0.80,groundY-104,W*0.96,groundY-64);ctx.stroke();
  ctx.fillStyle='#0a0d14';ctx.fillRect(W*0.70,groundY-96,10,96);ctx.fillRect(W*0.86,groundY-92,10,92);
  ctx.fillRect(W*0.685,groundY-104,W*0.19,8);   // right bridge deck

  const gnd=ctx.createLinearGradient(0,groundY,0,H);gnd.addColorStop(0,'#0a0d13');gnd.addColorStop(1,'#06080d');
  ctx.fillStyle=gnd;ctx.fillRect(0,groundY,W,H);

  // ---- the DEAD windows of the town: a few faint cold squares, most black ----
  ctx.fillStyle='rgba(120,135,155,0.10)';
  for(let i=0;i<14;i++){const x=W*0.30+((i*53)%320);const y=groundY-20-((i*29)%60);ctx.fillRect(x,y,4,5);}

  // ================= THE TOWNSPEOPLE — sealed in isolation =================
  // a row of figures standing close, each in a tiny cold pocket, blind to the next.
  const folk=[
    {x:W*0.30,scale:1.0},
    {x:W*0.40,scale:1.08},
    {x:W*0.50,scale:0.96},
    {x:W*0.60,scale:1.04},
    {x:W*0.69,scale:0.92}
  ];
  const fy=groundY+6;

  // the SEVERED threads of connection — faint warm light between people, guttering out.
  // draw broken: a short warm stub leaving each figure, then nothing across the gap.
  for(let i=0;i<folk.length-1;i++){
    const a=folk[i], b=folk[i+1];
    const midY=fy-40;
    const gutter=0.06+0.05*Math.sin(t*0.01+i); // last flicker of a dying bond
    // stub from A reaching right
    let ga=ctx.createLinearGradient(a.x+10,midY,a.x+34,midY);
    ga.addColorStop(0,'rgba(255,180,95,'+gutter+')');ga.addColorStop(1,'rgba(255,180,95,0)');
    ctx.strokeStyle=ga;ctx.lineWidth=1.4;
    ctx.beginPath();ctx.moveTo(a.x+10,midY);ctx.lineTo(a.x+34,midY-2);ctx.stroke();
    // stub from B reaching left — but they never meet (the gap is grey)
    let gb=ctx.createLinearGradient(b.x-10,midY,b.x-34,midY);
    gb.addColorStop(0,'rgba(255,180,95,'+gutter+')');gb.addColorStop(1,'rgba(255,180,95,0)');
    ctx.strokeStyle=gb;ctx.lineWidth=1.4;
    ctx.beginPath();ctx.moveTo(b.x-10,midY);ctx.lineTo(b.x-34,midY-2);ctx.stroke();
    // cold fog wedge filling the gap between them (the severance)
    let sever=ctx.createRadialGradient((a.x+b.x)/2,midY,2,(a.x+b.x)/2,midY,30);
    sever.addColorStop(0,'rgba(150,160,175,0.10)');sever.addColorStop(1,'rgba(150,160,175,0)');
    ctx.fillStyle=sever;ctx.beginPath();ctx.arc((a.x+b.x)/2,midY,30,0,7);ctx.fill();
  }

  // each figure: cold, dim, in its own little pocket of faint self-light that reaches no one
  folk.forEach((p,i)=>{
    ctx.save();ctx.translate(p.x,fy);ctx.scale(p.scale,p.scale);
    // tiny isolated cold pocket around them
    let pk=ctx.createRadialGradient(0,-20,2,0,-20,42);
    pk.addColorStop(0,'rgba(120,135,158,0.10)');pk.addColorStop(1,'rgba(120,135,158,0)');
    ctx.fillStyle=pk;ctx.beginPath();ctx.arc(0,-20,42,0,7);ctx.fill();
    // cloaked body, drained grey-blue
    const bodyc=ctx.createLinearGradient(0,-40,0,4);bodyc.addColorStop(0,'#1c2230');bodyc.addColorStop(1,'#0c1017');
    ctx.fillStyle=bodyc;
    ctx.beginPath();ctx.moveTo(-9,2);ctx.quadraticCurveTo(-12,-22,-5,-32);ctx.quadraticCurveTo(0,-37,5,-32);ctx.quadraticCurveTo(12,-22,9,2);ctx.quadraticCurveTo(0,6,-9,2);ctx.closePath();ctx.fill();
    // head, bowed slightly (turned inward, not toward neighbours)
    ctx.beginPath();ctx.arc(0,-38,6,0,7);ctx.fillStyle='#131824';ctx.fill();
    // cold moon rim — the only light that touches them, from the moon side (right)
    ctx.strokeStyle='rgba(150,172,205,0.42)';ctx.lineWidth=1.4;
    ctx.beginPath();ctx.moveTo(8,0);ctx.quadraticCurveTo(11,-22,5,-31);ctx.stroke();
    // faint moonlit crown of the head
    ctx.strokeStyle='rgba(150,172,205,0.3)';ctx.lineWidth=1;
    ctx.beginPath();ctx.arc(0,-38,6,-1.4,0.4);ctx.stroke();
    ctx.restore();
  });

  // low ground-fog drifting between the figures' feet, sealing them off
  for(let i=0;i<8;i++){
    const x=W*0.26+i*58+Math.sin(t*0.004+i)*10;
    const y=fy+6+Math.sin(t*0.008+i)*3;
    let fg=ctx.createRadialGradient(x,y,0,x,y,52);
    fg.addColorStop(0,'rgba(160,170,185,'+(0.10+f*0.03)+')');fg.addColorStop(1,'rgba(160,170,185,0)');
    ctx.fillStyle=fg;ctx.beginPath();ctx.arc(x,y,52,0,7);ctx.fill();
  }

  drawFog(t,0.2);
  vignette(0.74);
  paper();
}

// ===== PAGE 4 — THE COLD LANTERN =====
// SYMBOLISM: hope is smothered, not extinguished. A smolder still lives inside the great
// lantern, throwing a tiny warm light — enough to draw the people, who gather around it
// in shadow, still hoping. Above them the phantom hovers in the cold moonlight, presiding
// over the square, keeping its lie alive. The ember of hope, guarded by doubt.
function page4(t){
  const f=flickVal(t);
  nightBase('#12161f','#0e121b','#090c12');
  // dull moon again, upper area, cold and veiled (phantom hovers in its light)
  const moonX=W*0.50, moonY=H*0.18;
  let halo=ctx.createRadialGradient(moonX,moonY,6,moonX,moonY,W*0.55);
  halo.addColorStop(0,'rgba(172,185,205,0.20)');halo.addColorStop(0.4,'rgba(148,162,185,0.09)');halo.addColorStop(1,'rgba(148,162,185,0)');
  ctx.fillStyle=halo;ctx.fillRect(0,0,W,H);
  let disc=ctx.createRadialGradient(moonX,moonY,2,moonX,moonY,30);

  ctx.fillStyle=disc;ctx.beginPath();ctx.arc(moonX,moonY,30,0,7);ctx.fill();

  // square: cold stone ground, surrounding rooftops in shadow

  ctx.fillStyle='#0a0d14';

  ctx.fillStyle=gnd;ctx.fillRect(0,groundY,W,H);

  for(let i=0;i<5;i++){const y=groundY+10+i*14;ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke();}

  // ================= THE GREAT LANTERN (centre) with a dying smolder =================
  const lx=W*0.5, lbaseY=groundY+8;

  warmGlow(lx, lbaseY-70, 150, 0.32+f*0.10, t);

  ctx.beginPath();ctx.moveTo(lx-lw/2,lyTop+8);ctx.lineTo(lx-lw/2,lyTop+lh);ctx.moveTo(lx+lw/2,lyTop+8);ctx.lineTo(lx+lw/2,lyTop+lh);
  ctx.moveTo(lx,lyTop-12);ctx.lineTo(lx,lyTop+lh);ctx.stroke();
  ctx.strokeStyle='rgba(255,180,100,'+(0.3+f*0.15)+')';ctx.lineWidth=1;

  // ================= THE PEOPLE gathered around the ember in shadow =================

  // ================= THE PHANTOM hovering above in the moonlight =================

  ctx.beginPath();ctx.moveTo(-50,58);ctx.quadraticCurveTo(-68,-6,-42,-50);ctx.quadraticCurveTo(-24,-82,0,-84);ctx.quadraticCurveTo(24,-82,42,-50);ctx.quadraticCurveTo(68,-6,50,58);ctx.quadraticCurveTo(0,74,-50,58);ctx.closePath();ctx.fill();

  ctx.save();ctx.translate(-17,-26);ctx.rotate(-0.15);ctx.beginPath();ctx.ellipse(0,0,4,8,0,0,7);ctx.fill();ctx.restore();
  ctx.save();ctx.translate(17,-26);ctx.rotate(0.15);ctx.beginPath();ctx.ellipse(0,0,4,8,0,0,7);ctx.fill();ctx.restore();

// ===== PAGE 5 — THE PRINCE'S LITTLE FLAME =====

    ctx.beginPath();ctx.moveTo(26,50);ctx.quadraticCurveTo(11,6,7,0);ctx.stroke();

// ===== PAGE 6 — INTO THE FOREST =====
// SYMBOLISM: the first refusal of doubt. The phantom makes action conditional — a
// legendary sword, seven years, or death — the trick that keeps you from ever beginning.
// The prince rejects the premise. He doesn't fight the fear; he looks at the small true
// thing he already carries and chooses to GO AND SEE. Empty-handed is the point: he crosses
// the threshold with nothing but the inherited flame and the willingness to look.
function page6(t){
  const f=flickVal(t);
  nightBase('#0d1116','#0a0d12','#07090d');

  // ---- the dark forest ahead: pushed back, with clear ground before it ----

  for(let i=0;i<20;i++){const x=i*38-20;const h=44+((i*47)%40);const w=18+((i*13)%14);
    ctx.beginPath();ctx.moveTo(x,treeLine);ctx.lineTo(x+w*0.5,treeLine-h);ctx.lineTo(x+w,treeLine);ctx.closePath();ctx.fill();}
  // mid layer — taller trees just in front of the back wall
  ctx.fillStyle='#080b10';
  for(let i=0;i<13;i++){const x=i*58-30;const h=80+((i*61)%70);const w=26+((i*23)%18);
    ctx.beginPath();ctx.moveTo(x,treeLine+16);ctx.lineTo(x+w*0.5,treeLine-h);ctx.lineTo(x+w,treeLine+16);ctx.closePath();ctx.fill();
    ctx.fillRect(x+w*0.5-3,treeLine-h*0.3,6,h*0.3+16);}

    ctx.fillRect(x+w*0.5-5,groundY-h*0.4,10,h*0.4);});
  // ground — a clear stretch of open earth between the prince and the treeline
  const gnd=ctx.createLinearGradient(0,treeLine,0,H);gnd.addColorStop(0,'#080b10');gnd.addColorStop(0.4,'#090c11');gnd.addColorStop(1,'#05070b');
  ctx.fillStyle=gnd;ctx.fillRect(0,treeLine,W,H);
  // faint mist along the treeline (separates the forest from the foreground)
  for(let i=0;i<6;i++){const x=i*130+Math.sin(t*0.004+i)*14;const y=treeLine+10+Math.sin(t*0.006+i)*4;
    let m=ctx.createRadialGradient(x,y,0,x,y,90);m.addColorStop(0,'rgba(150,160,175,0.07)');m.addColorStop(1,'rgba(150,160,175,0)');

  ctx.save();ctx.translate(-15,-26);ctx.rotate(-0.05);ctx.beginPath();ctx.ellipse(0,0,4,8,0,0,7);ctx.fill();ctx.restore();
  ctx.save();ctx.translate(19,-26);ctx.rotate(0.28);ctx.beginPath();ctx.ellipse(0,0,4,8,0,0,7);ctx.fill();ctx.restore();
  ctx.fillStyle='rgba(20,28,44,0.9)';

  ctx.save();ctx.translate(19,-26);ctx.rotate(0.28);ctx.beginPath();ctx.ellipse(0,2,1.6,5,0,0,7);ctx.fill();ctx.restore();
  ctx.restore();
  ctx.restore();

  // ================= THE PRINCE at the threshold, empty-handed =================
  // small, stepping forward into the dark, his little flame the one warm point.
  const px=W*0.44, py=groundY+4, s=1.35;
  const LX=px+24*s, LY=py-18*s; // lantern in his right hand, out front

// ===== PAGE 7 — THE GOBLINS' SOUP =====
// SYMBOLISM: a people who live IN nature but have lost fluency WITH it. Genuine warmth,
// fire, community — but their houses fall apart around them, not for lack of wood or hands,
// but because an inherited belief (the magical saw) severs them from what's right in front
// of them. Disconnection dressed as tradition. The warmth is real; the decay is real; both
// at once. A goblin offers the prince a bowl of soup — the feared unknown was kindness.
function page7(t){
  const f=flickVal(t);
  nightBase('#100e12','#0c0b10','#08070b');

  // ---- the decayed forest houses behind, warm-rimmed by firelight, visibly sagging ----
  const groundY=H*0.82;
  // dark forest wall far back
  ctx.fillStyle='#080b0e';
  for(let i=0;i<14;i++){const x=i*54-20;const h=70+((i*57)%60);const w=22+((i*17)%14);ctx.beginPath();ctx.moveTo(x,H*0.5);ctx.lineTo(x+w*0.5,H*0.5-h);ctx.lineTo(x+w,H*0.5);ctx.closePath();ctx.fill();}

  // three sagging little houses (generations of disrepair): leaning walls, drooping roofs, patches
  function house(hx,hy,scale,lean){
    ctx.save();ctx.translate(hx,hy);ctx.scale(scale,scale);ctx.transform(1,0,lean,1,0,0); // shear = lean
    // wall
    ctx.fillStyle='#1a140e';
    ctx.beginPath();ctx.moveTo(-22,0);ctx.lineTo(-20,-34);ctx.lineTo(22,-32);ctx.lineTo(22,0);ctx.closePath();ctx.fill();
    // drooping, sagging roof (sway in the middle)
    ctx.fillStyle='#241a10';
    ctx.beginPath();ctx.moveTo(-30,-30);ctx.quadraticCurveTo(-4,-52,4,-44);ctx.quadraticCurveTo(18,-52,32,-28);ctx.quadraticCurveTo(0,-40,-30,-30);ctx.closePath();ctx.fill();
    // a couple of gaps/patches in the roof (leaking)
    ctx.fillStyle='#0a0806';
    ctx.beginPath();ctx.moveTo(-8,-40);ctx.lineTo(-2,-42);ctx.lineTo(-4,-36);ctx.closePath();ctx.fill();
    ctx.fillRect(10,-38,4,4);
    // dark doorway, slightly askew
    ctx.fillStyle='#080605';ctx.beginPath();ctx.moveTo(-8,0);ctx.lineTo(-7,-18);ctx.lineTo(4,-17);ctx.lineTo(5,0);ctx.closePath();ctx.fill();
    // a leaning support plank propping a wall (patched-up, makeshift)
    ctx.strokeStyle='#2a1e12';ctx.lineWidth=2.4;ctx.beginPath();ctx.moveTo(22,0);ctx.lineTo(30,-20);ctx.stroke();
    // warm firelight rim on the fire-facing side
    ctx.strokeStyle='rgba(240,150,70,0.28)';ctx.lineWidth=1.6;
    ctx.beginPath();ctx.moveTo(-22,0);ctx.lineTo(-20,-33);ctx.stroke();
    ctx.restore();
  }
  house(W*0.16,groundY-6,1.15,0.10);   // leaning right
  house(W*0.83,groundY-4,1.05,-0.12);  // leaning left
  house(W*0.30,groundY-30,0.7,0.06);   // smaller, further back

  // ground
  const gnd=ctx.createLinearGradient(0,groundY,0,H);gnd.addColorStop(0,'#0b0906');gnd.addColorStop(1,'#060504');
  ctx.fillStyle=gnd;ctx.fillRect(0,groundY,W,H);

  // ================= THE CAMPFIRE — the heart, real communal warmth =================
  const fx=W*0.5, fy=groundY+6;
  // big warm pool over the whole gathering
  warmGlow(fx, fy-30, 300, 0.5+f*0.12, t);
  warmGlow(fx, fy-10, 150, 0.5+f*0.14, t);
  // logs
  ctx.strokeStyle='#241812';ctx.lineWidth=5;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(fx-16,fy+2);ctx.lineTo(fx+14,fy-4);ctx.stroke();
  ctx.beginPath();ctx.moveTo(fx-12,fy-4);ctx.lineTo(fx+16,fy+2);ctx.stroke();
  // flames (layered, flickering)
  for(let i=0;i<3;i++){const ff=0.5+Math.sin(t*0.008+i)*0.35;const fw=14-i*3;const fh=(30-i*6)*(0.85+ff*0.35);const off=Math.sin(t*0.008+i*2)*3;
    let fl=ctx.createLinearGradient(fx,fy-4,fx,fy-4-fh);
    fl.addColorStop(0,i===0?'#ffd27a':'#ffb347');fl.addColorStop(0.6,'rgba(240,120,40,0.8)');fl.addColorStop(1,'rgba(240,90,30,0)');
    ctx.fillStyle=fl;ctx.beginPath();ctx.moveTo(fx-fw+off,fy-4);ctx.quadraticCurveTo(fx-fw*0.4+off,fy-4-fh*0.6,fx+off,fy-4-fh);ctx.quadraticCurveTo(fx+fw*0.4+off,fy-4-fh*0.6,fx+fw+off,fy-4);ctx.closePath();ctx.fill();}
  // bright core + embers
  let fc=ctx.createRadialGradient(fx,fy-8,0,fx,fy-8,16);fc.addColorStop(0,'rgba(255,240,190,'+(0.9+f*0.1)+')');fc.addColorStop(1,'rgba(255,180,90,0)');
  ctx.fillStyle=fc;ctx.beginPath();ctx.arc(fx,fy-8,16,0,7);ctx.fill();
  for(let i=0;i<10;i++){const ex=fx+Math.sin(t*0.02+i*1.7)*16;const ey=fy-8-((t*0.05+i*16)%90);const al=Math.max(0,1-((t*0.05+i*16)%90)/90);ctx.fillStyle='rgba(255,190,110,'+al*0.7+')';ctx.fillRect(ex,ey,1.6,1.6);}

  // ---- locked goblin drawing (squat, hooded, glowing eyes), warm-rimmed ----
  function goblin(gx,gy,scale,faceDir,warmth){
    ctx.save();ctx.translate(gx,gy);ctx.scale(scale*faceDir,scale);
    const warm='rgba(255,170,80,'+(0.5*warmth+f*0.2)+')';
    const body=ctx.createLinearGradient(-20,-30,20,40);body.addColorStop(0,'#2a3a1c');body.addColorStop(1,'#0d1008');
    ctx.beginPath();ctx.moveTo(-17,42);ctx.quadraticCurveTo(-24,2,-10,-20);ctx.quadraticCurveTo(0,-30,10,-20);ctx.quadraticCurveTo(24,2,17,42);ctx.quadraticCurveTo(0,48,-17,42);ctx.closePath();ctx.fillStyle=body;ctx.fill();
    ctx.strokeStyle=warm;ctx.lineWidth=2.2;ctx.beginPath();ctx.moveTo(16,40);ctx.quadraticCurveTo(22,2,9,-19);ctx.stroke();
    // hood point
    ctx.fillStyle='#1c2612';ctx.beginPath();ctx.moveTo(-10,-18);ctx.quadraticCurveTo(-4,-40,4,-24);ctx.quadraticCurveTo(0,-22,-10,-18);ctx.closePath();ctx.fill();
    // head + eyes
    ctx.beginPath();ctx.arc(0,-16,8,0,7);ctx.fillStyle='#22190e';ctx.fill();
    ctx.strokeStyle=warm;ctx.lineWidth=1.6;ctx.beginPath();ctx.arc(2.5,-16,8,-1.1,1.1);ctx.stroke();
    ctx.fillStyle='rgba(240,200,90,'+(0.7+f*0.3)+')';ctx.beginPath();ctx.arc(-2,-17,1.1,0,7);ctx.fill();ctx.beginPath();ctx.arc(3,-17,1.1,0,7);ctx.fill();
    ctx.restore();
  }
  // a warm circle of goblins around the fire (facing inward)
  goblin(fx-90,groundY+4,0.85,1,1);
  goblin(fx-52,groundY+10,0.95,1,1);
  goblin(fx+60,groundY+8,0.9,-1,1);
  goblin(fx+96,groundY+2,0.82,-1,1);
  // one standing further back, off to the side (behind the fire, not in it)
  goblin(fx-120,groundY-16,0.6,1,0.7);

  // ---- the offering goblin, nearest the prince (right side), holding out a bowl ----
  const ogx=fx+70, ogy=groundY+10;
  goblin(ogx,ogy,1.0,-1,1);
  // its arm extended right toward the prince with a bowl
  ctx.save();
  ctx.strokeStyle='#1c2612';ctx.lineWidth=5;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(ogx+8,ogy-6);ctx.quadraticCurveTo(ogx+26,ogy-4,ogx+40,ogy+2);ctx.stroke();
  ctx.strokeStyle='rgba(255,170,80,0.5)';ctx.lineWidth=1.8;ctx.beginPath();ctx.moveTo(ogx+9,ogy-7);ctx.quadraticCurveTo(ogx+27,ogy-5,ogx+40,ogy+1);ctx.stroke();
  // the bowl, with a little rising steam
  ctx.fillStyle='#2a1e14';ctx.beginPath();ctx.ellipse(ogx+46,ogy+3,7,3.5,0,0,7);ctx.fill();
  ctx.beginPath();ctx.arc(ogx+46,ogy+3,7,0,Math.PI);ctx.fill();
  // warm soup sheen
  ctx.fillStyle='rgba(255,190,110,0.5)';ctx.beginPath();ctx.ellipse(ogx+46,ogy+2,5,2,0,0,7);ctx.fill();
  // steam
  ctx.strokeStyle='rgba(230,210,180,'+(0.2+f*0.1)+')';ctx.lineWidth=1;
  for(let i=0;i<2;i++){ctx.beginPath();ctx.moveTo(ogx+44+i*4,ogy-1);ctx.quadraticCurveTo(ogx+40+i*4+Math.sin(t*0.03+i)*4,ogy-12,ogx+45+i*4,ogy-22);ctx.stroke();}
  ctx.restore();

  // ================= THE PRINCE arriving at the right edge, receiving =================
  const px=W*0.72, py=groundY+6, s=1.2;
  const LX=px+18*s, LY=py+4*s; // his lantern in his free RIGHT hand, away from the fire
  (function drawPrinceArriving(cx,cy,sc){
    ctx.save();ctx.translate(cx,cy);ctx.scale(sc,sc);
    const cool=ctx.createLinearGradient(0,-52,0,52);cool.addColorStop(0,'#28455f');cool.addColorStop(0.5,'#183043');cool.addColorStop(1,'#0b141c');
    const warm='rgba(255,180,95,'+(0.6+f*0.3)+')'; // strongly fire-lit now
    const coolRim='rgba(120,160,205,0.3)';
    // legs
    ctx.strokeStyle=cool;ctx.lineCap='round';ctx.lineWidth=7;
    ctx.beginPath();ctx.moveTo(-5,26);ctx.lineTo(-9,50);ctx.stroke();
    ctx.beginPath();ctx.moveTo(5,26);ctx.lineTo(10,50);ctx.stroke();
    ctx.lineWidth=6;ctx.strokeStyle='#0b141c';
    ctx.beginPath();ctx.moveTo(-9,50);ctx.lineTo(-15,51);ctx.stroke();
    ctx.beginPath();ctx.moveTo(10,50);ctx.lineTo(16,51);ctx.stroke();
    // hips
    ctx.fillStyle=cool;ctx.beginPath();ctx.moveTo(-8,8);ctx.lineTo(8,8);ctx.lineTo(9,26);ctx.quadraticCurveTo(0,30,-9,26);ctx.closePath();ctx.fill();
    // tunic
    ctx.beginPath();ctx.moveTo(-15,-24);ctx.lineTo(-8,11);ctx.quadraticCurveTo(0,15,8,11);ctx.lineTo(15,-24);ctx.quadraticCurveTo(0,-30,-15,-24);ctx.closePath();ctx.fillStyle=cool;ctx.fill();
    // cape trailing right (behind him, away from fire)
    ctx.beginPath();ctx.moveTo(14,-23);ctx.quadraticCurveTo(30,-6,20,24);ctx.quadraticCurveTo(14,-2,9,-18);ctx.closePath();ctx.fillStyle='#0e1c2960';ctx.fill();
    ctx.strokeStyle=coolRim;ctx.lineWidth=1.2;ctx.beginPath();ctx.moveTo(14,-23);ctx.quadraticCurveTo(30,-6,20,24);ctx.stroke();
    // warm rim on LEFT (fire side)
    ctx.strokeStyle=warm;ctx.lineWidth=2.4;ctx.beginPath();ctx.moveTo(-15,-23);ctx.lineTo(-8,10);ctx.stroke();
    // belt
    ctx.strokeStyle='rgba(200,160,90,'+(0.5+f*0.25)+')';ctx.lineWidth=2.4;ctx.beginPath();ctx.moveTo(-8,10);ctx.quadraticCurveTo(0,14,8,10);ctx.stroke();
    ctx.strokeStyle=warm;ctx.lineWidth=1.8;ctx.beginPath();ctx.moveTo(-14,-24);ctx.quadraticCurveTo(0,-30,15,-24);ctx.stroke();
    // left arm reaching toward the bowl (down-left)
    ctx.strokeStyle=cool;ctx.lineWidth=6;ctx.beginPath();ctx.moveTo(-13,-18);ctx.quadraticCurveTo(-24,-12,-30,-2);ctx.stroke();
    ctx.strokeStyle=warm;ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(-14,-19);ctx.quadraticCurveTo(-25,-13,-30,-3);ctx.stroke();
    // right hand holds his own lantern low and out to the side (free hand)
    ctx.strokeStyle=cool;ctx.lineWidth=5;ctx.beginPath();ctx.moveTo(13,-16);ctx.quadraticCurveTo(17,-4,18,6);ctx.stroke();
    // neck + head, turned toward the fire/goblin (left)
    ctx.fillStyle='#101a24';ctx.fillRect(-3.5,-32,7,9);
    ctx.save();ctx.rotate(-0.06);
    ctx.beginPath();ctx.moveTo(-7,-35);ctx.quadraticCurveTo(-8,-45,0,-46);ctx.quadraticCurveTo(8,-45,7,-35);ctx.quadraticCurveTo(6,-28,0,-28);ctx.quadraticCurveTo(-6,-28,-7,-35);ctx.closePath();ctx.fillStyle='#111a22';ctx.fill();
    ctx.strokeStyle=warm;ctx.lineWidth=1.9;ctx.beginPath();ctx.moveTo(-6,-37);ctx.quadraticCurveTo(-7,-28,-1,-28);ctx.stroke();
    ctx.restore();
    // circlet
    ctx.strokeStyle='rgba(255,215,130,'+(0.6+f*0.35)+')';ctx.lineWidth=2.4;ctx.beginPath();ctx.moveTo(-7,-43);ctx.quadraticCurveTo(0,-47,7,-43);ctx.stroke();
    ctx.fillStyle='rgba(255,235,170,'+(0.75+f*0.3)+')';ctx.beginPath();ctx.arc(0,-46,1.4,0,7);ctx.fill();
    ctx.restore();
  })(px, py, s);
  // his little lantern, hanging from his free right hand
  lanternObj(LX, LY, f);

  drawFog(t);
  vignette(0.72);
  paper();
}

// ===== PAGE 8 — THE AXE =====
// SYMBOLISM: the inherited lie broken by simply trying. The goblins shivered for
// generations believing only a magical saw could fell their trees — helpless in a forest
// full of wood. The prince picks up the humble rusty axe that lay by the woodpile the
// whole time — the solution they walked past every day — and just tries. The tree falls.
// The goblins weep for the wasted years and cheer for sudden liberation, both at once.
function page8(t){
  const f=flickVal(t);
  nightBase('#100e12','#0c0b10','#08070b');

  // forest wall + a couple of decayed houses, warm-rimmed (same world as page 7)
  const groundY=H*0.82;
  ctx.fillStyle='#080b0e';
  for(let i=0;i<14;i++){const x=i*54-20;const h=64+((i*57)%56);const w=22+((i*17)%14);ctx.beginPath();ctx.moveTo(x,H*0.5);ctx.lineTo(x+w*0.5,H*0.5-h);ctx.lineTo(x+w,H*0.5);ctx.closePath();ctx.fill();}

  // the campfire, off to the LEFT now (prince works to the right of it)
  const fx=W*0.26, fy=groundY+4;
  warmGlow(fx, fy-30, 300, 0.5+f*0.12, t);
  warmGlow(fx, fy-10, 150, 0.5+f*0.14, t);
  ctx.strokeStyle='#241812';ctx.lineWidth=5;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(fx-14,fy+2);ctx.lineTo(fx+12,fy-4);ctx.stroke();
  ctx.beginPath();ctx.moveTo(fx-10,fy-4);ctx.lineTo(fx+14,fy+2);ctx.stroke();
  for(let i=0;i<3;i++){const ff=0.5+Math.sin(t*0.008+i)*0.35;const fw=12-i*3;const fh=(26-i*6)*(0.85+ff*0.35);const off=Math.sin(t*0.008+i*2)*3;
    let fl=ctx.createLinearGradient(fx,fy-4,fx,fy-4-fh);fl.addColorStop(0,i===0?'#ffd27a':'#ffb347');fl.addColorStop(0.6,'rgba(240,120,40,0.8)');fl.addColorStop(1,'rgba(240,90,30,0)');
    ctx.fillStyle=fl;ctx.beginPath();ctx.moveTo(fx-fw+off,fy-4);ctx.quadraticCurveTo(fx-fw*0.4+off,fy-4-fh*0.6,fx+off,fy-4-fh);ctx.quadraticCurveTo(fx+fw*0.4+off,fy-4-fh*0.6,fx+fw+off,fy-4);ctx.closePath();ctx.fill();}
  let fc=ctx.createRadialGradient(fx,fy-8,0,fx,fy-8,14);fc.addColorStop(0,'rgba(255,240,190,'+(0.9+f*0.1)+')');fc.addColorStop(1,'rgba(255,180,90,0)');
  ctx.fillStyle=fc;ctx.beginPath();ctx.arc(fx,fy-8,14,0,7);ctx.fill();

  // ground
  const gnd=ctx.createLinearGradient(0,groundY,0,H);gnd.addColorStop(0,'#0b0906');gnd.addColorStop(1,'#060504');
  ctx.fillStyle=gnd;ctx.fillRect(0,groundY,W,H);

  // ---- reusable goblin ----
  function goblin(gx,gy,scale,faceDir,warmth,armsUp){
    ctx.save();ctx.translate(gx,gy);ctx.scale(scale*faceDir,scale);
    const warm='rgba(255,170,80,'+(0.5*warmth+f*0.2)+')';
    const body=ctx.createLinearGradient(-20,-30,20,40);body.addColorStop(0,'#2a3a1c');body.addColorStop(1,'#0d1008');
    ctx.beginPath();ctx.moveTo(-17,42);ctx.quadraticCurveTo(-24,2,-10,-20);ctx.quadraticCurveTo(0,-30,10,-20);ctx.quadraticCurveTo(24,2,17,42);ctx.quadraticCurveTo(0,48,-17,42);ctx.closePath();ctx.fillStyle=body;ctx.fill();
    ctx.strokeStyle=warm;ctx.lineWidth=2.2;ctx.beginPath();ctx.moveTo(16,40);ctx.quadraticCurveTo(22,2,9,-19);ctx.stroke();
    ctx.fillStyle='#1c2612';ctx.beginPath();ctx.moveTo(-10,-18);ctx.quadraticCurveTo(-4,-40,4,-24);ctx.quadraticCurveTo(0,-22,-10,-18);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.arc(0,-16,8,0,7);ctx.fillStyle='#22190e';ctx.fill();
    ctx.strokeStyle=warm;ctx.lineWidth=1.6;ctx.beginPath();ctx.arc(2.5,-16,8,-1.1,1.1);ctx.stroke();
    ctx.fillStyle='rgba(240,200,90,'+(0.7+f*0.3)+')';ctx.beginPath();ctx.arc(-2,-17,1.1,0,7);ctx.fill();ctx.beginPath();ctx.arc(3,-17,1.1,0,7);ctx.fill();
    // arms raised in astonishment/cheer
    if(armsUp){ctx.strokeStyle=body;ctx.lineWidth=5;ctx.lineCap='round';
      ctx.beginPath();ctx.moveTo(-8,-2);ctx.quadraticCurveTo(-18,-16,-14,-30);ctx.stroke();
      ctx.beginPath();ctx.moveTo(8,-2);ctx.quadraticCurveTo(18,-16,14,-30);ctx.stroke();
      ctx.strokeStyle=warm;ctx.lineWidth=1.6;ctx.beginPath();ctx.moveTo(8,-3);ctx.quadraticCurveTo(18,-17,14,-31);ctx.stroke();}
    ctx.restore();
  }

  // ---- the goblins watching, astonished turning to joy (behind/left of prince) ----
  goblin(fx+30,groundY+8,0.9,1,1,true);
  goblin(fx+70,groundY+12,0.82,1,1,true);
  goblin(fx-30,groundY+6,0.85,1,1,false);
  goblin(fx+100,groundY-6,0.66,1,0.8,true);

  // ================= THE GREAT TREE caught MID-FALL (drama) =================
  // pivoting from a stump on the right, toppling toward the right edge, motion lines.
  const stumpX=W*0.70, stumpY=groundY+2;
  // fresh stump
  ctx.fillStyle='#1a1206';ctx.beginPath();ctx.ellipse(stumpX,stumpY,14,5,0,0,7);ctx.fill();
  ctx.fillStyle='#2a1e10';ctx.fillRect(stumpX-12,stumpY-10,24,10);
  // pale exposed cut (freshly felled)
  ctx.fillStyle='rgba(200,170,110,0.5)';ctx.beginPath();ctx.ellipse(stumpX,stumpY-10,12,4,0,0,7);ctx.fill();

  // the falling trunk — pivoting off the stump, leaning hard to the right, mid-topple
  const fall=0.62; // radians of lean (well past vertical, committed to falling)
  ctx.save();ctx.translate(stumpX,stumpY-8);ctx.rotate(fall);
  // trunk
  const trunkGrad=ctx.createLinearGradient(0,0,0,-230);trunkGrad.addColorStop(0,'#241a0e');trunkGrad.addColorStop(1,'#160f06');
  ctx.fillStyle=trunkGrad;
  ctx.beginPath();ctx.moveTo(-11,0);ctx.lineTo(-7,-210);ctx.lineTo(7,-210);ctx.lineTo(11,0);ctx.closePath();ctx.fill();
  // warm rim on the fire-facing (left) side of the trunk
  ctx.strokeStyle='rgba(240,150,70,0.3)';ctx.lineWidth=1.6;ctx.beginPath();ctx.moveTo(-10,-4);ctx.lineTo(-7,-205);ctx.stroke();
  // canopy at the top (a mass of dark foliage, cold-rimmed by moon)
  ctx.fillStyle='#101609';
  ctx.beginPath();ctx.arc(0,-220,34,0,7);ctx.fill();
  ctx.beginPath();ctx.arc(-24,-206,22,0,7);ctx.fill();
  ctx.beginPath();ctx.arc(26,-210,24,0,7);ctx.fill();
  ctx.beginPath();ctx.arc(4,-250,26,0,7);ctx.fill();
  ctx.strokeStyle='rgba(150,175,210,0.15)';ctx.lineWidth=2;ctx.beginPath();ctx.arc(4,-250,26,-1.2,1.4);ctx.stroke();
  ctx.restore();

  // motion arcs trailing the falling canopy (sense of speed)
  ctx.strokeStyle='rgba(200,210,225,0.10)';ctx.lineWidth=2;
  const canTipX=stumpX+Math.sin(fall)*250, canTipY=(stumpY-8)-Math.cos(fall)*250;
  for(let i=0;i<3;i++){ctx.beginPath();ctx.arc(stumpX,stumpY-8,235-i*8,-Math.PI/2, -Math.PI/2+fall);ctx.stroke();}
  // a few leaves/debris flying off
  for(let i=0;i<7;i++){const a=-Math.PI/2+fall*(0.4+i*0.1);const rr=200+((i*30)%60);const lx=stumpX+Math.cos(a)*rr;const ly=(stumpY-8)+Math.sin(a)*rr - ((t*0.04+i*20)%40);ctx.fillStyle='rgba(60,80,40,0.5)';ctx.fillRect(lx,ly,2.5,2.5);}
  // dust kicking up where it will land
  let dust=ctx.createRadialGradient(canTipX,groundY,0,canTipX,groundY,60);dust.addColorStop(0,'rgba(120,110,90,0.14)');dust.addColorStop(1,'rgba(120,110,90,0)');
  ctx.fillStyle=dust;ctx.beginPath();ctx.arc(canTipX,groundY,60,0,7);ctx.fill();

  // ================= THE PRINCE mid-swing with the rusty axe =================
  // planted at the base of the falling tree, body torqued, axe swung through.
  const px=W*0.52, py=groundY+6, s=1.3;
  // his little lantern SET DOWN, resting on the ground beside him (needs both hands)
  const LX=px-46*s, LY=groundY-4;
  warmGlow(LX, LY-6, 110, 0.32+f*0.1, t);
  lanternObj(LX, LY, f);
  // little shadow pool under it so it reads as resting on the ground
  ctx.fillStyle='rgba(0,0,0,0.35)';ctx.beginPath();ctx.ellipse(LX,LY+9,11,3,0,0,7);ctx.fill();

  (function drawPrinceSwinging(cx,cy,sc){
    ctx.save();ctx.translate(cx,cy);ctx.scale(sc,sc);
    const cool=ctx.createLinearGradient(0,-52,0,52);cool.addColorStop(0,'#28455f');cool.addColorStop(0.5,'#183043');cool.addColorStop(1,'#0b141c');
    const warm='rgba(255,180,95,'+(0.6+f*0.3)+')';
    const coolRim='rgba(120,160,205,0.3)';
    // legs planted wide, braced for the swing
    ctx.strokeStyle=cool;ctx.lineCap='round';ctx.lineWidth=7;
    ctx.beginPath();ctx.moveTo(-6,24);ctx.lineTo(-16,50);ctx.stroke();   // back leg braced
    ctx.beginPath();ctx.moveTo(6,24);ctx.lineTo(14,50);ctx.stroke();    // front leg
    ctx.lineWidth=6;ctx.strokeStyle='#0b141c';

// ===== PAGE 12 — THE LANTERN ROARS TO LIGHT =====
// SYMBOLISM: the payoff of every thread at once. The inherited flame (p5) meets the found
// oil (p11) and becomes light strong enough to banish the lie. Neither alone was enough.
// The phantom's death is the book's sharpest line: "no phantom can survive being truly seen."
// Doubt isn't out-fought or out-argued — it dies the instant there is light enough to SEE,
// because doubt is made of fog and not-looking. Flood the world with sight and it has nothing
// left to hide in. Light roars up like a sunrise; the phantom shrieks, thins, comes apart.
function page12(t){
  const f=flickVal(t);
  // the eruption pulse — a bright surge that swells (the light "roaring up")
  const surge=0.82+0.12*Math.sin(t*0.012)+0.04*Math.sin(t*0.028);

  // sky going from cold night (edges) to a roaring warm sunrise (centre column)
  const sky=ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#3a2a2e');sky.addColorStop(0.5,'#7a4a30');sky.addColorStop(1,'#c8823e');
  ctx.fillStyle=sky;ctx.fillRect(0,0,W,H);

  const groundY=H*0.82;
  const lx=W*0.5;

  // ---- the great column of light ROARING upward from the lantern ----
  const colGrad=ctx.createLinearGradient(lx,groundY,lx,0);
  colGrad.addColorStop(0,'rgba(255,240,190,'+(0.9*surge)+')');
  colGrad.addColorStop(0.4,'rgba(255,210,130,'+(0.5*surge)+')');
  colGrad.addColorStop(1,'rgba(255,190,110,0)');
  ctx.save();
  ctx.beginPath();
  // a widening beam / plume rising from the lantern to the sky
  ctx.moveTo(lx-26,groundY-40);
  ctx.quadraticCurveTo(lx-90*surge,H*0.3,lx-140*surge,-20);
  ctx.lineTo(lx+140*surge,-20);
  ctx.quadraticCurveTo(lx+90*surge,H*0.3,lx+26,groundY-40);
  ctx.closePath();
  ctx.fillStyle=colGrad;ctx.fill();
  ctx.restore();

  // giant radial burst of warmth centred on the lantern (the sunrise)
  let burst=ctx.createRadialGradient(lx,groundY-70,10,lx,groundY-70,W*0.9*surge);

    ctx.beginPath();ctx.arc(p.face*1.5,-39,6.5,p.face>0?-1:2,p.face>0?1.2:4.2);ctx.stroke();
    // two little eyes (faces seeing each other)
    ctx.fillStyle='rgba(255,230,180,0.8)';
    ctx.beginPath();ctx.arc(p.face*1.5,-40,0.9,0,7);ctx.fill();
    // warm rim both sides (fully alive in the light)
    ctx.strokeStyle='rgba(255,190,110,'+(0.55+f*0.2)+')';ctx.lineWidth=1.4;
    ctx.beginPath();ctx.moveTo(8,2);ctx.quadraticCurveTo(11,-24,5,-32);ctx.stroke();
    ctx.restore();
    // joy gestures
    if(p.joy==='raise'){ // both arms reaching HIGH overhead in celebration
      ctx.strokeStyle=bodyc;ctx.lineWidth=4;ctx.lineCap='round';
      ctx.beginPath();ctx.moveTo(-7,-18);ctx.quadraticCurveTo(-15,-40,-11,-56);ctx.stroke();
      ctx.beginPath();ctx.moveTo(7,-18);ctx.quadraticCurveTo(15,-40,11,-56);ctx.stroke();
      ctx.strokeStyle='rgba(255,190,110,0.5)';ctx.lineWidth=1.4;
      ctx.beginPath();ctx.moveTo(7,-19);ctx.quadraticCurveTo(15,-41,11,-57);ctx.stroke();
      ctx.beginPath();ctx.moveTo(-7,-19);ctx.quadraticCurveTo(-15,-41,-11,-57);ctx.stroke();
    } else if(p.joy==='embrace'){ // arm reaching toward neighbour at shoulder height (embrace)
      ctx.strokeStyle=bodyc;ctx.lineWidth=4;ctx.lineCap='round';
      ctx.beginPath();ctx.moveTo(p.face*6,-24);ctx.quadraticCurveTo(p.face*16,-26,p.face*26,-24);ctx.stroke();
      ctx.strokeStyle='rgba(255,190,110,0.5)';ctx.lineWidth=1.4;
      ctx.beginPath();ctx.moveTo(p.face*6,-25);ctx.quadraticCurveTo(p.face*16,-27,p.face*26,-25);ctx.stroke();
    }

  });

  // gentle warm vignette (no fog — this is page 3 fully healed)
  let vg=ctx.createRadialGradient(W/2,H*0.5,H*0.4,W/2,H*0.5,H*0.95);
  vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(30,12,0,0.28)');
  ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);

}

// ===== PAGE 14 — "LET'S GO AND LOOK" =====
// SYMBOLISM: the thesis crystallized into a way of living. The kingdom didn't just get its
// light back — it kept the method that saved it. "Let's go and look" is the antidote to
// doubt distilled into a phrase a child can carry: not "be brave", but the repeatable practice
// of checking for yourself. The phantom can never return, because a whole people now
// instinctively do the one thing doubt cannot survive — they look. The prince's single
// inherited flame (p5) has become a whole people carrying their own lights, setting out
// unafraid, a child among them carrying one too: the method and the light, passed forward.
function page14(t){
  const f=flickVal(t);
  // warm, calm dawn — the settled "ever after", forward into a bright horizon
  const sky=ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#3a2a3e');sky.addColorStop(0.4,'#8a5240');sky.addColorStop(0.72,'#d4924e');sky.addColorStop(1,'#f0c06a');
  ctx.fillStyle=sky;ctx.fillRect(0,0,W,H);

  // a bright horizon ahead (where they're headed to look) — a rising warm glow, low centre-right
  const hzX=W*0.66, hzY=H*0.60;
  let hz=ctx.createRadialGradient(hzX,hzY,10,hzX,hzY,W*0.7);
  hz.addColorStop(0,'rgba(255,235,170,0.55)');hz.addColorStop(0.4,'rgba(255,200,120,0.22)');hz.addColorStop(1,'rgba(255,200,120,0)');
  ctx.fillStyle=hz;ctx.fillRect(0,0,W,H);
  let sun=ctx.createRadialGradient(hzX,hzY,2,hzX,hzY,44);
  sun.addColorStop(0,'rgba(255,248,215,0.85)');sun.addColorStop(0.7,'rgba(255,210,140,0.4)');sun.addColorStop(1,'rgba(255,210,140,0)');
  ctx.fillStyle=sun;ctx.beginPath();ctx.arc(hzX,hzY,44,0,7);ctx.fill();

  const groundY=H*0.74;
  // gentle rise/hills toward the horizon (open land to go and look at)
  ctx.fillStyle='#9a5a38';
  ctx.beginPath();ctx.moveTo(0,H*0.68);ctx.quadraticCurveTo(W*0.35,H*0.62,W*0.66,H*0.66);ctx.quadraticCurveTo(W*0.85,H*0.68,W,H*0.63);ctx.lineTo(W,H);ctx.lineTo(0,H);ctx.closePath();ctx.fill();

  // ---- the healed kingdom BEHIND them, on the left: warm town, bridge, great lantern, festival lights ----
  // (soft, receding — they are leaving it to go look at the wider world)
  ctx.save();ctx.globalAlpha=0.9;
  // great lantern glowing steady, left
  const glx=W*0.14, glTop=groundY-120;
  warmGlow(glx, glTop+24, 150, 0.35+f*0.1, t);
  ctx.fillStyle='#3a2418';ctx.fillRect(glx-3,glTop,6,120);
  ctx.fillStyle='#33200f';
  ctx.beginPath();ctx.moveTo(glx-13,glTop+30);ctx.lineTo(glx-13,glTop+2);ctx.lineTo(glx,glTop-12);ctx.lineTo(glx+13,glTop+2);ctx.lineTo(glx+13,glTop+30);ctx.closePath();ctx.fill();
  let ggl=ctx.createRadialGradient(glx,glTop+16,0,glx,glTop+16,16);ggl.addColorStop(0,'rgba(255,240,190,0.9)');ggl.addColorStop(1,'rgba(255,190,100,0)');
  ctx.fillStyle=ggl;ctx.beginPath();ctx.arc(glx,glTop+16,16,0,7);ctx.fill();
  // a couple of warm rooftops behind (kept low, foreground of the town cluster)
  ctx.fillStyle='#5a3826';
  for(let i=0;i<5;i++){const x=W*0.03+i*38;const rh=30+((i*29)%26);ctx.beginPath();ctx.moveTo(x,groundY);ctx.lineTo(x,groundY-rh);ctx.lineTo(x+13,groundY-rh-11);ctx.lineTo(x+26,groundY-rh);ctx.lineTo(x+26,groundY);ctx.closePath();ctx.fill();}
  // a small sky-bridge (same clean style as pages 3/13), sitting behind the town
  const b1=W*0.03, b2=W*0.19, bTop=groundY-118;
  ctx.fillStyle='#4a3022';
  ctx.fillRect(b1,bTop,9,groundY-bTop-40);        // left pylon down toward ground
  ctx.fillRect(b2,bTop,9,groundY-bTop-40);        // right pylon
  // a single bold arch between the pylons (the span)
  ctx.strokeStyle='#4a3022';ctx.lineWidth=7;
  ctx.beginPath();ctx.moveTo(b1+4,bTop+4);ctx.quadraticCurveTo((b1+b2)/2+4,bTop+40,b2+4,bTop+4);ctx.stroke();
  // the deck running across the top of the pylons
  ctx.fillRect(b1-8,bTop-6,(b2-b1)+25,7);
  // festival string, cleanly anchored from the bridge deck down to a rooftop
  ctx.strokeStyle='rgba(40,24,16,0.4)';ctx.lineWidth=1.2;
  ctx.beginPath();ctx.moveTo(b2+8,bTop-4);ctx.quadraticCurveTo(W*0.22,groundY-64,W*0.32,groundY-52);ctx.stroke();
  for(let i=1;i<7;i++){const u=i/7;const bx=(1-u)*(1-u)*(b2+8)+2*(1-u)*u*(W*0.22)+u*u*(W*0.32);const by=(1-u)*(1-u)*(bTop-4)+2*(1-u)*u*(groundY-64)+u*u*(groundY-52);const fl=0.7+Math.sin(t*0.03+i)*0.25;const hue=i%3;const col=hue===0?'255,190,110':hue===1?'255,150,90':'255,215,140';ctx.fillStyle='rgba('+col+','+(0.8*fl)+')';ctx.beginPath();ctx.arc(bx,by+3,2,0,7);ctx.fill();}
  ctx.restore();

  // ground
  const gnd=ctx.createLinearGradient(0,groundY,0,H);gnd.addColorStop(0,'#7a4a2c');gnd.addColorStop(1,'#4a2c1a');
  ctx.fillStyle=gnd;ctx.fillRect(0,groundY,W,H);
  // a soft path leading from the town toward the horizon, directly under the procession
  ctx.fillStyle='rgba(255,210,140,0.12)';
  ctx.beginPath();
  ctx.moveTo(W*0.33, H);           // wide at the near foreground (under the front walker)
  ctx.lineTo(W*0.52, H);
  ctx.lineTo(hzX+14, hzY+6);        // narrowing to the horizon glow
  ctx.lineTo(hzX-6, hzY+6);
  ctx.closePath();ctx.fill();
  // a soft centre sheen down the road
  ctx.fillStyle='rgba(255,220,150,0.06)';
  ctx.beginPath();
  ctx.moveTo(W*0.40, H);ctx.lineTo(W*0.46, H);ctx.lineTo(hzX+4, hzY+6);ctx.lineTo(hzX-2, hzY+6);
  ctx.closePath();ctx.fill();

  // ================= THE PEOPLE setting out, each carrying a lantern =================
  // walking away toward the horizon (seen from behind / three-quarter), easy confident strides.
  // a small procession receding toward the bright horizon — scale shrinks with distance.
  // helper: a townsperson walking away, lantern in hand, warm-rimmed.
  function walker(wx,wy,scale,lanternSide){
    ctx.save();ctx.translate(wx,wy);ctx.scale(scale,scale);
    const body=ctx.createLinearGradient(0,-34,0,22);body.addColorStop(0,'#6a4a2c');body.addColorStop(1,'#33200f');
    // legs mid-stride (walking away)
    ctx.strokeStyle='#3a2614';ctx.lineCap='round';ctx.lineWidth=5;
    ctx.beginPath();ctx.moveTo(-3,16);ctx.lineTo(-6,34);ctx.stroke();
    ctx.beginPath();ctx.moveTo(3,16);ctx.lineTo(7,33);ctx.stroke();
    // cloak/body (seen from behind — a simple rounded back)
    ctx.fillStyle=body;
    ctx.beginPath();ctx.moveTo(-9,18);ctx.quadraticCurveTo(-12,-10,-6,-22);ctx.quadraticCurveTo(0,-27,6,-22);ctx.quadraticCurveTo(12,-10,9,18);ctx.quadraticCurveTo(0,22,-9,18);ctx.closePath();ctx.fill();
    // head (back of it)
    ctx.beginPath();ctx.arc(0,-27,5,0,7);ctx.fillStyle='#3a2818';ctx.fill();
    // warm rim on the horizon-facing side (they walk into the light)
    ctx.strokeStyle='rgba(255,200,120,'+(0.55+f*0.2)+')';ctx.lineWidth=1.4;
    ctx.beginPath();ctx.moveTo(9,16);ctx.quadraticCurveTo(12,-10,6,-21);ctx.stroke();
    ctx.beginPath();ctx.arc(1.5,-27,5,-1,1.1);ctx.stroke();
    // arm out with a lantern, held ahead/to the side, lighting the way
    const ls=lanternSide;
    ctx.strokeStyle=body;ctx.lineWidth=3.4;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(ls*6,-14);ctx.quadraticCurveTo(ls*13,-8,ls*15,0);ctx.stroke();
    // the lantern glow + body
    const lgx=ls*16, lgy=2;
    let lg=ctx.createRadialGradient(lgx,lgy,0,lgx,lgy,16);lg.addColorStop(0,'rgba(255,215,140,'+(0.6+f*0.2)+')');lg.addColorStop(1,'rgba(255,190,100,0)');
    ctx.fillStyle=lg;ctx.beginPath();ctx.arc(lgx,lgy,16,0,7);ctx.fill();
    ctx.strokeStyle='rgba(30,20,10,0.8)';ctx.lineWidth=1;ctx.strokeRect(lgx-3,lgy-4,6,8);
    ctx.fillStyle='rgba(255,245,205,0.95)';ctx.beginPath();ctx.arc(lgx,lgy,2.2,0,7);ctx.fill();
    ctx.restore();
  }

  // the procession, receding toward the horizon (front/large -> back/small), ON the road centre-line
  walker(W*0.541, groundY+30, 1.25, 1);     // nearest, foreground
  walker(W*0.558, groundY+16, 1.0, -1);
  walker(W*0.573, groundY+4, 0.8, 1);
  walker(W*0.585, groundY-6, 0.62, -1);
  walker(W*0.595, groundY-14, 0.48, 1);    // furthest, nearly at the horizon glow

  // ---- the CHILD, carrying a little lantern too (the torch passed forward) ----
  // small, beside the nearest walker (the prince), being led out to look.
  (function child(cx,cy,sc){
    ctx.save();ctx.translate(cx,cy);ctx.scale(sc,sc);
    const body=ctx.createLinearGradient(0,-20,0,16);body.addColorStop(0,'#6a4a2c');body.addColorStop(1,'#33200f');
    ctx.strokeStyle='#3a2614';ctx.lineCap='round';ctx.lineWidth=4;
    ctx.beginPath();ctx.moveTo(-2,10);ctx.lineTo(-4,22);ctx.stroke();
    ctx.beginPath();ctx.moveTo(2,10);ctx.lineTo(5,21);ctx.stroke();
    ctx.fillStyle=body;
    ctx.beginPath();ctx.moveTo(-6,12);ctx.quadraticCurveTo(-8,-6,-4,-14);ctx.quadraticCurveTo(0,-18,4,-14);ctx.quadraticCurveTo(8,-6,6,12);ctx.quadraticCurveTo(0,15,-6,12);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.arc(0,-18,3.6,0,7);ctx.fillStyle='#3a2818';ctx.fill();
    ctx.strokeStyle='rgba(255,200,120,0.55)';ctx.lineWidth=1.2;ctx.beginPath();ctx.arc(1,-18,3.6,-1,1.1);ctx.stroke();
    // little arm holding a tiny lantern out front (its own light — the inheritance)
    ctx.strokeStyle=body;ctx.lineWidth=2.4;ctx.beginPath();ctx.moveTo(5,-8);ctx.quadraticCurveTo(11,-4,12,2);ctx.stroke();
    let lg=ctx.createRadialGradient(13,3,0,13,3,11);lg.addColorStop(0,'rgba(255,220,150,'+(0.65+f*0.2)+')');lg.addColorStop(1,'rgba(255,190,100,0)');
    ctx.fillStyle=lg;ctx.beginPath();ctx.arc(13,3,11,0,7);ctx.fill();
    ctx.strokeStyle='rgba(30,20,10,0.8)';ctx.lineWidth=0.9;ctx.strokeRect(11,0,4,6);
    ctx.fillStyle='rgba(255,245,205,0.95)';ctx.beginPath();ctx.arc(13,3,1.6,0,7);ctx.fill();
    ctx.restore();
  })(W*0.505, groundY+36, 1.0);

  // the nearest walker is the PRINCE — give him a faint circlet so he reads as grown, leading
  ctx.save();ctx.translate(W*0.541, groundY+30);ctx.scale(1.25,1.25);
  ctx.strokeStyle='rgba(255,215,130,'+(0.55+f*0.25)+')';ctx.lineWidth=1.8;
  ctx.beginPath();ctx.moveTo(-4,-30);ctx.quadraticCurveTo(0,-33,4,-30);ctx.stroke();
  ctx.restore();

  // gentle warm vignette (bright, settled, at peace)
  let vg=ctx.createRadialGradient(W*0.6,H*0.5,H*0.45,W*0.6,H*0.5,H*0.98);
  vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(30,14,0,0.30)');
  ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);
  paper();
}

// ---- reader state & navigation ----
const PAGES=[page1,page2,page3,page4,page5,page6,page7,page8,page9,page10,page11,page12,page13,page14];
const TEXTS=["Once upon a time, in a kingdom of sky-high bridges, a fisherman pulled a strange corked bottle from the sea.", "When he opened it, out poured a cold grey fog, and with it slithered a phantom with a voice like silk. He whispered his way into the castle, right to the king's ear.", "And the kingdom slowly went blind. Neighbours became shadows. The markets fell silent, the festivals died, and children forgot the faces of their friends.", "In the town square stood the great lantern, cold and dark, and whenever anyone dreamed aloud of relighting it, the phantom hissed: the oil lies across the sea, beyond the forest of the goblins, and no one who seeks it ever returns. And ohh, the tales they told of those goblins. Twisted creatures with yellow eyes, they said, teeth like broken glass, who strung travellers' bones from the branches. Even the bravest knights refused the road.", "But the young prince carried a small lantern his mother had lit before the fog came, and its little flame showed him one step ahead.", "The phantom loomed over him and whispered: first, a legendary sword, forged over seven years, or the goblins will tear you apart. And the prince felt the fear crawl up his spine... but he looked at his wee flame and said, I will go and see for myself. And he walked into the dark forest empty-handed.", "The trees creaked. Yellow eyes blinked in the gloom. A huge shape stepped onto the path... and held out a bowl of soup. The goblins were weathered and strange, yes, but they laughed warmly and shared their fire, and their fearsome teeth were mostly used for bread. Yet their homes sagged and leaked around them, for they believed their own trees could only be felled by a magical saw from a distant mountain, and so they shivered in the rain for generations.", "The prince picked up a rusty old axe by the woodpile and said, may I try? One swing, two, and a mighty tree came crashing down. The goblins wept and cheered.", "Then they clutched him and warned, the great bridge ahead has surely crumbled, take our timber to mend it or you will fall into the abyss! And the prince felt the dread rise again... but he said, first let me look and count how many trees we would need. And when he reached the gorge, the wind howling beneath him, the bridge stood proud and unbroken, as it had all along. He simply walked across.", "In the far-off land, the people frowned at his question and said, oil? Dear prince, we sent your kingdom a whole barrel years ago, as a gift. And the prince's heart went cold and then hot, for he understood everything.", "He raced home, threw open a dusty cupboard, and there sat the barrel.", "He filled the great lantern, touched his mother's small flame to the wick, and light roared up through the fog like a sunrise. The phantom shrieked and thinned and vanished, for no phantom can survive being truly seen.", "And the people of the kingdom stood blinking in the golden light, seeing each other's faces for the first time in years, and some wept, and some laughed, and the festivals began that very night.", "And ever after, when anyone in that kingdom cried that a thing was impossible, the people would just smile and say, well then, let's go and look."];
const NUM=PAGES.length;

let idx=-1; // -1 = title screen, 0..13 = pages, NUM = end screen
const titleScreen=document.getElementById('titleScreen');
const endScreen=document.getElementById('endScreen');
const textEl=document.getElementById('text');
const counter=document.getElementById('counter');
const progress=document.getElementById('progress');

// build progress dots
for(let i=0;i<NUM;i++){const d=document.createElement('div');d.className='dot';progress.appendChild(d);}
const dots=[...progress.children];

function render(){
  titleScreen.classList.toggle('hidden', idx!==-1);
  endScreen.classList.toggle('hidden', idx!==NUM);
  const onPage = idx>=0 && idx<NUM;
  counter.style.opacity = onPage?1:0;
  progress.style.opacity = onPage?1:0;
  document.getElementById('prevArrow').style.opacity = onPage||idx===NUM?1:0;
  document.getElementById('nextArrow').style.opacity = idx<NUM?1:0;
  if(onPage){
    // fade text out then in
    textEl.style.opacity=0;
    setTimeout(()=>{textEl.textContent=TEXTS[idx];textEl.style.opacity=1;},180);
    counter.textContent=(idx+1)+' / '+NUM;
    dots.forEach((d,i)=>d.classList.toggle('on',i===idx));
  } else {
    textEl.textContent='';
  }
}
function go(n){
  idx=Math.max(-1,Math.min(NUM,n));
  render();
}
function next(){ go(idx+1); }
function prev(){ if(idx===NUM){go(NUM-1);} else {go(idx-1);} }

document.getElementById('next').addEventListener('click',next);
document.getElementById('prev').addEventListener('click',prev);
// title/end screens: tap anywhere advances
titleScreen.addEventListener('click',()=>go(0));
endScreen.addEventListener('click',()=>go(0));
// keyboard
window.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key===' ')next();if(e.key==='ArrowLeft')prev();});
// swipe
let tx=0;
window.addEventListener('touchstart',e=>{tx=e.changedTouches[0].clientX;},{passive:true});
window.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-tx;if(Math.abs(dx)>45){dx<0?next():prev();}},{passive:true});

// home link -> parent site (adjust as needed)
document.getElementById('homelink').addEventListener('click',e=>{
  e.preventDefault();
  window.location.href='https://aaronunify2.github.io/RecreateMeaning/home.html';
});

// ---- fullscreen toggle ----
const fsBtn=document.getElementById('fsBtn');
const fsIcon=document.getElementById('fsIcon');
const ENTER_ICON='<path d="M4 9V4h5M20 9V4h-5M4 15v5h5M20 15v5h-5"/>';
const EXIT_ICON='<path d="M9 4H4v5M15 4h5v5M9 20H4v-5M15 20h5v-5"/>';
function isFs(){return document.fullscreenElement||document.webkitFullscreenElement;}
function toggleFs(){
  const el=document.documentElement;
  if(!isFs()){
    (el.requestFullscreen||el.webkitRequestFullscreen||el.webkitRequestFullScreen).call(el);
  } else {
    (document.exitFullscreen||document.webkitExitFullscreen).call(document);
  }
}
function syncFsIcon(){ fsIcon.innerHTML = isFs()?EXIT_ICON:ENTER_ICON; }
fsBtn.addEventListener('click',e=>{e.stopPropagation();toggleFs();});
document.addEventListener('fullscreenchange',syncFsIcon);
document.addEventListener('webkitfullscreenchange',syncFsIcon);

// ---- animation loop: draw whichever page we're on ----
function loop(t){
  const onPage = idx>=0 && idx<NUM;
  if(onPage){
    PAGES[idx](t);
  } else {
    // idle: clear to a soft dark so the screens sit on black
    ctx.fillStyle='#08060a';ctx.fillRect(0,0,W,H);
  }
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
render();
</script>
