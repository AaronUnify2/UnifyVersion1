<!DOCTYPE html>

<head>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/dom-to-image/2.6.0/dom-to-image.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script type="module">
        import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@10/dist/mermaid.esm.min.mjs';

        window._mermaid = mermaid;

        mermaid.initialize({
            startOnLoad: false,
            theme: 'default',
            flowchart: {
                useMaxWidth: false,
                htmlLabels: true,
                curve: 'basis',
                nodeSpacing: 80,
                rankSpacing: 120,
                padding: 25
            },
            themeVariables: {
                fontSize: '32px',
                fontFamily: 'Arial, sans-serif'
            }
        });

        window.applyPostProcessing = function() {
            const svg = document.querySelector('#mermaidDiagram svg');
            if (!svg) return;

            const styleEl = document.createElementNS('http://www.w3.org/2000/svg', 'style');
            styleEl.textContent = `
                foreignObject div, foreignObject span, foreignObject p,
                foreignObject b, foreignObject i, foreignObject u,
                .nodeLabel, .nodeLabel * {
                    font-size: 26px !important;
                    line-height: 1.35 !important;
                    font-family: Arial, sans-serif !important;
                }
                .nodeLabel { text-align: left !important; }
                .nodeLabel * { text-align: left !important; }
                .edgeLabel foreignObject div, .edgeLabel .nodeLabel, .edgeLabel .nodeLabel * {
                    font-size: 22px !important;
                    font-weight: 700 !important;
                    text-align: center !important;
                }
            `;
            svg.insertBefore(styleEl, svg.firstChild);

            svg.querySelectorAll('text').forEach(el => { el.style.fontSize = '26px'; });

            svg.querySelectorAll('.nodeLabel').forEach(label => {
                const inner = label.querySelector('div') || label;
                if (!inner) return;
                const html = inner.innerHTML;
                const m = html.match(/^(<b>.*?<\/b>)(<br\/>|<br>)?(.*)/s);
                if (m) {
                    inner.innerHTML =
                        '<div style="text-align:center;font-weight:bold;margin-bottom:6px;">' + m[1] + '</div>' +
                        '<div style="text-align:left;padding-left:8px;">' + (m[3]||'') + '</div>';
                } else {
                    inner.style.textAlign = 'left';
                    inner.style.paddingLeft = '8px';
                }
            });

            svg.querySelectorAll('foreignObject').forEach(fo => {
                const div = fo.querySelector('div');
                if (div) {
                    const rect = div.getBoundingClientRect();
                    fo.setAttribute('width', Math.ceil(rect.width) + 20);
                    fo.setAttribute('height', Math.ceil(rect.height) + 20);
                }
            });

            const bbox = svg.getBBox();
            svg.setAttribute('viewBox', `${bbox.x-20} ${bbox.y-20} ${bbox.width+40} ${bbox.height+40}`);
            svg.setAttribute('width', bbox.width + 40);
            svg.setAttribute('height', bbox.height + 40);

            // ── Attach click listeners to context toggle spans ───────────
            svg.querySelectorAll('[data-context]').forEach(el => {
                el.style.cursor = 'pointer';
                el.addEventListener('click', function(e) {
                    e.stopPropagation();
                    const key = el.getAttribute('data-context');
                    if (!window._openContext) window._openContext = new Set();
                    if (window._openContext.has(key)) {
                        window._openContext.delete(key);
                    } else {
                        window._openContext.add(key);
                    }
                    const dc = document.getElementById('diagramContainer');
                    const scrollLeft = dc.scrollLeft;
                    const scrollTop  = dc.scrollTop;
                    window.rebuildDiagram({ preserveView: true }).then(() => {
                        dc.scrollLeft = scrollLeft;
                        dc.scrollTop  = scrollTop;
                    });
                });
            });
        };

        window.renderDiagram = async function(source) {
            const wrapper = document.getElementById('diagramContainer');
            const old = document.getElementById('mermaidDiagram');
            if (old) old.remove();

            const fresh = document.createElement('div');
            fresh.className = 'mermaid';
            fresh.id = 'mermaidDiagram';
            fresh.textContent = source;
            wrapper.appendChild(fresh);

            await window._mermaid.run({ nodes: [fresh] });
            window.applyPostProcessing();
        };

        window.addEventListener('load', () => {
            window.rebuildDiagram();
        });
    </script>

<script>
    // ── Open context state ───────────────────────────────────────────────
    window._openContext = new Set();

    // ── Context node definitions ─────────────────────────────────────────
    const CONTEXT_NODES = {
        'PlanGPart1': {
            parentId: 'PlanGPart1',
            nodeId: 'PlanGPart1_ctx',
            label: `<b>📖 What is the Planning Scheme?</b><br/><br/>📌 <a href='https://www.sdrc.qld.gov.au/doing-business/planning---development/strategic-planning' target='_blank'>Southern Downs Planning Scheme</a><br/><br/>A legally binding document governing land use and development in the local government area over the long term (typically 20 years). Defines zoning, building heights, and development rules to balance community needs, economic growth, and environmental protection.<br/><br/>Each Queensland council prepares its own scheme in consultation with the State Government and community.<br/><br/>Aims to: ensure land is available for housing, services, and business; maximise liveability; plan infrastructure efficiently; protect natural areas and heritage; build resilience to floods and bushfires; and reflect the community's vision for the region.`
        },
        'PlanCanI': {
            parentId: 'PlanCanI',
            nodeId: 'PlanCanI_ctx',
            label: `<b>📖 Background &amp; Context — Can I build here?</b><br/><br/>There are two types of approvals for construction: <b>building approval</b> and <b>planning approval</b>. Most new structures require building approval. A shed under 10m2 does not require building approval, but must still comply with siting and boundary clearance rules.<br/><br/>Whether planning approval is required depends on many factors — the most common reason is that the construction cannot meet the required setbacks of the Southern Downs Planning Scheme.<br/><br/><u>Common site constraints:</u><br/>- Underground infrastructure (e.g. sewer line)<br/>- Lack of constructed road access to the property<br/>- Bushfire Zone | Flood Zone<br/><br/><u>Setbacks - Dwellings:</u><br/>Residential/township: 6m front, 1.5m side &amp; rear (QDC MP 1.2)<br/>Rural: 60m from side/rear lot boundaries; 60m from gravel/unmade road; 6m from sealed road<br/>Rural residential: Refer to Southern Downs Planning Scheme<br/><br/><u>Setbacks - Sheds:</u><br/>Residential/township: 6m front, 1.5m side &amp; rear<br/>Rural/specific: typically 4.5-6m - refer to Queensland Development Code`
        },
        'PlanExist': {
            parentId: 'PlanExist',
            nodeId: 'PlanExist_ctx',
            label: `<b>📖 Why we always transfer — Existing Applications</b><br/><br/>Planning applications are complex and highly case-specific. Only the planner managing a file has the full context needed to answer accurately — application history, conditions, referral agency responses, and any outstanding issues.<br/><br/>Attempting to answer without that context risks giving incorrect advice that could have serious consequences for the applicant.`
        },
        'PlanPreLodge': {
            parentId: 'PlanPreLodge',
            nodeId: 'PlanPreLodge_ctx',
            label: `<b>📖 General Enquiries vs Pre-Lodgement Meetings</b><br/><br/><b>General Enquiries (no fee):</b><br/>For information of a general nature - opportunities and constraints of a site; clarifying the location of a building; potential use of a specific parcel of land. Transfer to the planning team.<br/><br/><b>Pre-Lodgement Meeting ($300 - 60 min, RC192):</b><br/>A paid service for applicants who already have a clear development goal. Provides tailored advice on a specific proposal before a formal Development Application is lodged. Helps applicants understand key areas of assessment and required supporting documents in advance.<br/><br/>This service is for people who know what and where they want to develop - not for general site enquiries.`
        },
        'PlanObjection': {
            parentId: 'PlanObjection',
            nodeId: 'PlanObjection_ctx',
            label: `<b>📖 Why this matters — Appeal rights</b><br/><br/>Submissions that do not meet all of the checklist criteria are <b>not considered properly made</b> and submitters will not have third-party appeal rights.<br/><br/>If a submission is properly made and Council approves the application, the submitter has the right to appeal Council's decision in the Planning and Environment Court.<br/><br/>If Council refuses the application, all submitters (properly made or not) are notified after the decision is made and receive a copy of the Decision Notice.`
        },
        'AnimalAttack': {
            parentId: 'AnimalAttack',
            nodeId: 'AnimalAttack_ctx',
            label: `<b>📖 After a Dog Attack — Possible outcomes</b><br/><br/>Following a reported attack, Local Laws officers will investigate. Possible outcomes:<br/><br/><b>Dangerous Dog Declaration:</b><br/>May be issued where a dog has attacked, bitten, or rushed at a person or animal. Requirements imposed on the owner include: microchipping, desexing, approved enclosure, muzzle in public, and a warning sign on the premises. The owner may appeal within 28 days to the Magistrates Court.<br/><br/><b>Destruction Order:</b><br/>May be issued in severe or repeat cases, or where the owner fails to comply with a Dangerous Dog Declaration.<br/><br/><b>Advising the victim:</b><br/>- Seek medical attention if injured<br/>- A police report may be appropriate for serious incidents<br/>- Retain evidence: photos, witness details, and vet reports if a pet was also injured`
        },
        'BarkNew': {
            parentId: 'BarkNew',
            nodeId: 'BarkNew_ctx',
            label: `<b>📖 Why we require a diary — Plain-English script</b><br/><br/>Customers often push back on having to keep a diary. A clean way to explain it:<br/><br/><i>&quot;A noise diary creates an objective record showing a pattern — which Local Laws Officers need to demonstrate a genuine nuisance under the legislation. It also protects you by documenting the problem factually.&quot;</i><br/><br/><u>Legal framework:</u><br/>Council needs documented evidence before taking enforcement action. A single complaint without a diary cannot result in formal action. The diary establishes a pattern of nuisance over time, which is required to demonstrate an ongoing problem.<br/><br/><u>Escalation path:</u><br/>1. Customer encouraged to contact the dog owner directly first<br/>2. Customer completes diary over 10 days and emails to Local Laws<br/>3. Local Laws contacts dog owner and issues written warning<br/>4. If behaviour continues: infringement notice may be issued<br/>5. Non-compliance: infringement notice which if unpaid can lead to court action<br/><br/>Set realistic expectations with the customer — the process takes time and council's primary goal is behavioural correction, not punishment.`
        },
        'RatesSale': {
            parentId: 'RatesSale',
            nodeId: 'RatesSale_ctx',
            label: `<b>📖 Property Valuations — Background</b><br/><br/>Properties are valued by the State Government (Department of Resources), not council. Valuations are updated annually and form the basis of the General Rate calculation.<br/><br/>Owners who believe their valuation is incorrect have 60 days from the date of their valuation notice to lodge a formal objection with the Department of Resources. Council cannot intervene in this process.<br/><br/><u>Why rates increase after subdivision or sale of bulk-assessed land:</u><br/>When bulk-assessed lots are sold individually, each receives its own Property ID and is independently valued. The per-lot valuation is typically higher than a proportional share of the bulk-assessed value, resulting in a higher rates charge.<br/><br/>This is a State Government valuation outcome — council has no discretion to reduce it. Customers who dispute their new valuation should contact the Department of Resources.`
        },
        'RatesPayAgree': {
            parentId: 'RatesPayAgree',
            nodeId: 'RatesPayAgree_ctx',
            label: `<b>📖 Payment Agreements — Policy context</b><br/><br/><b>If a customer defaults:</b><br/>If the customer fails to maintain agreed payments, the payment agreement is void and all outstanding rates become immediately payable. Council may proceed to debt recovery, including referral to an external collector and ultimately a caveat on the property.<br/><br/><b>Customers in genuine hardship:</b><br/>Customers experiencing ongoing financial difficulty beyond a standard payment agreement should be encouraged to contact the revenue team directly. Customer service should not make commitments beyond the standard process.<br/><br/><b>Rate recovery codes — what they mean:</b><br/>- General: standard account in good standing<br/>- FirstREM / FinalREM: reminder notice issued, account overdue<br/>- ARR: referred to external debt recovery (Recoveries &amp; Reconstructions) — do not negotiate, transfer to R&amp;R: 1300 556 863`
        },
        'BuildingNew': {
            parentId: 'BuildingNew',
            nodeId: 'BuildingNew_ctx',
            label: `<b>📖 What building work requires approval?</b><br/><br/><u>Generally requires building approval:</u><br/>New dwellings, extensions, garages, carports, sheds over 10m2, swimming pools, retaining walls over 1m, patios/decks attached to the dwelling, and most commercial construction.<br/><br/><u>Generally does not require building approval:</u><br/>Garden sheds under 10m2, some fencing, some landscaping. However, even exempt structures must still comply with siting and boundary setback requirements under the Queensland Development Code.<br/><br/><u>Private Certifier vs Council:</u><br/>Customers may engage a private building certifier who manages the application, arranges inspections, and liaises with council on their behalf. Most customers undertaking larger projects choose this route. Council fees are the same either way — the certifier charges their own fee on top.`
        },
        'BuildingVsPlanning': {
            parentId: 'BuildingNew',
            nodeId: 'BuildingVsPlanning_ctx',
            label: `<b>📖 Building vs Planning Approval — Staff script</b><br/><br/>These two sound similar but answer two different questions. A clean way to explain it to a customer:<br/><br/><i>&quot;Planning approval asks: can this use happen on this land? It's about where the building goes, how it's sited, and whether the use fits the Planning Scheme — setbacks, overlays, road access, bushfire and flood zones.<br/><br/>Building approval asks: is the structure itself safe and compliant? It's about how the building is constructed — footings, framing, bracing, tie-down, energy efficiency, smoke alarms, and all the engineering that makes the building safe.&quot;</i><br/><br/><u>The usual pathway on the Southern Downs:</u><br/>- If the site ticks every box on the Rural Zone Checklist → building approval only<br/>- If it doesn't tick every box (can't meet setbacks, in bushfire zone, no constructed road) → planning approval (MCU) first, THEN building approval<br/><br/>Many rural houses need only building approval. Use the checklist with the customer before referring them up.`
        },
        'BuildingTinyContainer': {
            parentId: 'BuildingNew',
            nodeId: 'BuildingTinyContainer_ctx',
            label: `<b>📖 Tiny Homes, Prefab &amp; Shipping Containers</b><br/><br/>These come up constantly and the most common misconception is that &quot;tiny&quot; or &quot;prefab&quot; means the normal rules don't apply. They do.<br/><br/><u>Tiny homes fixed to the land:</u><br/>Treated like any other Class 1a dwelling — full building approval process, full document list, Form 21 at the end. Council removed the 60m2 minimum floor area in August 2024, so there's no &quot;too small&quot; threshold.<br/><br/><u>Tiny homes on wheels:</u><br/>Treated like caravans. Can be stored on the land without approval if genuinely just stored (not lived in, not connected to services). Living in one requires a Temporary Home permit or an approved caravan park.<br/><br/><u>Prefab / manufactured homes:</u><br/>Can be approved as Class 1a — but paperwork is often harder, not easier. Many are imported and may not meet Australian standards. Advise the customer to get written certification BEFORE purchase: RPEQ signoff, Form 15 for structural, Form 43 for waterproofing, QBCC insurance eligibility.<br/><br/><u>Shipping containers — depends on use:</u><br/>- Self-assessable: short-term storage (under 6 months) during renovations, not fixed to ground, not on a road reserve<br/>- Building approval required: any use as a building or structure, long-term storage, anchored with footings/slabs, altered with doors/windows<br/>- Amenity &amp; Aesthetics application: required BEFORE building approval in Urban/Rural Residential zones, or in Rural zone within 100m of a residential area, on lots 4,000m2 or less, or within 20m of a boundary<br/><br/>Always advise the customer to call BEFORE committing funds — a 10-minute conversation can save thousands.`
        },
        'BuildingForms': {
            parentId: 'BuildingInspec',
            nodeId: 'BuildingForms_ctx',
            label: `<b>📖 Forms 15, 16 &amp; 21 — What they are</b><br/><br/>Customers and builders reference these constantly. The short version:<br/><br/><b>Form 15 — Compliance Certificate for Building Design or Specification</b><br/>Signed by an RPEQ (registered engineer) to confirm that part of the design meets code. Commonly provided for footings, slabs, and steel framing. Required BEFORE building approval can be issued.<br/><br/><b>Form 16 — Inspection Certificate / Aspect Certificate</b><br/>Signed by the building certifier (or another competent person) after each stage of construction to confirm that stage passes. Four are collected over the build — footing, slab, frame, final.<br/><br/><b>Form 21 — Final Inspection Certificate</b><br/>Issued by the certifier once the final inspection passes and all conditions of approval are met. It's the document that says the building is complete and lawful.<br/><br/><u>Key point for customers:</u><br/>For new dwellings, the customer CANNOT move in until Form 21 is issued. Occupying a new dwelling before Form 21 is an offence under the Building Act 1975 and can affect their insurance.<br/><br/>Cleanaway also requires Form 21 before starting a kerbside collection service on a new property.`
        },
        'BuildingTempHome': {
            parentId: 'BuildingTempHome',
            nodeId: 'BuildingTempHome_ctx',
            label: `<b>📖 Temporary Accommodation During Build — Background</b><br/><br/>Allowed on rural land only, AFTER building approval for the permanent dwelling has been granted. Not automatic, and not allowed in urban residential areas.<br/><br/><u>Process:</u><br/>1. Building approval for the dwelling must be in place first<br/>2. Customer submits Application for Permission to Occupy Temporary Accommodation — minimum 30 days before intended start date<br/>3. Applicable fee is paid<br/>4. Supporting information required: drawings of proposed temporary home, wastewater disposal plan, drinking water supply (minimum 5,000L tank), landowner consent if not the owner, reason for needing temporary occupation<br/><br/><u>Term:</u><br/>Up to 18 months, extendable to match expected completion of the permanent dwelling. Lapses automatically when the dwelling is finished or the building approval lapses.<br/><br/><u>What counts as suitable:</u><br/>Caravan, mobile home, or a Class 10a shed with prior building approval. Tents and camper trailers are NOT considered suitable.<br/><br/>Set the expectation clearly: starting occupation before approval voids the temporary approval and creates enforcement issues.`
        },
        'BuildingRuralVsUrban': {
            parentId: 'BuildingNew',
            nodeId: 'BuildingRuralVsUrban_ctx',
            label: `<b>📖 Rural vs Urban — Zone-specific differences</b><br/><br/>Most of the process is the same regardless of zone (Form 15/16/21, four inspection stages, QBCC insurance, QLeave). Where the zone changes things:<br/><br/><u>RURAL ZONE — Common site constraints:</u><br/>- Setbacks: 60m from boundaries if dirt road frontage; 6m front + 60m side/rear if bitumen frontage<br/>- 50m from watercourse, 200m+ from various animal industries<br/>- 17m x 17m flood-free building pad on slope under 15%<br/>- BAL (Bushfire Attack Level) report often required<br/>- On-site water storage: 45,000L for 1-2 bedrooms, 67,500L for more<br/>- On-site sewerage (OSSF) — see Plumbing<br/>- Driveway with culvert if crossing a table drain<br/>- Longer rural lots may still be in Bushfire Hazard Overlay even if in township<br/><br/>Refer: Building a House in Rural Zone checklist.<br/><br/><u>URBAN ZONE (Residential / Rural Residential / Township):</u><br/>- Setbacks under 450m2 lots: QDC MP 1.1 (scaled smaller setbacks)<br/>- Setbacks 450m2 and over: QDC MP 1.2 — 6m front, 1.5m side &amp; rear (or siting concession)<br/>- Common overlays: Flood Hazard, Heritage/Character (some parts of Warwick and Stanthorpe), Airport Environs (near Warwick airport), easements (sewer/water/drainage commonly cross urban blocks)<br/>- Connected to town water and sewer in most cases — plumbing approval still required<br/>- Pool approval — see Building - Pool node<br/>- Secondary dwelling / granny flat — Planning Scheme currently under review, transfer to Duty Planner<br/><br/>Refer: Dual Occupancy (Duplex) Residential/Rural Residential checklist.<br/><br/><u>Common exemptions (QDC MP 1.2, lots 450m2+):</u><br/>- A1(c) Open carports within road setback if walls/screens/supports ≤15% of perimeter<br/>- A2(d) Class 10a buildings within side/rear clearances if height ≤4.5m, boundary length ≤9m, 1.5m from adjoining habitable windows`
        },
        'BuildingExtensions': {
            parentId: 'BuildingExtensions',
            nodeId: 'BuildingExtensions_ctx',
            label: `<b>📖 Extensions, Decks, Sheds, Carports — Rules of thumb</b><br/><br/>These are the most common small-project calls. Staff can use this as a quick-reference, but always confirm with the customer that a certifier or the building team will do the final check.<br/><br/><u>Extensions:</u><br/>Always need building approval. If the extension pushes into a setback, planning approval or a siting concession is also required.<br/><br/><u>Decks and patios attached to the dwelling:</u><br/>Need building approval. Decks higher than 1m above natural ground level need balustrades compliant with the Building Code.<br/><br/><u>Sheds over 10m2:</u><br/>Need building approval. Sheds under 10m2 are self-assessable but must still meet siting rules (boundary clearances, Queensland Development Code).<br/><br/><u>Carports:</u><br/>Need building approval. Open carports can sometimes sit within the front setback under QDC MP 1.2 A1(c) if supports/walls within the setback are under 15% of perimeter.<br/><br/><u>Retaining walls over 1m:</u><br/>Need building approval, with engineering design and Form 15.<br/><br/><u>Fences over 2m:</u><br/>Need building approval. Pool fencing has its own separate standard — see Building - Pool.<br/><br/>For anything close to a threshold, offer a callback from the building team rather than confirming over the phone.`
        },
        'BuildingPool': {
            parentId: 'BuildingPool',
            nodeId: 'BuildingPool_ctx',
            label: `<b>📖 Swimming Pools — Safety Register &amp; Certificate</b><br/><br/>Any pool capable of holding water deeper than 300mm needs BOTH building approval AND compliant pool fencing. This includes permanent pools, most portable/inflatable pools, spas, and portable wading pools at that depth.<br/><br/><u>Governing legislation:</u><br/>Building Act 1975 + Queensland Pool Safety Standard. Strictly enforced — no discretion on the fencing standard.<br/><br/><u>Three things every pool owner must know:</u><br/>1. <b>Queensland Pool Safety Register</b> — the pool must be registered<br/>2. <b>Pool Safety Certificate</b> — required before selling or leasing a property with a pool, and whenever the fence is replaced or modified<br/>3. Pool fence inspections are performed by a <b>licensed Pool Safety Inspector</b>, NOT Council. Council investigates unfenced or non-compliant pools as a safety matter.<br/><br/><u>Customer script — why the rules are strict:</u><br/><i>&quot;Child drownings remain the leading cause of accidental death for Queensland children under 5. Pool fencing is strictly enforced and there's no discretion on the standard — that's to keep kids alive.&quot;</i>`
        },
        'DrivewayApproval': {
            parentId: 'WorksDriveway',
            nodeId: 'DrivewayApproval_ctx',
            label: `<b>📖 Driveway / Works Within Road Reserve (WWRR)</b><br/><br/>Almost every new driveway — and any upgrade to an existing one — needs Works Within Road Reserve (WWRR) approval from Council Engineering. This is a high-frequency call and customers often don't know it's required.<br/><br/><u>Why it's required:</u><br/>Section 75(2) of the Local Government Act prohibits carrying out works on a road without Council's permission. The &quot;road reserve&quot; includes the sealed surface, kerb and channel, footpath, and verge — all Council-managed land even where the verge looks like part of the customer's front garden.<br/><br/><u>When WWRR is required:</u><br/>- New driveway access (part of virtually every new build)<br/>- Widening or relocating an existing driveway<br/>- Changing the surface type (e.g. gravel to concrete)<br/>- Adding a second access point, culvert, or kerb crossing<br/><br/>Simple resealing/maintenance of an existing surface does NOT normally trigger approval.<br/><br/><u>Gravel driveways need approval too</u> — the rule is about works on the road reserve, not the finish.<br/><br/><u>What's involved:</u><br/>1. Complete the Application for Minor Works — Works Within a Road Reserve form (Council Engineering)<br/>2. Attach a sketch plan showing proposed location, dimensions, and any culverts or drainage<br/>3. Pay the application fee (Fees &amp; Charges)<br/>4. Allow 20 working days for assessment<br/>5. On approval, Council issues an Approval Letter with conditions<br/><br/><u>TMR-controlled roads:</u><br/>If the property accesses the New England Highway, Cunningham Highway, or any other state-controlled road, driveway access is assessed by TMR, NOT Council. Refer customer to TMR on 13 20 80 BEFORE applying to Council.<br/><br/><u>Water or sewer infrastructure nearby:</u><br/>If the driveway will pass over, or within 2m of, any Council water main, sewer main, or manhole, a separate Works Near Water Supply or Sewerage Infrastructure approval is required under Section 192(2) of the Water Supply (Safety and Reliability) Act 2008 — second form, second assessment, second fee.<br/><br/>Telltale signs of underground infrastructure: meter boxes, sewer manholes, valve/hydrant surface boxes on or near the verge.<br/><br/>Engineering Department will identify applicable approvals during initial enquiry.<br/><br/><u>Script:</u><br/><i>&quot;Most licensed driveway contractors handle the WWRR as part of their quote — but ask them before signing rather than assuming. And call Council's Engineering Department for pre-application advice before any concrete is poured.&quot;</i>`
        },
        'PlumbOSSF': {
            parentId: 'PlumbOSSF',
            nodeId: 'PlumbOSSF_ctx',
            label: `<b>📖 On-Site Sewerage Facilities (OSSF) — Rural context</b><br/><br/>Most rural properties are not connected to Council's sewerage network, so they need an On-Site Sewerage Facility (OSSF) to treat wastewater on their own land. Two main options:<br/><br/><u>Septic tank with absorption trench:</u><br/>Traditional approach. Wastewater flows into the tank, solids settle, liquid effluent disperses through trenches into the soil. Works well on well-draining land with adequate room for trenches.<br/><br/><u>Aerated Wastewater Treatment System (AWTS):</u><br/>Higher-standard treatment using aeration. Treated water disperses over a smaller area, often via surface irrigation. More expensive to install, requires ongoing servicing, but often the only option on smaller or difficult sites.<br/><br/><u>Which is right depends on:</u><br/>Soil type, lot size, slope, separation from watercourses, bores and neighbours, and number of bedrooms. A soil test + consultation with a licensed plumber give a clear answer.<br/><br/><u>Customer-facing script:</u><br/><i>&quot;Don't commit to a house design before sorting the sewerage solution — it can influence your building footprint and siting, especially on smaller or sloped rural blocks.&quot;</i><br/><br/><u>Approvals &amp; inspections:</u><br/>OSSF installations require Council plumbing approval BEFORE work begins, and inspections during construction.`
        },
        'BuildingCosts': {
            parentId: 'BuildingCosts',
            nodeId: 'BuildingCosts_ctx',
            label: `<b>📖 Costs &amp; Fees Beyond Construction — Detail</b><br/><br/>Customers planning a build often underestimate the non-construction costs. Use this list to set realistic expectations.<br/><br/><u>Council fees:</u><br/>- <b>Building application fee</b> — see current Fees &amp; Charges<br/>- <b>Plumbing application fee</b> (separate from building)<br/>- <b>Planning application fee</b> — only if site needs MCU<br/>- <b>Pre-lodgement meeting</b> — $300 for 60 minutes (CREDITED back to application fee if lodged within 12 months — see Pre-Lodgement Meeting context panel)<br/>- <b>Driveway/WWRR application fee</b> — separate from building<br/><br/><u>Mandatory third-party costs:</u><br/>- <b>Private certifier fee</b> if using one (most builds do)<br/>- <b>RPEQ engineer</b> — for footing/slab design and Form 15, plus soil test<br/>- <b>Energy efficiency assessment</b> — required for ALL new dwellings<br/>- <b>BAL assessment</b> — only if in Bushfire Hazard Overlay (check Online Mapping)<br/>- <b>QBCC Home Warranty Insurance</b> — required for residential work over $3,300. Paid by builder, added to contract price<br/><br/><u>QLeave levy — important:</u><br/>Required for work over $150,000 (excl. GST). <b>MUST be paid before building approval is issued.</b> Customers often miss this and it delays approval.<br/><br/><u>Rural-specific infrastructure:</u><br/>- <b>Driveway construction</b> (often with culvert at table-drain crossing)<br/>- <b>Stormwater management</b><br/>- <b>On-site water storage</b> — minimum 45,000L for 1-2 bedrooms, 67,500L for more<br/>- <b>On-site sewerage</b> (septic or AWTS) — see Plumbing OSSF<br/>- <b>Power connection</b> — Ergon contracted, can be substantial cost on rural blocks<br/><br/><u>Ongoing post-build:</u><br/>- Rates (general + waste + water access charges)<br/>- Insurance (home + contents + landlord if applicable)<br/>- Pool maintenance + Pool Safety Certificate renewals if applicable`
        },
        'BuildingOverwhelmed': {
            parentId: 'BuildingOverwhelmed',
            nodeId: 'BuildingOverwhelmed_ctx',
            label: `<b>📖 First-time builder script — &quot;I'm overwhelmed&quot;</b><br/><br/>This call comes through a lot, especially for rural builds. The customer often hasn't bought the land yet, or has just bought and doesn't know where to start. Most don't know terminology and feel they should before ringing — they shouldn't, and saying so is genuinely reassuring.<br/><br/><u>Customer-facing script:</u><br/><i>&quot;Totally normal feeling. The shortest sensible first week looks like this. First, check the property on our Online Mapping tool to confirm the zone — that tells you what rules apply. Then work through the checklist that matches your situation — Rural Zone Checklist if rural, the urban building info sheets otherwise. Mark each item as ticked, crossed, or not applicable. If anything is crossed, give us a ring and ask to speak to the duty planner — general enquiries are free, that's literally what they're there for. From there you'll know whether you need planning approval first, or whether you can go straight to building approval. Don't worry about knowing the right words before you ring. We're happy to walk you through it.&quot;</i><br/><br/><u>What to direct the customer to:</u><br/>1. SDRC Online Mapping (zone + overlays) — sdrc.spatial.t1cloud.com<br/>2. Building a House in the Rural Zone Checklist (if rural)<br/>3. Building Info Sheets (if urban)<br/>4. Phone the duty planner on 1300 697 372 — general enquiries free<br/><br/><u>Then:</u><br/>5. Get 2-3 quotes from licensed builders<br/>6. Engage a private certifier (if going that route)<br/>7. Consider booking a Pre-Lodgement Meeting ($300) for tailored advice<br/><br/><u>Reassurance points worth saying:</u><br/>- The duty planner doesn't bill for general enquiries<br/>- Pre-lodgement fees are credited back if you lodge within 12 months<br/>- Council staff are happy to walk through the process — it's not a test<br/>- Most rural builds only need building approval (no planning approval)`
        },
        'PlanProcess': {
            parentId: 'PlanProcess',
            nodeId: 'PlanProcess_ctx',
            label: `<b>📖 Planning Application Process — 5 parts</b><br/><br/>The Queensland planning application process has five main parts. Not every application goes through every part — referral, information request, and public notification are conditional.<br/><br/><u>To be &quot;properly made&quot;, an application requires:</u><br/>[ ] Cover Letter<br/>[ ] DA Form 1 (standard Qld Government form)<br/>[ ] Plans — site plan, floor plans, elevations<br/>[ ] Assessment against the Planning Scheme<br/>[ ] Owner's Consent (signed)<br/>[ ] Application Fee<br/><br/><u>The five parts:</u><br/><br/><b>Part 1 — Application (10 business days)</b><br/>Council confirms the application is properly made. If yes: Action Notice + Confirmation Notice issued. If no (missing docs/consent/fee): clock doesn't start until issues resolved.<br/><br/><b>Part 2 — Referral (10 business days, IF APPLICABLE)</b><br/>Triggered by state-interest matters. Applicant submits directly to Referral Agency, not Council. Main agency: <b>State Assessment and Referral Agency (SARA)</b>. Common triggers:<br/>[ ] Land within 25m of a state-controlled road (New England Hwy, Cunningham Hwy)<br/>[ ] Clearing or proximity to regulated/protected vegetation<br/>[ ] Concurrence Environmentally Relevant Activity (ERA)<br/>[ ] Land on the Queensland Heritage Register<br/>Additional fees apply.<br/><br/><b>Part 3 — Information Request (10 business days)</b><br/>Council has 10 days from end of referral to issue any info request. <b>Applicant then has up to 3 months to respond.</b> This is often where applications stall — clock pauses while waiting on applicant.<br/><br/><b>Part 4 — Public Notification (15 business days, IMPACT ASSESSMENT ONLY)</b><br/>Applicant runs notification — Council provides signs, but sign placement on every frontage, newspaper notice, and written notice to adjoining owners are all the applicant's responsibility. If submissions are received: Council 10 days to consider, applicant 10 days to respond.<br/><br/><b>Part 5 — Decision (35 business days, less time elapsed)</b><br/>Most decided by Planning Department under delegated authority. Impact-assessable applications that received objecting submissions go to a full Council meeting. Applicant can request a deputation at a Committee Information Session before the meeting.<br/><br/><u>After the Decision Notice — 20 business days appeal period:</u><br/>- <b>Negotiated Decision</b> — applicant can request review/amendment of specific conditions<br/>- <b>Planning &amp; Environment Court appeal</b> — against conditions or refusal<br/>For impact applications, properly-made submitters get a further 20-day appeal window after the applicant's.<br/><br/><u>Approval currency periods (use must commence within):</u><br/>- <b>MCU</b> — 6 years<br/>- <b>RC (Reconfiguration of a Lot)</b> — 4 years<br/>- <b>BA + OPW</b> — 2 years<br/><br/><u>Critical script point — &quot;the clock pauses&quot;:</u><br/><i>&quot;If a decision feels slow, it's usually because the application is sitting with someone other than Council — a referral agency, an engineer, a town planner, or the applicant themselves waiting to respond to an information request. Statutory timeframes pause whenever we're waiting on someone else. The Application Tracking Tool shows where it is.&quot;</i>`
        },
        'PlanCodeImpact': {
            parentId: 'PlanCodeImpact',
            nodeId: 'PlanCodeImpact_ctx',
            label: `<b>📖 Code Assessment vs Impact Assessment</b><br/><br/>Once a proposal is assessable, the Planning Scheme determines one of two pathways. The applicant doesn't choose.<br/><br/><u>Code Assessment — the more straightforward pathway:</u><br/>- Assessed against specific codes in the Planning Scheme<br/>- <b>NO public notification required</b><br/>- Most decided by a Council planning officer under delegated authority<br/>- Faster, cheaper for the applicant<br/><br/><u>Impact Assessment — wider scrutiny:</u><br/>- For proposals that may have wider impacts on adjoining land uses or surrounding area<br/>- <b>Public notification required</b> — applicant erects signs on every frontage, advertises in newspaper, notifies adjoining owners<br/>- Members of the public can lodge submissions for or against<br/>- If objecting submissions received → application goes to a full Council meeting (not delegated)<br/>- Adds minimum 15 business days for public notification, plus signage and advertising costs<br/><br/><u>How to explain it to the customer:</u><br/><i>&quot;The Planning Scheme decides the pathway based on what you're proposing — neither you nor Council picks. Generally, uses that fit within the zone's intent get Code Assessment. Uses that sit at the edge of, or outside, the zone's intent get Impact Assessment. The duty planner can confirm which pathway your idea falls into before you spend money on an application.&quot;</i>`
        },
        'PlanPreLodgeFee': {
            parentId: 'PlanPreLodge',
            nodeId: 'PlanPreLodgeFee_ctx',
            label: `<b>📖 Pre-Lodgement Meeting — Fee &amp; Credit Detail</b><br/><br/><u>Cost: $300 for 60 minutes</u><br/>Capped at 1 hour, typically 30 minutes.<br/><br/><u>Booking process:</u><br/>1. Customer completes Pre-lodgement Request Form<br/>2. Email to mail@sdrc.qld.gov.au<br/>3. Council officer contacts customer with payment details<br/>4. Meeting scheduled once payment received<br/>5. <b>Allow up to 4 weeks</b> for the meeting to be scheduled — planning staff need time to review concept plans and prepare tailored advice<br/><br/><u>Format options:</u><br/>- Online via Microsoft Teams<br/>- In person at Warwick (standard slots: Wednesday 2pm or 3pm)<br/>- In person at Stanthorpe on request<br/>- Maximum 5 people in person; unlimited via Teams<br/><br/><u>What customer should bring:</u><br/>- Completed request form with specific questions listed<br/>- Property details (address, lot &amp; plan, current use, lot size)<br/>- Proposal description<br/>- Site plan (hand-drawn fine — boundaries, existing structures, distances clear)<br/><br/><u>After the meeting:</u><br/>Council emails meeting record within one week.<br/><br/><u>The $300 fee credit — important:</u><br/>If the customer lodges an application within <b>12 months</b> of the pre-lodgement meeting, under the same Planning Scheme, for the same parcel of land, and for the same type of development, the $300 fee is <b>CREDITED against the application fee</b>. Customer must include a copy of the pre-lodgement receipt with the application to claim the credit.<br/><br/>The credit applies once per site/proposal — subsequent pre-lodgement meetings on the same matter don't accumulate.<br/><br/><u>SARA runs its own parallel track:</u><br/>If the proposal has state-interest triggers (state-controlled road, vegetation, ERA, Heritage Register), SARA offers its own pre-lodgement meetings. Book directly with SARA — Toowoomba office on 07 4616 7307 or ToowoombaSARA@dsdilgp.qld.gov.au. For complex rural proposals, running BOTH a Council pre-lodgement AND a SARA pre-lodgement is often worthwhile.<br/><br/><u>Important caveat for the customer:</u><br/><i>&quot;Pre-lodgement advice is not a commitment to approve. The advice can't override Council's legislative responsibilities during formal assessment — including considering submissions from the public, referral agency responses, or matters that come to light during detailed assessment. A pre-lodgement meeting reduces surprises; it doesn't guarantee an outcome.&quot;</i>`
        },
        'PlanSubdivide': {
            parentId: 'PlanSubdivide',
            nodeId: 'PlanSubdivide_ctx',
            label: `<b>📖 Rural Subdivision — Minimum Lot Sizes &amp; the &quot;No Family Exemption&quot; Rule</b><br/><br/>Almost every call about subdividing rural land hits the same answer: in line with State Government Planning Policy, subdivision in the Rural Zone is GENERALLY NOT SUPPORTED. Minimum lot sizes are set high to preserve productive agricultural units and discourage rural-residential fragmentation.<br/><br/><u>Minimum lot sizes by rural precinct:</u><br/>(Each NEW lot created must meet the minimum for that precinct)<br/><br/>- Alluvial Plains — 200 hectares (~494 acres)<br/>- Basalt Quality Grazing — 200 hectares (~494 acres)<br/>- Basalt Uplands — 200 hectares (~494 acres)<br/>- <b>Granite Belt — 100 hectares (~247 acres)</b> — smallest, most common SDRC<br/>- Granite Hills — 500 hectares (~1,235 acres)<br/>- Granite Plains — 500 hectares (~1,235 acres)<br/>- Sandstone Rises Traprock Hills — 700 hectares (~1,730 acres)<br/>- Walloon Arable — 200 hectares (~494 acres)<br/><br/>To identify which precinct a property falls into: consult the Rural Zone Precincts Map (link below).<br/><br/><u>⚠️ &quot;Can I subdivide off a block for my kids/parents?&quot; — the most common call</u><br/><br/><b>There is NO family exemption.</b> Council does not grant exceptions for subdivisions intended for a family member — child building a house, parent downsizing, succession planning. All subdivision applications are assessed against the same minimum lot-size requirements regardless of who the new lot is intended for. The answer is consistent and the customer needs to hear it clearly.<br/><br/><u>Customer-facing script:</u><br/><i>&quot;I understand this is frustrating, but Council can't grant an exemption based on who's intending to live on the new block. The minimum lot sizes are set by State Government Planning Policy to protect rural productive land — and they apply equally to every applicant, including families wanting to subdivide for adult kids or succession. The good news is, if more housing on the existing land is the goal rather than separate titles, there might be options — second dwellings, dual occupancy, or multiple dwellings, depending on the zone. The duty planner can talk you through what's actually possible on your specific block.&quot;</i><br/><br/><u>If the lot DOES meet the precinct minimum:</u><br/>Typically assessed as Reconfiguration of a Lot (RC) against standard codes. Engage a town planner or surveyor for anything beyond straightforward.<br/><br/><u>If the lot does NOT meet the precinct minimum:</u><br/>Application is technically possible but Impact Assessable. Goes to a full Council meeting. Applicant bears cost of public notification. Onus on applicant to demonstrate why proposal warrants departure from scheme. <b>Rare — and rarely approved.</b> Pre-lodgement meeting essential before going down this path.<br/><br/><u>Related options worth mentioning:</u><br/>If the goal is more housing rather than separate titles, see PlanSecondDwelling node — different rules, different pathway.<br/><br/>📌 Rural Zone Precincts Map: sdrc.qld.gov.au/ArticleDocuments/804`
        },
        'PlanSecondDwelling': {
            parentId: 'PlanSecondDwelling',
            nodeId: 'PlanSecondDwelling_ctx',
            label: `<b>📖 Second Dwelling / Granny Flat — Zone-by-Zone Rules</b><br/><br/>A &quot;second dwelling&quot; is two dwellings on one property — attached or detached. In planning terms it's a <b>Dual Occupancy</b>. Whether planning approval is required depends almost entirely on zone, lot size, and road frontage. Always check zone on Online Mapping FIRST.<br/><br/>⚠️ <b>Important — the Planning Scheme rules for secondary dwellings are currently being reviewed and may change.</b> Always recommend the customer call the duty planner on 1300 697 372 before committing to a design or contract.<br/><br/><u>RURAL ZONE — most flexibility</u><br/>Can often proceed WITHOUT planning approval IF all three of these are true:<br/>[ ] Lot is at least 10 hectares in area<br/>[ ] Lot has frontage to a constructed road (or constructed road via registered easement)<br/>[ ] Proposal meets all acceptable outcomes (watercourse setbacks, flood-free pad, separation from animal/extractive industries, on-site water storage)<br/><br/>If all three apply: building + plumbing approvals only.<br/>If 10ha+ &amp; constructed frontage but can't meet every AO: <b>code-assessable MCU</b><br/>If smaller than 10ha: <b>impact-assessable MCU</b> — pre-lodgement meeting recommended<br/><br/><u>LOW DENSITY RESIDENTIAL ZONE</u><br/>Planning approval ALWAYS required.<br/>- Lot 800m² or more → <b>code assessable</b><br/>- Lot smaller than 800m² → <b>impact assessable</b><br/><br/><u>MEDIUM DENSITY RESIDENTIAL ZONE</u><br/>Planning approval ALWAYS required.<br/><b>Code assessable regardless of lot size.</b><br/><br/><u>RURAL RESIDENTIAL ZONE</u><br/>- Lot 8,000m² or more AND constructed road frontage → <b>code assessable</b><br/>- Lot smaller than 8,000m² OR no constructed road frontage → <b>impact assessable</b><br/><br/><u>THREE OR MORE DWELLINGS — different category</u><br/>Three or more dwellings = Multiple Dwellings (flats, units, townhouses, triplexes). Different rules:<br/>- Only permitted in Low and Medium Density Residential zones<br/>- Density caps: ~1 dwelling per 500m² (Low Density), ~1 per 250m² (Medium Density), more generous for small one-bedroom units<br/>- Low Density: always impact-assessable<br/>- Medium Density: code-assessable<br/>Rare question — refer to duty planner.<br/><br/><u>Customer reminders regardless of zone:</u><br/>- Overlays can change the picture — Flood, Bushfire, Biodiversity, Heritage, Morgan Park / Airport environs<br/>- Building, plumbing, drainage approvals always required separately<br/>- Common conditions: road works, off-street parking, stormwater, landscaping, buffering, infrastructure charges<br/>- Secondary dwellings usually CANNOT be sold separately — remain on same title<br/><br/>📌 Dual Occupancy checklist: sdrc.qld.gov.au/ArticleDocuments/527`
        },
        'PlanHomeBiz': {
            parentId: 'PlanHomeBiz',
            nodeId: 'PlanHomeBiz_ctx',
            label: `<b>📖 Home-Based Business — Full Framework</b><br/><br/>Plenty of small businesses operate legitimately from home in the Southern Downs without ANY planning approval — online retailers, consultants, tutors, bookkeepers, tradespeople whose work happens at other sites, family day care, B&amp;Bs. The Planning Scheme has a dedicated <b>Home Based Business</b> framework (section 9.3.4) that defines what fits within self-assessable limits and what tips into needing an MCU.<br/><br/><u>NO planning approval required IF ALL of these apply:</u><br/><br/><b>Size of operation:</b><br/>- Up to 40m² in Residential zones<br/>- Up to 100m² in Rural zone<br/><br/><b>Staff:</b><br/>- Residential zones: only residents of the dwelling<br/>- Rural zone: residents PLUS one off-site employee<br/><br/><b>Clients on site:</b><br/>- Maximum 6 at any one time<br/>- Between 8am and 7pm Monday-Saturday (excl. public holidays)<br/>- B&amp;B and family day care have their own rules — see below<br/><br/><b>Signage:</b><br/>- One sign maximum<br/>- 0.3m² maximum size<br/>- Showing only name, occupation, contact details of the occupier<br/><br/><b>No retail sales from premises:</b><br/>- Mail order and online sales OK<br/>- No walk-in retail, goods on display, or outside storage<br/><br/><b>Vehicles:</b><br/>- One commercial vehicle (two in Rural zone)<br/>- No vehicle over 4.5 tonnes in residential zones<br/>- No fuelling, repairing, or maintenance (beyond cleaning) of vehicles on site<br/><br/><b>Excluded outright (regardless of scale):</b><br/>- Motor vehicle workshops<br/>- Medium-impact industries<br/>- High-impact industries<br/><br/><u>B&amp;B and Family Day Care — specific rules:</u><br/>- Family day care: capped at 6 children under school age at any one time<br/>- B&amp;B in Low/Medium Density Residential: must be under same roof as dwelling<br/>- B&amp;B in Rural / Rural Residential: can be a separate building, must be at least 60m from side and rear boundaries on rural land<br/>- 40m fire buffer around B&amp;B building applies in rural areas<br/><br/><u>If the business steps outside ANY of those limits — MCU required:</u><br/><br/>This is more common than people assume. An MCU doesn't mean refusal — it's the pathway that lets Council assess against Performance Outcomes rather than strict Acceptable Outcomes. Plenty of home-based operations that don't fit the default ratios get approved with conditions on hours, parking, signage, neighbour notification, etc.<br/><br/><u>Customer-facing script:</u><br/><i>&quot;If you think your plan might need an MCU, give the duty planner a call before you commit to anything. General enquiries are free, and a 10-minute conversation can shape your proposal in a way that makes approval much more straightforward.&quot;</i><br/><br/><u>OTHER permits that may be required (separate from planning):</u><br/>- <b>Food businesses</b> (baked goods, meals, catering, market stalls, mobile coffee, home kitchens) — separate Food Business Licence under Food Act 2006<br/>- <b>Personal Appearance Services</b> (body piercing, tattooing, beauty therapy, skin penetration) — licence required under Public Health Act 2003, regardless of setting<br/><br/><u>Outside Council's remit but worth mentioning:</u><br/>ABN (Australian Business Register), ATO tax implications, Working with Children check (Blue Card), liquor licence (OLGR), WorkCover if employing staff. Business Queensland (business.qld.gov.au) has good checklists.`
        },
        'AnimalKeeping': {
            parentId: 'AnimalKeeping',
            nodeId: 'AnimalKeeping_ctx',
            label: `<b>📖 Keeping of Animals — Permits &amp; Limits</b><br/><br/>The number and type of animals you can keep depends on the zone, lot size, and animal type. The <b>Keeping of Animals Fact Sheet</b> is the definitive source — covers dogs, cats, horses, cattle, poultry, bees, pigs, exotic animals, with maximum permitted numbers without a permit for each.<br/><br/><u>General principle:</u><br/>Rural-zoned land allows a broader range and higher numbers (horses, cattle, sheep, goats, alpacas, poultry typical). Residential land is much more restricted — a few hens, limited dogs/cats, no large livestock.<br/><br/><u>If the customer wants more than the standard number:</u><br/>A <b>Keeping of Animals permit</b> is required. Process:<br/>1. Advise customer to call Local Laws BEFORE applying — discuss whether a permit is likely to be approved for their block (saves wasted application fee)<br/>2. If feasible: customer submits application + fee<br/>3. Local Laws assesses against zone, lot size, animal welfare, neighbour amenity, waste management<br/><br/><u>Restricted or prohibited regardless of lot size:</u><br/>[ ] Restricted breed dogs (American Pit Bull Terrier, Dogo Argentino, Fila Brasileiro, Japanese Tosa, Perro de Presa Canario)<br/>[ ] Some reptiles<br/>[ ] All feral animals (rabbits — see Pest Animals - Rabbits, foxes, etc.)<br/><br/>⚠️ Customer should check the fact sheet BEFORE buying, breeding, or relocating animals to a new property — buying first and asking later often ends with the customer being required to rehome animals they're already attached to.<br/><br/>📌 <a href='https://www.sdrc.qld.gov.au/ArticleDocuments/702/Keeping_Animals_Fact_Sheet.pdf.aspx' target='_blank'>Keeping of Animals Fact Sheet</a>`
        },
        'BuildingAdmin': {
            parentId: 'BuildingAdmin',
            nodeId: 'BuildingAdmin_ctx',
            label: `<b>📖 Building plan copyright — Background</b><br/><br/>Building plans are a creative work protected by copyright. The copyright belongs to whoever created the plans (architect, draftsperson, or design team) — not the property owner, even if the owner paid for construction.<br/><br/>Copyright lasts for the creator's lifetime plus 70 years. Council cannot release plans without written consent from the copyright owner, or until the copyright has expired.<br/><br/><u>Common scenarios:</u><br/>- Plans by a known draftsperson or firm: contact that person or their estate for consent<br/>- Plans drawn by Len Rigg: standing permission has been granted by his estate — council may release these<br/>- Plans with unknown or long-deceased creator: copyright may have expired — seek guidance from the building team before releasing<br/><br/>The property owner's right to maintain their property does not transfer copyright ownership.`
        },
        'WasteBin': {
            parentId: 'WasteBin',
            nodeId: 'WasteBin_ctx',
            label: `<b>📖 Cleanaway contract — Background</b><br/><br/>Cleanaway is contracted by SDRC to provide domestic waste and recycling collection. Council does not directly manage collection operations — Cleanaway is the point of contact for all standard service issues.<br/><br/>All bin service requests go through the Cleanaway portal. Do not lodge a Merit for standard bin issues (missed pickup, damaged bin, missing bin) — these must go through Cleanaway directly.<br/><br/><u>Complaints about recurring issues or driver conduct:</u><br/>Lodge a Merit (Keyword: Complaint) — these are actioned by the Council's Waste Team, not Cleanaway.<br/><br/><u>If a Cleanaway request goes unresolved:</u><br/>Lodge a Merit (Keyword: Complaint) so council can follow up with Cleanaway on the customer's behalf.`
        },
        'WasteFacilities': {
            parentId: 'WasteFacilities',
            nodeId: 'WasteFacilities_ctx',
            label: `<b>📖 Facility charges, materials &amp; opening hours</b><br/><br/><u>Generally accepted at no charge:</u><br/>Green/garden waste (residents), clean recyclables (paper, cardboard, glass, plastics 1 and 2), and e-waste at designated sites.<br/><br/><u>Fees typically apply to:</u><br/>General household waste, mattresses, tyres, large whitegoods. Fees set annually in the Fees &amp; Charges schedule.<br/><br/><u>Asbestos — special requirements:</u><br/>Asbestos must be double-bagged in 200-micron plastic, clearly labelled, and the customer must pre-book with council before attending the facility. Facility staff cannot accept asbestos that has not been pre-booked. Direct customers to the Asbestos Disposal Guidelines for full requirements.<br/><br/><u>Landfill levy:</u><br/>A State Government charge included in the cost of general waste disposal. Council must pass this on and has no discretion to waive it.<br/><br/><b>━━━ OPENING HOURS ━━━</b><br/><br/><u>Weighbridge facilities — open 7 days, 8am–5pm</u> (closed Christmas Day and Good Friday):<br/>- <b>Warwick:</b> 190 Old Stanthorpe Rd, Warwick 4370 — Reuse Shop: Wed 12–4pm, Sat 8am–4pm<br/>- <b>Stanthorpe:</b> 94 Rifle Range Rd, Stanthorpe 4380 — Reuse Shop: Thu 12–4pm, Sat 8am–4pm<br/><br/><u>Transfer stations — 9am–4pm on days shown:</u><br/>- Allora, 14 Burges Road — Fri to Mon<br/>- Broadwater, 814 Texas Road — Fri to Sun<br/>- Killarney, 152 Killarney-Barlows Gate Road — Fri to Mon<br/>- Leyburn, 466 Donovan Road — Fri to Sun<br/>- Maryvale, 53 Whites Road — Sat to Mon<br/>- Northern Granite Belt, 76 Taggart Road, The Summit — Sat to Mon<br/>- Pratten, 12 Springate Lane — Sat to Mon<br/>- Wallangarra, 13 Hines Road — Fri to Sun<br/>- Yangan, 345 Strudwicks Road — Fri to Sun<br/><br/>Some transfer stations cannot accept large volumes, large items like furniture, or commercial waste — check the flyer for what each site takes.`
        },
        'WasteRecycleMate': {
            parentId: 'WasteRecycleMate',
            nodeId: 'WasteRecycleMate_ctx',
            label: `<b>📖 Recycle Mate &amp; Batteries — Staff script</b><br/><br/><u>Recycle Mate — the fastest answer to &quot;where does this go?&quot;</u><br/>Recycle Mate is a free app (and web tool) that tells customers exactly how and where to dispose of almost anything. They snap a photo or type the item name, and it returns locations specific to the Southern Downs — Council waste facilities, supermarkets running soft plastic or battery collection, pharmacies taking unused medication, and charity shops accepting reusable items.<br/><br/>Lead with Recycle Mate before going into facility details — it usually resolves the call in 30 seconds.<br/><br/><u>Batteries — never in a kerbside bin</u><br/>Batteries can short-circuit, catch fire, and damage trucks or facilities. This is one of the fastest-growing causes of waste fires in Australia.<br/><br/>Council has partnered with Ecobatt — dedicated battery collection containers are at ALL supervised Council waste facilities. Best practice: tape the terminals (especially lithium) and hand the battery to a facility attendant rather than dropping it in.<br/><br/>Accepted: household alkaline (AA, AAA, C, D, PP3, button cells), rechargeable, lithium, and power tool batteries under 5kg.<br/><br/><u>Bin colour guide for customers:</u><br/>- <b>Red or Green lid (general waste, weekly):</b> kitchen and food waste, general household rubbish, plastic bags and cling wrap, nappies, polystyrene foam<br/>- <b>Yellow lid (recycling, fortnightly):</b> paper and cardboard, steel and aluminium cans, rigid plastic bottles and containers (lids removed), glass bottles and jars (lids removed)`
        },
        'WasteDumping': {
            parentId: 'WasteDumping',
            nodeId: 'WasteDumping_ctx',
            label: `<b>📖 Illegal Dumping — Threshold &amp; process</b><br/><br/><u>What counts as illegal dumping:</u><br/>Any unlawful deposit of 200 litres or more of waste (roughly the volume of a wheelie bin) in bushland, roadsides, waterways, outside charity bins, on the kerbside outside of collection time, or at the wrong location within a waste facility.<br/><br/><u>Information to capture from the customer:</u><br/>[ ] Time, date, place, and description of the waste<br/>[ ] Vehicle registration, make, model, colour, or distinguishing features<br/>[ ] Description of the person (location in vehicle, clothing, gender)<br/>[ ] Photos if the customer has them — location pinned on map if reporting via online form<br/><br/><u>Safety script for the customer:</u><br/><i>&quot;Please don't approach the person depositing the waste. Take photos only if safe to do so.&quot;</i><br/><br/><u>Penalties:</u><br/>Fines are significant — individuals and corporations can face substantial on-the-spot penalties, with much higher amounts available if the matter goes to court. Refer customers to the Illegal Dumping fact sheet for current figures.<br/><br/><u>Useful context for customers who are dumping out of frustration:</u><br/>Almost all domestic waste can be disposed of at Council facilities for free. The cost of doing it properly is much less than the fine for dumping — worth mentioning if a caller expresses frustration with facility fees.`
        },
        'WaterMeterSides': {
            parentId: 'WaterMeterLeak',
            nodeId: 'WaterMeterSides_ctx',
            label: `<b>📖 Which side of the meter? — Plain-English script</b><br/><br/>This is one of the most common water calls and customers don't know the distinction. Clean script for phones:<br/><br/><i>&quot;Council's side is the meter itself and the pipe between the water main and the meter. If the leak is there, report it to us and we'll action it.<br/><br/>Your side is the pipe running from the meter into the property — that's the property owner's responsibility. If the leak is there, consider shutting off the water at the meter while you arrange a licensed plumber.<br/><br/>Not sure which side? Stay on the line and I'll help you work it out.&quot;</i><br/><br/><u>How to work it out on the call:</u><br/>1. Search Property ID in Aqualas (customer-facing name: My SDRC Water portal — same system)<br/>2. Check if water usage shows periods of 0L/hour:<br/>[ ] Usage returns to 0L/hour AND visible leak present → Council side. Lodge Merit (keyword: leak), report to north/south maintenance supervisor<br/>[ ] Usage consistently above 0L/hour → customer side. Advise customer to shut off water at meter if practical and call a licensed plumber<br/>[ ] Both possible (non-zero usage AND visible council-side leak) → do both: lodge Merit for council side AND advise customer to shut off meter and call a plumber<br/><br/><u>Finding the inside leak — tips to share:</u><br/>- Running toilet is the most common cause. Add a few drops of food colouring to the cistern and wait 10 minutes without flushing; if colour appears in the bowl, the cistern is leaking<br/>- Check all taps, showerheads, and washing machine connections<br/>- Outside: look for unusually green or boggy ground (underground pipe failure)<br/>- Check garden timers and hose guns`
        }
    };

    'rates': `    PropDecision -->|Rates| RatesDecision{"Balance/Payment,<br/>Agreement, Admin,<br/>Property Sale, Info,<br/>or Privacy?"}
    RatesDecision -->|Property Sale| RatesSale["<b>💰 RATES - Property Sale</b><br/><br/><u>Settlement:</u><br/>During a typical settlement, solicitors adjust the sale price so the rates for the current period are shared between vendor and purchaser in proportion to their respective periods of ownership. Neither party needs to contact council — the transfer of name on the property is handled automatically by the Titles Office.<br/><br/><u>Bulk Assessed Properties:</u><br/>In rural zones it is common for a single Property ID to cover multiple lots. In Intramaps, the selected lot boundary shows in red and related bulk-assessed lots show in orange — these share a PID and appear on the same rates notice.<br/><br/>When land is bulk assessed, the Titles Office values it as a single large lot, resulting in a lower valuation and lower rates. When individual lots within a bulk-assessed property are sold, each sold lot receives a new PID and is revalued independently — typically resulting in a higher rates charge.<br/><br/>Because settlement contracts generally do not allow time for revaluation and a supplementary rates notice to be issued, the standard process is for the vendor to ensure all rates owing on the property are paid in full prior to settlement.<br/><br/><span data-context='RatesSale' style='display:inline-block;margin-top:10px;padding:3px 10px;background:#eff6ff;border:1px solid #93c5fd;border-radius:4px;color:#1d4ed8;'>📖 Valuations explained</span>"]
    RatesDecision -->|Balance / Payment| RatesBalPay["<b>💰 RATES - Balance &amp; Payment</b><br/><br/><u>Rates Balance:</u><br/>Look up property in TechOne - navigate to the rates tab and provide the Total Payable balance.<br/><br/>If customer queries the balance:<br/>[ ] Check the correct Property ID was pasted into TechOne<br/>[ ] Total Payable Balance reflects the total if the customer pays today<br/>[ ] Before the due date, the Total Payable balance includes the discount<br/>[ ] If customer has made payment via BPAY/direct debit/bank transfer it may take time to show - check most recent rates notice and transaction history<br/>[ ] Offer to provide a copy of the most recent rates notice<br/><br/><u>Solicitor Exception:</u><br/>If a solicitor calls to confirm the current balance for a property sale, check whether a rates search application has been submitted. If yes, provide the balance to the solicitor.<br/><br/><u>Rates Payment:</u><br/>1. Use Property ID in TechOne - verbally confirm Total Payable Balance<br/>2. Process payment in BPOINT<br/><br/>📌 Eli: Rates Process"]
    RatesDecision -->|Payment Agreement| RatesPayAgree["<b>💰 RATES - Payment Agreement</b><br/><br/>1. Look up property on TechOne<br/>2. Verify caller identity<br/>3. Check rate recovery code:<br/>[ ] General/FirstREM/FinalREM: proceed<br/>[ ] ARR: refer to R&amp;R: 1300 556 863<br/>[ ] Other: arrange callback from revenue department<br/>4. Generate spreadsheet - run XLOne report in TechOne<br/>5. Follow spreadsheet process with customer<br/>6. Save spreadsheet to pre-approved agreements folder: PID - SURNAME<br/>7. Email copy of spreadsheet to revenue (if customer rejected both payment options, inform revenue in email)<br/>8. Customer to await confirmation email from revenue<br/><br/>📌 Eli: Payment Agreement<br/><br/><span data-context='RatesPayAgree' style='display:inline-block;margin-top:10px;padding:3px 10px;background:#eff6ff;border:1px solid #93c5fd;border-radius:4px;color:#1d4ed8;'>📖 Payment agreement policy</span>"]
    RatesDecision -->|Admin| RatesAdmin["<b>💰 RATES - Admin</b><br/><br/><u>Copy of Rates Notice:</u><br/>1. Verify identity<br/>2. Search Property ID in Payreq<br/>3. Email most recent rates notice PDF to customer<br/>4. If customer requires rates notice from previous FY: look up fee in Fees &amp; Charges<br/><br/><u>Direct Debit:</u><br/>New: Email Form - Direct Debit Request<br/>Alter: Email Form - DD Alteration/Cancellation<br/><br/><u>Pensioner Rates Subsidy:</u><br/>1. Confirm address on pension card matches customer address in TechOne<br/>2. Email Form - Pension Subsidy Application - request customer attach a copy of pension card<br/>3. Customer may attend front counter to fill out form in person - we will photocopy their card<br/><br/><u>Sign up for Email Rates Notices:</u><br/>1. Refer customer to second page of rates notice - Go Paperless QR code<br/>2. Or search Go Paperless on SDRC website - create a Payreq account<br/>3. Customer must provide the name on the rates notice and their BPAY Reference number<br/>4. Customer must ensure email address used to sign up for Payreq matches the one on file in TechOne<br/><br/>📌 Eli: Rates<br/>📌 Eli: Direct Debit<br/>📌 Eli: SDRC - Go Paperless"]
    RatesDecision -->|Understanding Rates| RatesExplain["<b>💰 RATES - Understanding Your Rates</b><br/><br/>- <b>Water Access Charge:</b> Levied on all properties with the ability to connect to the water main, even if not currently connected<br/>- <b>Domestic &amp; Recycling Waste Collection:</b> Charge for the bin service<br/>- <b>Waste Management Charge:</b> Applied to all properties in the Southern Downs - covers council waste management facilities and rehabilitation of closed landfill sites<br/><br/>📌 <a href='https://www.sdrc.qld.gov.au/payments-services/property-rates-charges/rates-charges-explained' target='_blank'>Rates Charges Explained - SDRC</a>"]

    RatesDecision -->|Privacy / Info| RatesPrivacy["<b>💰 RATES - Privacy &amp; Information Requests</b><br/><br/>Information that can be provided to non-property owners:<br/>- Information available on the public Online Mapping tool<br/>- Postal addresses of property owners<br/>- Information available on the public Application Tracking Tool<br/><br/>📌 <a href='https://sdrc-web.t1cloud.com/T1PRDefault/WebApps/eProperty/P1/eTrack/eTrackApplicationSearch.aspx?r=P1.WEBGUEST&amp;f=$P1.ETR.SEARCH.ENQ' target='_blank'>Application Tracking Tool</a><br/><br/>When in doubt, ask a supervisor."]
