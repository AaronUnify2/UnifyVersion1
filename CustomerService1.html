    'building': `    PropDecision -->|Building| BuildingDecision{"Zone check, New, Existing,<br/>Inspection, Plans, Extensions,<br/>Pool, Temp Home, Pay Fees,<br/>Costs, First-time builder,<br/>or Privacy?"}
    BuildingDecision -->|New| BuildingNew["<b>🏗️ BUILDING - New</b><br/><br/>1. Check the zone on Intramaps BEFORE answering — Rural, Rural Residential, Residential, or Township. Rural and urban zones have different setback rules.<br/>2. Provide Factsheets: Building Info Sheets - SDRC<br/>3. Arrange callback: Merit Building - Follow Process, provide customer with Merit #<br/><br/><u>Customer-facing script — Building vs Planning Approval:</u><br/><i>&quot;Planning approval asks: can this use happen on this land? It's about where the building goes and how it's sited. Building approval asks: is the structure itself safe and compliant? It's about how the building is constructed. Many houses only need building approval — if your site ticks every box on the Rural Zone Checklist (or falls inside the Planning Scheme's acceptable outcomes for residential), no planning approval is required.&quot;</i><br/><br/><u>Building Approval Not Required?</u><br/>Some structures may not require building approval under Schedule 2 of the Building Regulation 2021 (Qld). Common examples include structures under 3m high that are not fences, retaining walls, or swimming pools; sun hoods under 2m2; tents under 100m2; and certain rural agricultural structures set back 200m from roads and boundaries.<br/><br/>Do not confirm over the phone that building approval is not required — project-specific details matter and advice given without full context could be incorrect. Provide general information, refer the customer to the Schedule 2 link below, and offer to arrange a callback with the building team if they feel it is necessary.<br/><br/><u>Tiny homes, prefab &amp; shipping containers:</u><br/>These get asked about constantly and the most common misconception is that &quot;tiny&quot; or &quot;prefab&quot; means the normal rules don't apply. They do. See the context panel for how to explain this to the customer.<br/><br/>📌 <a href='https://www.sdrc.qld.gov.au/doing-business/planning-development/building/building-info-sheets' target='_blank'>SDRC Website - Building info sheets</a><br/>📌 <a href='https://www.planning.qld.gov.au/planning-framework/development-assessment/development-assessment-process/forms-and-templates' target='_blank'>DA Form 2 - With examples</a><br/>📌 <a href='https://www.legislation.qld.gov.au/view/html/inforce/current/sl-2021-0126#sch.2' target='_blank'>Building Regulation 2021 - Schedule 2 (Qld)</a><br/><br/><span data-context='BuildingNew' style='display:inline-block;margin-top:10px;padding:3px 10px;background:#eff6ff;border:1px solid #93c5fd;border-radius:4px;color:#1d4ed8;'>📖 What needs approval?</span> <span data-context='BuildingRuralVsUrban' style='display:inline-block;margin-top:10px;padding:3px 10px;background:#eff6ff;border:1px solid #93c5fd;border-radius:4px;color:#1d4ed8;'>📖 Rural vs Urban</span> <span data-context='BuildingVsPlanning' style='display:inline-block;margin-top:10px;padding:3px 10px;background:#eff6ff;border:1px solid #93c5fd;border-radius:4px;color:#1d4ed8;'>📖 Building vs Planning</span> <span data-context='BuildingTinyContainer' style='display:inline-block;margin-top:10px;padding:3px 10px;background:#eff6ff;border:1px solid #93c5fd;border-radius:4px;color:#1d4ed8;'>📖 Tiny Homes &amp; Containers</span>"]
    BuildingDecision -->|Existing| BuildingExist["<b>🏗️ BUILDING - Existing</b><br/><br/>1. Check if customer is using a private certifier - if so, refer them back to their certifier<br/>2. If no private certifier: look up BLD number in ECM/TechOne to find most recent correspondence<br/>Transfer to relevant person:<br/>- Question regarding application: Built Environment Technical Officer<br/>- Question regarding certification or inspection: Building Certifier<br/>3. If unavailable - arrange callback:<br/>Merit Building - Follow Process, provide customer with Merit #<br/><br/>📌 Eli: Building Applications"]
    BuildingDecision -->|Inspection| BuildingInspec["<b>🏗️ BUILDING - Inspection</b><br/><br/>For a Class 1a dwelling, the certifier must inspect and sign off at four stages. Each stage must pass before the next commences.<br/><br/><u>The four stages — what each one checks:</u><br/>1. <b>Footing/Foundation</b> — before concrete is poured. Confirms excavation depth, reinforcement, and placement match the engineer's design.<br/>2. <b>Slab</b> — after slab prep, before the pour. Confirms reinforcement, plumbing penetrations, and setout.<br/>3. <b>Frame</b> — once framing (walls, roof structure) is up and before sheeting goes on. Confirms tie-down, bracing, and member sizes. This is often where problems are caught.<br/>4. <b>Final</b> — at completion. Everything: stairs, balustrades, smoke alarms, waterproofing, energy efficiency, safety, and all conditions of approval.<br/><br/><u>Booking the inspection:</u><br/>Follow email template to notify Building Certifier. Plumbing has its own separate inspection schedule — see Plumbing - Inspection node.<br/><br/><u>Failed inspection:</u><br/>Certifier issues a written notice of what needs to be rectified. Work must be corrected and re-inspected before construction continues. If a licensed builder refuses to rectify defective work, the QBCC can issue a formal Direction to Rectify.<br/><br/>📌 Eli: Building Inspections<br/><br/><span data-context='BuildingForms' style='display:inline-block;margin-top:10px;padding:3px 10px;background:#eff6ff;border:1px solid #93c5fd;border-radius:4px;color:#1d4ed8;'>📖 Forms 15, 16 &amp; 21</span>"]
    BuildingDecision -->|Plans| BuildingPlans["<b>🏗️ BUILDING - Copy of Building Plans</b><br/><br/>Only the property owner may request a copy of their house plans. Plans are only released with permission from the copyright owner.<br/><br/>1. Check if council has plans on file — note: some properties pre-date the modern building approval process and plans may not exist<br/>2. Obtain written permission from the copyright owner — note: the Estate of Len Rigg has provided standing permission for plans produced during his career<br/>3. Customer to pay applicable fee — refer to Fees &amp; Charges: Copy of Development Approval Documents<br/>4. Contact building team to release documents<br/><br/><span data-context='BuildingAdmin' style='display:inline-block;margin-top:10px;padding:3px 10px;background:#eff6ff;border:1px solid #93c5fd;border-radius:4px;color:#1d4ed8;'>📖 Plan copyright</span>"]
    BuildingDecision -->|Extensions/Sheds/Decks| BuildingExtensions["<b>🏗️ BUILDING - Extensions, Decks, Sheds &amp; Carports</b><br/><br/>The most common call in Building is &quot;do I need approval for this small project?&quot; Use the rules of thumb below, then confirm specifics with the building team or the customer's certifier.<br/><br/><u>Rules of thumb:</u><br/>- <b>Extensions:</b> always need building approval. Into a setback → also planning approval or siting concession.<br/>- <b>Decks/patios attached to dwelling:</b> building approval. Over 1m above natural ground level → balustrades compliant with Building Code.<br/>- <b>Sheds over 10m2:</b> building approval. Under 10m2 self-assessable but must meet siting rules.<br/>- <b>Carports:</b> building approval. Open carports may sit within front setback under QDC MP 1.2 A1(c) (supports/walls in setback ≤15% of perimeter).<br/>- <b>Retaining walls over 1m:</b> building approval + engineering design + Form 15.<br/>- <b>Fences over 2m:</b> building approval. Pool fencing has its own standard — see Pool node.<br/><br/><u>Staff action:</u><br/>1. Provide relevant factsheet (Building Info Sheets)<br/>2. Do NOT confirm over the phone that approval is not required — project specifics matter<br/>3. If the customer wants a firm answer, arrange callback from the building team<br/><br/>📌 <a href='https://www.sdrc.qld.gov.au/doing-business/planning-development/building/building-info-sheets' target='_blank'>Building Info Sheets</a><br/><br/><span data-context='BuildingExtensions' style='display:inline-block;margin-top:10px;padding:3px 10px;background:#eff6ff;border:1px solid #93c5fd;border-radius:4px;color:#1d4ed8;'>📖 Small projects — quick reference</span>"]
    BuildingDecision -->|Swimming Pool| BuildingPool["<b>🏗️ BUILDING - Swimming Pool</b><br/><br/>Any pool capable of holding water deeper than 300mm needs both building approval AND compliant pool fencing. Includes permanent pools, most portable/inflatable pools, spas, and portable wading pools at that depth.<br/><br/><u>Customer-facing script — three things every pool owner must know:</u><br/><i>&quot;Your pool must be registered on the Queensland Pool Safety Register. You need a Pool Safety Certificate before selling or leasing the property, and whenever the fence is replaced or modified. Pool fence inspections are done by a licensed Pool Safety Inspector — not Council.&quot;</i><br/><br/><u>Staff action:</u><br/>1. For new pool approval: Arrange callback from building team (Merit Building — Follow Process)<br/>2. For non-compliant/unfenced pool report (public safety): Lodge Merit (Keyword: Pool) — Building Compliance team to investigate<br/>3. For Pool Safety Certificate: refer customer to a licensed Pool Safety Inspector, not Council<br/><br/>📌 <a href='https://www.sdrc.qld.gov.au/living-here/environment-water-waste/pollution-neighbourhood-nuisances/building-compliance/swimming-pools/swimming-pools' target='_blank'>Swimming Pools — SDRC</a><br/><br/><span data-context='BuildingPool' style='display:inline-block;margin-top:10px;padding:3px 10px;background:#eff6ff;border:1px solid #93c5fd;border-radius:4px;color:#1d4ed8;'>📖 Pool Safety Register &amp; Certificate</span>"]
    BuildingDecision -->|Temp Home During Build| BuildingTempHome["<b>🏗️ BUILDING - Temporary Accommodation During Build</b><br/><br/>Customers often ask whether they can live on the land in a caravan or shed while they build. On rural land — yes, but only AFTER building approval for the permanent dwelling has been granted, and not in urban residential areas.<br/><br/><u>Customer-facing script:</u><br/><i>&quot;You can apply to live on the land temporarily once you have building approval for your house. It's not automatic — you need to complete an Application for Permission to Occupy Temporary Accommodation and lodge it with Council at least 30 days before you plan to move on site. Approval can run for up to 18 months and can be extended to match completion of the permanent dwelling.&quot;</i><br/><br/><u>Action:</u><br/>1. Confirm building approval is in place for the dwelling (check ECM/TechOne)<br/>2. Email Form: Application for Permission to Occupy Temporary Accommodation<br/>3. Advise the customer of supporting info required:<br/>[ ] Drawings of the proposed temporary home<br/>[ ] Wastewater disposal plan<br/>[ ] Drinking water supply (minimum 5,000L tank required)<br/>[ ] Landowner consent if not the owner<br/>[ ] Reason for needing temporary occupation<br/>4. Advise the fee applies<br/><br/><u>What's acceptable:</u><br/>Caravan, mobile home, or a Class 10a shed with prior building approval. Tents and camper trailers are NOT considered suitable.<br/><br/>📌 <a href='https://www.sdrc.qld.gov.au/living-here/environment-water-waste/pollution-neighbourhood-nuisances/building-compliance/temporary-homes' target='_blank'>SDRC - Temporary Homes</a><br/><br/><span data-context='BuildingTempHome' style='display:inline-block;margin-top:10px;padding:3px 10px;background:#eff6ff;border:1px solid #93c5fd;border-radius:4px;color:#1d4ed8;'>📖 Temp Home background</span>"]

    BuildingDecision -->|Pay Application Fees| BuildingPayFees["<b>🏗️ BUILDING - Pay Application Fees</b><br/><br/>1. Confirm the fee with the customer before processing payment — search the Application Number in the Regulatory/Applications tab in TechOne<br/>2. Process payment in BPOINT<br/><br/>Note: Application fees are not refunded if the application is denied."]
    BuildingDecision -->|Costs &amp; Fees| BuildingCosts["<b>🏗️ BUILDING - Costs &amp; Fees Beyond Construction</b><br/><br/>Customers planning a build often underestimate non-construction costs. Set realistic expectations early.<br/><br/><u>Customer-facing script:</u><br/><i>&quot;Beyond the construction itself there are several other costs to budget for. The big ones people miss are QBCC Home Warranty Insurance for any work over $3,300 — that's added to your contract — and the QLeave levy for any project over $150,000, which has to be paid before we can issue your building approval. Then there's your private certifier if you're using one, your engineer for footings and slab, energy efficiency assessment which is required for every new dwelling, and a BAL assessment if you're in a bushfire zone. Want me to walk through the rest?&quot;</i><br/><br/><u>Council fees (refer to current Fees &amp; Charges):</u><br/>[ ] Building application fee<br/>[ ] Plumbing application fee (separate)<br/>[ ] Planning application fee (only if MCU needed)<br/>[ ] Pre-lodgement meeting — $300 (CREDITED back to application fee if lodged within 12 months)<br/>[ ] Driveway/WWRR application fee (separate)<br/><br/><u>Mandatory third-party costs:</u><br/>[ ] Private certifier (most builds)<br/>[ ] RPEQ engineer for footing/slab + Form 15, plus soil test<br/>[ ] Energy efficiency assessment (ALL new dwellings)<br/>[ ] BAL assessment (only if in Bushfire Hazard Overlay)<br/>[ ] QBCC Home Warranty Insurance — required for residential work over $3,300, paid by builder, added to contract<br/><br/>⚠️ <b>QLeave levy — important:</b><br/>Required for work over $150,000 (excl. GST). MUST be paid BEFORE building approval is issued. Customers often miss this and it delays approval.<br/><br/><u>Rural-specific infrastructure:</u><br/>[ ] Driveway construction (often with culvert at table-drain crossing)<br/>[ ] Stormwater management<br/>[ ] On-site water storage — minimum 45,000L (1-2 bedroom), 67,500L (3+ bedroom)<br/>[ ] On-site sewerage (septic or AWTS)<br/>[ ] Power connection (Ergon — can be substantial on rural blocks)<br/><br/>📌 <a href='https://www.sdrc.qld.gov.au/payments---services/fees-charges' target='_blank'>SDRC Fees &amp; Charges</a><br/><br/><span data-context='BuildingCosts' style='display:inline-block;margin-top:10px;padding:3px 10px;background:#eff6ff;border:1px solid #93c5fd;border-radius:4px;color:#1d4ed8;'>📖 Full cost breakdown</span>"]
    BuildingDecision -->|First-time builder| BuildingOverwhelmed["<b>🏗️ BUILDING - First-time builder / Where do I start?</b><br/><br/>This call comes through often, especially for rural builds. The customer often hasn't bought the land yet, or has just bought and doesn't know where to begin. Most don't know terminology — and saying it's normal is genuinely reassuring.<br/><br/><u>Customer-facing script — the &quot;first week&quot; plan:</u><br/><i>&quot;Totally normal feeling. The shortest sensible first week looks like this: First, check the property on our Online Mapping tool — that confirms your zone and tells you what rules apply. Then work through the relevant checklist — the Rural Zone Checklist if rural, the Building Info Sheets if urban — marking each item as ticked, crossed, or not applicable. If anything is crossed, ring us and ask for the duty planner. General enquiries are free, that's literally what they're there for. From there, you'll know whether you need planning approval first or whether you can go straight to building approval. Don't worry about knowing the right words before you ring.&quot;</i><br/><br/><u>Direct customer to (in this order):</u><br/>1. SDRC Online Mapping tool — confirm zone + check overlays<br/>2. The relevant checklist:<br/>[ ] Rural: Building a House in the Rural Zone Checklist<br/>[ ] Urban: Building Info Sheets<br/>3. Mark each item ✓ / ✗ / NA<br/>4. Phone duty planner on 1300 697 372 if any ✗<br/>5. Get 2-3 quotes from licensed builders<br/>6. Engage a private certifier (if going that route)<br/>7. Consider a Pre-Lodgement Meeting ($300, credited back if lodged within 12 months)<br/><br/><u>Reassurance points worth saying out loud:</u><br/>- General enquiries to the duty planner are FREE<br/>- Pre-lodgement fees are credited back if you lodge within 12 months<br/>- Council staff are happy to walk through the process — it's not a test<br/>- Most rural builds only need building approval (no planning approval) if the Rural Zone Checklist all ticks<br/><br/>📌 <a href='https://sdrc.spatial.t1cloud.com/spatial/intramaps/?configId=15145eaf-c419-4c91-aa46-f0b9d5637836&amp;project=Online%20Mapping' target='_blank'>SDRC Online Mapping</a><br/>📌 <a href='https://www.sdrc.qld.gov.au/ArticleDocuments/527/Building%20a%20House%20in%20Rural%20Zone.pdf.aspx' target='_blank'>Building a House in the Rural Zone Checklist</a><br/><br/><span data-context='BuildingOverwhelmed' style='display:inline-block;margin-top:10px;padding:3px 10px;background:#eff6ff;border:1px solid #93c5fd;border-radius:4px;color:#1d4ed8;'>📖 Full first-time builder script</span>"]
    BuildingDecision -->|Privacy / Info| BuildingPrivacy["<b>🏗️ BUILDING - Privacy &amp; Information Requests</b><br/><br/>Information that can be provided to non-property owners:<br/>- Information available on the public Online Mapping tool<br/>- Information available on the public Application Tracking Tool<br/><br/>📌 <a href='https://sdrc-web.t1cloud.com/T1PRDefault/WebApps/eProperty/P1/eTrack/eTrackApplicationSearch.aspx?r=P1.WEBGUEST&amp;f=$P1.ETR.SEARCH.ENQ' target='_blank'>Application Tracking Tool</a><br/><br/>When in doubt, ask a supervisor."]

    'buildingguide': `    PropDecision -->|Building Approval General Process| BGuide1["<b>📚 BUILDING GUIDE - Before You Begin</b><br/><br/>If you have a construction project in mind, a good starting point is to obtain quotes from multiple licensed contractors. A contractor can advise on materials and methods, provide a rough schedule, and give a cost estimate.<br/><br/>Licensed contractors are bound by state legislation to complete work to a standard that will pass inspection. Getting a quote can help identify the most practical approach, which will assist with preparing your building application.<br/><br/>Note: No work of any description is to be commenced until your building application is approved."]
    BGuide1 --> BGuide2["<b>📚 BUILDING GUIDE - Application Requirements</b><br/><br/>Your application will require a <b>DA Form 2</b>, plus supporting documents. Offer to email the customer the relevant fact sheet.<br/><br/>Typical supporting documents:<br/>[ ] Site Plan, Floor Plan, Elevations and Structural Details<br/>[ ] Footing/Slab Design and Form 15 (signed by RPEQ registered engineer)<br/>[ ] Energy Efficiency Report (Class 1a dwellings)<br/>[ ] Soil Test Report (Class 1a dwellings)<br/>[ ] QBCC Insurance Certificate — mandatory for residential construction valued over $3,300<br/>OR QBCC Owner Builder Permit — if building yourself, value $11,000 or more (once per 6-year period)<br/>[ ] QLeave Payment Receipt — if value of building work over $150,000 excl. GST. Must be registered before construction begins. Council cannot issue Building Approval until this receipt is sighted.<br/><br/>Note: Additional information may be required for bushfire attack level, flood zone, termite protection, lighting, water tanks etc.<br/><br/>📌 <a href='https://www.sdrc.qld.gov.au/doing-business/planning-development/building/building-info-sheets' target='_blank'>SDRC Website - Building info sheets</a><br/>📌 <a href='https://www.planning.qld.gov.au/planning-framework/development-assessment/development-assessment-process/forms-and-templates' target='_blank'>DA Form 2 - With examples</a>"]
    BGuide2 --> BGuide3["<b>📚 BUILDING GUIDE - Private Building Certifier</b><br/><br/>It is possible to engage a private building certifier to prepare and lodge the application on your behalf. Most customers undertaking larger projects choose this option.<br/><br/>The certifier will assist with documentation and can subcontract additional professionals as required (architects, engineers, surveyors, soil tests, energy efficiency reports, bushfire attack level reports etc.).<br/><br/>Post-lodgement, the certifier will liaise with council on your behalf and conduct on-site inspections throughout construction."]
    BGuide3 --> BGuide4["<b>📚 BUILDING GUIDE - Construction Inspections</b><br/><br/>Inspections are required at each of the following stages:<br/>1. Footing/Foundation<br/>2. Slab<br/>3. Frame<br/>4. Final<br/><br/>Each stage must be signed off before the next commences.<br/><br/>Once the final inspection is passed, a Form 21 Final Certificate is issued. In the case of new dwellings, the property may not be inhabited until this certificate has been issued."]
    BGuide4 --> BGuide5["<b>📚 BUILDING GUIDE - Failed Inspection / Defective Work</b><br/><br/>The QBCC can issue a formal Direction to Rectify, requiring the builder to fix the work at their own cost within a set timeframe. Non-compliance may result in significant fines and licence suspension.<br/><br/>If a builder refuses or fails to rectify defective work, the QBCC can assist the homeowner through other means, including the Queensland Home Warranty Scheme.<br/><br/>SDRC customer service staff can assist in directing specific building queries to the council building team."]

    PlumbingDecision -->|Do I need approval?| PlumbNew["<b>🔧 PLUMBING - Do I need approval?</b><br/><br/>1. Unregulated work - No approval required: Homeowners may fix minor plumbing maintenance issues without requiring a licensed tradesperson or council approval.<br/>📌 <a href='https://www.sdrc.qld.gov.au/doing-business/plumbing---drainage/plumbing-approvals/unregulated-work' target='_blank'>SDRC - Unregulated Work</a><br/><br/>2. Minor work - No approval required: Minor work does not require council approval but must be performed by an appropriately licensed person.<br/>📌 <a href='https://www.sdrc.qld.gov.au/doing-business/plumbing-drainage/plumbing-approvals/minor-work-plumbing' target='_blank'>SDRC - Minor Work</a><br/><br/>3. Notifiable work - No approval required: Your licensed plumber will notify the council on your behalf.<br/><br/>4. Compliance assessable work - Yes, approval and inspections required: Typically a plumber or building certifier will submit the necessary applications.<br/><br/>5. If necessary arrange callback from plumbing team:<br/>[ ] Merit Plumbing - Follow Process<br/>[ ] Provide customer with Merit #<br/><br/>📌 Eli: Plumbing FAQ"]
    PlumbingDecision -->|Existing| PlumbExist["<b>🔧 PLUMBING - Existing</b><br/><br/><u>Existing Application:</u><br/>1. Transfer to relevant person<br/>2. If unavailable - arrange callback:<br/>[ ] Merit Plumbing - Follow Process<br/>[ ] Provide customer with Merit #<br/><br/>📌 Eli: Plumbing Applications"]
    PlumbingDecision -->|Water/Sewer| PlumbConnect["<b>🔧 PLUMBING - New Connections</b><br/><br/><u>Connect to Sewer/Water:</u><br/>1. Check Intramaps Water &amp; Sewerage Module<br/>2. Use Intramaps to determine standard or non-standard connection - all four must = YES for standard:<br/>[ ] Within 100m of 100mm main: use Water module + measurement tool in Intramaps<br/>[ ] In declared Catchment Area: use overlay in Waste Water module<br/>[ ] Has Vacant Access Charges: check water charge in property cadastre menu<br/>[ ] Single lot/duplex/secondary/subdivision<br/><br/>3. If Standard: Email Form - Application for Water or Sewer Services<br/>4. If Non-Standard: Email Form - Private Works (Water &amp; Sewerage Forms - SDRC)<br/><br/>📌 Eli: New Water/Sewer Connection"]
    PlumbingDecision -->|On-Site Sewerage / OSSF| PlumbOSSF["<b>🔧 PLUMBING - On-Site Sewerage (OSSF)</b><br/><br/>Most rural properties are not connected to Council's sewerage network and need an On-Site Sewerage Facility (OSSF). Staff often field &quot;do I need a septic or a treatment plant?&quot; calls from rural customers planning a new build.<br/><br/><u>Customer-facing script — the two main options:</u><br/><i>&quot;There are two common options. A septic tank with an absorption trench is the traditional approach — wastewater flows into the tank, solids settle, and liquid effluent disperses through trenches into the soil. An Aerated Wastewater Treatment System, or AWTS, treats wastewater to a higher standard using aeration, which means treated water can be dispersed over a smaller area. It costs more to install and needs ongoing servicing, but it's often the only option on smaller or difficult sites.&quot;</i><br/><br/><u>Which is right depends on:</u><br/>Soil type, lot size, slope, separation from watercourses/bores/neighbours, and number of bedrooms. A soil test + consultation with a licensed plumber give a clear answer.<br/><br/><u>Important customer advice:</u><br/>Don't commit to a house design before sorting the sewerage solution — it can influence building footprint and siting.<br/><br/><u>Staff action:</u><br/>1. Provide factsheet via the OSSF page<br/>2. For application/approval questions: arrange callback from plumbing team (Merit Plumbing - Follow Process)<br/>3. OSSF installations require Council plumbing approval BEFORE work begins, and inspections during construction<br/><br/>📌 <a href='https://www.sdrc.qld.gov.au/doing-business/planning-development/plumbing/on-site-sewerage-facilities-ossf' target='_blank'>On-Site Sewerage Facilities — SDRC</a><br/><br/><span data-context='PlumbOSSF' style='display:inline-block;margin-top:10px;padding:3px 10px;background:#eff6ff;border:1px solid #93c5fd;border-radius:4px;color:#1d4ed8;'>📖 Septic vs AWTS</span>"]
    PlumbingDecision -->|Inspection| PlumbInspec["<b>🔧 PLUMBING - Inspection</b><br/><br/><u>Booking Plumbing Inspections:</u><br/>1. Obtain from customer:<br/>- PD number<br/>- Structure type<br/>- Location<br/>- Preferred start time<br/>- Inspection type:<br/>[ ] Under slab (sub-drain)<br/>[ ] Stack/elevated pipework to be covered<br/>[ ] Drainage (sanitary house drain)<br/>[ ] Water services (rough in)<br/>[ ] Final plumbing inspection<br/><br/>Also obtain:<br/>- Plumbing assessment/approval number<br/>- Responsible person name and contact details<br/><br/>2. Check plumbing inspector calendar for availability - allow 30 min between inspections for travel<br/>3. Add inspection to calendar<br/>4. Notify inspectors by email<br/><br/>📌 Eli: Plumbing Inspections"]

    'planning': `    PropDecision -->|Planning| PlanningDecision{"<b>Planning</b>"}
    PlanningDecision -->|What is Town Planning?| PlanIntro["<b>📐 PLANNING - What is Town Planning?</b><br/><br/>Town planning manages how land is used to create functional, sustainable communities — guiding growth, reducing congestion, protecting the environment, and ensuring access to services.<br/><br/><u>Customer-facing script — the 3 pathways:</u><br/><i>&quot;Under Queensland's planning system, any development falls into one of three categories. Prohibited — not permitted under any circumstances, set by State Government and rare. Accepted — can proceed without planning approval; a straightforward dwelling that meets every acceptable outcome in the Planning Scheme is the common example. Assessable — needs planning approval before it can proceed, which is most things that don't fit neatly inside the acceptable outcomes.&quot;</i><br/><br/><u>Your role:</u><br/>You will regularly speak to customers about planning matters. You can help by:<br/>1. Providing factsheets and working through SDRC's publicly available checklists<br/>2. Explaining terminology and application requirements<br/>3. Referring customers to private town planners, surveyors, or other experts<br/>4. Transferring technical queries about specific properties to the planning team<br/><br/><u>The Planning Scheme is shaped by THREE parties — useful to know:</u><br/>- <b>Community feedback</b> — public consultation during scheme reviews<br/>- <b>State regulators</b> — must align with State Planning Policy and regional plans<br/>- <b>Council</b> — manages day-to-day, assesses applications, leads scheme reviews<br/><br/>That tri-party structure is why planning decisions sometimes feel more constrained than Council would prefer — neither Council nor residents alone set the rules.<br/><br/>⚠️ <b>The Planning Scheme is changing.</b> A new draft Southern Downs Planning Scheme is in development with consultation open at haveyoursay.sdrc.qld.gov.au. Decisions on current applications continue under the existing scheme until the new one is formally adopted.<br/><br/>Common customer questions:<br/>Do I need planning approval? / Can I subdivide? / What is the difference between planning and building approval? / What is the status of my application?"]
    PlanningDecision -->|Can I build?| PlanCanI["<b>📐 PLANNING - Can I build here?</b><br/><br/><u>Action</u><br/>1. Use the relevant checklist to determine if planning approval is required<br/>2. Share the Online Mapping link so the customer can check overlays for their property<br/>3. Work through the checklist with the customer if time permits<br/>4. For anything beyond the checklist level: contact the Duty Planner<br/><br/>📋 <a href='https://www.sdrc.qld.gov.au/ArticleDocuments/527/Building%20a%20House%20in%20Rural%20Zone.pdf.aspx' target='_blank'>House - Rural Zone checklist</a><br/>📋 <a href='https://www.sdrc.qld.gov.au/ArticleDocuments/527/Dual%20occupancy%20(second%20dwelling)%20in%20the%20Rural%20Zone.pdf.aspx' target='_blank'>Dual occupancy - Rural Zone checklist</a><br/>📋 <a href='https://www.sdrc.qld.gov.au/ArticleDocuments/527/Dual%20occupancy%20(Duplex)%20in%20the%20Residential%20and%20Rural%20residential%20Zones.pdf.aspx' target='_blank'>Dual Occupancy - Residential/Rural Residential checklist</a><br/><br/>📌 <a href='https://sdrc.spatial.t1cloud.com/spatial/intramaps/?configId=15145eaf-c419-4c91-aa46-f0b9d5637836&amp;project=Online%20Mapping' target='_blank'>Online Mapping</a> | 📌 <a href='https://www.sdrc.qld.gov.au/doing-business/planning---development/strategic-planning' target='_blank'>Southern Downs Planning Scheme</a><br/><br/><span data-context='PlanCanI' style='display:inline-block;margin-top:10px;padding:3px 10px;background:#eff6ff;border:1px solid #93c5fd;border-radius:4px;color:#1d4ed8;'>📖 Background &amp; Context</span>"]
    PlanningDecision -->|Application Process| PlanProcess["<b>📐 PLANNING - Application Process Walkthrough</b><br/><br/>Customers often ask &quot;how long will this take?&quot; or &quot;why is this taking so long?&quot;. The 5-part Queensland process explains both. Use this to walk a customer through what's happening.<br/><br/><u>Customer-facing script — the most useful thing to say:</u><br/><i>&quot;The Queensland planning process pauses the clock whenever we're waiting on someone other than Council — a referral agency, an engineer, a town planner, or you to respond to an information request. So if a decision feels slow, it's almost always sitting with someone other than us. The Application Tracking Tool shows where it is right now.&quot;</i><br/><br/><u>The 5 parts (high level):</u><br/>1. <b>Application</b> — 10 bd to confirm properly made<br/>2. <b>Referral</b> — 10 bd, IF state-interest triggers (SARA)<br/>3. <b>Information Request</b> — 10 bd to issue, applicant has up to 3 months to respond<br/>4. <b>Public Notification</b> — 15 bd, IMPACT ASSESSMENT only<br/>5. <b>Decision</b> — 35 bd, less time already elapsed<br/><br/>After Decision Notice: 20-bd appeal period (Negotiated Decision OR Planning &amp; Environment Court).<br/><br/><u>Approval currency periods (use must commence within):</u><br/>- MCU — 6 years<br/>- RC — 4 years<br/>- BA + OPW — 2 years<br/><br/>For a detailed walkthrough use the Planning Guide on the flowchart filter, or the context panel.<br/><br/>📌 <a href='https://sdrc-web.t1cloud.com/T1PRDefault/WebApps/eProperty/P1/eTrack/eTrackApplicationSearch.aspx?r=P1.WEBGUEST&amp;f=$P1.ETR.SEARCH.ENQ' target='_blank'>Application Tracking Tool</a><br/><br/><span data-context='PlanProcess' style='display:inline-block;margin-top:10px;padding:3px 10px;background:#eff6ff;border:1px solid #93c5fd;border-radius:4px;color:#1d4ed8;'>📖 Full process detail</span> <span data-context='PlanCodeImpact' style='display:inline-block;margin-top:10px;padding:3px 10px;background:#eff6ff;border:1px solid #93c5fd;border-radius:4px;color:#1d4ed8;'>📖 Code vs Impact</span>"]
    PlanningDecision -->|Subdivide rural land| PlanSubdivide["<b>📐 PLANNING - Subdivide Rural Land</b><br/><br/>One of the most common — and most disappointing — planning calls. The answer is usually &quot;no&quot;.<br/><br/><u>Customer-facing script — the headline:</u><br/><i>&quot;In line with State Government Planning Policy, subdivision in the Rural Zone is generally not supported. The minimum lot sizes are set high to preserve productive agricultural units. If your land is below the minimum for its precinct, subdivision is unlikely to be approved — though not impossible if an Impact Assessment application can demonstrate sufficient merit.&quot;</i><br/><br/><u>⚠️ THE most common follow-up — &quot;but it's for my kids/parents&quot;:</u><br/>There is NO family exemption. Council does not grant exceptions for subdivisions intended for family members — child building a house, parent downsizing, succession planning. All subdivision applications are assessed against the same minimum lot-size requirements regardless of who the new lot is intended for.<br/><br/><u>Customer-facing script for this:</u><br/><i>&quot;I understand this is frustrating, but Council can't grant an exemption based on who's intending to live on the new block. The minimum lot sizes apply equally to every applicant. The good news is, if more housing on the existing land is the goal rather than separate titles, there might be options — second dwellings, dual occupancy, or multiple dwellings depending on the zone. The duty planner can talk you through what's actually possible on your specific block.&quot;</i><br/><br/><u>Minimum lot sizes by precinct (each NEW lot must meet this):</u><br/>- Granite Belt: 100 ha (~247 acres) — smallest, most common<br/>- Alluvial Plains / Basalt Quality Grazing / Basalt Uplands / Walloon Arable: 200 ha (~494 acres)<br/>- Granite Hills / Granite Plains: 500 ha (~1,235 acres)<br/>- Sandstone Rises Traprock Hills: 700 ha (~1,730 acres)<br/><br/><u>Staff action:</u><br/>1. Look up property on Online Mapping (planning module shows zone)<br/>2. Refer to Rural Zone Precincts Map to identify the specific precinct<br/>3. If lot meets minimum: standard RC application — refer to duty planner<br/>4. If lot doesn't meet minimum: Impact Assessment, very rarely approved — strongly recommend Pre-Lodgement Meeting before spending money<br/><br/>📌 Rural Zone Precincts Map: sdrc.qld.gov.au/ArticleDocuments/804<br/><br/><span data-context='PlanSubdivide' style='display:inline-block;margin-top:10px;padding:3px 10px;background:#eff6ff;border:1px solid #93c5fd;border-radius:4px;color:#1d4ed8;'>📖 Full precinct table &amp; family rule</span>"]
    PlanningDecision -->|Second dwelling / Granny flat| PlanSecondDwelling["<b>📐 PLANNING - Second Dwelling / Granny Flat / Dual Occupancy</b><br/><br/>Always check zone on Online Mapping FIRST — the rules are completely different per zone.<br/><br/>⚠️ <b>Important — the Planning Scheme rules for secondary dwellings are currently being reviewed and may change.</b> Always recommend customer call duty planner on 1300 697 372 before committing to a design or contract.<br/><br/><u>RURAL ZONE — most flexibility:</u><br/>Can often proceed WITHOUT planning approval IF all 3 are true:<br/>[ ] Lot is at least 10 hectares<br/>[ ] Lot has frontage to a constructed road (or via registered easement)<br/>[ ] Proposal meets ALL acceptable outcomes (watercourse setbacks, flood-free pad, separation from animal/extractive industries, on-site water storage)<br/><br/>If 10ha+ but can't meet all AOs: code-assessable MCU<br/>If smaller than 10ha: impact-assessable MCU (rare, pre-lodgement essential)<br/><br/><u>LOW DENSITY RESIDENTIAL — always needs planning approval:</u><br/>- 800m² or more → code assessable<br/>- Smaller than 800m² → impact assessable<br/><br/><u>MEDIUM DENSITY RESIDENTIAL — always needs planning approval:</u><br/>Code assessable regardless of lot size.<br/><br/><u>RURAL RESIDENTIAL:</u><br/>- 8,000m²+ AND constructed road frontage → code assessable<br/>- Smaller OR no constructed frontage → impact assessable<br/><br/><u>3+ dwellings = MULTIPLE DWELLINGS (different category):</u><br/>Only Low/Medium Density Residential. Density caps apply (~1 per 500m² Low, ~1 per 250m² Medium). Refer to duty planner.<br/><br/><u>Reminders regardless of zone:</u><br/>[ ] Overlays change the picture (Flood, Bushfire, Heritage, etc.)<br/>[ ] Building, plumbing, drainage approvals always required separately<br/>[ ] Secondary dwellings usually CANNOT be sold separately (same title)<br/><br/>📌 <a href='https://www.sdrc.qld.gov.au/ArticleDocuments/527/Dual%20occupancy%20(Duplex)%20in%20the%20Residential%20and%20Rural%20residential%20Zones.pdf.aspx' target='_blank'>Dual Occupancy checklist</a><br/><br/><span data-context='PlanSecondDwelling' style='display:inline-block;margin-top:10px;padding:3px 10px;background:#eff6ff;border:1px solid #93c5fd;border-radius:4px;color:#1d4ed8;'>📖 Full zone-by-zone rules</span>"]
    PlanningDecision -->|Business from home| PlanHomeBiz["<b>📐 PLANNING - Business from Home</b><br/><br/>Plenty of small businesses operate legitimately from home WITHOUT any planning approval — online retailers, consultants, tutors, bookkeepers, tradies whose work happens at other sites, family day care, B&amp;Bs. The Planning Scheme has a dedicated <b>Home Based Business</b> framework (section 9.3.4) that defines what fits within self-assessable limits.<br/><br/><u>Customer-facing script:</u><br/><i>&quot;If your business fits within the Home Based Business framework — basically size, staff, client numbers, signage, vehicles all within set limits — you don't need planning approval. If anything steps outside those limits, it becomes a Material Change of Use, which sounds dramatic but just means we assess your specific proposal. Plenty of home businesses that don't fit the default ratios get approved with sensible conditions. Have a chat with the duty planner before committing — general enquiries are free.&quot;</i><br/><br/><u>NO planning approval if ALL of these apply:</u><br/>[ ] Size: ≤40m² in Residential, ≤100m² in Rural<br/>[ ] Staff: only residents (Residential) or residents + 1 off-site employee (Rural)<br/>[ ] Clients on site: max 6 at a time, 8am-7pm Mon-Sat (excl. public holidays)<br/>[ ] Signage: 1 sign max, ≤0.3m², name/occupation/contact only<br/>[ ] No retail sales from premises (online/mail order OK)<br/>[ ] Vehicles: 1 commercial (2 in Rural), no vehicle &gt;4.5t in Residential<br/>[ ] NOT a motor vehicle workshop or medium/high-impact industry<br/><br/><u>B&amp;B and Family Day Care — specific rules:</u><br/>Family day care: max 6 children under school age. B&amp;B in Low/Medium Density Residential: under same roof as dwelling. B&amp;B in Rural/Rural Residential: can be separate building, 60m from side/rear boundaries on rural land + 40m fire buffer.<br/><br/><u>If outside any limit → MCU required:</u><br/>Don't oversell as a refusal. Many step-outside-the-limits operations get approved with conditions on hours, parking, signage, neighbour notification.<br/><br/><u>Other permits potentially needed:</u><br/>- <b>Food Business Licence</b> (Food Act 2006) for food preparation/sales — separate from planning<br/>- <b>Personal Appearance Services licence</b> (Public Health Act 2003) for body piercing, tattooing, beauty therapy — required regardless of setting<br/><br/><u>Outside Council remit but worth mentioning:</u><br/>ABN (ABR), tax (ATO), Working with Children check (Blue Card), liquor licence (OLGR), WorkCover. Business Queensland (business.qld.gov.au) has good checklists.<br/><br/><span data-context='PlanHomeBiz' style='display:inline-block;margin-top:10px;padding:3px 10px;background:#eff6ff;border:1px solid #93c5fd;border-radius:4px;color:#1d4ed8;'>📖 Full Home Biz framework</span>"]
    PlanningDecision -->|Existing| PlanExist["<b>📐 PLANNING - Existing Application</b><br/><br/><u>Action</u><br/>1. Take details of the query<br/>2. Transfer to the planner working on the application<br/>3. If unavailable: lodge Merit Planning - Follow Process, provide Merit # and advise callback within max 5 business days<br/><br/>📌 Eli: Planning Applications<br/><br/><span data-context='PlanExist' style='display:inline-block;margin-top:10px;padding:3px 10px;background:#eff6ff;border:1px solid #93c5fd;border-radius:4px;color:#1d4ed8;'>📖 Why we always transfer</span>"]
    PlanningDecision -->|Payment| PlanPayment["<b>📐 PLANNING - Pay Application Fees</b><br/><br/>1. Confirm the fee with the customer before processing payment — search the Application Number in ECM<br/>2. Process payment in BPOINT<br/>3. Email receipt to the planning team<br/><br/>Note: Application fees are not refunded if the application is denied.<br/><br/>📌 Eli: Planning Applications"]
    PlanningDecision -->|Pre-Lodgement/Enquiry| PlanPreLodge["<b>📐 PLANNING - Pre-Lodgement Meeting &amp; Enquiries</b><br/><br/><u>The simple test for which one the customer needs:</u><br/><i>&quot;If you're still exploring options — what could be done with a block, is this even possible — that's a general enquiry, and it's free. If you've already got a concrete plan and want to refine it before lodging an application, that's a pre-lodgement meeting.&quot;</i><br/><br/><u>General Enquiry — FREE:</u><br/>1. Take details of the query<br/>2. Transfer to the planning team OR arrange callback via Merit if unavailable<br/>3. Best for: opportunities/constraints of a site, location of a proposed building, what land could potentially be used for, terminology<br/><br/><u>Pre-Lodgement Meeting — $300:</u><br/>1. Process $300 payment (RC192) via BPOINT<br/>2. Customer completes Pre-lodgement Request Form, emails to mail@sdrc.qld.gov.au<br/>3. Planning team schedules — <b>allow up to 4 weeks</b><br/>4. Format options: Microsoft Teams, Warwick (Wed 2pm/3pm standard), Stanthorpe on request<br/>5. Typically 30 min, capped at 1 hour<br/><br/><u>⚠️ Important — the $300 fee is CREDITED back to the application:</u><br/>If customer lodges an application within <b>12 months</b> for the same parcel + same type of development under the same Planning Scheme, the $300 is credited against the application fee. Customer must include the pre-lodgement receipt with their application to claim. Worth mentioning during booking.<br/><br/><u>SARA — separate parallel track for state-interest matters:</u><br/>If the proposal involves state-controlled road, regulated vegetation, ERA, or Heritage Register listing, SARA offers its own pre-lodgement meetings. Refer customer to SARA Toowoomba on 07 4616 7307 or ToowoombaSARA@dsdilgp.qld.gov.au. For complex rural proposals, doing BOTH a Council pre-lodgement and a SARA pre-lodgement is often worthwhile.<br/><br/>📌 Eli: Planning Applications<br/><br/><span data-context='PlanPreLodge' style='display:inline-block;margin-top:10px;padding:3px 10px;background:#eff6ff;border:1px solid #93c5fd;border-radius:4px;color:#1d4ed8;'>📖 Enquiry vs Pre-Lodgement</span> <span data-context='PlanPreLodgeFee' style='display:inline-block;margin-top:10px;padding:3px 10px;background:#eff6ff;border:1px solid #93c5fd;border-radius:4px;color:#1d4ed8;'>📖 Fee credit detail</span>"]
    PlanningDecision -->|Objection| PlanObjection["<b>📐 PLANNING - Objection to Planning Application</b><br/><br/>⚠️ <b>Only Impact Assessment applications go through public notification.</b> If the application is Code Assessment, no public submission process exists — Council assesses against the codes without public input.<br/><br/><u>Customer-facing script — important context:</u><br/><i>&quot;Submissions can only be made during the active public notification period — usually 15 business days. Check the dates on the site signage or in the newspaper notice. Once that window closes, submissions can't be considered.&quot;</i><br/><br/><u>Action - run through checklist with customer:</u><br/>To be a properly made submission it must:<br/>[ ] Be in writing and signed by each person making the submission<br/>[ ] Be received during the public notification period<br/>[ ] Include the name and address of all submitters<br/>[ ] Include the grounds of the submission, and the facts and circumstances relied upon in support of those grounds<br/>[ ] Include one (1) postal or electronic address for all submission-makers<br/>[ ] Be addressed to the assessment manager: Southern Downs Regional Council<br/><br/><u>Grounds that CARRY WEIGHT (relate to Planning Scheme):</u><br/>- Impact on traffic, noise, amenity<br/>- Hours of operation, overshadowing<br/>- Character of the area<br/>- Stormwater, environmental values<br/><br/><u>Grounds that do NOT carry weight (personal/commercial):</u><br/>- Disliking the applicant<br/>- Competing with the proposed business<br/>- Diminution of property value<br/><br/>Council assesses applications against the Planning Scheme — not against commercial or personal interests.<br/><br/><u>If the application is APPROVED despite submissions:</u><br/>Properly-made submitters have a right of appeal to the Planning &amp; Environment Court (20 bd appeal window after applicant's).<br/><br/><u>If the application is REFUSED:</u><br/>All submitters notified and receive a copy of the Decision Notice.<br/><br/>⚠️ Council can't tell the customer WHAT to say in a submission — that would be inappropriate — but can clarify the process, timeframes, and what the scheme considers relevant. Refer to duty planner if unsure.<br/><br/>📌 Eli: Planning Applications<br/><br/><span data-context='PlanObjection' style='display:inline-block;margin-top:10px;padding:3px 10px;background:#eff6ff;border:1px solid #93c5fd;border-radius:4px;color:#1d4ed8;'>📖 Why this matters</span>"]

    PlanningDecision -->|Privacy / Info| PlanningPrivacy["<b>📐 PLANNING - Privacy &amp; Information Requests</b><br/><br/>Information that can be provided to non-property owners:<br/>- Information available on the public Online Mapping tool<br/>- Information available on the public Application Tracking Tool<br/><br/>📌 <a href='https://sdrc-web.t1cloud.com/T1PRDefault/WebApps/eProperty/P1/eTrack/eTrackApplicationSearch.aspx?r=P1.WEBGUEST&amp;f=$P1.ETR.SEARCH.ENQ' target='_blank'>Application Tracking Tool</a><br/><br/>When in doubt, ask a supervisor."]

    'planningguide': `    PropDecision -->|Planning Application Process| PlanGTypes["<b>📚 PLANNING GUIDE - Types of Development &amp; Applications</b><br/><br/><u>Can this development proceed?</u><br/>1. <b>Prohibited</b> — Not permitted under any circumstances. Only the state government can designate development as prohibited.<br/>2. <b>Accepted</b> — Can proceed without any planning approval.<br/>3. <b>Assessable</b> — Requires planning approval from Council before it can proceed.<br/><br/><u>If assessable, what type of assessment applies?</u><br/>- <b>Code Assessment</b> — Assessed against planning scheme codes. No public notification required. The more straightforward pathway.<br/>- <b>Impact Assessment</b> — For proposals that may impact adjoining land uses. Requires public notification by the applicant. Submissions from the public are possible.<br/><br/><u>What type of application does the customer need?</u><br/>- <b>Reconfiguration (RC)</b> — Changing lot boundaries: subdivision, amalgamation, boundary realignment, or access easements. Subdivision creates two or more separate lots, each with its own title.<br/>- <b>Material Change of Use (MCU)</b> — Changing a property's fundamental purpose. Common Southern Downs examples: short-term accommodation, house sites that can't meet setback requirements, some second dwellings.<br/><br/><span data-context='PlanGPart1' style='display:inline-block;margin-top:10px;padding:3px 10px;background:#eff6ff;border:1px solid #93c5fd;border-radius:4px;color:#1d4ed8;'>📖 What is the Planning Scheme?</span>"]
    PlanGTypes --> PlanGPre["<b>📚 PLANNING GUIDE - Pre-Application Activities</b><br/><br/><u>General Enquiries (no fee):</u><br/>Members of the public can contact the planning team for general information of a general nature, such as:<br/>- Opportunities and constraints of a specific site<br/>- Clarifying the location of a building<br/>- Details regarding a potential use of a parcel of land<br/><br/><u>Pre-Lodgement Meeting ($300 - 60 min, RC192):</u><br/>A paid service for applicants who have a clear development goal. Provides tailored advice on a specific proposal before a formal Development Application is lodged.<br/><br/>Helps applicants understand key areas of assessment and required supporting documents in advance."]
    PlanGPre --> PlanGPart1["<b>📚 PLANNING GUIDE - Part 1: Application</b><br/><i>Council has 10 business days to confirm the application is properly made</i><br/><br/>To be properly made, an application requires:<br/>[ ] Cover Letter<br/>[ ] DA Form 1<br/>[ ] Plans<br/>[ ] Assessment against Planning Scheme<br/>[ ] Owner's Consent<br/>[ ] Application Fee<br/><br/>Council issues an Action Notice and Confirmation Notice upon acceptance."]
    PlanGPart1 --> PlanGRef["<b>📚 PLANNING GUIDE - Part 2: Referral</b><br/><i>If applicable — 10 business days. Applicant submits to the referral agency, not council.</i><br/><br/>State Assessment Referral Agency (SARA) is Queensland's state government agency responsible for assessing development applications that affect state interests.<br/><br/>Common referral triggers:<br/>- State Controlled Road<br/>- Regulated Vegetation"]
    PlanGRef --> PlanGIR["<b>📚 PLANNING GUIDE - Part 3: Information Request</b><br/><i>If applicable — 10 business days. Applicant has 3 months to respond.</i><br/><br/>Council may request any further information not included in the original application.<br/><br/>Examples: Traffic impact assessment, engineering reports, or additional supporting documents.<br/><br/>Note: Timeframes can be extended."]
    PlanGIR --> PlanGPart4["<b>📚 PLANNING GUIDE - Part 4: Public Notification</b><br/><i>Impact Assessment only — 15 business days</i><br/><br/>The applicant is responsible for undertaking public notification. Requirements:<br/>[ ] Sign on all frontages (signs provided by council)<br/>[ ] Notice in newspaper<br/>[ ] Notice to adjoining owners<br/><br/>Members of the public may submit either an objection to or a submission in support of the application during the notification period.<br/><br/>If submissions objecting to the application are received:<br/>- Council has 10 bd to consider submissions<br/>- Applicant is sent all submissions and has 10 bd to provide a response to Council<br/>- Receiving submissions triggers the application going to Council rather than a delegated officer for decision<br/><br/>Note: Timeframes can be extended."]
    PlanGPart4 --> PlanGPart5["<b>📚 PLANNING GUIDE - Part 5: Decision</b><br/><i>35 business days (reduced by time already elapsed)</i><br/><br/><u>Delegated:</u><br/>Planning Department makes the decision.<br/><br/><u>Council Decision:</u><br/>Required where submissions objecting to the application have been received. Applicant may request a deputation at a Committee Information Session (CIS).<br/><br/>Customer receives a Decision Notice upon conclusion of the applicant's 20-business-day appeal period.<br/><br/><u>For members of public who submitted an objection:</u><br/>- Properly made submission + application approved: submitter has right of appeal to the Planning &amp; Environment Court<br/>- Application refused: all submitters notified and receive a copy of the Decision Notice"]
    PlanGPart5 --> PlanGPost["<b>📚 PLANNING GUIDE - Post Decision</b><br/><br/>- Compliance with conditions of approval<br/>- Planning &amp; Environment Court appeal (if applicable)<br/>- Preparation of survey plans<br/><br/><u>Approval periods:</u><br/>- MCU (Material Change of Use): 6 years<br/>- RC (Reconfiguring a Lot): 4 years<br/>- BA + OPW (Building/Operational Works): 2 years"]

    'animals': `    CommDecision -->|Animals| AnimalType{"Issue Type?"}
    AnimalType -->|Stray / Found| AnimalStrayFound["<b>🐕 ANIMALS - Stray / Found</b><br/><br/>Customer service is the point of contact for straying and found animals in the community.<br/><br/><u>Customer reports a straying dog:</u><br/>1. Lodge Merit (Keyword: Stray) — record: Location, Breed, Direction of travel, Time, Collar Style, Orange Registration Tag visible (Y/N), any other relevant details<br/>[ ] Do not ask customer to engage the dog — risk of attack. Log as much information as possible and advise Local Laws will attend ASAP<br/>[ ] Breed unknown: size (S/M/L) and colour is sufficient<br/>[ ] Use Intramaps — Environment &amp; Regulatory Module, Regulatory Control Areas Overlay to determine Northern/Central/Southern<br/>2. Report to appropriate Local Laws Officer — use the Local Laws availability email to determine who to contact<br/><br/><u>Customer reports a found animal:</u><br/>Lodge Merit (Keyword: Found) — record: Location, Breed, Time Found, Collar Style, number on Orange Registration Tag<br/>[ ] Use Intramaps — Environment &amp; Regulatory Module, Regulatory Control Areas Overlay to determine Northern/Central/Southern<br/>Confirm with customer whether they would like to:<br/>- Continue to hold the animal until the owner is contacted<br/>- Have a Local Laws Officer collect the animal<br/>- Drop the animal to the pound<br/>If customer is holding the animal, confirm whether they are comfortable with council providing their contact number to the owner to arrange pickup.<br/><br/>Add to spreadsheet register: S:\Customer Service\Shared All\Animals - Lost and Found Register<br/>Notify CS Group + Local Laws via email<br/>[ ] Subject: Found Cat/Dog – Stanthorpe/Warwick/Other Suburb Area<br/>[ ] Copy and paste spreadsheet row into email, add signature and send<br/><br/>📌 Eli: Stray Dog<br/>📌 Shared Drive: Lost Animals Register"]
    AnimalType -->|Lost / Impounded| AnimalLostImpound["<b>🐕 ANIMALS - Lost / Impounded</b><br/><br/>Lost animals can be a major source of distress for customers. This process is thorough to maximise the chance the animal is returned safely.<br/><br/><u>Customer reports a lost animal:</u><br/>1. Add to spreadsheet register: S:\Customer Service\Shared All\Animals - Lost and Found Register<br/>[ ] Check latest entries to confirm if the animal has already been reported as found<br/>2. Lodge Merit (Keyword: Lost) — record: Location last seen, Breed, Time Noticed Missing, Collar Style, number on Orange Registration Tag<br/>[ ] Use Intramaps — Environment &amp; Regulatory Module, Regulatory Control Areas Overlay to determine Northern/Central/Southern<br/>[ ] When found, Local Laws will contact the customer using the contact details in the Merit<br/>3. Check the impoundments spreadsheet to confirm the animal has not been impounded: S:\Customer Service\Shared All\Animals - Impoundments - Warwick - from 1 Jan 2019<br/>4. Notify CS Group + Local Laws via email<br/>[ ] Subject: Lost Cat/Dog – Stanthorpe/Warwick/Other Suburb Area<br/>[ ] Copy and paste spreadsheet row into email, add signature and send<br/><br/><u>Customer calling about an impounded animal:</u><br/>The most common version of this call is a customer following up on a Local Laws voicemail advising their dog has been impounded.<br/>1. Check impoundments register: S:\Customer Service\Shared All\Animals - Impoundments - Warwick - from 1 Jan 2019<br/>2. Contact Local Laws Officer to:<br/>[ ] Arrange collection time<br/>[ ] Confirm release fee<br/>[ ] Confirm if dog must be registered before release<br/><br/>📌 Eli: Impounded Animals<br/>📌 Shared Drive: Lost Animals Register"]
    AnimalType -->|Registration/Keeping| AnimalReg["<b>🐕 ANIMALS - Registration &amp; Keeping of Animals</b><br/><br/><u>Dog Registration:</u><br/>1. Email Form: Application for Dog Registration<br/>2. If applicable, request customer attach:<br/>[ ] Proof of desexing<br/>[ ] Pension card<br/>[ ] Dog Breeder Supply Number<br/>[ ] Proof of Service Dog status<br/><br/><u>Type/Number of Animals Allowed on Property:</u><br/>The number and type of animals permitted on a property is determined by local bylaws and the planning scheme, and varies by property and zone.<br/><br/><u>Customer-facing script:</u><br/><i>&quot;Rural-zoned land generally allows a broader range and higher numbers of animals — horses, cattle, sheep, goats, alpacas, poultry are all typical. Residential land is much more restricted. The Keeping of Animals Fact Sheet is the definitive source — it sets out maximum permitted numbers by animal type and zone.&quot;</i><br/><br/>📌 <a href='https://www.sdrc.qld.gov.au/ArticleDocuments/702/Keeping_Animals_Fact_Sheet.pdf.aspx' target='_blank'>Keeping of Animals Fact Sheet</a><br/><br/><u>If customer wants more than the standard number — Keeping of Animals Permit:</u><br/>1. <b>Always advise customer to call Local Laws BEFORE applying</b> — discuss whether a permit is likely to be approved for their block. Saves wasted application fee.<br/>2. If feasible: customer submits application + fee<br/>3. Local Laws assesses against zone, lot size, animal welfare, neighbour amenity, waste management<br/><br/><u>⚠️ Restricted/prohibited regardless of lot size:</u><br/>[ ] Restricted breed dogs (American Pit Bull Terrier, Dogo Argentino, Fila Brasileiro, Japanese Tosa, Perro de Presa Canario)<br/>[ ] Some reptiles<br/>[ ] All feral animals (rabbits, foxes, etc. — see Pest Animals branches)<br/><br/>⚠️ Strongly encourage customers to check the fact sheet BEFORE buying, breeding, or relocating animals — buying first and asking later often ends with the customer being required to rehome animals they're already attached to.<br/><br/>📌 Eli: Dog Registration<br/>📌 Eli: Keeping Animals<br/><br/><span data-context='AnimalKeeping' style='display:inline-block;margin-top:10px;padding:3px 10px;background:#eff6ff;border:1px solid #93c5fd;border-radius:4px;color:#1d4ed8;'>📖 Permits &amp; restrictions</span>"]
    AnimalType -->|Barking| BarkingType{"New or Ongoing?"}
    BarkingType -->|New| BarkNew["<b>🐕 ANIMALS - Barking (New)</b><br/><br/>Customers making a noise complaint about a barking dog can be among the most stressed callers. Loss of sleep is a major source of stress and customers often call at their breaking point — take your time with this one.<br/><br/>1. Encourage the customer to make direct contact with the dog owner — a letter template is available on page 1 of the Noise Nuisance Diary Factsheet<br/>2. Lodge Merit (Keyword: Barking) — follow process, provide customer with Merit #<br/>3. Provide Barking Dogs Factsheet and Noise Diary to customer<br/>4. Advise customer that when the completed diary is received, Local Laws will investigate using the information in the diary — the dog owner will be given time to correct the behaviour<br/><br/><u>If the caller IS the dog owner (reported to them that their dog barks when they're away):</u><br/>Council hires out <b>barking collars</b> as a short-term behaviour-modification tool.<br/>- Hire: <b>$15 per week or part thereof</b> + <b>$100 refundable deposit</b><br/>- Deposit must be claimed within 3 months of return, or forfeited<br/>- Form: Application for Hire of Cat/Fox Trap or Barking Collar or Tree Pear Injector<br/>- Customer submits form + proof of ID to Warwick, Stanthorpe, or Allora Customer Service Centre<br/><br/>Most persistent barking has an underlying cause — boredom, separation anxiety, territorial stress, lack of exercise. Worth mentioning to the owner that addressing the cause (more exercise, enrichment, reducing line-of-sight to triggers) usually works better than suppressing the symptom, and persistent barking may warrant a chat with their vet.<br/><br/>📌 <a href='https://www.sdrc.qld.gov.au/ArticleDocuments/702/Barking_Dogs_Fact_Sheet.pdf.aspx' target='_blank'>Barking Dogs Fact Sheet and Noise Nuisance Diary</a><br/>📌 Eli: Barking Dog<br/><br/><span data-context='BarkNew' style='display:inline-block;margin-top:10px;padding:3px 10px;background:#eff6ff;border:1px solid #93c5fd;border-radius:4px;color:#1d4ed8;'>📖 Why we require a diary</span>"]
    BarkingType -->|Ongoing| BarkOngo["<b>🐕 ANIMALS - Barking (Ongoing)</b><br/><br/>1. Add a note to the existing Merit that another complaint has been received<br/>2. Include customer return phone number<br/><br/>📌 <a href='https://www.sdrc.qld.gov.au/ArticleDocuments/702/Barking_Dogs_Fact_Sheet.pdf.aspx' target='_blank'>Barking Dogs Fact Sheet and Noise Nuisance Diary</a><br/>📌 Eli: Barking Dog"]
    AnimalType -->|Surrender| AnimalSurrender["<b>🐕 ANIMALS - Surrender of Dogs/Cats</b><br/><br/>1. Email Form: Owners Consent to Privately Impound Dog or Cat<br/>[ ] If customer prefers, a Local Laws Officer can provide the Surrender Form during drop off<br/>2. Take impoundment fee over phone (Fees &amp; Charges: Private Impounding)<br/>[ ] No fee applies for surrendering feral cats — Local Laws Officer will check the cat for a microchip before impounding<br/>[ ] Email receipt to customer and Local Laws<br/>3. Call Local Laws Officer to arrange a mutually suitable surrender time — confirm if the Local Laws Officer would like to speak to the customer directly<br/><br/>📌 Eli: Private Impoundment"]
    AnimalType -->|Cat Trap Hire| AnimalCatTrap["<b>🐕 ANIMALS - Cat Trap Hire</b><br/><br/>1. Email Forms: Application for Hire of Cat/Fox Trap + Refund or Transfer Payment Request Form<br/>2. Complete receipt with Weekly Hire Fee &amp; Bond — refer to Fees &amp; Charges (CTRL+F: Trap)<br/>3. Provide customer with Instructions for Use of Cat Trap<br/>4. Complete spreadsheet: S:\Customer Service\Shared All\Animals\Lost &amp; Found Register — click on Fox &amp; Cat Trap Tab<br/><br/>📌 Eli: Cat Trap Hire"]
    AnimalType -->|Attack/Menacing| AnimalAttack["<b>🐕 ANIMALS - Dog Attack/Menacing</b><br/><br/>⚠️ <b>If anyone needs emergency medical attention, the customer should call 000 first.</b> Advise them to prioritise their safety before proceeding with the call.<br/><br/><u>Customer-facing script:</u><br/><i>&quot;Once you're safe, we'll get a Local Laws Officer out to you as quickly as possible. I'll take the key details now, and you'll also need to submit a Statement of Dog Attack form — I can email that to you. When you call in future, have ready: the location, a description of the dog, whether it is still in the area, and the time of the attack.&quot;</i><br/><br/><u>Lodge Merit (Keyword: Attack)</u> — record the following so Local Laws can attend ASAP. A more detailed statement will be taken on the Statement of Dog Attack Form.<br/><br/>[ ] Where exactly did the attack take place?<br/>[ ] Is the dog still in the area? If not, record last known location and direction of travel<br/>[ ] Dog description: Breed, Size, Colour, Collar<br/>[ ] What time did the attack occur? (date and time)<br/>[ ] Was medical treatment required?<br/><br/>Email Form: Statement of Dog Attack Form<br/><br/>📌 Eli: Dog Attack<br/><br/><span data-context='AnimalAttack' style='display:inline-block;margin-top:10px;padding:3px 10px;background:#eff6ff;border:1px solid #93c5fd;border-radius:4px;color:#1d4ed8;'>📖 After an attack</span>"]
    AnimalType -->|Wildlife/Cruelty| AnimalWildlife["<b>🐕 ANIMALS - Wildlife &amp; Cruelty</b><br/><br/><u>Animal Cruelty/Welfare:</u><br/>Emergency: Police 000<br/>Non-emergency: RSPCA 1300 264 625<br/>or rspca.org.au/report-animal-cruelty<br/><br/><u>Wildlife Removal:</u><br/>Provide appropriate wildlife carer contact details to customer<br/><br/>📌 Eli: Wildlife Removal"]
    AnimalType -->|Pest| AnimalKeepPest["<b>🐕 ANIMALS - Pest Animals</b><br/><br/>1. Lodge Merit (Keyword: Pest Animal) — instruct customer to await callback from Local Laws Officer, provide customer with Merit #<br/>2. For immediate information email customer the State Government Invasive Animals Fact Sheet<br/><br/>📌 <a href='https://www.business.qld.gov.au/industries/farms-fishing-forestry/agriculture/land-management/health-pests-weeds-diseases/pests/invasive-animals/fact-sheets' target='_blank'>Invasive Animals Fact Sheets — Queensland Government</a><br/>📌 Eli: Keeping Animals"]

    'environmental': `    CommDecision -->|Environmental| EnvStart["<b>🌿 ENV NUISANCE - Initial Assessment</b><br/><br/>1. Determine whether council has jurisdiction - refer to Eli: Environmental Nuisance &amp; Pollution and the SDRC website<br/>2. If council does not have jurisdiction: direct customer to the appropriate authority<br/>3. If council has jurisdiction: encourage the customer to contact the polluter directly and attempt to resolve without council involvement first<br/><br/>📌 Eli: Jurisdiction Check"]
    EnvStart --> EnvLodge["<b>🌿 ENV NUISANCE - Lodge</b><br/><br/>1. Lodge Merit Environment - select the appropriate option<br/>2. If the nuisance is ongoing, provide the Environmental Nuisance Diary for the customer to complete as evidence<br/>3. Instruct the customer to email the completed diary (after 14 days) quoting the Merit number in the subject line<br/><br/>📌 <a href='https://www.sdrc.qld.gov.au/ArticleDocuments/1232/Environmental%20Nuisance%20Diary%20V1%20Nov%202022.pdf.aspx' target='_blank'>Environmental Nuisance Diary</a><br/>📌 Eli: Nuisance Diary"]

    EnvLodge --> ActionDecision`,

    'waste': `    CommDecision -->|Waste| WasteType{"Request Type?"}
    WasteType -->|Recycle Mate / What goes where?| WasteRecycleMate["<b>🗑️ WASTE - Recycle Mate &amp; Bin Guide</b><br/><br/>Use this for <i>any</i> call along the lines of &quot;where do I take this?&quot; or &quot;what goes in which bin?&quot; — Recycle Mate will usually resolve it in 30 seconds.<br/><br/><u>Customer-facing script:</u><br/><i>&quot;Recycle Mate is a free app — or web tool — that tells you exactly how and where to dispose of almost anything. Snap a photo or type the item name, and it returns locations specific to the Southern Downs. It's the fastest way to get an answer without having to call us back.&quot;</i><br/><br/>📌 <a href='https://www.sdrc.qld.gov.au/living-here/environment-water-waste/waste-recycling/recycle-mate' target='_blank'>Recycle Mate — SDRC</a><br/><br/><u>If the customer is still on the line and wants a quick bin answer:</u><br/>- <b>Red or Green lid (general waste, weekly):</b> kitchen and food waste, general household rubbish, plastic bags and cling wrap, nappies, polystyrene foam<br/>- <b>Yellow lid (recycling, fortnightly):</b> paper and cardboard, steel and aluminium cans, rigid plastic bottles and containers (lids removed), glass bottles and jars (lids removed)<br/><br/>⚠️ Batteries NEVER go in either bin — they cause truck fires. See the context panel.<br/><br/><span data-context='WasteRecycleMate' style='display:inline-block;margin-top:10px;padding:3px 10px;background:#eff6ff;border:1px solid #93c5fd;border-radius:4px;color:#1d4ed8;'>📖 Recycle Mate &amp; Batteries</span>"]
    WasteType -->|Bin Issues| WasteBin["<b>🗑️ WASTE - Bin Issues</b><br/><br/>SDRC Customer Service is the point of contact for domestic rubbish and recycling collection issues. All requests are lodged through the Cleanaway request portal.<br/><br/>[ ] Missed collection: Lodge a Cleanaway request<br/>[ ] Damaged bin: Lodge a Cleanaway request<br/>[ ] Missing/stolen bin: Lodge a Cleanaway request<br/><br/><u>Before lodging a missed-collection request — confirm with the customer:</u><br/>[ ] Was the bin at the kerbside by 6:00am on collection day?<br/>[ ] Was it blocked by a parked vehicle or anything else the truck couldn't get past?<br/>These are the two most common reasons a bin is passed, and worth checking before creating a return-collection job.<br/><br/><u>Confirm Bin Day:</u><br/>Search property address in Intramaps — bin day is displayed in the cadastre menu. Days may change during public holidays; contact the waste team for updated schedule.<br/><br/><u>Status of Cleanaway Request:</u><br/>Search the customer address in the Jobs tab on the Cleanaway Live Collection page to check if a request has been scheduled.<br/><br/>📌 Eli: Cleanaway Requests<br/><br/><span data-context='WasteBin' style='display:inline-block;margin-top:10px;padding:3px 10px;background:#eff6ff;border:1px solid #93c5fd;border-radius:4px;color:#1d4ed8;'>📖 Cleanaway contract</span>"]
    WasteType -->|Waste Facilities| WasteFacilities["<b>🗑️ WASTE - Waste Facilities / Specific items</b><br/><br/>For locations and trading hours refer to the Waste Facility Flyer, or the context panel below for a quick reference.<br/><br/>For guidance on specific items, use Recycle Mate first — an interactive map tool that lets users search by item type to find nearby facilities. Also includes a chatbot for detailed disposal advice.<br/>📌 <a href='https://www.sdrc.qld.gov.au/living-here/environment-water-waste/waste-recycling/recycle-mate' target='_blank'>Recycle Mate — SDRC</a><br/><br/><u>Free at Council facilities:</u><br/>Scrap metal, clean concrete and bricks, e-waste, empty agvet chemical containers (drumMUSTER), used motor oil at some sites, and clean timber pallets.<br/><br/><u>Fees apply to:</u><br/>General household waste, mattresses, tyres, whitegoods, construction and demolition waste. Fees are set in the annual Fees &amp; Charges schedule.<br/><br/><u>Green waste:</u><br/>Grass clippings, prunings, and small branches can go in the red/green lid general waste bin. Do NOT put green waste in the yellow recycling bin. Larger loads can go to a Council waste facility — FREE for residents, commercial green waste attracts a disposal fee. Composting at home is a great option — Council has Worm Farming and Composting fact sheets.<br/><br/><u>Trickle tape (T-tape):</u><br/>Council stockpiles clean trickle tape for recycling at the Stanthorpe Waste Management Facility, FREE of charge. The tape must be separated from plastic mulch and as free as possible from soil, roots, and organic matter. Contaminated tape cannot be recycled and attracts landfill fees for commercial operators. Site supervisors direct the customer to the stockpile on arrival.<br/><br/><u>Specific items:</u><br/>[ ] <b>Asbestos:</b> customer must pre-book and complete the Asbestos Disposal Form before attending. Page 1 is for Commercial, Page 2 for Domestic. Must be double-bagged in 200-micron plastic and clearly labelled.<br/>[ ] <b>Deceased pets:</b> small pets (birds, fish, guinea pigs) can go in the general waste bin. Larger pets should be taken to the closest accepting waste facility. Burial is only available at the Warwick Waste Management Facility. Prior notice required for bulk loads.<br/>[ ] <b>Ammunition, explosives, old fireworks:</b> NEVER in any bin or waste facility. Refer customer to the Queensland Explosives Inspectorate on 1300 739 868 (24-hour hotline).<br/>[ ] <b>Solar Panels:</b> storm-damaged solar panels are being accepted until 1 July 2026 at Pratten, Warwick, and Stanthorpe. Otherwise refer to CDS Recycling for e-waste recycling.<br/>[ ] <b>Batteries:</b> never in a kerbside bin. Take to any supervised Council waste facility (Ecobatt partnership). Tape terminals on lithium batteries.<br/><br/>⚠️ Please don't let customers dump green waste on bushland, verges, or waterways — spreads pest plants, fuels bushfires, attracts wildlife to roadsides. See Illegal Dumping node.<br/><br/>For anything not covered, contact the waste team.<br/><br/>📌 <a href='https://www.sdrc.qld.gov.au/ArticleDocuments/279/Waste%20Facility%20Flyer.pdf.aspx?embed=Y' target='_blank'>Waste Facility Flyer</a><br/>📌 <a href='https://www.sdrc.qld.gov.au/ArticleDocuments/279/Fact%20Sheet_Asbestos%20Disposal%20Guidelines.pdf.aspx' target='_blank'>Asbestos Disposal Guidelines</a><br/>📌 Asbestos Disposal Form (Commercial + Domestic)<br/>📌 <a href='https://www.sdrc.qld.gov.au/living-here/environment-water-waste/waste-recycling/waste-recycling-fact-sheets' target='_blank'>Waste &amp; Recycling Fact Sheets</a><br/><br/><span data-context='WasteFacilities' style='display:inline-block;margin-top:10px;padding:3px 10px;background:#eff6ff;border:1px solid #93c5fd;border-radius:4px;color:#1d4ed8;'>📖 Charges, materials &amp; opening hours</span>"]
    WasteType -->|Illegal Dumping| WasteDumping["<b>🗑️ WASTE - Illegal Dumping</b><br/><br/>Illegal dumping is any unlawful deposit of 200 litres or more of waste (roughly a wheelie bin volume) in bushland, roadsides, waterways, outside charity bins, on the kerbside outside of collection time, or at the wrong location within a waste facility.<br/><br/><u>Lodge the report:</u><br/>1. Lodge Merit or submit via the online service request form<br/>2. Capture from the customer:<br/>[ ] Time, date, place, and description of the waste<br/>[ ] Vehicle registration, make, model, colour, distinguishing features<br/>[ ] Description of the person (location in vehicle, clothing, gender)<br/>[ ] Ask if the customer has photos — they can attach them to the online form with a pinned map location<br/><br/><u>Safety reminder for the customer:</u><br/><i>&quot;Please don't approach the person depositing the waste. Take photos only if it's safe to do so.&quot;</i><br/><br/>📌 <a href='https://www.sdrc.qld.gov.au/living-here/environment-water-waste/waste-recycling/waste-recycling-fact-sheets' target='_blank'>Illegal Dumping Fact Sheet</a><br/>📌 Eli: Illegal Dumping<br/><br/><span data-context='WasteDumping' style='display:inline-block;margin-top:10px;padding:3px 10px;background:#eff6ff;border:1px solid #93c5fd;border-radius:4px;color:#1d4ed8;'>📖 Threshold &amp; penalties</span>"]
    WasteType -->|Public Place| WastePublic["<b>🗑️ WASTE - Public Place Bin</b><br/><br/>1. Use Intramaps to confirm bin location with customer<br/>2. Open the Environment &amp; Regulatory Module and enable the Public Place Bins overlay to confirm responsibility<br/>[ ] If Cleanaway: Lodge a Cleanaway request<br/>[ ] If Council: Lodge Merit (Service: Parks, Garden, Reserves / Request: Public Amenities)<br/><br/>📌 Eli: Intramaps Guide"]
    WasteType -->|Infirm| WasteInfirm["<b>🗑️ WASTE - Infirm Service</b><br/><br/>Council offers an infirm collection service for elderly, disabled, or medically immobilised residents who are unable to put their bins out. Cleanaway drivers will collect and return the bins.<br/><br/>The service is only available if nobody else at the property is able to present the bins.<br/><br/>Customer to email the general inbox with:<br/>[ ] Letter requesting infirm service — Subject: ATTN Waste Team<br/>[ ] Note or certificate from a registered health care practitioner<br/><br/>📌 Eli: Wheelie Bin Infirm"]
    WasteType -->|Complaint| WasteComplaint["<b>🗑️ WASTE - Cleanaway Complaint</b><br/><br/>For complaints regarding recurring issues or driver conduct:<br/>Lodge Merit (Keyword: Complaint)<br/>These are actioned by the Council's Waste Team.<br/><br/>For unresolved Cleanaway requests:<br/>Lodge Merit (Keyword: Complaint) so council can follow up with Cleanaway on the customer's behalf.<br/><br/>📌 Eli: Complaint Process"]
    WasteType -->|New Service / Rural Compound| WasteNewService["<b>🗑️ WASTE - New Bin Service / Rural Compound</b><br/><br/>Use Intramaps — Environment &amp; Regulatory Module, Designated Waste Collection Area Overlay to determine the property's collection area type:<br/><br/>- <b>Compulsory:</b> Customer is required to have waste and recycling service — charge is non-optional<br/>- <b>Opt-In/Out:</b> Customer may choose whether to accept the service<br/>- <b>Voluntary:</b> Customer may request waste and/or recycling service — Cleanaway determines whether service can be provided<br/><br/>To request a new service, customer to email the general inbox with:<br/>[ ] Letter requesting bin collection service and accepting the charges to be added to their rates bill — Subject: ATTN Waste Team<br/><br/><u>Properties outside the collection area — Rural Bin Compounds:</u><br/>Locked, unsupervised bin compounds — access is by key, issued only to approved residents within the catchment area. Check whether the property falls within a compound catchment before confirming eligibility.<br/><br/>Compound locations:<br/>- Amiens — Bapaume Rd, Amiens 4380<br/>- Ballandean — Sundown Road, Ballandean 4382<br/>- Glen Aplin — Thorndale Road, Glen Aplin 4381<br/>- Pozieres — Pozieres Road, Pozieres 4352<br/>- Forest Springs — Forest Springs-Goomburra Road, Forest Springs 4362<br/>- Karara — Toowoomba-Karara Road, Karara 4352<br/>- Greymare — Mountain Maid Road, Greymare 4370<br/><br/><u>Note for new dwellings:</u><br/>Cleanaway requires a Form 21 Final Certificate before starting a service on a new property. Until Form 21 is issued, the property cannot be added to the collection round.<br/><br/>📌 Eli: New Wheelie Bins for Waste"]

    'complaints': `    CommDecision -->|Complaints| ComplaintRoute["<b>📝 COMPLAINTS</b><br/><br/>For complaints about a council service or staff member, assist the customer in choosing the most appropriate option:<br/><br/><b>Option 1: Lodge a Merit (Keyword: Complaint)</b><br/>Most appropriate when a customer wants to contact the supervisor or manager of a department. Take details of the complaint from the customer to assist the relevant department with their investigation.<br/><br/><b>Option 2: Complaint Form (Online or Email)</b><br/>More appropriate when a customer wishes to lodge a complaint at the executive level — above the department, directly to council leadership. An acknowledgement letter will be sent within 10 business days.<br/>📌 <a href='https://www.sdrc.qld.gov.au/about-council/contact-us/lodge-a-complaint' target='_blank'>Lodge a Complaint Online — SDRC</a><br/><br/><b>Option 3: Email directly</b><br/>Email: mail@sdrc.qld.gov.au<br/>Subject: ATTN: Complaint — Name/Department<br/>Records will allocate to the appropriate person.<br/><br/>Note: Customer may choose to remain anonymous, however this may impact council's ability to investigate and resolve the issue.<br/><br/>📌 Eli: Complaint Process"]

    ComplaintRoute --> ActionDecision`,

    'disaster': `    CommDecision -->|Disaster| DisasterDash["<b>🚨 DISASTER - Disaster Dashboard</b><br/><br/>Consult the Disaster Dashboard for current information. Assist customer in navigating to relevant section.<br/><br/><u>Dashboard Sections:</u><br/>- <b>Most Recent Updates:</b> Latest information from various organisations<br/>- <b>Emergency News:</b> Published by Southern Downs Regional Council<br/>- <b>Road Conditions:</b> Provided by Department of Transport and Main Roads<br/>- <b>Power Outages:</b> Provided by Ergon Energy<br/>- <b>Weather Warnings:</b> Provided by Bureau of Meteorology<br/><br/><u>Map Overlays:</u><br/>- <b>Fires:</b> State Government fire overlay displayed on map<br/>- <b>Flood Cameras:</b> Access recent pictures of crossings and rivers to determine if safe to travel<br/><br/>📌 <a href='https://disaster.sdrc.qld.gov.au' target='_blank'>SDRC Disaster Dashboard</a>"]
