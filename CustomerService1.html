    'disputes': `    CommDecision -->|Disputes| DisputeType{"Type?"}
    DisputeType -->|Council jurisdiction| DisputeCouncil["<b>🏠 DISPUTES - Council Can Help</b><br/><br/>Council's Local Laws team CAN investigate these:<br/><br/>- Dust/Smoke/Noise/Light/Odour/Water Pollution → See ENV NUISANCE<br/>- Keeping of Animals/Barking/Dangerous Dogs → See ANIMALS<br/>- Illegal Use of Caravan/Tents/Buses → Merit Building<br/>- Illegal Use of Building → Merit Building<br/>- Unauthorised Building Works → Merit Building (see Unapproved Works node)<br/>- Unlawful Land Use → Merit Planning (see Home Business node for residential)<br/><br/>📌 Eli: Disputes Guide"]
    DisputeType -->|Private / QCAT| DisputePrivate["<b>🏠 DISPUTES - Private Matter (QCAT)</b><br/><br/>Council CANNOT mediate or enforce these. They're private matters under Queensland law — usually QCAT territory.<br/><br/><u>Customer-facing script:</u><br/><i>&quot;That's a private matter between you and your neighbour, not something Council can investigate. The Queensland Civil and Administrative Tribunal — QCAT — is usually the right place to go if you can't resolve it directly.&quot;</i><br/><br/><u>Common private matters:</u><br/>- Boundary disputes<br/>- Fencing disputes (see dedicated node)<br/>- Trees crossing property lines (see dedicated node)<br/>- Easement disputes<br/>- Parking outside Warwick CBD → refer to Police<br/><br/><u>Contacts:</u><br/>- QCAT: 1300 753 228 or qcat.qld.gov.au<br/>- Qld Gov Housing &amp; Neighbours info<br/><br/>📌 Eli: Regulated Parking"]
    DisputeType -->|Neighbour's Tree| DisputeTree["<b>🏠 DISPUTES - Neighbour's Tree</b><br/><br/>Common call — branches overhanging, blocking light, or damaging a fence. Tree disputes between neighbours are a private matter under the Qld Neighbourhood Disputes (Dividing Fences and Trees) Act 2011.<br/><br/><u>Customer-facing script:</u><br/><i>&quot;Tree disputes between neighbours aren't something Council can mediate — they fall under the Neighbourhood Disputes Act, which is a QCAT matter. A few practical things you can do yourself first: talk to your neighbour (most tree issues are resolved when the owner is made aware), serve a formal notice under the Act if that doesn't work, and then QCAT if you still can't reach agreement. You can also trim branches overhanging your property up to the boundary line at your own cost — just don't damage the tree's health, and return the trimmings to your neighbour rather than dumping them.&quot;</i><br/><br/><u>Contacts:</u><br/>- QCAT: 1300 753 228 or qcat.qld.gov.au<br/><br/>⚠️ <b>Exception — trees on Council land:</b><br/>If the tree is on a Council road reserve or Council-owned land, that IS Council's responsibility. Lodge a service request (Keyword: Tree) — Parks team will assess. Advise the customer NOT to trim or remove a Council tree themselves.<br/><br/>📌 Eli: Tree Disputes"]
    DisputeType -->|Fencing / Boundary| DisputeFencing["<b>🏠 DISPUTES - Fencing &amp; Boundary</b><br/><br/>Fencing between two residential properties is governed by the Qld Neighbourhood Disputes (Dividing Fences and Trees) Act 2011 — NOT Council.<br/><br/><u>Customer-facing script:</u><br/><i>&quot;Dividing fences are a matter between you and your neighbour, not something Council can get involved in. The general rule is that both neighbours share the cost of a 'sufficient dividing fence' equally — but what counts as sufficient depends on the zone and the existing fence. The practical steps are: talk to your neighbour and agree on what needs doing, serve a formal Notice to Fence if you can't agree (templates are available from the Queensland Government), and then QCAT if there's still no agreement 30 days after the notice.&quot;</i><br/><br/><u>Boundary disputes (where the fence should sit) are separate:</u><br/>If the customer is uncertain where the boundary actually is, a licensed surveyor can confirm. Council's online mapping shows cadastral boundaries for reference but is NOT a substitute for a survey.<br/><br/><u>Contacts:</u><br/>- QCAT: 1300 753 228 or qcat.qld.gov.au<br/>- Qld Gov: Notice to Fence template<br/><br/>📌 Eli: Fencing Disputes"]
    DisputeType -->|Unapproved Works| DisputeUnapproved["<b>🏠 DISPUTES - Suspected Unapproved Building</b><br/><br/>Unapproved building works ARE something Council can investigate — unlike most neighbour disputes.<br/><br/><u>Customer-facing script:</u><br/><i>&quot;Unapproved building works are something we can investigate, which is different from a lot of neighbour disputes. If you believe a structure has been built without the required building or planning approval, we can look into it. The process takes time though — compliance is not usually a same-day outcome.&quot;</i><br/><br/><u>Staff action:</u><br/>1. Lodge Merit (Keyword: Building Compliance) or online service request<br/>2. Capture from the customer: address, description of the structure, when built (if known), why they believe it's unapproved<br/>3. Building Compliance team investigates — if unapproved, may issue notice requiring retrospective certification or removal<br/><br/>⚠️ <b>Important context for customers:</b><br/>Not every structure requires approval. Garden sheds under 10m2, fences under 2m, and retaining walls under 1m may be self-assessable. Set expectations that the investigation will confirm what was actually required.<br/><br/>📌 Eli: Building Compliance"]
    DisputeType -->|Business from Residence| DisputeHomeBiz["<b>🏠 DISPUTES - Business from Residential Property</b><br/><br/>Council CAN investigate &quot;unlawful land use&quot; under the Planning Scheme.<br/><br/><u>Customer-facing script:</u><br/><i>&quot;Unlawful land use is something Council can investigate. Some home-based businesses are permitted — typically small-scale, low-impact operations that don't generate traffic, noise, or signage beyond residential norms. Others need planning approval or simply aren't permitted in residential zones.&quot;</i><br/><br/><u>Common triggers that cross the line:</u><br/>[ ] Commercial vehicle traffic<br/>[ ] Employees arriving and leaving<br/>[ ] Customer parking<br/>[ ] Commercial signage<br/>[ ] Industrial noise<br/>[ ] Activities that change the character of the property<br/><br/><u>Staff action:</u><br/>Lodge Merit (Keyword: Planning Compliance) or online service request. Planning Compliance team investigates.<br/><br/>📌 Eli: Planning Compliance"]

    DisputeCouncil --> ActionDecision
    DisputePrivate --> ActionDecision
    DisputeTree --> ActionDecision
    DisputeFencing --> ActionDecision
    DisputeUnapproved --> ActionDecision
    DisputeHomeBiz --> ActionDecision`,

    'venues': `    CommDecision -->|Venues| VenuesNode["<b>🏛️ VENUES - Hall Hire</b><br/><br/><u>Availability:</u><br/>- Stanthorpe Civic Centre and Warwick Town Hall are available for hire<br/>- Allora Community Hall and Fred Rogers Camp are currently unavailable for hire<br/><br/><u>Making a Booking:</u><br/>1. Provide customer with the relevant Hirer's Agreement Form (Civic Centre or Warwick Town Hall) - must be returned within 7 days to hold the booking<br/>2. Create a TENTATIVE appointment in Microsoft Outlook Calendar:<br/>- Subject: TENTATIVE - [Hirer's Name]<br/>- Location: Room allocation (Main Auditorium / Whole Building / Supper Room)<br/>- Start/End Time: as per Hirer's Agreement<br/>- Notes: Contact name, phone number, booked by [name] on [date and time]<br/>3. Advise the customer that the booking will be confirmed upon receipt of the completed Hirer's Agreement Form<br/><br/><u>Key Conditions:</u><br/>- Stanthorpe Civic Centre must be vacated no later than 1:00am<br/>- Licensed bar must be closed no later than 12:30am<br/>- Hirers must organise their own Liquor Licence - RSA certification alone is not sufficient<br/><br/><u>Confirmation &amp; Next Steps</u> - refer to Eli: Stanthorpe Civic Centre for:<br/>[ ] Receiving completed application form<br/>[ ] Issue of keys<br/>[ ] Return of keys<br/>[ ] Refund of bond<br/><br/>📌 Eli: Stanthorpe Civic Centre"]

    VenuesNode --> ActionDecision`,

    'roads': `    InfraDecision -->|Roads| RoadType{"Issue Type?"}
    RoadType -->|Pothole| RoadPot["<b>🛣️ ROADS - Pothole</b><br/><br/><u>Customer-facing script:</u><br/><i>&quot;You can report it online through our service request form — it lets you attach a screenshot with a map pin showing the exact location, which really helps the road crew. Or I can take the details over the phone now.&quot;</i><br/><br/><u>Staff action:</u><br/>1. Lodge Merit (Keyword: Pothole) — follow process<br/>2. Use Intramaps to confirm whether the road is sealed or unsealed — expand Road Types in the layers menu (gravel and lower classifications are unsealed)<br/>3. Record exact location — use the snipping tool to take a screenshot of the map if practical<br/><br/><u>Details to capture:</u><br/>[ ] Street name<br/>[ ] Nearest landmark or cross-street<br/>[ ] Estimate of size<br/><br/>📌 Eli: Pothole Reporting"]
    RoadType -->|Road Kill| RoadKill["<b>🛣️ ROADS - Roadkill</b><br/><br/><u>Carcass over 100kg:</u><br/>[ ] TMR controlled road (yellow/orange on Intramaps) — advise customer to contact Roadtek: 4699 9350<br/>[ ] All other roads — Council Works Department. Lodge Merit (Keyword: Dead)<br/><br/><u>Carcass under 100kg:</u><br/>Use the Environment &amp; Regulatory overlay on Intramaps to determine if the carcass is within a Designated Waste Collection Area.<br/>[ ] Within collection area — create a Cleanaway request. Ensure the correct animal type is recorded so SDRC is charged correctly.<br/>[ ] Outside collection area, Council road — Lodge Merit (Keyword: Dead). Note: Council will not remove animals from rural road reserves where they pose no risk to traffic.<br/>[ ] Outside collection area, TMR road (yellow/orange on Intramaps) — contact Roadtek: 4699 9350<br/>[ ] On private land — Cleanaway and Council do not remove animals from private properties.<br/><br/>📌 Eli: Roadkill"]
    RoadType -->|Closure| RoadClose["<b>🛣️ ROADS - Closure</b><br/><br/><u>Customer-facing script:</u><br/><i>&quot;The SDRC Disaster Dashboard has current road closure information and flood camera images of key crossings — it's the most up-to-date source during weather events. For state roads like the New England or Cunningham Highway, check Queensland Traffic.&quot;</i><br/><br/>1. Check Disaster Dashboard<br/>2. Provide link to customer for real-time updates<br/>3. If state road: refer to Queensland Traffic<br/><br/>📌 <a href='https://disaster.sdrc.qld.gov.au' target='_blank'>SDRC Disaster Dashboard</a><br/>📌 <a href='https://qldtraffic.qld.gov.au/' target='_blank'>Queensland Traffic</a>"]
    RoadType -->|Rail/HWY| RoadRef["<b>🛣️ ROADS - Rail/Highway</b><br/><br/>If a customer calls regarding a problem with railways or a highway, refer them to the organisation with jurisdiction.<br/><br/>Train Tracks / Railway Crossings:<br/>QLD Rail: 13 16 17<br/><br/>Highway / TMR controlled road:<br/>TMR: 13 20 80<br/>Note: TMR controlled roads are shown in yellow/orange on Intramaps.<br/><br/>📌 Referral Contacts"]
    RoadType -->|Whose Road?| RoadJurisdiction["<b>🛣️ ROADS - Whose Road Is It?</b><br/><br/>Not all roads in the region are Council's responsibility. Use this when a customer is unsure who to contact.<br/><br/><u>Customer-facing script:</u><br/><i>&quot;Major highways in our area are managed by the State Government, not Council. For the New England Highway, Cunningham Highway, and other TMR roads, contact TMR on 13 20 80. For railway tracks and rail crossings, Queensland Rail is the right place — 13 16 17. For all other local roads, we can take a report here.&quot;</i><br/><br/><u>Staff triage:</u><br/>1. Open Intramaps — check road colour:<br/>[ ] Yellow/orange = TMR (State Government) → refer to TMR 13 20 80<br/>[ ] Any other colour = Council road → lodge Merit as normal<br/>2. Railway tracks / rail crossings → Queensland Rail 13 16 17<br/>3. Not sure? Offer to check Intramaps with the customer still on the line<br/><br/>📌 Eli: Road Jurisdiction"]

    RoadPot --> ActionDecision
    RoadKill --> ActionDecision
    RoadClose --> ActionDecision
    RoadRef --> ActionDecision
    RoadJurisdiction --> ActionDecision`,

    'works': `    InfraDecision -->|Works| WorksType{"Type?"}
    WorksType -->|Minor| WorksMinor["<b>🔨 WORKS - Minor Works</b><br/><br/>Minor Works Within a Road Reserve<br/><br/>See Eli: Roads &amp; Works Forms<br/>for application requirements<br/><br/>📌 Eli: Minor Works Process"]
    WorksType -->|Private| WorksPriv["<b>🔨 WORKS - Private Works</b><br/><br/>Member of public engages council<br/>to conduct works on private property<br/><br/>Roads &amp; Works Forms - SDRC<br/><br/>📌 Eli: Private Works Forms"]
    WorksType -->|Operational| WorksOp["<b>🔨 WORKS - Operational Works</b><br/><br/>Operational Works inquiry<br/><br/>Merit Works + provide details<br/><br/>📌 Eli: Operational Works"]
    WorksType -->|Driveway / WWRR| WorksDriveway["<b>🔨 WORKS - Driveway / Works Within Road Reserve</b><br/><br/>High-frequency call. Almost every new driveway needs Works Within Road Reserve (WWRR) approval from Council Engineering — customers often don't realise this is separate from building approval.<br/><br/><u>Customer-facing script:</u><br/><i>&quot;Any new or upgraded driveway has to cross Council land — the road reserve, which includes the footpath and verge — to reach the road. Section 75(2) of the Local Government Act means that needs Council permission, which is called a Works Within Road Reserve approval. It's separate from your building approval and it takes about 20 working days.&quot;</i><br/><br/><u>WWRR required for:</u><br/>[ ] New driveway access (virtually every new build)<br/>[ ] Widening or relocating an existing driveway<br/>[ ] Changing surface type (gravel to concrete, etc.)<br/>[ ] Adding a second access point, culvert, or kerb crossing<br/><br/>NOT normally required: simple resealing or maintenance.<br/><br/><u>Important — gravel driveways need approval too.</u> The rule is about works on the road reserve, not the finish.<br/><br/><u>Staff action:</u><br/>1. Check Intramaps — confirm road is NOT yellow/orange (TMR road). If TMR → refer customer to TMR on 13 20 80 FIRST.<br/>2. Email Form: Application for Minor Works — Works Within a Road Reserve (Engineering)<br/>3. Customer to attach sketch plan with location, dimensions, and any culverts/drainage<br/>4. Fee applies — refer to Fees &amp; Charges<br/>5. Allow 20 working days for assessment<br/>6. If unsure whether applies: arrange callback from Engineering<br/><br/><u>Second approval — Water/Sewer infrastructure:</u><br/>If the driveway will pass over, or within 2m of, any Council water main, sewer main, or manhole, a separate Works Near Water Supply or Sewerage Infrastructure approval is required (Section 192(2) Water Supply Act 2008) — second form, second fee.<br/><br/>Telltale signs: meter boxes, sewer manholes, valve/hydrant surface boxes on or near the verge.<br/><br/>📌 Eli: Works Within Road Reserve<br/><br/><span data-context='DrivewayApproval' style='display:inline-block;margin-top:10px;padding:3px 10px;background:#eff6ff;border:1px solid #93c5fd;border-radius:4px;color:#1d4ed8;'>📖 WWRR detail</span>"]

    WorksMinor --> ActionDecision

    'campgrounds': `    InfraDecision -->|Campgrounds| CampType{"Facility?"}
    CampType -->|Washpool| CampWash["<b>🏕️ WASHPOOL</b><br/><br/>Enquiries: Eli Washpool<br/>Additional info: Caretaker<br/>Vicki Lynam 0427 026 216<br/>Price: Fees &amp; Charges CTRL+F 523<br/><br/>Bookings:<br/>Refer to Vicki Lynam 0427 026 216<br/>Instruct to leave voicemail if no answer<br/><br/>📌 Eli: Washpool Guide"]
    CampType -->|Connolly Dam| CampConn["<b>🏕️ CONNOLLY DAM</b><br/><br/>Enquiries: Eli Connolly Dam Camping<br/>Price: Fees &amp; Charges CTRL+F 523<br/><br/>Bookings:<br/>Self-Registration on site<br/>Payment: Cash, cheque, or credit card<br/>Yellow permit on windscreen<br/><br/>📌 Eli: Connolly Dam"]
    CampType -->|River Road| CampRiver["<b>🏕️ CONDAMINE RIVER ROAD</b><br/><br/>Customers occasionally call to check whether the Condamine River Road Crossing is open and safe. It is recommended to only attempt the 14 river crossings in a 4WD.<br/><br/>1. Check the Disaster Dashboard — use the road closure list to determine if the crossing is open<br/>2. Use the Flood Cameras on the dashboard to access recent pictures of crossings on Condamine River Road — email pictures to the customer to assist them in making an informed decision<br/>3. If rain is forecast: advise the customer that mountain slopes channel water into the Condamine rapidly. It is not advisable to attempt the crossings if rain is forecast. An electric sign at the base of the crossing will also indicate if it is closed.<br/>4. If the customer is concerned conditions may change: link them to the Disaster Dashboard for the most current information<br/><br/>📌 <a href='https://disaster.sdrc.qld.gov.au' target='_blank'>SDRC Disaster Dashboard</a>"]

    'claims': `    OtherDecision -->|Claims| ClaimsRoute["<b>⚠️ DAMAGE OR INJURY CLAIMS</b><br/><br/><u>Customer-facing script:</u><br/><i>&quot;You can submit a letter of demand to Council. It needs to include your name, the time and location of the incident, the nature of the damage or injury, and any supporting evidence — photos, witness details, or vet/medical reports. I can give you the postal and email details now.&quot;</i><br/><br/><u>Instruct customer to include:</u><br/>Name, Time, Location of incident, Nature of injury/damage, Evidence: photos, witnesses, etc.<br/><br/><u>Send Letter of Demand to:</u><br/><br/><b>Personal/Property Damage:</b><br/>Subject: ATTN: CEO<br/><br/><b>Road Related Damage:</b><br/>Subject: ATTN: Governance<br/><br/><u>Postal:</u><br/>Southern Downs Regional Council<br/>PO Box 26<br/>Warwick QLD 4370<br/><br/><u>Email:</u><br/>mail@sdrc.qld.gov.au<br/><br/>📌 Eli: Claims Process"]

    'water': `    PropDecision -->|Water| WaterType{"Type?"}
    WaterType -->|Aqualas Portal| WaterAqualas["<b>💧 WATER - Water Usage &amp; Portal</b><br/><br/>Staff-facing tool name: <b>Aqualas</b>. Customer-facing name: <b>My SDRC Water portal</b>. Same system — use the customer-facing name when speaking to callers.<br/><br/><u>Customer-facing script:</u><br/><i>&quot;The My SDRC Water portal connects to your Smart Water Meter and lets you view near-real-time usage and set a custom alert threshold to catch a leak early. Sign-up details are on page 4 of your rates notice.&quot;</i><br/><br/>[ ] Customers can sign up for the portal to monitor their own water usage — sign-up QR code is on page 4 of the rates notice<br/>[ ] Once the customer has made an account, real estate agents can be granted access to monitor water usage on behalf of a property owner<br/>[ ] Customers can set a custom leak detection threshold within the portal to receive alerts<br/><br/>📌 <a href='https://mysdrcwater.sdrc.qld.gov.au/' target='_blank'>My SDRC Water portal</a>"]
    WaterType -->|Leak| WaterLeakType{"Leak Type?"}
    WaterLeakType -->|Notified by Water Team| WaterLeakNotified["<b>💧 WATER - Leak Notified by Water Team</b><br/><br/>The Water Team notifies customers when a leak is detected on their side of the meter. Customers often call to confirm.<br/><br/><u>Customer-facing script — finding an inside leak:</u><br/><i>&quot;Many leaks can be found without a plumber. A running toilet is the most common cause — add a few drops of food colouring to the cistern and wait 10 minutes without flushing; if colour appears in the bowl, the cistern is leaking. Also check all taps, showerheads, and washing machine connections. Outside, look for unusually green or boggy ground — this can indicate an underground pipe failure even when there's no visible surface water.&quot;</i><br/><br/><u>Staff action:</u><br/>1. Verify customer identity<br/>2. Search Property ID in Aqualas (customer-facing: My SDRC Water) — check current water usage and recent notifications on the property dashboard<br/>3. If water usage is consistently above 0L/hour, the leak is within the customer's plumbing<br/>4. Run through basic leak finding techniques with customer — occasionally the leak can be identified and resolved during the call<br/><br/><u>Internal checks:</u><br/>[ ] Substantial leak but no wet areas visible — water may be leaking into a drain<br/>[ ] Check for running toilets, washing machine leaks, dripping taps/showers (see fact sheet for method)<br/><br/><u>External checks:</u><br/>[ ] Garden timers and hose guns — check anything left running<br/>[ ] Look for unusually green or boggy patches of ground (underground pipe/fitting failure)<br/>[ ] Underground pipes can fail without a wet surface — plumbers can pump air into pipes to test pressure (refer to fact sheet for non-plumber method)<br/><br/>If the leak is not obvious, advise the customer to contact a licensed plumber.<br/><br/>📌 <a href='https://www.sdrc.qld.gov.au/ArticleDocuments/1182/Checking%20for%20Water%20Leaks%20Fact%20Sheet.pdf.aspx' target='_blank'>Checking for Water Leaks Fact Sheet</a><br/>📌 Eli: Water Leak Procedure"]
    WaterLeakType -->|Suspected Meter Leak| WaterMeterLeak["<b>💧 WATER - Suspected Water Meter Leak</b><br/><br/>Customer reports a visible leak at the meter, footpath, or road. Before contacting the Maintenance Supervisor, determine which side of the meter the leak is on.<br/><br/><u>Customer-facing script — which side:</u><br/><i>&quot;Council's side is the meter itself and the pipe between the water main and the meter. Your side is the pipe running from the meter into the property — that's the property owner's responsibility. Not sure which side? Stay on the line and I'll help you work it out.&quot;</i><br/><br/><u>Staff triage:</u><br/>[ ] Visible leak at meter/footpath/road — search PID in Aqualas (My SDRC Water) and check whether usage shows periods of 0L/hour. If usage returns to 0L/hour and a visible leak is present: lodge Merit (keyword: leak) and report to the north/south maintenance supervisor.<br/><br/>[ ] Usage consistently above 0L/hour — leak is likely on the customer side. Advise customer to shut off water at meter if practical and call a licensed plumber.<br/><br/>[ ] Both possible — if Aqualas shows non-zero usage AND customer reports a visible leak on the council side: lodge Merit (keyword: leak), report to maintenance supervisor, and also advise customer to shut off meter and call a licensed plumber.<br/><br/>📌 <a href='https://www.sdrc.qld.gov.au/ArticleDocuments/1182/Checking%20for%20Water%20Leaks%20Fact%20Sheet.pdf.aspx' target='_blank'>Checking for Water Leaks Fact Sheet</a><br/>📌 Eli: Water Leak Procedure<br/><br/><span data-context='WaterMeterSides' style='display:inline-block;margin-top:10px;padding:3px 10px;background:#eff6ff;border:1px solid #93c5fd;border-radius:4px;color:#1d4ed8;'>📖 Which side of the meter?</span>"]
    WaterLeakType -->|Finding the Meter| WaterMeterFind["<b>💧 WATER - Finding the Water Meter</b><br/><br/>Common both on its own (&quot;where is my water meter?&quot;) and during leak calls. Handle both the same way.<br/><br/><u>Customer-facing script:</u><br/><i>&quot;Water meters are usually near the front boundary of the property close to the street — often in a small covered box set into the ground. I can look up the exact location for your address now if you like.&quot;</i><br/><br/><u>Staff action:</u><br/>[ ] Open Intramaps, select the Water and Sewerage Module, and zoom in on the property to show the exact meter location. Describe the location to the customer and send a screenshot if necessary. Aqualas (My SDRC Water) also contains photos taken at the time of meter installation.<br/>[ ] If the property has multiple meters, provide the customer with the relevant meter number and location.<br/>[ ] If the customer is unsure which pipes connect to a specific meter — check ECM for building plans. Note: if the customer requests a copy of building plans, refer to Building - Copy of Building Plans node. A simpler approach is often to shut off each meter individually and check which taps stop running."]
    WaterType -->|Waterways| WaterWaysType{"Query Type?"}
    WaterWaysType -->|Creeks &amp; Rivers| WaterCreeks["<b>💧 WATER - Warwick/Stanthorpe Creeks &amp; Rivers</b><br/><br/>Complaints or concerns regarding creeks and rivers within the Warwick/Stanthorpe shire boundaries should be referred to the Warwick/Stanthorpe Shire River Improvement Trust.<br/><br/>The Trust carries out works to improve water flow, correct erosion, and provide flood mitigation in rivers and tributaries.<br/><br/>📌 Eli: Shire River Improvement Trust"]
    WaterWaysType -->|Dam / Creek / Bore| WaterDam["<b>💧 WATER - Dam Construction, Creek Water &amp; Bore Access</b><br/><br/>Queries regarding waterway permits and licences are managed by the Department of Natural Resources.<br/><br/>Common queries include:<br/>- Can I dig a dam?<br/>- Can I pump from a creek?<br/>- Can I install a bore?<br/><br/>Refer customer to Department of Natural Resources: 13 74 68"]
    WaterType -->|Bulk Water| WaterBulk["<b>💧 WATER - Supply of Bulk Water</b><br/><br/><u>Fill Station Locations:</u><br/>- Warwick: Wallace Street (near the Guide Hut) — PID 20505<br/>- Stanthorpe: Mackenzie Street (near the Council Depot) — PID 95510<br/>- Killarney: Mountain View Road — Adjacent PID 53180<br/>- Allora: Forest Plain Road — Adjacent PID 68865<br/><br/>Fill stations are accessible 24 hours. Fittings available:<br/>- 80mm male camlock — suitable for water carters<br/>- 25mm male camlock — suitable for filling pods<br/><br/>An updated list of approved bulk water carriers is available on the SDRC website.<br/><br/>📌 More information to be added"]
    WaterType -->|Recycled Water| WaterRecycled["<b>💧 WATER - Recycled Water Supply</b><br/><br/>Council provides recycled water to commercial customers only.<br/><br/><u>Access options:</u><br/>- Fill stations (access card required)<br/>- Direct metered connection to the pipeline<br/><br/><u>To arrange purchase of recycled water:</u><br/>Lodge a Merit (keyword: Effluent) — Water Department processes these requests. Customer service can advise on general details.<br/><br/><u>Customer application process:</u><br/>1. Set up a Debtor Account with Council<br/>2. Sign the Recycled Water Agreement<br/>3. Access card issued upon approval<br/><br/><u>Fees:</u><br/>Charged per megalitre (1,000,000L) — refer to current SDRC Fees and Charges (Recycled Water section). A monthly administration fee also applies. Full details in the Recycled Water Agreement.<br/><br/><u>Fill point locations:</u><br/>- Wentworth Street (near the Warwick Wastewater Treatment Plant)<br/>- Morgan Park (near the recycled water reservoir)"]

    WaterAqualas --> ActionDecision
    WaterLeakNotified --> ActionDecision

    WaterDam --> ActionDecision

    'weeds': `    BioDecision -->|Weeds| WeedsType{"Topic?"}
    WeedsType -->|Obligations / GBO| WeedsGBO["<b>🌾 WEEDS - Landholder Obligations (GBO)</b><br/><br/>Every landholder in Queensland has a <b>General Biosecurity Obligation (GBO)</b> under the Biosecurity Act 2014. The legal standard is &quot;reasonable and practical&quot; steps to prevent the spread of invasive plants — NOT eradication of every weed.<br/><br/><u>Customer-facing script:</u><br/><i>&quot;The law asks you to take reasonable and practical steps — what that looks like depends on the species, the size of the infestation, and what you can realistically manage. Treating a small new outbreak of African Boxthorn is reasonable; hand-pulling every blackberry on 200 hectares of bushland is not. Our Local Laws Team can help you work out what's reasonable for your property.&quot;</i><br/><br/><u>Species with stronger obligations:</u><br/>- <b>Restricted invasive plants (state, Biosecurity Act 2014):</b> Blackberry, African Boxthorn, Lantana — must not be sold, given away, or released. Active control expected.<br/>- <b>Locally declared (SDRC Subordinate Local Law No. 7):</b> Firethorn, Green Cestrum, St John's Wort — Council has authority to issue control notices.<br/><br/><u>Staff action:</u><br/>1. Provide the Qld Gov invasive plants fact sheet link (identification + control advice by species)<br/>2. For property-specific advice: transfer to Local Laws, or arrange callback (Merit: Weeds)<br/><br/>📌 <a href='https://www.publications.qld.gov.au/dataset/invasive-plant-weed' target='_blank'>Qld Gov — Invasive Plant Fact Sheets</a><br/>📌 <a href='https://www.sdrc.qld.gov.au/living-here/environment-water-waste/biosecurity-sustainability/pest-management-weeds' target='_blank'>SDRC Pest Management — Weeds</a>"]
    WeedsType -->|Identification| WeedsID["<b>🌾 WEEDS - Plant Identification</b><br/><br/>Customers regularly call to ask whether a plant on their property is a declared weed.<br/><br/><u>Customer-facing script:</u><br/><i>&quot;The Queensland Government publishes free fact sheets for every declared and restricted invasive plant — with identification photos, distinguishing features, and look-alike species. That's the definitive source. If you're still not sure, we can help — describe what you've seen: leaf shape, flower colour, fruit, where it's growing, how tall it is. A photo really helps too.&quot;</i><br/><br/><u>Staff action:</u><br/>1. Direct customer to Qld Gov invasive plants fact sheets (authoritative source)<br/>2. If customer still unsure: take a description, ask them to email a photo, or arrange callback with Local Laws<br/>3. DO NOT identify plants yourself from a verbal description — getting it wrong in either direction is a problem (destroying a native, or ignoring a declared weed)<br/><br/>⚠️ Warn customer against general image-search tools — many invasive plants have native look-alikes.<br/><br/>📌 <a href='https://www.publications.qld.gov.au/dataset/invasive-plant-weed' target='_blank'>Qld Gov — Invasive Plant Fact Sheets</a>"]
    WeedsType -->|Equipment Hire| WeedsHire["<b>🌾 WEEDS - Equipment Hire</b><br/><br/>Council Local Laws hires out three pieces of weed-control equipment to landholders and registered farmer groups within the Southern Downs region.<br/><br/><u>Equipment &amp; fees (current Apr 2026 — subject to change):</u><br/><br/>1. <b>Boxthorn / Sucker Puller</b> (skid-steer or Euro Hitch)<br/>   Best for: African Boxthorn and other woody weeds<br/>   $20/day or $100/week + $250 refundable deposit<br/><br/>2. <b>Spray Equipment (300L)</b><br/>   Best for: General foliar spraying on difficult terrain and fence lines<br/>   $20/day or $100/week + $250 refundable deposit<br/><br/>3. <b>Cactus Injector</b><br/>   Best for: Tree Pear and other invasive cacti — precise herbicide injection<br/>   FREE hire + $100 refundable deposit<br/><br/><u>Terms:</u><br/>- Maximum hire period: 2 weeks<br/>- Late return fee: $52/day<br/>- Eligibility: individual farmers or registered farmer groups within the SDRC region<br/>- Deposit must be claimed within 3 months of return, with the correct form, or deposit is forfeited<br/><br/><u>Staff action:</u><br/>1. Email Form: Application for Hire (download from Pest Management — Weeds page)<br/>2. Customer submits the form to a Customer Service Centre (Warwick, Stanthorpe, or Allora)<br/>3. Take hire fee and deposit at time of pickup<br/>4. For equipment advice on which suits their situation: transfer to Local Laws<br/><br/>📌 Eli: Weed Equipment Hire<br/>📌 <a href='https://www.sdrc.qld.gov.au/living-here/environment-water-waste/biosecurity-sustainability/pest-management-weeds' target='_blank'>Pest Management — Weeds</a>"]
    WeedsType -->|Herbicide advice| WeedsHerbicide["<b>🌾 WEEDS - Herbicide Advice</b><br/><br/>⚠️ <b>Council Local Laws can offer general advice on approach, but cannot recommend specific commercial products.</b><br/><br/><u>Customer-facing script:</u><br/><i>&quot;Every Queensland Government weed fact sheet includes a detailed herbicide table — with specific products, application rates, situations (pasture, non-crop, native conservation area), and the right season to spray. That's the authoritative source. Council staff can talk through the general approach, but we can't recommend a specific brand.&quot;</i><br/><br/><u>General principles worth mentioning:</u><br/>[ ] Always read the herbicide label — labels are legally binding<br/>[ ] Check for APVMA minor-use permits (e.g. Firethorn is covered by permit PER11463)<br/>[ ] Timing matters — most weeds are best treated when actively growing (typically spring-autumn)<br/>[ ] Remove grazing stock from sprayed areas during and after treatment<br/>[ ] Some properties are in hazardous chemical areas (Agricultural Chemicals Distribution Control Act 1966) — certain herbicides restricted<br/><br/>Transfer to Local Laws for property-specific advice, or arrange callback.<br/><br/>📌 <a href='https://www.publications.qld.gov.au/dataset/invasive-plant-weed' target='_blank'>Qld Gov — Invasive Plant Fact Sheets (with herbicide tables)</a>"]
    WeedsType -->|Council Road Weeds| WeedsRoad["<b>🌾 WEEDS - Weeds on Council Roads</b><br/><br/>Council's Local Laws Team coordinates weed control on Council roads and land.<br/><br/><u>Staff action:</u><br/>1. Check Intramaps — confirm road is NOT yellow/orange (TMR road)<br/>2. If TMR road (New England Hwy, Cunningham Hwy, etc.): refer customer to TMR on 13 20 80<br/>3. If Council road: Lodge Merit (Keyword: Weeds) or online service request — include location, description of weed if known, and customer contact<br/><br/>📌 Eli: Weed Control — Council Roads"]
    WeedsType -->|Neighbour spreading weeds| WeedsNeighbour["<b>🌾 WEEDS - Neighbour's weeds spreading onto property</b><br/><br/>This is a biosecurity matter, NOT a neighbour dispute. Council CAN investigate — different from tree or fencing disputes.<br/><br/><u>Customer-facing script:</u><br/><i>&quot;This is a biosecurity matter, not a neighbour dispute — every landholder in Queensland has a legal duty to take reasonable steps to prevent weeds spreading from their land. If you feel safe doing so, a friendly conversation with the neighbour often resolves it — many people don't realise what's growing on their property or that it's a problem. If that doesn't work, we can investigate.&quot;</i><br/><br/><u>Staff action:</u><br/>1. Encourage customer to speak with neighbour first if safe and appropriate<br/>2. If that fails, lodge Merit (Keyword: Weeds) or online service request<br/>3. Local Laws investigates and may:<br/>[ ] Work directly with the neighbouring landholder<br/>[ ] For restricted species (state Biosecurity Act 2014): refer to Biosecurity Queensland / DPI<br/><br/>📌 <a href='https://www.dpi.qld.gov.au/contact' target='_blank'>Department of Primary Industries</a><br/>📌 Eli: Weed Complaints"]

    WeedsGBO --> ActionDecision
    WeedsID --> ActionDecision
    WeedsHire --> ActionDecision
    WeedsHerbicide --> ActionDecision
    WeedsRoad --> ActionDecision
    WeedsNeighbour --> ActionDecision`,

    'pests': `    BioDecision -->|Pest Animals| PestsType{"Topic?"}
    PestsType -->|Obligations / GBO| PestsGBO["<b>🐗 PESTS - Landholder Obligations (GBO)</b><br/><br/>Every landholder has a <b>General Biosecurity Obligation (GBO)</b> under the Biosecurity Act 2014 for invasive animals — same legal basis as for weeds.<br/><br/><u>Customer-facing script:</u><br/><i>&quot;If an invasive animal is on your land and there are reasonable, practical steps you could take to limit the damage or its spread, you're expected to take them. What counts as reasonable depends on whether you're on a suburban block, a lifestyle property, or a large grazing property — there's no one-size-fits-all checklist.&quot;</i><br/><br/><u>Restricted invasive animals in the Southern Downs:</u><br/>- Wild dog and dingo (Canis familiaris / Canis familiaris dingo)<br/>- European red fox (Vulpes vulpes)<br/>- Feral pig (Sus scrofa)<br/>- Feral cat (Felis catus) — meaning unowned cats<br/>- Rabbit (Oryctolagus cuniculus) — both wild and domestic varieties<br/>- Feral deer — primarily fallow deer (Dama dama) locally<br/><br/>These MUST NOT be moved, kept, fed, given away, sold, or released.<br/><br/><u>Indian mynas:</u> NOT declared restricted, but still covered by GBO.<br/><br/>📌 <a href='https://www.business.qld.gov.au/industries/farms-fishing-forestry/agriculture/biosecurity/animals/invasive' target='_blank'>Qld Gov — Invasive Animals</a><br/>📌 <a href='https://www.feralscan.org.au' target='_blank'>FeralScan (sightings/reports)</a>"]
    PestsType -->|Wild Dogs / Stock Attack| PestsWildDog["<b>🐗 PESTS - Wild Dogs &amp; Stock Attack</b><br/><br/>Wild dogs (including dingoes, dingo-cross, and roaming unowned domestic dogs) are one of the most significant pest animal issues for Southern Downs producers.<br/><br/><u>Customer-facing script for an active attack:</u><br/><i>&quot;Protect your remaining stock first — move lambing ewes, calving cows, and young stock closer to the house or into yards. Then photograph carcasses, bite patterns, tracks, and scats before you move anything — that helps us and supports coordinated control across the district. Control on one property alone rarely holds for long, so talking to your neighbours about coordinating is usually the single most effective thing you can do.&quot;</i><br/><br/><u>Staff action:</u><br/>1. Lodge Merit (Keyword: Wild Dog) or online service request<br/>2. Encourage the customer to also log in FeralScan — free app, data helps Council coordinate<br/>3. For advice on which control methods suit their property: transfer to Local Laws<br/><br/><u>Control methods available to landholders:</u><br/>- 1080 baiting (most economical over large areas — see Baiting node)<br/>- Trapping with padded foot-hold traps<br/>- Shooting<br/>- Exclusion fencing, including cluster fencing arrangements<br/>- Livestock guardian animals (maremma dogs, alpacas)<br/><br/>📌 <a href='https://www.feralscan.org.au' target='_blank'>FeralScan / WildDogScan</a><br/>📌 Eli: Wild Dogs"]
    PestsType -->|Wild Dog Bounty| PestsBounty["<b>🐗 PESTS - Wild Dog Bounty</b><br/><br/>Council pays a bounty on wild dogs destroyed within Southern Downs as an incentive for ongoing control.<br/><br/><u>Current rates (Apr 2026 — subject to change):</u><br/>- <b>$50 per pup</b> (up to 14 weeks of age)<br/>- <b>$100 per wild dog</b> (over 14 weeks of age)<br/><br/><u>How to claim — staff action:</u><br/>1. Confirm dog was destroyed within SDRC boundaries<br/>2. Confirm the kill was logged in FeralScan (required on claim form)<br/>3. Customer presents the <b>whole dog</b> (not just a scalp) to a Council Authorised Person within 60 days of destruction<br/>4. Email Form: Claim for Wild Dog Bounty<br/>5. Authorised Person signs to confirm they received the dog and rendered it unsuitable for future claims<br/>6. If customer has not claimed in the last 2 years: include SDRC Electronic Transfer Form (and ABS Statement by Supplier if no ABN)<br/><br/><u>Set expectations with the customer:</u><br/>The bounty complements other control methods — coordinated baiting, exclusion fencing, guardian animals — rather than replacing them. Bounty payments are a privilege, not a legal right, and can be adjusted by Council.<br/><br/>📌 Eli: Wild Dog Bounty"]
    PestsType -->|1080 Baiting| Pests1080["<b>🐗 PESTS - 1080 Baiting Program</b><br/><br/>Council is an authorised supplier of 1080 (sodium fluoroacetate) baits for wild dog and fox control. Pickup is from the <b>Warwick and Stanthorpe pounds</b>.<br/><br/><u>Two options for landholders:</u><br/>1. <b>Buy pre-prepared manufactured baits</b> — $36 for a 10-pack of wild dog baits (Apr 2026, subject to change)<br/>2. <b>Bring your own fresh meat</b> to be injected with 1080 — often preferred because local wild dogs may already be habituated to that meat source<br/><br/><u>Before baiting — customer MUST:</u><br/>[ ] Attend a baiting briefing or sign the required acknowledgements (Council guides them through this)<br/>[ ] <b>Notify all adjoining neighbours at least 72 hours in advance</b><br/>[ ] Erect warning signage at every entrance before baiting AND for at least 1 month afterwards<br/>[ ] Keep working dogs muzzled or restrained<br/>[ ] Remove livestock from baited paddocks per product label<br/><br/>⚠️ <b>Critical customer warning:</b><br/>1080 is extremely toxic to dogs and there is NO reliable antidote. Baits and poisoned carcasses remain toxic for a considerable time. If a working dog or family pet takes a bait or eats a poisoned animal, the outcome is usually fatal. Neighbour notification, signage, and correct bait placement are LEGAL requirements, not guidelines.<br/><br/><u>Recommended timing:</u><br/>Many landholders bait twice a year — March-May (breeding adults) and September-November (pups/juveniles). Coordinating with neighbours dramatically improves results.<br/><br/><u>Staff action:</u><br/>Transfer to Local Laws to arrange bait supply and to discuss if baiting is the right approach for their situation.<br/><br/>📌 Eli: 1080 Baiting"]
    PestsType -->|Cat / Fox Trap Hire| PestsTrap["<b>🐗 PESTS - Cat / Fox Trap Hire</b><br/><br/>Council has <b>10 cat traps</b> in the hire pool (approx 88 hires per year) for residents dealing with feral cats, stray cats, or foxes.<br/><br/><u>Fees (Apr 2026 — subject to change):</u><br/>- <b>$15 per week or part thereof</b> + <b>$100 refundable deposit</b><br/>- Deposit must be claimed within 3 months of return, or forfeited<br/><br/><u>How to hire — staff action:</u><br/>1. Email Form: Application for Hire of Cat/Fox Trap or Barking Collar or Tree Pear Injector<br/>2. Customer submits form AND proof of identity (driver's licence, passport, or other acceptable ID) to Warwick, Stanthorpe, or Allora Customer Service Centre<br/>3. Hire period: one week<br/>4. Take fee and deposit at pickup<br/>5. Complete spreadsheet: S:\\Customer Service\\Shared All\\Animals\\Lost &amp; Found Register — Fox &amp; Cat Trap Tab<br/><br/><u>Safety script for the customer:</u><br/><i>&quot;Check the trap at least twice a day — morning and late afternoon. Never leave a baited, set trap unattended more than 12 hours. Keep it out of direct sun, and provide shade and water if it's set overnight. Release any non-target animals — possums, native birds, pet cats — immediately and unharmed.&quot;</i><br/><br/><u>Drop-off for captured cats:</u><br/>Warwick or Stanthorpe pound — 24-hour impoundment drop-off boxes at both facilities, checked daily including weekends and public holidays. For foxes, customer should call Council before drop-off for guidance.<br/><br/><u>Cat impoundment holding periods:</u><br/>- Microchipped (owner identifiable): held minimum 5 days<br/>- No ID: held minimum 3 days before assessed for rehoming (often via Southern Downs Ark) or other disposition<br/><br/>📌 Eli: Cat Trap Hire"]
    PestsType -->|Feral Pigs / Hog Hopper| PestsPig["<b>🐗 PESTS - Feral Pigs &amp; Hog Hopper Hire</b><br/><br/>Feral pigs are a restricted invasive animal — must not be kept, fed, or moved. Signs of pig activity: rooting damage, wallows near water, damaged fences, missing lambs or poultry.<br/><br/><u>Control options for landholders:</u><br/>- <b>Trapping with a pig-specific trigger</b> — silo-style cage with funnel entrance or lift-bar trigger. Pre-feed for several nights before setting the trigger to dramatically improve catch rates<br/>- <b>1080 baiting</b> — most effective broadscale, same notification/signage/pre-feeding requirements as wild dogs (see 1080 node). Fermented grain is common and effective<br/>- <b>Fencing</b> — sheep mesh tight to ground with electrified offset wire, good for high-value crops<br/>- <b>Ground and aerial shooting</b> — effective in low-density or open country, thermal imaging helps at night<br/><br/><u>Council Hog Hopper hire:</u><br/>Species-specific bait delivery device with a weighted, hinged lid — pigs can lift it with their snouts, but native animals, macropods, and most livestock cannot. Makes 1080 pig baiting substantially safer by reducing non-target risk.<br/><br/>- Hire: <b>FREE</b> + $100 refundable deposit<br/>- Maximum hire period: 2 weeks<br/>- Deposit claimable within 3 months of return<br/><br/><u>Staff action:</u><br/>Transfer to Local Laws, or arrange callback, to organise Hog Hopper hire and discuss control approach.<br/><br/>⚠️ <b>Customer health warning:</b><br/>Feral pigs can carry diseases transmissible to humans — leptospirosis, brucellosis, Q fever, melioidosis. Wear gloves, avoid direct contact with blood/urine/faeces, don't eat undercooked feral pig meat, and never feed raw feral pig meat or offal to dogs (swine brucellosis can pass from pigs to dogs to humans).<br/><br/>📌 Eli: Feral Pigs"]
    PestsType -->|Rabbits / DDMRB| PestsRabbit["<b>🐗 PESTS - Rabbits &amp; the Rabbit-Free Zone</b><br/><br/>Queensland is the only Australian state that maintains a designated <b>rabbit-free zone</b>, protected by a rabbit-proof fence and actively managed by the <b>Darling Downs-Moreton Rabbit Board (DDMRB)</b>. The Southern Downs sits INSIDE this zone — rabbit sightings here are treated seriously.<br/><br/><u>Customer-facing script for a wild rabbit sighting:</u><br/><i>&quot;Because the Southern Downs is inside Queensland's rabbit-free zone, any wild rabbit sighting matters. The Darling Downs-Moreton Rabbit Board has specialist officers for exactly this — I'd suggest giving them a call on 07 4661 4076, or I can take the details and pass it on to them.&quot;</i><br/><br/><u>Critical — pet rabbits are ILLEGAL in Queensland:</u><br/>Domestic and wild rabbits are the same species and will interbreed if domestic rabbits escape. Keeping a pet rabbit — even desexed, in a secure hutch — is not permitted. Permits only issued for research or certain public entertainment (magic shows, circuses).<br/><br/><u>Customer-facing script for an illegal pet rabbit situation:</u><br/><i>&quot;Please don't release it into the wild. You have options — you can surrender it to Council at the Warwick or Stanthorpe office, contact the Rabbit Board on 07 4661 4076 to arrange collection, or arrange humane euthanasia through a vet. Council and the DDMRB would rather help you resolve this than see the rabbit released — so get in touch, no one will be unpleasant about it.&quot;</i><br/><br/><u>Contacts:</u><br/>- Darling Downs-Moreton Rabbit Board: 07 4661 4076<br/>- Council: 1300 697 372<br/><br/>📌 <a href='https://www.ddmrb.org.au' target='_blank'>DDMRB website</a>"]
    PestsType -->|Feral Deer| PestsDeer["<b>🐗 PESTS - Feral Deer</b><br/><br/>The Southern Downs is home to the largest wild fallow deer herd in Queensland, centred on the Pikedale area south-west of Warwick. Broadly continuous with the NSW New England Tableland population.<br/><br/><u>Species locally:</u><br/>Fallow deer (Dama dama) is the local species. Red, chital, and rusa deer are well north and east of SDRC.<br/><br/><u>Legal status:</u><br/>Feral fallow deer are a category 3, 4 and 6 restricted invasive animal under the Biosecurity Act 2014 — must not be moved, fed, given away, sold, or released. GBO applies.<br/><br/><u>Farmed deer / game parks:</u><br/>Kept in deer-proof enclosures, treated separately. If an enclosed deer escapes and establishes in the wild, the owner is responsible. Anyone keeping deer must register as a biosecurity entity.<br/><br/><u>Control options for landholders:</u><br/>- <b>Ground shooting</b> — most effective and humane method; usually at night from a vehicle with spotlights or thermal equipment, by trained personnel with appropriate licences<br/>- <b>Helicopter shooting</b> — cost-effective across large or open properties but specialised; best coordinated across adjoining landholders<br/>- <b>Trapping</b> — option in peri-urban areas; self-closing gate or clover trap; must be checked frequently, animal welfare considerations significant<br/>- <b>Exclusion fencing</b> — works but expensive (approx 2.1m high, 9m posts, netting pegged to ground); usually only for high-value crops<br/>- <b>Engaging licensed recreational hunters</b> — common local approach; landholder should check access conditions, public liability insurance, and references first<br/><br/><u>Coordination matters:</u><br/>Deer have large home ranges and move between properties. Control on a single property is usually eroded by in-migration — coordinated effort across adjoining landholders is much more effective than working alone.<br/><br/><u>Staff action:</u><br/>For property-specific advice, transfer to Local Laws or arrange callback (Merit: Deer).<br/><br/>📌 <a href='https://www.business.qld.gov.au/industries/farms-fishing-forestry/agriculture/biosecurity/animals/invasive' target='_blank'>Biosecurity Qld — Invasive Animals</a>"]
    PestsType -->|Roaming Cats| PestsCat["<b>🐗 PESTS - Roaming / Neighbour's Cat</b><br/><br/>Common nuisance complaint. Roaming cats are treated differently from a dog nuisance — no barking-diary equivalent.<br/><br/><u>Customer-facing script:</u><br/><i>&quot;The best first step is almost always a friendly conversation with the cat's owner — in many cases they don't realise it's causing a problem, and a calm chat often sorts it out. If that doesn't work, you can hire a cat trap from Council.&quot;</i><br/><br/><u>Staff action:</u><br/>1. Encourage the customer to try direct contact first<br/>2. If that fails: offer cat trap hire — see Cat/Fox Trap Hire node<br/>3. For microchipped cats dropped at the pound: Council attempts owner contact; cats with chip held min. 5 days, no ID min. 3 days<br/><br/><u>Useful subsidised service to mention:</u><br/>Council runs a subsidised cat desexing and microchipping program through the National Desexing Network, subject to available funding each year. Desexed cats are less likely to roam or fight, and a current microchip is the single best way to make sure a lost cat comes home. Check current eligibility and availability before confirming to the customer.<br/><br/>📌 Eli: Cat Desexing Program"]
    PestsType -->|Indian Mynas| PestsMyna["<b>🐗 PESTS - Indian Mynas</b><br/><br/>Indian mynas are NOT a declared restricted species, but are covered by the GBO. Council supports residents who want to control them. They compete for tree hollows, evict native parrots, and roof nests introduce mites, lice, and a fire risk.<br/><br/>⚠️ <b>Critical ID warning for the customer:</b><br/>Do not confuse Indian mynas with native noisy miners — they look superficially similar but noisy miners are NATIVE and PROTECTED. Destroying a noisy miner is a wildlife offence.<br/><br/><u>Quick ID:</u><br/>- <b>Indian myna</b> — BROWN body, BRIGHT YELLOW legs<br/>- <b>Noisy miner</b> — GREY body, FLESH-COLOURED legs<br/>Both have yellow bills and yellow eye patches.<br/><br/><u>Customer-facing script — what actually reduces numbers:</u><br/><i>&quot;The four most effective things are: block access to nest sites in your roof and eaves (cover gaps, clear dead palm fronds, bird-proof gutters), don't feed them even accidentally (bring pet food inside, seal compost, watch your bird feeders), remove nests and eggs (Indian myna eggs are a distinctive blue-turquoise — no native hollow-nester lays eggs that colour), and restore native habitat. Trapping is possible but needs coordination with neighbours to actually make a dent.&quot;</i><br/><br/>📌 <a href='https://indianmynaaction.org.au' target='_blank'>Indian Myna Action Group</a>"]
    PestsType -->|Council Land Pests| PestsCouncilLand["<b>🐗 PESTS - Pest Animals on Council Land or Roads</b><br/><br/>Council Local Laws coordinates invasive animal control on Council-managed land and road reserves.<br/><br/><u>Staff action:</u><br/>1. Check Intramaps — confirm land/road is Council-managed (not yellow/orange for TMR, not National Park)<br/>2. Lodge Merit (Keyword: Pest Animal) or online service request<br/>3. Useful details to capture: location (GPS or nearest cross-street), species, approximate number, time of sighting, any evidence of damage<br/><br/><u>Not Council-managed — refer customer:</u><br/>- <b>State-controlled roads</b> (New England Hwy, Cunningham Hwy) → TMR 13 20 80<br/>- <b>National parks</b> (Main Range, Girraween, Sundown) → Queensland Parks and Wildlife Service (QPWS)<br/><br/><u>Region-wide sighting data — worth mentioning:</u><br/><i>&quot;If you'd like to also log this in FeralScan, it's free and works as a phone app — the accumulated data helps Council, the Rabbit Board, and neighbouring landholders coordinate broader control efforts.&quot;</i><br/><br/>📌 <a href='https://www.feralscan.org.au' target='_blank'>FeralScan</a><br/>📌 Eli: Pest Animals on Council Land"]

    };

    // ── Auto line-wrap ───────────────────────────────────────────────────
    // Wraps plain text inside Mermaid node labels at word boundaries so no
    // single visual line exceeds maxLen characters. Skips HTML tags and any
    // segment that contains a URL (href=) so links are never broken.

    function wrapTextSegment(segment, maxLen) {
        if (segment.length <= maxLen) return segment;
        if (/href=/.test(segment)) return segment; // never break URL lines

        const tokens = segment.split(/(<[^>]+>)/); // split on HTML tags
        let output = '';
        let lineLen = 0;

        for (const tok of tokens) {
            if (tok.startsWith('<')) {
                output += tok; // tag — output as-is, don't count length
            } else {
                const words = tok.split(' ');
                for (let w = 0; w < words.length; w++) {
                    const word = words[w];
                    if (!word) {
                        if (lineLen > 0) { output += ' '; lineLen++; }
                        continue;
                    }
                    const addSpace = lineLen > 0;
                    const needed = word.length + (addSpace ? 1 : 0);
                    if (lineLen > 0 && lineLen + needed > maxLen) {
                        output += '<br/>';
                        lineLen = 0;
                        output += word;
                        lineLen = word.length;
                    } else {
                        if (addSpace) { output += ' '; lineLen++; }
                        output += word;
                        lineLen += word.length;
                    }
                }
            }
        }
        return output;
    }

    function wrapHtmlLines(html, maxLen) {
        // Split preserving existing <br/> tags, then wrap each segment
        const parts = html.split(/(<br\s*\/?>)/i);
        return parts.map(p => /<br\s*\/?>/i.test(p) ? p : wrapTextSegment(p, maxLen)).join('');
    }

    function wrapSource(source, maxLen) {
        maxLen = maxLen || 72;
        // Match node label content between [" and "]
        return source.replace(/\["([\s\S]*?)"\]/g, (match, content) =>
            '["' + wrapHtmlLines(content, maxLen) + '"]'
        );
    }

    // ── Rebuild & render ─────────────────────────────────────────────────
    let renderTimer = null;

    // rebuildFresh: called by checkboxes & toggleCat — clears open context panels
    window.rebuildFresh = function() {
        window._openContext = new Set();
        window.rebuildDiagram();
    };

    // rebuildDiagram: returns a Promise so callers can chain .then()
    window.rebuildDiagram = function(opts) {
        opts = opts || {};
        clearTimeout(renderTimer);
        document.getElementById('statusBar').classList.add('show');

        return new Promise(resolve => {
            renderTimer = setTimeout(async () => {
                const checked = Object.keys(SECTIONS).filter(k => {
                    const cb = document.getElementById('cb_' + k);
                    return cb && cb.checked;
                });

                if (checked.length === 0) {
                    document.getElementById('mermaidDiagram').innerHTML =
                        '<div class="rendering-msg">☑️ Select at least one service to display the diagram.</div>';
                    document.getElementById('statusBar').classList.remove('show');
                    resolve();
                    return;
                }

                // Which categories are needed?
                const neededCats = [...new Set(checked.map(k => SERVICE_CAT[k]))];
                const catLines = neededCats.map(c => CAT_ENTRIES[c]).join('\n');

                // Build body sections
                let bodyLines = checked.map(k => SECTIONS[k]).join('\n\n');

                // Append any open context nodes as new diagram nodes below their parent
                if (window._openContext && window._openContext.size > 0) {
                    window._openContext.forEach(key => {
                        const ctx = CONTEXT_NODES[key];
                        if (ctx) {
                            bodyLines += `\n    ${ctx.nodeId}["${ctx.label}"]`;
                            bodyLines += `\n    ${ctx.parentId} -.->|context| ${ctx.nodeId}`;
                            bodyLines += `\n    ${ctx.nodeId} -.-> ActionDecision`;
                            bodyLines += `\n    style ${ctx.nodeId} fill:#eff6ff,stroke:#93c5fd,stroke-width:2px`;
                        }
                    });
                }

                const source = wrapSource(HEADER + '\n' + catLines + '\n\n' + bodyLines + '\n\n' + TAIL);

                await window.renderDiagram(source);
                document.getElementById('statusBar').classList.remove('show');
                if (!opts.preserveView) initialFit();
                resolve();
            }, 300);
        });
    };

    // ── Category toggle ──────────────────────────────────────────────────
    window.toggleCat = function(cat, state) {
        document.querySelectorAll(`input[data-cat="${cat}"]`).forEach(cb => {
            cb.checked = state;
        });
        rebuildFresh();
    };

    // ── Zoom ─────────────────────────────────────────────────────────────
    let currentZoom = 100;
    const zoomStep = 15;

    function updateZoom() {
        const el = document.getElementById('mermaidDiagram');
        el.style.transform = `scale(${currentZoom / 100})`;
        document.getElementById('zoomLevel').textContent = currentZoom;
        const ov = document.getElementById('overlayZoomLevel');
        if (ov) ov.textContent = currentZoom + '%';
    }
    function zoomIn()    { if (currentZoom < 200) { currentZoom += zoomStep; updateZoom(); } }
    function zoomOut()   { if (currentZoom > 25)  { currentZoom -= zoomStep; updateZoom(); } }
    function resetZoom() { currentZoom = 100; updateZoom(); }
    function fitToScreen() { initialFit(); }
    function initialFit() {
        const dc = document.getElementById('diagramContainer');
        currentZoom = 30;
        updateZoom();
        dc.scrollTop  = 0;
        dc.scrollLeft = 0;
        document.getElementById('zoomLevel').textContent = currentZoom;
    }

    // ── Save as SVG ───────────────────────────────────────────────────────
    function getSvgData() {
        const container = document.getElementById('mermaidDiagram');
        const svg = container.querySelector('svg');
        if (!svg) return null;
        const origTransform = container.style.transform;
        container.style.transform = 'none';
        const svgClone = svg.cloneNode(true);
        const svgWidth  = parseFloat(svg.getAttribute('width')  || svg.viewBox.baseVal.width  || 2000);
        const svgHeight = parseFloat(svg.getAttribute('height') || svg.viewBox.baseVal.height || 3000);
        svgClone.setAttribute('width',  svgWidth);
        svgClone.setAttribute('height', svgHeight);
        container.style.transform = origTransform;
        return { svgClone, svgWidth, svgHeight };
    }

    function saveSVG() {
        const statusEl = document.getElementById('svgStatus');
        const data = getSvgData();
        if (!data) { statusEl.textContent = '⚠️ No diagram rendered yet.'; return; }
        const { svgClone } = data;
        const serialiser = new XMLSerializer();
        const svgString = serialiser.serializeToString(svgClone);
        const blob = new Blob([svgString], { type: 'image/svg+xml;charset=utf-8' });
        const link = document.createElement('a');
        link.download = 'SDRC_CallFlow.svg';
        link.href = URL.createObjectURL(blob);
        link.click();
        statusEl.textContent = '✅ SVG downloaded! Open in Chrome to print, or in Inkscape/Illustrator to export PNG at any size.';
    }

    // ── Pan & scroll ─────────────────────────────────────────────────────
    const dc = document.getElementById('diagramContainer');
    let isDragging = false, startX, startY, scrollLeft, scrollTop;
    dc.addEventListener('mousedown', e => {
        isDragging = true;
        startX = e.pageX - dc.offsetLeft; startY = e.pageY - dc.offsetTop;
        scrollLeft = dc.scrollLeft; scrollTop = dc.scrollTop;
    });
    dc.addEventListener('mouseleave', () => isDragging = false);
    dc.addEventListener('mouseup',    () => isDragging = false);
    dc.addEventListener('mousemove', e => {
        if (!isDragging) return;
        e.preventDefault();
        dc.scrollLeft = scrollLeft - (e.pageX - dc.offsetLeft - startX) * 1.5;
        dc.scrollTop  = scrollTop  - (e.pageY - dc.offsetTop  - startY) * 1.5;
    });
    dc.addEventListener('wheel', e => {
        if (e.ctrlKey) { e.preventDefault(); e.deltaY < 0 ? zoomIn() : zoomOut(); }
    }, { passive: false });

    document.addEventListener('keydown', e => {
        if (e.ctrlKey && (e.key === '=' || e.key === '+')) { e.preventDefault(); zoomIn(); }
        if (e.ctrlKey && e.key === '-') { e.preventDefault(); zoomOut(); }
        if (e.ctrlKey && e.key === '0') { e.preventDefault(); resetZoom(); }
    });
</script>
