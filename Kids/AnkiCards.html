<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Reading Stars</title>
<style>
:root {
    --sky-top: #aee4f7;
    --sky-bottom: #7ec8e3;
    --paper: #fffdf5;
    --ink: #33415c;
    --sun: #ffc93c;
    --sun-deep: #f5a623;
    --grass: #59c36a;
    --grass-deep: #3ea854;
    --berry: #ff6b6b;
    --cloud: #ffffff;
    --shadow: rgba(51, 65, 92, 0.18);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body { height: 100%; }

body {
    font-family: 'Comic Sans MS', 'Comic Neue', 'Chalkboard SE', 'Marker Felt', 'Segoe UI', sans-serif;
    background: linear-gradient(180deg, var(--sky-top) 0%, var(--sky-bottom) 100%);
    background-attachment: fixed;
    color: var(--ink);
    user-select: none;
    -webkit-user-select: none;
    -webkit-touch-callout: none;
    -webkit-tap-highlight-color: transparent;
    min-height: 100vh;
}

/* Drifting clouds behind everything */
.clouds { position: fixed; inset: 0; overflow: hidden; pointer-events: none; z-index: 0; }
.cloud {
    position: absolute;
    background: var(--cloud);
    border-radius: 100px;
    opacity: 0.75;
    animation: drift linear infinite;
}
.cloud::before, .cloud::after {
    content: '';
    position: absolute;
    background: var(--cloud);
    border-radius: 50%;
}
.cloud.c1 { width: 120px; height: 40px; top: 8%;  animation-duration: 70s; }
.cloud.c2 { width: 90px;  height: 30px; top: 30%; animation-duration: 95s;  animation-delay: -40s; }
.cloud.c3 { width: 150px; height: 46px; top: 65%; animation-duration: 110s; animation-delay: -70s; }
.cloud.c1::before { width: 50px; height: 50px; top: -25px; left: 20px; }
.cloud.c1::after  { width: 36px; height: 36px; top: -16px; left: 62px; }
.cloud.c2::before { width: 38px; height: 38px; top: -18px; left: 16px; }
.cloud.c2::after  { width: 28px; height: 28px; top: -12px; left: 46px; }
.cloud.c3::before { width: 60px; height: 60px; top: -30px; left: 28px; }
.cloud.c3::after  { width: 44px; height: 44px; top: -20px; left: 80px; }
@keyframes drift {
    from { transform: translateX(-200px); }
    to   { transform: translateX(110vw); }
}

.container {
    position: relative;
    z-index: 1;
    max-width: 560px;
    margin: 0 auto;
    padding: 16px 16px 32px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
}

/* ---------- Header ---------- */
.header {
    text-align: center;
    color: #fff;
    padding: 10px 0 18px;
}
.header h1 {
    font-size: 2.2em;
    letter-spacing: 1px;
    text-shadow: 0 3px 0 rgba(51, 65, 92, 0.25);
}
.header .sub {
    font-size: 1em;
    color: #f2fbff;
    text-shadow: 0 1px 2px rgba(51,65,92,0.25);
}

.mute-btn {
    position: absolute;
    top: 14px;
    right: 16px;
    z-index: 2;
    background: var(--paper);
    border: 3px solid #fff;
    border-radius: 50%;
    width: 48px;
    height: 48px;
    font-size: 1.3em;
    cursor: pointer;
    box-shadow: 0 4px 10px var(--shadow);
    transition: transform 0.15s ease, opacity 0.2s ease;
}
.mute-btn:active { transform: scale(0.9); }
body.muted .mute-btn { opacity: 0.65; }
body.muted .speak-btn { opacity: 0.35; }

/* ---------- Panels ---------- */
.panel {
    background: var(--paper);
    border-radius: 26px;
    padding: 22px;
    box-shadow: 0 10px 24px var(--shadow);
    animation: pop-in 0.35s ease;
    flex: 1;
    display: flex;
    flex-direction: column;
}
@keyframes pop-in {
    from { opacity: 0; transform: translateY(14px) scale(0.98); }
    to   { opacity: 1; transform: translateY(0) scale(1); }
}

.screen { display: none; flex: 1; flex-direction: column; }
.screen.active { display: flex; }

/* ---------- Sticker buttons (the signature) ---------- */
.sticker {
    border: 4px solid #fff;
    border-radius: 22px;
    box-shadow: 0 5px 0 rgba(51, 65, 92, 0.15), 0 8px 16px var(--shadow);
    cursor: pointer;
    font-family: inherit;
    font-weight: bold;
    color: var(--ink);
    transition: transform 0.12s ease, box-shadow 0.12s ease, background 0.2s ease;
    outline: none;
}
.sticker:active { transform: translateY(3px) scale(0.98); box-shadow: 0 2px 0 rgba(51,65,92,0.15), 0 4px 8px var(--shadow); }
.sticker:focus-visible { outline: 4px solid var(--sun-deep); outline-offset: 2px; }

/* ---------- Mode grid ---------- */
.mode-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
.mode-grid .mode-card:nth-child(5) { grid-column: 1 / -1; min-height: 110px; }
.mode-card {
    background: linear-gradient(180deg, #fff6d9, #ffe9a8);
    padding: 18px 12px;
    text-align: center;
    font-size: 1.05em;
    min-height: 130px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 6px;
}
.mode-card .m-emoji { font-size: 2.4em; line-height: 1; }
.mode-card .m-desc { font-size: 0.72em; font-weight: normal; color: #6b7690; }

/* ---------- Deck picker ---------- */
.deck-group-title {
    font-size: 0.95em;
    color: #6b7690;
    margin: 14px 0 8px;
    display: flex;
    align-items: center;
    gap: 8px;
}
.deck-group-title::after {
    content: '';
    flex: 1;
    height: 2px;
    background: #eee6cf;
    border-radius: 2px;
}
.deck-chips { display: flex; flex-wrap: wrap; gap: 10px; }
.chip {
    background: #fff;
    border: 3px solid #e8e0c8;
    border-radius: 999px;
    padding: 9px 14px;
    font-size: 0.95em;
    font-weight: bold;
    color: var(--ink);
    cursor: pointer;
    font-family: inherit;
    transition: all 0.15s ease;
}
.chip.selected {
    background: var(--grass);
    border-color: var(--grass-deep);
    color: #fff;
    transform: scale(1.04);
}
.deck-list { flex: 1; overflow-y: auto; margin-bottom: 14px; }

.toolbar { display: flex; gap: 10px; margin-bottom: 12px; }
.toolbar .mini {
    flex: 1;
    background: #fff;
    border: 3px solid #e8e0c8;
    border-radius: 14px;
    padding: 8px;
    font-size: 0.9em;
    font-weight: bold;
    font-family: inherit;
    color: var(--ink);
    cursor: pointer;
}

.big-btn {
    display: block;
    width: 100%;
    padding: 16px;
    font-size: 1.25em;
    background: linear-gradient(180deg, var(--sun), var(--sun-deep));
    color: #5c3d00;
}
.big-btn:disabled { opacity: 0.45; cursor: default; }
.big-btn.green { background: linear-gradient(180deg, var(--grass), var(--grass-deep)); color: #fff; }

.back-link {
    background: none;
    border: none;
    font-family: inherit;
    font-weight: bold;
    font-size: 1em;
    color: #6b7690;
    cursor: pointer;
    padding: 6px 2px;
    margin-bottom: 8px;
    align-self: flex-start;
}

/* ---------- Quiz screen ---------- */
.quiz-top { display: flex; align-items: center; gap: 12px; margin-bottom: 14px; }
.progress-track {
    flex: 1;
    height: 16px;
    background: #eee6cf;
    border-radius: 999px;
    overflow: hidden;
}
.progress-fill {
    height: 100%;
    width: 0%;
    background: linear-gradient(90deg, var(--sun), var(--sun-deep));
    border-radius: 999px;
    transition: width 0.4s ease;
}
.star-count { font-size: 1.1em; font-weight: bold; white-space: nowrap; }

.prompt-card {
    background: #fff;
    border: 4px dashed #ffe08a;
    border-radius: 22px;
    padding: 20px 16px;
    text-align: center;
    margin-bottom: 18px;
    position: relative;
    min-height: 150px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
}
.prompt-emoji { font-size: 4.2em; line-height: 1.15; }
.prompt-word { font-size: 2.4em; font-weight: bold; letter-spacing: 3px; }
.prompt-word .blank {
    display: inline-block;
    min-width: 1.1em;
    border-bottom: 5px solid var(--berry);
    color: transparent;
    margin-right: 2px;
    animation: blink-blank 1.4s ease infinite;
}
@keyframes blink-blank {
    0%, 100% { border-color: var(--berry); }
    50% { border-color: #ffc0c0; }
}
.prompt-word .blank.filled {
    color: var(--grass-deep);
    border-color: var(--grass);
    animation: none;
}
.prompt-sentence {
    font-size: 1.5em;
    line-height: 1.6;
    font-weight: bold;
}
.prompt-sentence .blank {
    display: inline-block;
    min-width: 2.4em;
    border-bottom: 5px solid var(--berry);
    animation: blink-blank 1.4s ease infinite;
}
.prompt-sentence .blank.filled {
    color: var(--grass-deep);
    border-color: var(--grass);
    animation: none;
    min-width: 0;
    padding: 0 4px;
}
.prompt-question { font-size: 0.95em; color: #6b7690; font-weight: normal; }

.speak-btn {
    position: absolute;
    top: 10px;
    right: 10px;
    background: #fff6d9;
    border: 3px solid var(--sun);
    border-radius: 50%;
    width: 48px;
    height: 48px;
    font-size: 1.4em;
    cursor: pointer;
    transition: transform 0.15s ease;
}
.speak-btn:active { transform: scale(0.9); }

/* Dice */
.dice-row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
.die {
    width: 58px;
    height: 58px;
    background: #fff;
    border: 3px solid var(--ink);
    border-radius: 12px;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(3, 1fr);
    padding: 6px;
    box-shadow: 0 3px 0 rgba(51,65,92,0.15);
}
.die .pip {
    width: 10px;
    height: 10px;
    background: var(--ink);
    border-radius: 50%;
    align-self: center;
    justify-self: center;
}
.die.small { width: 40px; height: 40px; padding: 4px; border-width: 2px; }
.die.small .pip { width: 7px; height: 7px; }

/* ---------- Answer buttons ---------- */
.answers { display: grid; gap: 12px; margin-top: auto; }
.answers.three-wide { grid-template-columns: repeat(3, 1fr); }
.answer-btn {
    background: linear-gradient(180deg, #ffffff, #f3edda);
    padding: 14px 10px;
    font-size: 1.5em;
    min-height: 76px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 4px;
    line-height: 1.1;
}
.answer-btn .a-emoji { font-size: 1.7em; line-height: 1.1; }
.answer-btn .a-word { font-size: 0.72em; letter-spacing: 1px; }
.answer-btn.letter-opt { font-size: 2.4em; }
.answer-btn.correct {
    background: linear-gradient(180deg, var(--grass), var(--grass-deep));
    color: #fff;
    border-color: #d6ffdf;
    animation: bounce-win 0.5s ease;
}
.answer-btn.wrong {
    background: #f0f0f0;
    color: #b9b9b9;
    animation: shake 0.4s ease;
    cursor: default;
}
@keyframes bounce-win {
    0% { transform: scale(1); }
    40% { transform: scale(1.12); }
    70% { transform: scale(0.96); }
    100% { transform: scale(1); }
}
@keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-8px); }
    40% { transform: translateX(8px); }
    60% { transform: translateX(-6px); }
    80% { transform: translateX(6px); }
}

/* Confetti burst */
.confetti-bit {
    position: fixed;
    font-size: 1.6em;
    pointer-events: none;
    z-index: 50;
    animation: confetti-fly 1s ease-out forwards;
}
@keyframes confetti-fly {
    0%   { transform: translate(0, 0) scale(0.6) rotate(0deg); opacity: 1; }
    100% { transform: translate(var(--dx), var(--dy)) scale(1.3) rotate(var(--rot)); opacity: 0; }
}

/* ---------- Finish screen ---------- */
.finish-box { text-align: center; padding: 20px 0; flex: 1; display: flex; flex-direction: column; justify-content: center; gap: 14px; }
.finish-box .trophy { font-size: 5em; animation: bounce-win 0.8s ease; }
.finish-box h2 { font-size: 1.8em; }
.finish-stars { font-size: 1.6em; letter-spacing: 4px; }
.finish-actions { display: flex; flex-direction: column; gap: 12px; margin-top: 10px; }

/* ---------- Note Detective (piano) ---------- */
.lyric-line { font-size: 1.35em; font-weight: bold; }
.note-tiles {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
}
.note-tile {
    width: 44px;
    height: 44px;
    border-radius: 50%;
    border: 3px solid #fff;
    box-shadow: 0 3px 6px var(--shadow);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: bold;
    font-size: 1.05em;
    color: #fff;
    text-shadow: 0 1px 2px rgba(0,0,0,0.25);
    transition: transform 0.15s ease;
}
.note-tile.playing { transform: scale(1.25); box-shadow: 0 0 0 4px rgba(255,201,60,0.6), 0 3px 6px var(--shadow); }
.note-tile.mystery {
    background: #fff;
    color: var(--berry);
    border: 3px dashed var(--berry);
    text-shadow: none;
    animation: blink-blank 1.4s ease infinite;
}
.note-tile.mystery.guessed { border-style: solid; color: #fff; text-shadow: 0 1px 2px rgba(0,0,0,0.25); animation: none; }
.note-tile.mystery.won { border: 3px solid var(--grass); animation: bounce-win 0.5s ease; }
.note-tile.flash-gap { animation: gap-flash 0.45s ease; }
.note-tile.shake-tile { animation: shake 0.4s ease; }
@keyframes gap-flash {
    0%, 100% { transform: scale(1); background: #fff; }
    50% { transform: scale(1.35); background: #ffe1e1; }
}

.play-line-btn {
    background: linear-gradient(180deg, var(--sun), var(--sun-deep));
    padding: 10px 20px;
    font-size: 1.05em;
    color: #5c3d00;
}
.play-line-btn:disabled { opacity: 0.5; cursor: default; }

.piano-row {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
}
.p-key {
    flex: 1;
    min-width: 0;
    height: 118px;
    border: 4px solid #fff;
    border-radius: 10px 10px 16px 16px;
    box-shadow: 0 5px 0 rgba(51,65,92,0.2), 0 8px 14px var(--shadow);
    cursor: pointer;
    font-family: inherit;
    font-weight: bold;
    font-size: 1.4em;
    color: #fff;
    text-shadow: 0 1px 3px rgba(0,0,0,0.3);
    display: flex;
    align-items: flex-end;
    justify-content: center;
    padding-bottom: 10px;
    transition: transform 0.08s ease, box-shadow 0.08s ease, filter 0.08s ease;
    outline: none;
}
.p-key:active, .p-key.pressed {
    transform: translateY(4px);
    box-shadow: 0 1px 0 rgba(51,65,92,0.2), 0 3px 6px var(--shadow);
    filter: brightness(1.15);
}
.p-key:focus-visible { outline: 4px solid var(--ink); outline-offset: 2px; }
.p-key.chosen { box-shadow: 0 0 0 4px var(--ink), 0 5px 0 rgba(51,65,92,0.2); }

@media (max-width: 420px) {
    .note-tile { width: 36px; height: 36px; font-size: 0.9em; }
    .p-key { height: 100px; font-size: 1.15em; gap: 6px; }
    .piano-row { gap: 6px; }
}

@media (max-width: 420px) {
    .header h1 { font-size: 1.8em; }
    .prompt-emoji { font-size: 3.4em; }
    .prompt-word { font-size: 1.9em; }
    .prompt-sentence { font-size: 1.25em; }
    .answer-btn { font-size: 1.3em; }
    .panel { padding: 16px; }
}

@media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation: none !important; transition: none !important; }
}
</style>
</head>
<body>

<div class="clouds" aria-hidden="true">
    <div class="cloud c1"></div>
    <div class="cloud c2"></div>
    <div class="cloud c3"></div>
</div>

<div class="container">
    <button class="mute-btn" id="muteBtn" aria-label="Sound on or off">🔊</button>
    <div class="header">
        <h1>⭐ Reading Stars ⭐</h1>
        <div class="sub" id="headerSub">What shall we practise today?</div>
    </div>

    <!-- MODE SELECT -->
    <div class="screen active" id="modeScreen">
        <div class="panel">
            <div class="mode-grid" id="modeGrid"></div>
        </div>
    </div>

    <!-- DECK SELECT -->
    <div class="screen" id="deckScreen">
        <div class="panel">
            <button class="back-link" id="backToModes">← Back</button>
            <div class="toolbar">
                <button class="mini" id="selectAll">Select all</button>
                <button class="mini" id="clearAll">Clear</button>
            </div>
            <div class="deck-list" id="deckList"></div>
            <button class="sticker big-btn green" id="startBtn" disabled>Start! 🚀</button>
        </div>
    </div>

    <!-- QUIZ -->
    <div class="screen" id="quizScreen">
        <div class="panel">
            <button class="back-link" id="quitQuiz">← Stop</button>
            <div class="quiz-top">
                <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
                <div class="star-count" id="starCount">⭐ 0</div>
            </div>
            <div class="prompt-card" id="promptCard"></div>
            <div class="answers" id="answerArea"></div>
        </div>
    </div>

    <!-- FINISH -->
    <div class="screen" id="finishScreen">
        <div class="panel">
            <div class="finish-box">
                <div class="trophy">🏆</div>
                <h2>All done!</h2>
                <div class="finish-stars" id="finishStars"></div>
                <div id="finishMsg"></div>
                <div class="finish-actions">
                    <button class="sticker big-btn green" id="playAgain">Play again 🔁</button>
                    <button class="sticker big-btn" id="goHome">Home 🏠</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
'use strict';

/* =====================================================
   DECK DATA
   Word decks: cards are { word, emoji } (+ letter for A-Z,
   + sentence for sentence-mode decks).
   Number decks: cards are { num, word, dice }.
   ===================================================== */

const DECKS = {

    /* ---- Numbers ---- */
    'numbers1-10': {
        name: 'Numbers 1–10', emoji: '🔢', group: 'Numbers', type: 'number',
        cards: [
            { num: '1',  word: 'ONE',    dice: [1] },
            { num: '2',  word: 'TWO',    dice: [2] },
            { num: '3',  word: 'THREE',  dice: [3] },
            { num: '4',  word: 'FOUR',   dice: [4] },
            { num: '5',  word: 'FIVE',   dice: [5] },
            { num: '6',  word: 'SIX',    dice: [6] },
            { num: '7',  word: 'SEVEN',  dice: [6, 1] },
            { num: '8',  word: 'EIGHT',  dice: [6, 2] },
            { num: '9',  word: 'NINE',   dice: [6, 3] },
            { num: '10', word: 'TEN',    dice: [6, 4] }
        ]
    },
    'numbers11-20': {
        name: 'Numbers 11–20', emoji: '🎲', group: 'Numbers', type: 'number',
        cards: [
            { num: '11', word: 'ELEVEN',    dice: [6, 5] },
            { num: '12', word: 'TWELVE',    dice: [6, 6] },
            { num: '13', word: 'THIRTEEN',  dice: [6, 6, 1] },
            { num: '14', word: 'FOURTEEN',  dice: [6, 6, 2] },
            { num: '15', word: 'FIFTEEN',   dice: [6, 6, 3] },
            { num: '16', word: 'SIXTEEN',   dice: [6, 6, 4] },
            { num: '17', word: 'SEVENTEEN', dice: [6, 6, 5] },
            { num: '18', word: 'EIGHTEEN',  dice: [6, 6, 6] },
            { num: '19', word: 'NINETEEN',  dice: [6, 6, 6, 1] },
            { num: '20', word: 'TWENTY',    dice: [6, 6, 6, 2] }
        ]
    },

    /* ---- Letters, shapes, colours ---- */
    'letters': {
        name: 'Letters A–Z', emoji: '🔤', group: 'Letters & Colours', type: 'word',
        cards: [
            { word: 'Apple',     emoji: '🍎', letter: 'A' },
            { word: 'Ball',      emoji: '⚽', letter: 'B' },
            { word: 'Cat',       emoji: '🐱', letter: 'C' },
            { word: 'Dog',       emoji: '🐶', letter: 'D' },
            { word: 'Elephant',  emoji: '🐘', letter: 'E' },
            { word: 'Fish',      emoji: '🐠', letter: 'F' },
            { word: 'Giraffe',   emoji: '🦒', letter: 'G' },
            { word: 'House',     emoji: '🏠', letter: 'H' },
            { word: 'Ice cream', emoji: '🍦', letter: 'I' },
            { word: 'Jacket',    emoji: '🧥', letter: 'J' },
            { word: 'Kite',      emoji: '🪁', letter: 'K' },
            { word: 'Lion',      emoji: '🦁', letter: 'L' },
            { word: 'Moon',      emoji: '🌙', letter: 'M' },
            { word: 'Nurse',     emoji: '👩‍⚕️', letter: 'N' },
            { word: 'Orange',    emoji: '🍊', letter: 'O' },
            { word: 'Pizza',     emoji: '🍕', letter: 'P' },
            { word: 'Queen',     emoji: '👸', letter: 'Q' },
            { word: 'Robot',     emoji: '🤖', letter: 'R' },
            { word: 'Sun',       emoji: '☀️', letter: 'S' },
            { word: 'Tree',      emoji: '🌳', letter: 'T' },
            { word: 'Umbrella',  emoji: '☂️', letter: 'U' },
            { word: 'Van',       emoji: '🚐', letter: 'V' },

/* =====================================================
   AUDIO + SPEECH
   ===================================================== */

let soundOn = true;

let audioCtx = null;
function getAudio() {
    if (!audioCtx) {
        const AC = window.AudioContext || window.webkitAudioContext;
        if (AC) audioCtx = new AC();
    }
    return audioCtx;
}

function playTone(freq, start, dur, type = 'triangle', vol = 0.25) {
    if (!soundOn) return;
    const ctx = getAudio();
    if (!ctx) return;
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type;
    osc.frequency.value = freq;
    gain.gain.setValueAtTime(vol, ctx.currentTime + start);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + start + dur);
    osc.connect(gain);
    gain.connect(ctx.destination);
    osc.start(ctx.currentTime + start);
    osc.stop(ctx.currentTime + start + dur);
}

function playCorrect() {
    playTone(523.25, 0,    0.18); // C5
    playTone(659.25, 0.12, 0.18); // E5
    playTone(783.99, 0.24, 0.3);  // G5
}

function playWrong() {
    playTone(196, 0, 0.25, 'sine', 0.18); // gentle low G3
}

$('muteBtn').addEventListener('click', () => {
    soundOn = !soundOn;
    $('muteBtn').textContent = soundOn ? '🔊' : '🔇';
    document.body.classList.toggle('muted', !soundOn);
    if (!soundOn && 'speechSynthesis' in window) {
        try { window.speechSynthesis.cancel(); } catch (e) { /* no-op */ }
    }
});

function speak(text) {
    if (!soundOn) return;
    if (!('speechSynthesis' in window)) return;
    try {
        window.speechSynthesis.cancel();
        const u = new SpeechSynthesisUtterance(text);
        u.rate = 0.85;
        u.pitch = 1.1;
        u.lang = 'en-GB';
        window.speechSynthesis.speak(u);
    } catch (e) { /* speech unavailable — quietly skip */ }
}

function shuffle(arr) {
    const a = arr.slice();
    for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
}

function pick(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

function sameConfusableGroup(a, b) {
    return CONFUSABLE.some(g => g.includes(a) && g.includes(b));
}

function firstLetterOf(card) {
    return card.letter || card.word.charAt(0).toUpperCase();
}

/* All cards from the selected decks (for distractor pools) */
function selectedPool() {
    const pool = [];
    selectedDeckIds.forEach(id => {
        DECKS[id].cards.forEach(card => pool.push({ deckId: id, card }));
    });
    return pool;
}

/* Pick n distractor cards distinct from the answer (by key fn) */
function pickDistractors(answerCard, n, keyFn) {
    const answerKey = keyFn(answerCard);
    const pool = shuffle(selectedPool()
        .map(e => e.card)
        .filter(c => keyFn(c) !== answerKey));
    const out = [];
    const seen = new Set([answerKey]);
    for (const c of pool) {
        const k = keyFn(c);
        if (!seen.has(k)) {
            seen.add(k);
            out.push(c);
            if (out.length === n) break;
        }
    }
    return out;
}

/* =====================================================
   MODE SCREEN
   ===================================================== */

function renderModes() {
    const grid = $('modeGrid');
    grid.innerHTML = '';
    Object.keys(MODES).forEach(modeId => {
        const m = MODES[modeId];
        const btn = document.createElement('button');
        btn.className = 'sticker mode-card';
        btn.innerHTML =
            '<span class="m-emoji">' + m.emoji + '</span>' +
            '<span>' + m.name + '</span>' +
            '<span class="m-desc">' + m.desc + '</span>';
        btn.addEventListener('click', () => {
            currentMode = modeId;
            selectedDeckIds = [];
            renderDeckPicker();
            setHeader(m.emoji + ' ' + m.name + ' — pick your decks!');
            showScreen('deck');
        });
        grid.appendChild(btn);
    });
}

/* =====================================================
   DECK PICKER
   ===================================================== */

function compatibleDecks() {
    const filter = MODES[currentMode].deckFilter;
    return Object.keys(DECKS).filter(id => {
        const d = DECKS[id];
        if (!filter(d)) return false;
        if (currentMode === 'sentence') {
            return d.cards.filter(c => c.sentence).length >= 3;
        }
        return true;
    });
}

function renderDeckPicker() {
    const list = $('deckList');
    list.innerHTML = '';
    const ids = compatibleDecks();

    // Group decks under headings
    const groups = {};
    ids.forEach(id => {
        const g = DECKS[id].group;
        (groups[g] = groups[g] || []).push(id);
    });

    Object.keys(groups).forEach(groupName => {
        const title = document.createElement('div');
        title.className = 'deck-group-title';
        title.textContent = groupName;
        list.appendChild(title);

        const wrap = document.createElement('div');
        wrap.className = 'deck-chips';
        groups[groupName].forEach(id => {
            const d = DECKS[id];
            const chip = document.createElement('button');
            chip.className = 'chip';
            chip.dataset.deckId = id;
            chip.textContent = d.emoji + ' ' + d.name;
            chip.addEventListener('click', () => {
                const i = selectedDeckIds.indexOf(id);
                if (i >= 0) selectedDeckIds.splice(i, 1);
                else selectedDeckIds.push(id);
                chip.classList.toggle('selected');
                updateStartBtn();
            });
            wrap.appendChild(chip);
        });
        list.appendChild(wrap);
    });

    updateStartBtn();
}

function updateStartBtn() {
    const btn = $('startBtn');
    btn.disabled = selectedDeckIds.length === 0;
    btn.textContent = selectedDeckIds.length === 0
        ? 'Pick a deck first!'
        : 'Start! 🚀';
}

$('selectAll').addEventListener('click', () => {
    selectedDeckIds = compatibleDecks();
    document.querySelectorAll('#deckList .chip').forEach(c => c.classList.add('selected'));
    updateStartBtn();
});

$('clearAll').addEventListener('click', () => {
    selectedDeckIds = [];
    document.querySelectorAll('#deckList .chip').forEach(c => c.classList.remove('selected'));
    updateStartBtn();
});

$('backToModes').addEventListener('click', () => {
    setHeader('What shall we practise today?');
    showScreen('mode');
});

/* =====================================================
   QUIZ ENGINE
   ===================================================== */

$('startBtn').addEventListener('click', startSession);
$('quitQuiz').addEventListener('click', () => {
    setHeader('What shall we practise today?');
    showScreen('mode');
});
$('playAgain').addEventListener('click', startSession);
$('goHome').addEventListener('click', () => {
    setHeader('What shall we practise today?');
    showScreen('mode');
});

function startSession() {
    let cards = selectedPool();
    if (currentMode === 'sentence') {
        cards = cards.filter(e => e.card.sentence);
    }
    queue = shuffle(cards);
    qIndex = 0;
    stars = 0;
    setHeader(MODES[currentMode].emoji + ' ' + MODES[currentMode].name);
    showScreen('quiz');
    showQuestion();
}

function updateProgress() {
    $('progressFill').style.width = (qIndex / queue.length * 100) + '%';
    $('starCount').textContent = '⭐ ' + stars;
}

function showQuestion() {
    if (qIndex >= queue.length) { finishSession(); return; }
    inputLocked = false;
    firstTry = true;
    updateProgress();

    const entry = queue[qIndex];
    const card = entry.card;

    let q;
    if (currentMode === 'match')         q = buildMatchQuestion(card);
    else if (currentMode === 'letter')   q = buildLetterQuestion(card);
    else if (currentMode === 'numbers')  q = buildNumberQuestion(card, entry.deckId);
    else if (currentMode === 'piano')    { renderPianoQuestion(card, entry.deckId); return; }
    else                                 q = buildSentenceQuestion(card);

    renderQuestion(q);
}

/* ---------- Question builders ----------
   Each returns:
   { promptHTML, questionText, speakText,
     options: [{ html, correct, letterStyle }],
     onCorrect(promptCard) }
*/

function optionWordHTML(card) {
    return '<span class="a-emoji">' + card.emoji + '</span>' +
           '<span class="a-word">' + card.word.toUpperCase() + '</span>';
}

function buildMatchQuestion(card) {
    const askWord = Math.random() < 0.5; // show emoji → pick word, or show word → pick emoji
    const distractors = pickDistractors(card, 2, c => c.word.toLowerCase() + '|' + c.emoji);
    const all = shuffle([card, ...distractors]);

    if (askWord) {
        return {
            promptHTML: '<div class="prompt-emoji">' + card.emoji + '</div>',
            questionText: 'Which word is this?',
            speakText: card.word,
            options: all.map(c => ({
                html: '<span class="a-word" style="font-size:1em">' + c.word.toUpperCase() + '</span>',
                correct: c === card
            })),
            onCorrect: () => speak(card.word)
        };
    }
    return {
        promptHTML: '<div class="prompt-word">' + card.word.toUpperCase() + '</div>',
        questionText: 'Which picture is this?',
        speakText: card.word,
        options: all.map(c => ({
            html: '<span class="a-emoji">' + c.emoji + '</span>',
            correct: c === card
        })),
        onCorrect: () => speak(card.word)
    };
}

function buildLetterQuestion(card) {
    const answer = firstLetterOf(card);
    const rest = card.word.slice(1).toUpperCase();

    // Two distractor letters: not the answer, not look-alikes of it or of each other
    const chosen = [];
    const candidates = shuffle(ALPHABET.filter(l => l !== answer && !sameConfusableGroup(l, answer)));
    for (const l of candidates) {
        if (chosen.every(c => !sameConfusableGroup(c, l) && c !== l)) {
            chosen.push(l);
            if (chosen.length === 2) break;
        }
    }
    const all = shuffle([answer, ...chosen]);

    return {
        promptHTML:
            '<div class="prompt-emoji">' + card.emoji + '</div>' +
            '<div class="prompt-word"><span class="blank" id="letterBlank">' + answer + '</span>' + rest + '</div>',
        questionText: 'Which letter is missing?',
        speakText: card.word,
        options: all.map(l => ({
            html: l,
            letterStyle: true,
            correct: l === answer
        })),
        onCorrect: () => {
            const blank = $('letterBlank');
            if (blank) blank.classList.add('filled');
            speak(card.word);
        }
    };
}

function diceHTML(dice, small) {
    const PIPS = {
        1: [5], 2: [1, 9], 3: [1, 5, 9],
        4: [1, 3, 7, 9], 5: [1, 3, 5, 7, 9], 6: [1, 3, 4, 6, 7, 9]
    };
    let out = '<div class="dice-row">';
    dice.forEach(v => {
        out += '<div class="die' + (small ? ' small' : '') + '">';
        for (let cell = 1; cell <= 9; cell++) {
            out += PIPS[v].includes(cell) ? '<span class="pip"></span>' : '<span></span>';
        }
        out += '</div>';
    });
    return out + '</div>';
}

function buildNumberQuestion(card, deckId) {
    const parts = ['num', 'word', 'dice'];
    const hidden = pick(parts);
    const shown = parts.filter(p => p !== hidden);

    const others = shuffle(DECKS[deckId].cards.filter(c => c !== card)).slice(0, 2);
    const all = shuffle([card, ...others]);

    const partHTML = (c, part, small) => {
        if (part === 'num')  return '<div class="prompt-word" style="letter-spacing:1px">' + c.num + '</div>';
        if (part === 'word') return '<div class="prompt-word" style="font-size:1.6em">' + c.word + '</div>';
        return diceHTML(c.dice, small);
    };
    const optHTML = (c, part) => {
        if (part === 'num')  return '<span style="font-size:1.4em">' + c.num + '</span>';
        if (part === 'word') return '<span class="a-word" style="font-size:0.9em">' + c.word + '</span>';
        return diceHTML(c.dice, true);
    };

    return {
        promptHTML: shown.map(p => partHTML(card, p, false)).join(''),
        questionText: 'Find the missing piece!',
        speakText: card.word,
        options: all.map(c => ({
            html: optHTML(c, hidden),
            correct: c === card
        })),
        onCorrect: () => speak(card.word)
    };
}

function buildSentenceQuestion(card) {
    const sentencePool = selectedPool().map(e => e.card).filter(c => c.sentence);
    const distractors = pickDistractors(card, 2, c => c.word.toLowerCase());
    // Prefer distractors that also have sentences (thematic fit), fall back to any
    const all = shuffle([card, ...distractors]);

    const parts = card.sentence.split('___');
    const promptHTML =
        '<div class="prompt-sentence">' +
        parts[0] +
        '<span class="blank" id="sentenceBlank">&nbsp;</span>' +
        (parts[1] || '') +
        '</div>';

    return {
        promptHTML,
        questionText: 'Which word finishes the sentence?',
        speakText: card.sentence.replace('___', 'mmm'),
        options: all.map(c => ({
            html: optionWordHTML(c),
            correct: c === card
        })),
        onCorrect: () => {
            const blank = $('sentenceBlank');
            if (blank) {
                blank.textContent = card.word.toLowerCase();
                blank.classList.add('filled');
            }
            speak(card.sentence.replace('___', card.word));
        }
    };
}

/* ---------- Note Detective (piano) ---------- */

const NOTE_SLOT_MS = 480;   // time per note slot
const NOTE_LEN = 0.4;       // seconds each note rings

let pianoPlaying = false;

function playPianoNote(noteName) {
    const def = NOTE_DEFS[noteName];
    if (!def) return;
    playTone(def.freq, 0, NOTE_LEN, 'triangle', 0.3);
    playTone(def.freq * 2, 0, NOTE_LEN * 0.6, 'sine', 0.08); // soft sparkle an octave up
}

function tileHTML(noteName) {
    const def = NOTE_DEFS[noteName];
    return '<span class="note-tile" style="background:' + def.color + '">' + def.label + '</span>';
}

function renderPianoQuestion(card, deckId) {
    const deck = DECKS[deckId];
    const notes = card.notes;
    const hiddenIdx = 1 + Math.floor(Math.random() * (notes.length - 1));
    const answer = notes[hiddenIdx];
    let guess = null;

    // Prompt: lyric + tile row + play button
    const tiles = notes.map((n, i) =>
        i === hiddenIdx
            ? '<span class="note-tile mystery" id="mysteryTile">?</span>'
            : tileHTML(n)
    ).join('');

    const promptCard = $('promptCard');
    promptCard.innerHTML =
        '<div class="lyric-line">' + deck.emoji + ' ' + card.lyric + '</div>' +
        '<div class="note-tiles" id="tileRow">' + tiles + '</div>' +
        '<button class="sticker play-line-btn" id="playLineBtn">▶ Play the line</button>' +
        '<div class="prompt-question">' + MODES.piano.sub + '</div>' +
        '<button class="speak-btn" id="speakBtn" aria-label="Hear the words">🔊</button>';

    $('speakBtn').addEventListener('click', e => {
        e.stopPropagation();
        speak(card.lyric);
    });

    // Answers area: the piano + confirm
    const area = $('answerArea');
    area.className = 'answers';
    area.innerHTML =
        '<div class="piano-row" id="pianoRow"></div>' +
        '<button class="sticker big-btn green" id="confirmNote" disabled>That\'s my note! ✅</button>';

    const pianoRow = $('pianoRow');
    deck.keys.forEach(noteName => {
        const def = NOTE_DEFS[noteName];
        const key = document.createElement('button');
        key.className = 'p-key';
        key.style.background = 'linear-gradient(180deg, ' + def.color + ', ' + def.color + 'cc)';
        key.textContent = def.label;
        key.dataset.note = noteName;
        key.addEventListener('click', () => {
            if (pianoPlaying || inputLocked) return;
            getAudio();
            playPianoNote(noteName);
            key.classList.add('pressed');
            setTimeout(() => key.classList.remove('pressed'), 130);
            // Set as current guess
            guess = noteName;
            pianoRow.querySelectorAll('.p-key').forEach(k => k.classList.remove('chosen'));
            key.classList.add('chosen');
            const tile = $('mysteryTile');
            tile.classList.add('guessed');
            tile.classList.remove('shake-tile');
            tile.style.background = def.color;
            tile.style.borderColor = '#fff';
            tile.textContent = def.label;
            $('confirmNote').disabled = false;
        });
        pianoRow.appendChild(key);
    });

    const tileEls = () => $('tileRow').querySelectorAll('.note-tile');

    /* Play the line. fillNote: note name to sound at the gap, or null for a silent flash. */
    function playLine(fillNote, done) {
        if (pianoPlaying) return;
        pianoPlaying = true;
        getAudio();
        $('playLineBtn').disabled = true;
        const els = tileEls();
        notes.forEach((n, i) => {
            setTimeout(() => {
                els.forEach(el => el.classList.remove('playing'));
                if (i === hiddenIdx) {
                    if (fillNote) {
                        playPianoNote(fillNote);
                        els[i].classList.add('playing');
                    } else {
                        els[i].classList.add('flash-gap');
                        setTimeout(() => els[i].classList.remove('flash-gap'), 460);
                    }
                } else {
                    playPianoNote(n);
                    els[i].classList.add('playing');
                }
            }, i * NOTE_SLOT_MS);
        });
        setTimeout(() => {
            tileEls().forEach(el => el.classList.remove('playing'));
            pianoPlaying = false;
            const btn = $('playLineBtn');
            if (btn) btn.disabled = false;
            if (done) done();
        }, notes.length * NOTE_SLOT_MS + 200);
    }

    $('playLineBtn').addEventListener('click', () => playLine(null));

    $('confirmNote').addEventListener('click', () => {
        if (!guess || pianoPlaying || inputLocked) return;
        inputLocked = true;
        $('confirmNote').disabled = true;
        // Hear the line with his note in place — right or wrong, he hears it in context
        playLine(guess, () => {
            const tile = $('mysteryTile');
            if (guess === answer) {
                tile.classList.add('won');
                playCorrect();
                confettiFrom(tile);
                if (firstTry) stars++;
                updateProgress();
                setTimeout(() => {
                    qIndex++;
                    showQuestion();
                }, 1500);
            } else {
                playWrong();
                firstTry = false;
                tile.classList.add('shake-tile');
                // Reset back to a mystery so he can try again
                setTimeout(() => {
                    tile.classList.remove('guessed', 'shake-tile');
                    tile.style.background = '';
                    tile.style.borderColor = '';
                    tile.textContent = '?';
                    pianoRow.querySelectorAll('.p-key').forEach(k => k.classList.remove('chosen'));
                    guess = null;
                    inputLocked = false;
                }, 700);
            }
        });
    });

    // Auto-play the line once so he hears the puzzle straight away
    setTimeout(() => playLine(null), 600);
}

/* ---------- Rendering & answering ---------- */

function renderQuestion(q) {
    const promptCard = $('promptCard');
    promptCard.innerHTML =
        q.promptHTML +
        '<div class="prompt-question">' + q.questionText + '</div>' +
        '<button class="speak-btn" id="speakBtn" aria-label="Hear it">🔊</button>';

    $('speakBtn').addEventListener('click', e => {
        e.stopPropagation();
        speak(q.speakText);
    });

    const area = $('answerArea');
    area.innerHTML = '';
    area.className = 'answers' + (q.options.every(o => o.letterStyle) ? ' three-wide' : '');

    q.options.forEach(opt => {
        const btn = document.createElement('button');
        btn.className = 'sticker answer-btn' + (opt.letterStyle ? ' letter-opt' : '');
        btn.innerHTML = opt.html;
        btn.addEventListener('click', () => handleAnswer(btn, opt, q));
        area.appendChild(btn);
    });
}

function handleAnswer(btn, opt, q) {
    if (inputLocked || btn.classList.contains('wrong')) return;
    getAudio(); // unlock audio on first tap

    if (opt.correct) {
        inputLocked = true;
        btn.classList.add('correct');
        playCorrect();
        confettiFrom(btn);
        if (firstTry) stars++;
        updateProgress();
        if (q.onCorrect) q.onCorrect();
        setTimeout(() => {
            qIndex++;
            showQuestion();
        }, 1500);
    } else {
        firstTry = false;
        btn.classList.add('wrong');
        playWrong();
    }
}

function confettiFrom(el) {
    const rect = el.getBoundingClientRect();
    const cx = rect.left + rect.width / 2;
    const cy = rect.top + rect.height / 2;
    const bits = ['⭐', '🌟', '✨', '🎉'];
    for (let i = 0; i < 12; i++) {
        const bit = document.createElement('span');
        bit.className = 'confetti-bit';
        bit.textContent = pick(bits);
        bit.style.left = cx + 'px';
        bit.style.top = cy + 'px';
        const angle = Math.random() * Math.PI * 2;
        const dist = 60 + Math.random() * 90;
        bit.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
        bit.style.setProperty('--dy', (Math.sin(angle) * dist - 40) + 'px');
        bit.style.setProperty('--rot', (Math.random() * 360 - 180) + 'deg');
        document.body.appendChild(bit);
        setTimeout(() => bit.remove(), 1100);
    }
}

/* ---------- Finish ---------- */

function finishSession() {
    updateProgress();
    $('progressFill').style.width = '100%';
    const total = queue.length;
    $('finishStars').textContent = '⭐ ' + stars + ' / ' + total;
    let msg;
    if (stars === total)            msg = 'Perfect! Every one first try! 🌟';
    else if (stars >= total * 0.7)  msg = 'Brilliant work! 🎉';
    else                            msg = 'Great practising! Let\'s play again! 💪';
    $('finishMsg').textContent = msg;
    setHeader('Well done! 🏆');
    showScreen('finish');
    playCorrect();
    setTimeout(() => speak('Well done! You got ' + stars + ' stars!'), 600);
}

   INIT

renderModes();
