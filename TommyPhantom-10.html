<!DOCTYPE html>
<html lang="en"><head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>The Prince and The Lantern</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Special+Elite&family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;background:#0a0810;overflow:hidden;font-family:'Lora',serif;}
  #app{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:radial-gradient(ellipse at 50% 40%,#161018,#0a0810 80%);}

  /* stage holds the canvas */
  #stage{position:relative;width:100%;max-width:760px;display:flex;flex-direction:column;align-items:center;padding:0 12px;}
  canvas{width:100%;height:auto;display:block;border-radius:10px;box-shadow:0 10px 50px rgba(0,0,0,0.7);background:#08060a;}

  /* story text below the illustration */
  #textwrap{width:100%;max-width:680px;padding:20px 22px 8px;min-height:120px;display:flex;align-items:flex-start;justify-content:center;}
  #text{font-size:clamp(16px,4.4vw,21px);line-height:1.6;color:#e8dcc8;text-align:center;font-weight:400;text-shadow:0 1px 8px rgba(0,0,0,0.5);transition:opacity .35s ease;}
  /* ---- story voices: each speaker's words glow the colour their figure glows in the art ---- */
  #text .ph{background:linear-gradient(178deg,#cdd9ec 10%,#8296ba 48%,#b3c3dd 72%,#7e93b8);-webkit-background-clip:text;background-clip:text;color:transparent;font-style:italic;letter-spacing:0.6px;filter:drop-shadow(0 0 7px rgba(140,170,220,0.35));}
  #text .pr{color:#ffb35e;font-weight:600;text-shadow:0 0 10px rgba(255,170,80,0.35);}
  #text .gb{color:#a4bf6e;text-shadow:0 0 8px rgba(120,160,60,0.3);}
  #text .kg{color:#e9c877;font-style:italic;text-shadow:0 0 8px rgba(230,190,90,0.3);}
  /* ---- story textures ---- */
  #text .name{color:#aebfda;}                                          /* the phantom's name, cool-tinted */
  #text .fog{color:#a9b6c6;letter-spacing:2.2px;opacity:0.9;}          /* fog, rumours, cold things */
  #text .eyes{color:#e8c85a;text-shadow:0 0 9px rgba(232,200,90,0.55);}/* goblin eyes in the dark */
  #text .warm{color:#ffcf8e;text-shadow:0 0 8px rgba(255,190,110,0.35);}/* small warm lights */
  #text .blaze{background:linear-gradient(180deg,#fff3d0,#ffc86e 60%,#ff9d4a);-webkit-background-clip:text;background-clip:text;color:transparent;font-weight:700;font-size:1.12em;filter:drop-shadow(0 0 9px rgba(255,190,100,0.5));}
  #text .crash{font-weight:700;font-size:1.14em;letter-spacing:0.5px;color:#f3e6cd;}
  #text .f1{opacity:0.85;letter-spacing:1px;}                          /* shrieked... */
  #text .f2{opacity:0.55;letter-spacing:2.6px;}                        /* ...thinned... */
  #text .f3{opacity:0.28;letter-spacing:4.6px;}                        /* ...vanished */
  #text .motto{font-family:'Special Elite',monospace;color:#f0d9a8;font-size:1.05em;text-shadow:0 1px 14px rgba(255,180,90,0.35);}

  /* title & end screens */
  .screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;padding:40px;background:radial-gradient(ellipse at 50% 45%,#1a1220,#0a0810 85%);transition:opacity .5s ease;z-index:5;}
  .screen h1{font-family:'Special Elite',monospace;color:#f0d9a8;font-size:clamp(30px,8vw,52px);line-height:1.15;letter-spacing:1px;text-shadow:0 2px 20px rgba(255,180,90,0.25);margin-bottom:18px;}
  .screen .sub{color:#b89a78;font-size:clamp(14px,4vw,18px);font-style:italic;margin-bottom:40px;letter-spacing:.5px;}
  .screen .tap{color:#8a7358;font-size:13px;letter-spacing:2px;text-transform:uppercase;opacity:.8;animation:pulse 2.4s ease-in-out infinite;}
  .screen .lanterntitle{font-size:44px;margin-bottom:26px;filter:drop-shadow(0 0 22px rgba(255,180,90,.6));}
  @keyframes pulse{0%,100%{opacity:.4}50%{opacity:.9}}
  .screen.hidden{opacity:0;pointer-events:none;}

  /* nav zones (invisible tap areas) */
  .navzone{position:fixed;top:0;bottom:0;width:32%;z-index:8;}
  #prev{left:0;} #next{right:0;}

  /* on-screen arrows (subtle) */
  .arrow{position:fixed;top:50%;transform:translateY(-50%);z-index:9;color:rgba(240,217,168,.35);font-size:34px;font-family:'Special Elite',monospace;user-select:none;transition:color .2s;pointer-events:none;}
  #prevArrow{left:14px;} #nextArrow{right:14px;}

  /* progress dots */
  #progress{position:fixed;bottom:14px;left:50%;transform:translateX(-50%);display:flex;gap:6px;z-index:9;}
  .dot{width:6px;height:6px;border-radius:50%;background:rgba(232,220,200,.22);transition:background .3s,transform .3s;}
  .dot.on{background:#f0c070;transform:scale(1.35);}

  /* page counter */
  #counter{position:fixed;top:12px;right:54px;z-index:9;color:rgba(232,220,200,.4);font-size:12px;letter-spacing:1px;font-family:'Special Elite',monospace;}
  #homelink{position:fixed;top:12px;left:16px;z-index:10;color:rgba(232,220,200,.4);font-size:12px;letter-spacing:1px;font-family:'Special Elite',monospace;text-decoration:none;}
  #homelink:hover{color:#f0c070;}
  #fsBtn{position:fixed;top:10px;right:16px;z-index:11;width:30px;height:30px;display:flex;align-items:center;justify-content:center;background:rgba(20,14,24,.5);border:1px solid rgba(232,220,200,.18);border-radius:7px;color:rgba(232,220,200,.55);cursor:pointer;transition:color .2s,border-color .2s,background .2s;padding:0;}
  #fsBtn:hover{color:#f0c070;border-color:rgba(240,192,112,.5);background:rgba(30,20,10,.6);}
  #fsBtn svg{width:16px;height:16px;display:block;}
  /* when fullscreen, nudge the counter left so it doesn't collide with the button */
  :fullscreen #counter{right:54px;}
  :-webkit-full-screen #counter{right:54px;}
</style></head>
<body>
<div id="app">
  <div id="stage">
    <canvas id="c" width="720" height="480"></canvas>
    <div id="textwrap"><p id="text"></p></div>
  </div>

  <!-- Title screen -->
  <div class="screen" id="titleScreen">
    <div class="lanterntitle">&#128367;</div>
    <h1>The Prince<br>&amp; The Lantern</h1>
    <div class="sub">a tale for the brave and the curious</div>
    <div class="tap">tap to begin</div>
  </div>

  <!-- End screen -->
  <div class="screen hidden" id="endScreen">
    <h1>The End</h1>
    <div class="sub">well then &mdash; let's go and look</div>
    <div class="tap">tap to read again</div>
  </div>
</div>

<a id="homelink" href="#">&#8592; home</a>
<div id="counter"></div>
<button id="fsBtn" aria-label="Toggle fullscreen" title="Fullscreen">
  <svg id="fsIcon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <path d="M4 9V4h5M20 9V4h-5M4 15v5h5M20 15v5h-5"/>
  </svg>
</button>
<div class="navzone" id="prev"></div>
<div class="navzone" id="next"></div>
<div class="arrow" id="prevArrow">&#10094;</div>
<div class="arrow" id="nextArrow">&#10095;</div>
<div id="progress"></div>

<script>

const cv=document.getElementById('c'),ctx=cv.getContext('2d');const W=cv.width,H=cv.height;
const grain=(()=>{const g=document.createElement('canvas');g.width=W;g.height=H;const gx=g.getContext('2d');const id=gx.createImageData(W,H);for(let i=0;i<id.data.length;i+=4){const v=200+Math.random()*55;id.data[i]=id.data[i+1]=id.data[i+2]=v;id.data[i+3]=Math.random()*13;}gx.putImageData(id,0,0);return g;})();
const fog=[];for(let i=0;i<30;i++)fog.push({x:Math.random()*W,y:H*0.4+Math.random()*H*0.55,r:90+Math.random()*150,sp:0.08+Math.random()*0.2,ph:Math.random()*7});
function flickVal(t){return 0.5+Math.sin(t*0.008)*0.25+Math.sin(t*0.021)*0.15+(Math.random()-0.5)*0.1;}
function nightBase(top,mid,bot){const b=ctx.createLinearGradient(0,0,0,H);b.addColorStop(0,top);b.addColorStop(0.6,mid);b.addColorStop(1,bot);ctx.fillStyle=b;ctx.fillRect(0,0,W,H);}
function warmGlow(x,y,rad,a,t){const f=flickVal(t);let g=ctx.createRadialGradient(x,y,3,x,y,rad*(0.9+f*0.15));g.addColorStop(0,'rgba(255,200,125,'+(a*(0.85+f*0.2))+')');g.addColorStop(0.4,'rgba(240,150,70,'+(a*0.4)+')');g.addColorStop(1,'rgba(240,150,70,0)');ctx.fillStyle=g;ctx.fillRect(0,0,W,H);}
function lanternObj(LX,LY,f){let core=ctx.createRadialGradient(LX,LY,0,LX,LY,15);core.addColorStop(0,'#fff4d6');core.addColorStop(0.4,'#ffcf7a');core.addColorStop(1,'rgba(255,150,60,0)');ctx.fillStyle=core;ctx.beginPath();ctx.arc(LX,LY,15*(0.85+f*0.3),0,7);ctx.fill();ctx.strokeStyle='rgba(20,14,8,0.95)';ctx.lineWidth=1.6;ctx.strokeRect(LX-6,LY-8,12,16);ctx.beginPath();ctx.moveTo(LX,LY-8);ctx.lineTo(LX,LY-14);ctx.stroke();let fl=ctx.createRadialGradient(LX,LY,0,LX,LY,5);fl.addColorStop(0,'#fffefb');fl.addColorStop(1,'rgba(255,200,110,0)');ctx.fillStyle=fl;ctx.beginPath();ctx.arc(LX,LY,5,0,7);ctx.fill();}
function drawFog(t,spd){spd=spd===undefined?1:spd;fog.forEach(p=>{const x=(p.x+t*p.sp*spd)%(W+320)-160;const a=0.04+0.05*Math.sin(t*0.004*spd+p.ph);let fg=ctx.createRadialGradient(x,p.y,0,x,p.y,p.r);fg.addColorStop(0,'rgba(150,160,175,'+a+')');fg.addColorStop(1,'rgba(150,160,175,0)');ctx.fillStyle=fg;ctx.beginPath();ctx.arc(x,p.y,p.r,0,7);ctx.fill();});}
function vignette(strength){let vg=ctx.createRadialGradient(W/2,H/2,H*0.32,W/2,H/2,H*0.95);vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(0,0,0,'+strength+')');ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);}
function paper(){ctx.globalAlpha=0.5;ctx.drawImage(grain,0,0);ctx.globalAlpha=1;}

// ===== PAGE 1 — THE BOTTLE =====
// A fisherman's small boat on dark cold water at dusk. A corked bottle bobs on the
// waves, faintly catching an eerie glow — the only point of interest in a wide cold sea.
function page1(t,variant){variant=variant||0;
  const f=flickVal(t);
  // WARM DUSK — later in the day, the sun low and dimming (eases into page 2's dark)
  const sky=ctx.createLinearGradient(0,0,0,H);
  sky.addColorStop(0,'#241a2e');sky.addColorStop(0.35,'#4e2e30');sky.addColorStop(0.62,'#8a5236');sky.addColorStop(1,'#b0713e');
  ctx.fillStyle=sky;ctx.fillRect(0,0,W,H);
  // the setting sun very low on the horizon, dimmer and deeper now
  const sunX=W*0.5, sunY=H*0.56;
  let sunHalo=ctx.createRadialGradient(sunX,sunY,8,sunX,sunY,W*0.55);
  sunHalo.addColorStop(0,'rgba(255,205,135,0.4)');sunHalo.addColorStop(0.4,'rgba(240,160,90,0.16)');sunHalo.addColorStop(1,'rgba(220,140,80,0)');
  ctx.fillStyle=sunHalo;ctx.fillRect(0,0,W,H*0.72);
  let disc=ctx.createRadialGradient(sunX,sunY,2,sunX,sunY,32);
  disc.addColorStop(0,'rgba(255,232,180,0.75)');disc.addColorStop(0.7,'rgba(250,190,120,0.35)');disc.addColorStop(1,'rgba(250,190,120,0)');
  ctx.fillStyle=disc;ctx.beginPath();ctx.arc(sunX,sunY,32,0,7);ctx.fill();
  // sea — deeper dusk tones
  const seaY=H*0.58;
  const sea=ctx.createLinearGradient(0,seaY,0,H);sea.addColorStop(0,'#5e3826');sea.addColorStop(1,'#2a1810');
  ctx.fillStyle=sea;ctx.fillRect(0,seaY,W,H);
  // the sun's dimmer reflection on the water
  let refl=ctx.createLinearGradient(sunX,seaY,sunX,H);refl.addColorStop(0,'rgba(255,200,130,0.3)');refl.addColorStop(1,'rgba(250,180,110,0)');
  ctx.fillStyle=refl;ctx.beginPath();ctx.moveTo(sunX-12,seaY);ctx.lineTo(sunX+12,seaY);ctx.lineTo(sunX+46,H);ctx.lineTo(sunX-46,H);ctx.closePath();ctx.fill();
  // rolling wave lines, dusk-lit
  ctx.strokeStyle='rgba(255,190,130,0.11)';ctx.lineWidth=1;
  for(let i=0;i<7;i++){const y=seaY+8+i*((H-seaY)/7);ctx.beginPath();for(let x=0;x<=W;x+=12){const yy=y+Math.sin((x*0.03)+(t*0.004)+i)*2.2;x===0?ctx.moveTo(x,yy):ctx.lineTo(x,yy);}ctx.stroke();}

  // boat silhouette (right of center), simple skiff with a standing fisherman
  const bx=W*0.60,by=seaY+14+Math.sin(t*0.002)*2;
  ctx.save();ctx.translate(bx,by);
  // hull
  ctx.fillStyle='#2a1810';ctx.beginPath();ctx.moveTo(-58,0);ctx.quadraticCurveTo(0,26,58,0);ctx.quadraticCurveTo(30,10,-30,10);ctx.quadraticCurveTo(-48,8,-58,0);ctx.closePath();ctx.fill();
  // warm sunset rim on hull
  ctx.strokeStyle='rgba(255,190,110,0.4)';ctx.lineWidth=1.4;ctx.beginPath();ctx.moveTo(-58,0);ctx.quadraticCurveTo(0,26,58,0);ctx.stroke();
  // fisherman SEATED in the skiff, FLIPPED to face LEFT toward the bottle (rod points at it)
  ctx.save();ctx.scale(-1,1); // mirror horizontally — now everything left-facing
  ctx.fillStyle='#2a1810';
  // seated torso
  ctx.beginPath();ctx.moveTo(-7,2);ctx.quadraticCurveTo(-11,-20,-4,-30);ctx.quadraticCurveTo(2,-36,8,-30);ctx.quadraticCurveTo(13,-20,9,2);ctx.quadraticCurveTo(0,5,-7,2);ctx.closePath();ctx.fill();
  // head
  ctx.beginPath();ctx.arc(2,-36,6,0,7);ctx.fill();
  // warm sunset rim
  ctx.strokeStyle='rgba(255,190,110,0.45)';ctx.lineWidth=1.3;ctx.beginPath();ctx.moveTo(8,0);ctx.quadraticCurveTo(12,-20,6,-29);ctx.stroke();
  // rod — long and upright, rising toward the sky (points out over the bottle side)
  ctx.strokeStyle='#241008';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(4,-18);ctx.lineTo(44,-70);ctx.stroke();
  ctx.restore(); // end mirror
  // legs drawn OUTSIDE the mirror so they bend the natural way — toward the bow he faces (left)
  ctx.strokeStyle='#2a1810';ctx.lineCap='round';ctx.lineWidth=6;
  ctx.beginPath();ctx.moveTo(-2,2);ctx.quadraticCurveTo(-14,4,-20,2);ctx.stroke();     // thigh/shin forward to the bow
  ctx.beginPath();ctx.moveTo(2,2);ctx.quadraticCurveTo(-10,7,-18,5);ctx.stroke();      // second leg
  ctx.restore(); // end boat translate

  // THE BOTTLE — bobbing on the water left of the boat. a faint COLD wrong glow against
  // the warm sunset (the one wrong note in a warm world — the trouble that's coming)
  const btx=W*0.30, bty=seaY+22+Math.sin(t*0.003+1)*3;
  let bg=ctx.createRadialGradient(btx,bty,0,btx,bty,44);
  bg.addColorStop(0,'rgba(150,175,160,'+(0.16+f*0.06)+')');bg.addColorStop(1,'rgba(150,175,160,0)');
  ctx.fillStyle=bg;ctx.beginPath();ctx.arc(btx,bty,44,0,7);ctx.fill();
  // bottle body
  ctx.save();ctx.translate(btx,bty);ctx.rotate(-0.35+Math.sin(t*0.003)*0.05);
  ctx.fillStyle='#243026';
  ctx.beginPath();ctx.moveTo(-4,10);ctx.lineTo(4,10);ctx.lineTo(4,-6);ctx.lineTo(2,-12);ctx.lineTo(2,-18);ctx.lineTo(-2,-18);ctx.lineTo(-2,-12);ctx.lineTo(-4,-6);ctx.closePath();ctx.fill();
  // glass sheen
  ctx.strokeStyle='rgba(180,200,185,0.5)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(-3,8);ctx.lineTo(-3,-6);ctx.stroke();
  // cork
  ctx.fillStyle='#3a2c1a';ctx.fillRect(-2,-22,4,5);
  ctx.restore();

  // the fishing LINE from the rod tip down toward the bottle (he's about to hook it)
  const rodTipX = bx - 44, rodTipY = by - 70;   // mirrored rod tip in world space
  ctx.strokeStyle='rgba(255,225,165,0.3)';ctx.lineWidth=0.9;
  ctx.beginPath();ctx.moveTo(rodTipX, rodTipY);
  ctx.quadraticCurveTo(rodTipX-24, by-24, btx+4, bty-10);  // arcs down to just above the bottle
  ctx.stroke();

  // soft warm vignette (no fog yet — the world is still whole and warm)
  let vg=ctx.createRadialGradient(W/2,H*0.5,H*0.42,W/2,H*0.5,H*0.95);
  vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(30,14,0,0.34)');
  ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);
  paper();
}

// ===== PAGE 2 — THE FOG AND THE PHANTOM =====
// SYMBOLISM: the phantom is unnecessary, contagious doubt — a relic of the time before
// life flourished, an entity of decay that wills life into non-existence by conjuring
// obstacles that were never real. He is the SOURCE of the fog that will drown the land.
// He looms, ancient and mighty, over a tiny boat. Cuttlefish form: broad hooded mantle,
// cold hollow eyes, a curtain of tendrils — two reaching for the boat, the rest drifting.
// ---- shared castle-hall pieces: pages 3 & 7 are the SAME scene (the whisperer never left) ----
function castleHallBase(t,f){
  nightBase('#161520','#111019','#0a0910');
  const groundY=H*0.80;
  // chamber floor + soft arch behind (same as page 5's hall)
  ctx.fillStyle='#0e0c16';ctx.fillRect(0,groundY,W,H-groundY);
  ctx.strokeStyle='rgba(120,100,70,0.12)';ctx.lineWidth=10;
  ctx.beginPath();ctx.moveTo(W*0.22,groundY);ctx.lineTo(W*0.22,H*0.34);ctx.quadraticCurveTo(W*0.5,H*0.18,W*0.78,H*0.34);ctx.lineTo(W*0.78,groundY);ctx.stroke();
  // faint pillars either side of the hall
  ctx.fillStyle='#0c0a14';ctx.fillRect(W*0.08,H*0.26,14,groundY-H*0.26);ctx.fillRect(W*0.90,H*0.26,14,groundY-H*0.26);
  // cold fog engulfing the RIGHT side (the king's side)
  let coldSide=ctx.createLinearGradient(W*0.55,0,W,0);
  coldSide.addColorStop(0,'rgba(90,104,130,0)');coldSide.addColorStop(0.5,'rgba(80,94,120,0.16)');coldSide.addColorStop(1,'rgba(70,84,110,0.30)');
  ctx.fillStyle=coldSide;ctx.fillRect(W*0.5,0,W*0.5,H);
  for(let i=0;i<5;i++){const x=W*0.66+Math.sin(t*0.003+i)*20+i*20;const y=H*0.4+i*40;let fg=ctx.createRadialGradient(x,y,0,x,y,90);fg.addColorStop(0,'rgba(110,124,150,0.10)');fg.addColorStop(1,'rgba(110,124,150,0)');ctx.fillStyle=fg;ctx.beginPath();ctx.arc(x,y,90,0,7);ctx.fill();}
  return groundY;
}
function drawKingTaken(cx,cy,s,t,f){
  ctx.save();ctx.translate(cx,cy);ctx.scale(s,s);
  const robe=ctx.createLinearGradient(0,-46,0,50);robe.addColorStop(0,'#3a3450');robe.addColorStop(0.55,'#26243c');robe.addColorStop(1,'#161426');
  const cold='rgba(140,158,190,'+(0.3+f*0.12)+')';
  // blocky robe (king), slightly slumping as the fog takes him
  ctx.save();ctx.rotate(0.06);
  ctx.beginPath();ctx.moveTo(-20,50);ctx.lineTo(-19,-16);ctx.quadraticCurveTo(-22,-26,-24,-28);ctx.lineTo(-12,-32);ctx.lineTo(12,-32);ctx.lineTo(24,-28);ctx.quadraticCurveTo(22,-26,19,-16);ctx.lineTo(20,50);ctx.closePath();ctx.fillStyle=robe;ctx.fill();
  ctx.strokeStyle='rgba(40,26,50,0.6)';ctx.lineWidth=1.4;ctx.beginPath();ctx.moveTo(0,-28);ctx.lineTo(0,50);ctx.stroke();
  // cold rim (the fog's light, not warm)
  ctx.strokeStyle=cold;ctx.lineWidth=1.8;ctx.beginPath();ctx.moveTo(20,48);ctx.lineTo(19,-16);ctx.quadraticCurveTo(22,-26,24,-28);ctx.stroke();
  // slumped head
  ctx.fillStyle='#1e1c30';ctx.fillRect(-5,-42,10,10);
  ctx.beginPath();ctx.arc(1,-48,8,0,7);ctx.fill();
  ctx.strokeStyle=cold;ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(3,-48,8,-1.1,1.1);ctx.stroke();
  // heavy banded crown, dimmed
  ctx.fillStyle='rgba(150,150,170,0.35)';ctx.fillRect(-9,-62,18,5);
  ctx.strokeStyle='rgba(160,168,195,0.45)';ctx.lineWidth=2;ctx.strokeRect(-9,-62,18,5);
  ctx.fillStyle='rgba(150,158,185,0.4)';ctx.fillRect(-9,-66,4,4);ctx.fillRect(-2,-67,4,5);ctx.fillRect(5,-66,4,4);
  ctx.restore();
  ctx.restore();
}
function drawPhantomWhisper(cx,cy,s,t,f){
  // sits at the king's SHOULDER, leaning in — an intimate parasite, not a looming monster
  ctx.save();ctx.translate(cx,cy);ctx.scale(s,s);
  const sway=Math.sin(t*0.0025)*4;
  let cg=ctx.createRadialGradient(0,0,3,0,0,80);cg.addColorStop(0,'rgba(120,142,178,0.16)');cg.addColorStop(1,'rgba(120,142,178,0)');
  ctx.fillStyle=cg;ctx.fillRect(-100,-90,200,200);
  // tendrils curling level, straight to the ear (the whisper itself)
  ctx.strokeStyle='rgba(120,140,175,0.4)';ctx.lineWidth=3;
  ctx.beginPath();ctx.moveTo(-10,4);ctx.quadraticCurveTo(-50+sway,18,-94,12);ctx.stroke();

// ===== PAGE 11 — THE BARREL IN THE CUPBOARD =====
// SYMBOLISM: the quiet gut-punch. The oil the whole kingdom believed was impossibly far —
// across the sea, beyond the goblin forest, guarded by death — was HOME the entire time,
// in a dusty cupboard, the gift never opened because the phantom's lie made everyone stop
// looking in the obvious places. The dust is the point: it sat untouched for years while
// the kingdom went cold around it. The thing you need is often already in the room; the
// only barrier was a story that told you not to look. Untapped potential, just waiting.
function page11(t,variant){variant=variant||0;
  const f=flickVal(t);
  // interior: a dim, dusty palace room. cold and neglected, but not fogged — just forgotten.

  room.addColorStop(0,'#14121a');room.addColorStop(0.6,'#100e15');room.addColorStop(1,'#0a080e');

  ctx.fillStyle=ggl;ctx.beginPath();ctx.arc(glx,glTop+16,16,0,7);ctx.fill();
  // a few warm houses behind (kept low) — gabled, chimneyed, windows aglow
  for(let i=0;i<5;i++){
    const x=W*0.03+i*38;const rh=30+((i*29)%26);
    ctx.fillStyle='#5a3826';
    ctx.fillRect(x,groundY-rh,26,rh); // body
    ctx.beginPath();ctx.moveTo(x-3,groundY-rh);ctx.lineTo(x+13,groundY-rh-14);ctx.lineTo(x+29,groundY-rh);ctx.closePath();ctx.fill();
    ctx.strokeStyle='rgba(255,190,110,0.3)';ctx.lineWidth=1.1;
    ctx.beginPath();ctx.moveTo(x+13,groundY-rh-14);ctx.lineTo(x+29,groundY-rh);ctx.stroke();
    if(i%2===0){ctx.fillStyle='#5a3826';ctx.fillRect(x+18,groundY-rh-11,4.5,8);}
    ctx.fillStyle='rgba(255,210,120,'+(0.75+f*0.15)+')';
    ctx.fillRect(x+5,groundY-rh+6,6,8);ctx.fillRect(x+15,groundY-rh+6,6,8);
  }
  // a festival ARCHWAY standing on the ground (right post lands in the gap between houses)
  const b1=W*0.008, b2=W*0.0685, bTop=groundY-118;
  ctx.fillStyle='#4a3022';
  ctx.fillRect(b1,bTop,9,groundY-bTop);           // left post, planted on the ground
  ctx.fillRect(b2,bTop,9,groundY-bTop);           // right post, planted on the ground
  // the swag hanging between the posts
  ctx.strokeStyle='#4a3022';ctx.lineWidth=7;
  ctx.beginPath();ctx.moveTo(b1+4,bTop+4);ctx.quadraticCurveTo((b1+b2)/2+4,bTop+26,b2+4,bTop+4);ctx.stroke();
  // the lintel across the top (ends well short of the lantern)
  ctx.fillRect(b1-6,bTop-6,(b2-b1)+17,7);
  // ---- festival strings, all radiating FROM the great lantern (the hub of the square) ----
  function festString(x1,y1,cx2,cy2,x2,y2,nb){
    ctx.strokeStyle='rgba(40,24,16,0.4)';ctx.lineWidth=1.2;
    ctx.beginPath();ctx.moveTo(x1,y1);ctx.quadraticCurveTo(cx2,cy2,x2,y2);ctx.stroke();
    for(let i=1;i<nb;i++){const u=i/nb;
      const bx=(1-u)*(1-u)*x1+2*(1-u)*u*cx2+u*u*x2;
      const by=(1-u)*(1-u)*y1+2*(1-u)*u*cy2+u*u*y2;
      const fl=0.7+Math.sin(t*0.03+i+x2*0.1)*0.25;const hue=i%3;
      const col=hue===0?'255,190,110':hue===1?'255,150,90':'255,215,140';
      ctx.fillStyle='rgba('+col+','+(0.8*fl)+')';ctx.beginPath();ctx.arc(bx,by+3,2,0,7);ctx.fill();}
  }
  // lantern -> archway lintel
  festString(glx-14, glTop+26, (glx-14+b2+9)/2, groundY-80, b2+9, bTop-2, 4);
  // lantern -> peak of the third house
  festString(glx+14, glTop+28, W*0.183, groundY-64, W*0.03+3*38+13, groundY-53, 4);
  // lantern -> chimney of the far house
  festString(glx+14, glTop+30, W*0.215, groundY-54, W*0.03+4*38+20, groundY-53, 6);
  ctx.restore();

  // ground
  const gnd=ctx.createLinearGradient(0,groundY,0,H);gnd.addColorStop(0,'#7a4a2c');gnd.addColorStop(1,'#4a2c1a');
  ctx.fillStyle=gnd;ctx.fillRect(0,groundY,W,H);
  // a soft path leading from the town toward the horizon, directly under the procession
  ctx.fillStyle='rgba(255,210,140,0.12)';
  ctx.beginPath();
  ctx.moveTo(W*0.33, H);           // wide at the near foreground (under the front walker)
  ctx.lineTo(W*0.52, H);
  ctx.lineTo(hzX+14, hzY+6);        // narrowing to the horizon glow
  ctx.lineTo(hzX-6, hzY+6);
  ctx.closePath();ctx.fill();
  // a soft centre sheen down the road
  ctx.fillStyle='rgba(255,220,150,0.06)';
  ctx.beginPath();
  ctx.moveTo(W*0.40, H);ctx.lineTo(W*0.46, H);ctx.lineTo(hzX+4, hzY+6);ctx.lineTo(hzX-2, hzY+6);
  ctx.closePath();ctx.fill();

  // ================= THE PEOPLE setting out, each carrying a lantern =================
  // walking away toward the horizon (seen from behind / three-quarter), easy confident strides.
  // a small procession receding toward the bright horizon — scale shrinks with distance.
  // helper: a townsperson walking away, lantern in hand, warm-rimmed.
  function walker(wx,wy,scale,lanternSide){
    ctx.save();ctx.translate(wx,wy);ctx.scale(scale,scale);
    const body=ctx.createLinearGradient(0,-34,0,22);body.addColorStop(0,'#6a4a2c');body.addColorStop(1,'#33200f');
    // legs mid-stride (walking away)
    ctx.strokeStyle='#3a2614';ctx.lineCap='round';ctx.lineWidth=5;
    ctx.beginPath();ctx.moveTo(-3,16);ctx.lineTo(-6,34);ctx.stroke();
    ctx.beginPath();ctx.moveTo(3,16);ctx.lineTo(7,33);ctx.stroke();
    // cloak/body (seen from behind — a simple rounded back)
    ctx.fillStyle=body;
    ctx.beginPath();ctx.moveTo(-9,18);ctx.quadraticCurveTo(-12,-10,-6,-22);ctx.quadraticCurveTo(0,-27,6,-22);ctx.quadraticCurveTo(12,-10,9,18);ctx.quadraticCurveTo(0,22,-9,18);ctx.closePath();ctx.fill();
    // head (back of it)
    ctx.beginPath();ctx.arc(0,-27,5,0,7);ctx.fillStyle='#3a2818';ctx.fill();
    // warm rim on the horizon-facing side (they walk into the light)
    ctx.strokeStyle='rgba(255,200,120,'+(0.55+f*0.2)+')';ctx.lineWidth=1.4;
    ctx.beginPath();ctx.moveTo(9,16);ctx.quadraticCurveTo(12,-10,6,-21);ctx.stroke();
    ctx.beginPath();ctx.arc(1.5,-27,5,-1,1.1);ctx.stroke();
    // arm out with a lantern, held ahead/to the side, lighting the way
    const ls=lanternSide;
    ctx.strokeStyle=body;ctx.lineWidth=3.4;ctx.lineCap='round';
    ctx.beginPath();ctx.moveTo(ls*6,-14);ctx.quadraticCurveTo(ls*13,-8,ls*15,0);ctx.stroke();
    // the lantern glow + body
    const lgx=ls*16, lgy=2;
    let lg=ctx.createRadialGradient(lgx,lgy,0,lgx,lgy,16);lg.addColorStop(0,'rgba(255,215,140,'+(0.6+f*0.2)+')');lg.addColorStop(1,'rgba(255,190,100,0)');
    ctx.fillStyle=lg;ctx.beginPath();ctx.arc(lgx,lgy,16,0,7);ctx.fill();
    ctx.strokeStyle='rgba(30,20,10,0.8)';ctx.lineWidth=1;ctx.strokeRect(lgx-3,lgy-4,6,8);
    ctx.fillStyle='rgba(255,245,205,0.95)';ctx.beginPath();ctx.arc(lgx,lgy,2.2,0,7);ctx.fill();
    ctx.restore();
  }

  // the procession, receding toward the horizon (front/large -> back/small), ON the road centre-line
  walker(W*0.541, groundY+30, 1.25, 1);     // nearest, foreground
  walker(W*0.558, groundY+16, 1.0, -1);
  walker(W*0.573, groundY+4, 0.8, 1);
  walker(W*0.585, groundY-6, 0.62, -1);
  walker(W*0.595, groundY-14, 0.48, 1);    // furthest, nearly at the horizon glow

  // ---- the CHILD, carrying a little lantern too (the torch passed forward) ----
  // small, beside the nearest walker (the prince), being led out to look.
  (function child(cx,cy,sc){
    ctx.save();ctx.translate(cx,cy);ctx.scale(sc,sc);
    const body=ctx.createLinearGradient(0,-20,0,16);body.addColorStop(0,'#6a4a2c');body.addColorStop(1,'#33200f');
    ctx.strokeStyle='#3a2614';ctx.lineCap='round';ctx.lineWidth=4;
    ctx.beginPath();ctx.moveTo(-2,10);ctx.lineTo(-4,22);ctx.stroke();
    ctx.beginPath();ctx.moveTo(2,10);ctx.lineTo(5,21);ctx.stroke();
    ctx.fillStyle=body;
    ctx.beginPath();ctx.moveTo(-6,12);ctx.quadraticCurveTo(-8,-6,-4,-14);ctx.quadraticCurveTo(0,-18,4,-14);ctx.quadraticCurveTo(8,-6,6,12);ctx.quadraticCurveTo(0,15,-6,12);ctx.closePath();ctx.fill();
    ctx.beginPath();ctx.arc(0,-18,3.6,0,7);ctx.fillStyle='#3a2818';ctx.fill();
    ctx.strokeStyle='rgba(255,200,120,0.55)';ctx.lineWidth=1.2;ctx.beginPath();ctx.arc(1,-18,3.6,-1,1.1);ctx.stroke();
    // little arm holding a tiny lantern out front (its own light — the inheritance)
    ctx.strokeStyle=body;ctx.lineWidth=2.4;ctx.beginPath();ctx.moveTo(5,-8);ctx.quadraticCurveTo(11,-4,12,2);ctx.stroke();
    let lg=ctx.createRadialGradient(13,3,0,13,3,11);lg.addColorStop(0,'rgba(255,220,150,'+(0.65+f*0.2)+')');lg.addColorStop(1,'rgba(255,190,100,0)');
    ctx.fillStyle=lg;ctx.beginPath();ctx.arc(13,3,11,0,7);ctx.fill();
    ctx.strokeStyle='rgba(30,20,10,0.8)';ctx.lineWidth=0.9;ctx.strokeRect(11,0,4,6);
    ctx.fillStyle='rgba(255,245,205,0.95)';ctx.beginPath();ctx.arc(13,3,1.6,0,7);ctx.fill();
    ctx.restore();
  })(W*0.505, groundY+36, 1.0);

  // the nearest walker is the PRINCE — give him a faint circlet so he reads as grown, leading
  ctx.save();ctx.translate(W*0.541, groundY+30);ctx.scale(1.25,1.25);
  ctx.strokeStyle='rgba(255,215,130,'+(0.55+f*0.25)+')';ctx.lineWidth=1.8;
  ctx.beginPath();ctx.moveTo(-4,-30);ctx.quadraticCurveTo(0,-33,4,-30);ctx.stroke();
  ctx.restore();

  // gentle warm vignette (bright, settled, at peace)
  let vg=ctx.createRadialGradient(W*0.6,H*0.5,H*0.45,W*0.6,H*0.5,H*0.98);
  vg.addColorStop(0,'rgba(0,0,0,0)');vg.addColorStop(1,'rgba(30,14,0,0.30)');
  ctx.fillStyle=vg;ctx.fillRect(0,0,W,H);
  paper();
}

// ---- reader state & navigation ----
// ---- SPREADS: one short beat per page (scene fn + variant + text) ----
// variant lets a scene vary slightly across the 2-3 pages that share it.
const SPREADS=[
  // P1 — the bottle (unchanged, one sentence)
  {s:page1, v:0, t:"Once upon a time, while fishing in the deepest waters, a fisherman pulled a strange corked bottle from the ocean."},

  // P2 — fog & phantom, split into a transition pair
  {s:page2, v:0, t:"When he opened it, out poured a <span class='fog'>cold grey fog</span>, and with it slithered a <span class='name'>phantom</span> with a <span class='ph'>voice like silk</span>."},
  {s:page2, v:1, t:"The <span class='name'>Phantom</span> <span class='ph'>whispered</span> his way into the castle, right to the king's ear."},

  // P3 — kingdom goes blind, split in two
  {s:page3, v:0, t:"The <span class='name'>Phantom</span> began to change the kingdom. Neighbours became <span class='fog'>shadows</span>."},
  {s:page3, v:1, t:"Soon the markets fell <span class='fog'>silent</span>, the festivals were cancelled, and the children forgot the faces of their friends."},

  // P4 — cold lantern + goblin lore, split into three
  {s:page4, v:0, t:"In the town square stood the great lantern. The king told the townspeople that the kingdom had run out of oil, so it was <span class='fog'>cold and dark</span>."},
  {s:page4, v:1, t:"Whenever anyone dreamed of relighting it, the <span class='name'>phantom</span> hissed: <span class='ph'>the oil lies beyond the forest of goblins, across the broken bridge, in the enemy kingdom, no one who seeks it ever returns.</span>"},
  {s:page4, v:2, t:"The townspeople were afraid of the goblins — <span class='fog'>teeth like broken glass</span>, they said. Even the bravest knights refused the road."},

  // P5 — the flame (one sentence)
  {s:page5, v:0, t:"But the young prince carried a small lantern his mother had lit before the <span class='fog'>fog</span> came, and its <span class='warm'>little flame</span> showed him one step ahead."},

  // P6 — into the forest, split in two
  {s:page6, v:0, t:"The <span class='name'>phantom</span> loomed over him and whispered: <span class='ph'>before you seek the oil, you must forge a legendary sword over 7 years, or the goblins will tear you apart.</span>"},
  {s:page6, v:1, t:"But the prince looked at his lantern and said, <span class='pr'>I will go and see for myself</span>, and he walked into the dark forest without the sword."},

  // P7 — the forest path, the huge shape, the soup, the goblins' fire (four beats)
  {s:page7, v:0, t:"The trees creaked. <span class='eyes'>Yellow eyes</span> blinked in the gloom."},
  {s:page7, v:1, t:"A <span class='crash'>huge shape</span> stepped onto the path..."},
  {s:page7, v:2, t:"...and held out a <span class='warm'>bowl of soup</span>."},
  {s:page7, v:3, t:"The goblins were strange, but they <span class='warm'>shared their fire</span> with the prince. The prince saw that the goblin houses were falling apart, as they believed they could only chop down the enchanted trees using a <span class='fog'>magical saw</span> from over the mountains."},

  // P8 — the axe, split in two
  {s:page8, v:0, t:"The goblins were afraid to travel over the mountains because of the <span class='fog'>fierce giants</span>, however the prince picked up a rusty axe from the woodpile and said, <span class='pr'>I will see for myself.</span>"},
  {s:page8, v:1, t:"One swing, two, and a mighty tree came <span class='crash'>crashing down</span>. The goblins <span class='gb'>cheered</span>. Then they warned him: <span class='gb'>the great bridge ahead has surely crumbled — stay and cut a dozen wagonloads of timber and we will help you repair the bridge.</span>"},

  // P9 — the bridge, split in two
  {s:page9, v:0, t:"The prince travelled to see for himself. The <span class='fog'>grey fog</span> obscured the bridge and the prince walked across, guided by his <span class='warm'>lantern</span>, one step at a time, waiting to find the broken section."},
  {s:page9, v:1, t:"He realised that the bridge stood proud and unbroken, as it had been all along. He simply walked across."},

  // P10 — far-off land, split in two
  {s:page10, v:0, t:"In the far-off land the king frowned and said, <span class='kg'>oil? Dear Prince, we sent your kingdom a whole barrel recently, as a gift.</span>"},
  {s:page10, v:1, t:"The Prince was angry, and his lantern <span class='blaze'>flared</span>, for now he understood the <span class='name'>phantom's</span> trick."},

  // P11 — barrel (one sentence)
  {s:page11, v:0, t:"He raced home to see the oil for himself, he threw open a dusty cupboard and there sat the barrel."},

  // P12 — relight, split in two
  {s:page12, v:0, t:"He refilled the great lantern and touched his flame to the wick. The light <span class='blaze'>roared</span> through the fog like a <span class='blaze'>sunrise</span>."},
  {s:page12, v:1, t:"The <span class='name'>phantom</span> <span class='ph f1'>shrieked</span> and <span class='ph f2'>thinned</span> and <span class='ph f3'>vanished</span>, for no <span class='name'>phantom</span> can survive being <span class='warm'>truly seen</span>."},

  // P13 — faces (one sentence)
  {s:page13, v:0, t:"And the people saw each other's faces for the first time in years, and some wept, and some laughed, and the <span class='warm'>festivals began that very night</span>."},

  // P14 — let's go and look (one sentence)
  {s:page14, v:0, t:"And ever after, when anyone cried that a thing was <span class='fog'>impossible</span> the people would just smile and say — <span class='motto'>well then, let's go and look for ourselves.</span>"},
];
const NUM=SPREADS.length;

let idx=-1; // -1 = title screen, 0..13 = pages, NUM = end screen
const titleScreen=document.getElementById('titleScreen');
const endScreen=document.getElementById('endScreen');
const textEl=document.getElementById('text');
const counter=document.getElementById('counter');
const progress=document.getElementById('progress');

// build progress dots
for(let i=0;i<NUM;i++){const d=document.createElement('div');d.className='dot';progress.appendChild(d);}
const dots=[...progress.children];

function render(){
  titleScreen.classList.toggle('hidden', idx!==-1);
  endScreen.classList.toggle('hidden', idx!==NUM);
  const onPage = idx>=0 && idx<NUM;
  counter.style.opacity = onPage?1:0;
  progress.style.opacity = onPage?1:0;
  document.getElementById('prevArrow').style.opacity = onPage||idx===NUM?1:0;
  document.getElementById('nextArrow').style.opacity = idx<NUM?1:0;
  if(onPage){
    // fade text out then in
    textEl.style.opacity=0;
    const capturedIdx=idx;
    setTimeout(()=>{const sp=SPREADS[capturedIdx];if(sp && idx===capturedIdx){textEl.innerHTML=sp.t;textEl.style.opacity=1;}},180);
    counter.textContent=(idx+1)+' / '+NUM;
    dots.forEach((d,i)=>d.classList.toggle('on',i===idx));
  } else {
    textEl.innerHTML='';
  }
}
function go(n){
  idx=Math.max(-1,Math.min(NUM,n));
  render();
}
function next(){ go(idx+1); }
function prev(){ if(idx===NUM){go(NUM-1);} else {go(idx-1);} }

document.getElementById('next').addEventListener('click',next);
document.getElementById('prev').addEventListener('click',prev);
// title/end screens: tap anywhere advances
titleScreen.addEventListener('click',()=>go(0));
endScreen.addEventListener('click',()=>go(0));
// keyboard
window.addEventListener('keydown',e=>{if(e.key==='ArrowRight'||e.key===' ')next();if(e.key==='ArrowLeft')prev();});
// swipe
let tx=0;
window.addEventListener('touchstart',e=>{tx=e.changedTouches[0].clientX;},{passive:true});
window.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-tx;if(Math.abs(dx)>45){dx<0?next():prev();}},{passive:true});

// home link -> parent site (adjust as needed)
document.getElementById('homelink').addEventListener('click',e=>{
  e.preventDefault();
  window.location.href='https://aaronunify2.github.io/RecreateMeaning/home.html';
});

// ---- fullscreen toggle ----
const fsBtn=document.getElementById('fsBtn');
const fsIcon=document.getElementById('fsIcon');
const ENTER_ICON='<path d="M4 9V4h5M20 9V4h-5M4 15v5h5M20 15v5h-5"/>';
const EXIT_ICON='<path d="M9 4H4v5M15 4h5v5M9 20H4v-5M15 20h5v-5"/>';
function isFs(){return document.fullscreenElement||document.webkitFullscreenElement;}
function toggleFs(){
  const el=document.documentElement;
  if(!isFs()){
    (el.requestFullscreen||el.webkitRequestFullscreen||el.webkitRequestFullScreen).call(el);
  } else {
    (document.exitFullscreen||document.webkitExitFullscreen).call(document);
  }
}
function syncFsIcon(){ fsIcon.innerHTML = isFs()?EXIT_ICON:ENTER_ICON; }
fsBtn.addEventListener('click',e=>{e.stopPropagation();toggleFs();});
document.addEventListener('fullscreenchange',syncFsIcon);
document.addEventListener('webkitfullscreenchange',syncFsIcon);

// ---- animation loop: draw whichever page we're on ----
function loop(t){
  const onPage = idx>=0 && idx<NUM;
  if(onPage){
    SPREADS[idx].s(t, SPREADS[idx].v);
  } else {
    // idle: clear to a soft dark so the screens sit on black
    ctx.fillStyle='#08060a';ctx.fillRect(0,0,W,H);
  }
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);
render();
</script>
