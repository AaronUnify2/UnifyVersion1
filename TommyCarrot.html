<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Tommy and the Enormous Carrot — A Storybook Game</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  html,body { width:100%; height:100%; overflow:hidden; touch-action:none; background:#b8e0f2;
    font-family:"Comic Sans MS","Chalkboard SE","Marker Felt","Trebuchet MS",sans-serif; }
  #c { position:fixed; inset:0; display:block; }

  /* ---- narration card ---- */
  #narration {
    position:fixed; top:max(12px, env(safe-area-inset-top)); left:50%; transform:translateX(-50%);
    width:min(92vw,560px); background:#FFF8E4; border:3px solid #7a5230; border-radius:18px;
    padding:12px 16px; font-family:Georgia,'Times New Roman',serif; font-style:italic;
    font-size:clamp(16px,4.4vw,21px); color:#46310f; line-height:1.35; text-align:center;
    box-shadow:0 4px 0 #00000022; opacity:0; transition:opacity .4s; pointer-events:none; z-index:5;
  }
  #narration .who { font-style:normal; font-size:1.25em; margin-right:6px; }

  /* ---- team badge ---- */
  #badge {
    position:fixed; left:10px; bottom:max(14px, env(safe-area-inset-bottom)); z-index:5;
    background:#ffffffd9; border:3px solid #7a5230; border-radius:14px; padding:6px 12px;
    font-weight:bold; color:#5d3f15; font-size:clamp(14px,4vw,18px); display:none; letter-spacing:1px;
  }

  /* ---- fullscreen toggle ---- */
  #fsBtn {
    position:fixed; right:10px; bottom:max(14px, env(safe-area-inset-bottom)); z-index:7;
    width:48px; height:48px; border:3px solid #7a5230; border-radius:14px;
    background:#ffffffd9; color:#5d3f15; font-size:22px; line-height:1; cursor:pointer;
    font-family:inherit; box-shadow:0 3px 0 #00000022;
  }
  #fsBtn:active { transform:translateY(2px); box-shadow:none; }

  /* ---- big action button ---- */
  #btn {
    position:fixed; bottom:max(18px, env(safe-area-inset-bottom)); left:50%; transform:translateX(-50%);
    min-width:min(70vw,330px); padding:16px 26px; border:none; border-radius:999px;
    background:linear-gradient(#ffa14f,#ec7016) ; color:#fff;
    font-family:inherit; font-size:clamp(18px,5.2vw,24px); font-weight:bold; letter-spacing:.3px;
    box-shadow:0 6px 0 #a8470a, 0 10px 18px #0003; cursor:pointer; z-index:11;
    transition:transform .08s, box-shadow .08s, opacity .3s; text-shadow:0 2px 0 #0002;
  }
  #btn:active { transform:translateX(-50%) translateY(4px); box-shadow:0 2px 0 #a8470a, 0 5px 10px #0003; }
  #btn.hidden { opacity:0; pointer-events:none; }
  #btn.blue { background:linear-gradient(#6fc3ef,#2f7fc4); box-shadow:0 6px 0 #1f5a8e, 0 10px 18px #0003; }
  #btn.blue:active { box-shadow:0 2px 0 #1f5a8e, 0 5px 10px #0003; }
  #btn.green { background:linear-gradient(#8fd06a,#4a9a3e); box-shadow:0 6px 0 #2f6b28, 0 10px 18px #0003; }
  #btn.green:active { box-shadow:0 2px 0 #2f6b28, 0 5px 10px #0003; }
  #btn.red { background:linear-gradient(#ff8a5c,#e8512f); box-shadow:0 6px 0 #a93316, 0 10px 18px #0003;
    animation:wiggle 1.6s ease-in-out infinite; }
  #btn.red:active { box-shadow:0 2px 0 #a93316, 0 5px 10px #0003; animation:none; }
  @keyframes wiggle {
    0%,100% { transform:translateX(-50%) rotate(0deg); }
    8% { transform:translateX(-50%) rotate(-2deg) scale(1.03); }
    16% { transform:translateX(-50%) rotate(2deg) scale(1.03); }
    24% { transform:translateX(-50%) rotate(0deg); }
  }
  @media (prefers-reduced-motion: reduce) { #btn.red { animation:none; } }

  /* ---- tap-the-world hint ---- */
  #tapHint { position:fixed; left:0; top:0; width:120px; height:120px; margin:-60px 0 0 -60px;
    pointer-events:none; z-index:6; display:none; }
  #tapHint .ring { position:absolute; inset:10px; border:5px solid #ffd54f; border-radius:50%;
    box-shadow:0 0 14px #ffd54fcc, inset 0 0 10px #ffd54f88; animation:pulseRing 1.1s ease-out infinite; }
  #tapHint .finger { position:absolute; left:50%; top:74%; font-size:40px;
    animation:bobFinger 0.9s ease-in-out infinite; text-shadow:0 2px 6px #0004; }
  @keyframes pulseRing { 0%{transform:scale(.7);opacity:1} 100%{transform:scale(1.3);opacity:0} }
  @keyframes bobFinger { 0%,100%{transform:translate(-50%,0)} 50%{transform:translate(-50%,-12px)} }

  /* ---- pull slider ---- */
  #pull { position:fixed; bottom:max(18px, env(safe-area-inset-bottom)); left:50%; transform:translateX(-50%);
    width:min(86vw,440px); z-index:11; transition:opacity .3s; }
  #pull.hidden { opacity:0; pointer-events:none; }
  #pullLabel { text-align:center; color:#fff; font-weight:bold; font-size:clamp(17px,4.8vw,22px);
    text-shadow:0 2px 0 #0007, 0 0 12px #0005; margin-bottom:8px; }
  #pullTrack { position:relative; height:66px; background:#00000038; border:3px solid #ffffffd0;
    border-radius:999px; touch-action:none; overflow:visible; }
  #pullChevrons { position:absolute; inset:0; display:flex; align-items:center; justify-content:center;
    gap:20px; color:#ffffffb0; font-size:30px; font-weight:bold; pointer-events:none; }
  #pullFill { position:absolute; left:0; top:0; bottom:0; width:0; border-radius:999px;
    background:linear-gradient(90deg,#ffb24f99,#ec7016aa); pointer-events:none; }
  #pullHandle { position:absolute; top:50%; left:3px; width:76px; height:76px; margin-top:-38px;
    background:radial-gradient(circle at 35% 30%, #c98c4e, #8a5a33 70%); border:4px solid #5d3a1c;
    border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:36px;
    box-shadow:0 4px 10px #0006; pointer-events:none; }

  /* ---- title & end screens ---- */
  .screen {
    position:fixed; inset:0; z-index:10; display:flex; flex-direction:column; align-items:center;
    justify-content:center; text-align:center; padding:5vw; transition:opacity .7s;
    background:linear-gradient(#cdeaf7 0%, #f6e7b6 50%, #b9d77f 100%);
  }
  .screen.gone { opacity:0; pointer-events:none; }
  .screen .cast { font-size:clamp(26px,7.5vw,46px); letter-spacing:3px; }
  .screen h1 {
    font-family:Georgia,serif; color:#b35a10; font-size:clamp(30px,8.6vw,52px);
    line-height:1.12; margin:14px 0 6px; text-shadow:0 3px 0 #ffffff88;
  }
  .screen p { color:#6b5230; font-size:clamp(15px,4.4vw,19px); margin-bottom:26px; font-family:Georgia,serif; font-style:italic; }
  .screen button {
    padding:16px 34px; border:none; border-radius:999px; font-family:inherit; font-weight:bold;
    font-size:clamp(19px,5.4vw,24px); color:#fff; cursor:pointer;
    background:linear-gradient(#ffa14f,#ec7016); box-shadow:0 6px 0 #a8470a, 0 10px 18px #0003;
  }
  .screen button:active { transform:translateY(4px); box-shadow:0 2px 0 #a8470a; }
  #endScreen { background:linear-gradient(#ffd9a3 0%, #f6e7b6 45%, #a8cf72 100%); }
</style>
</head>
<body>
<canvas id="c"></canvas>

<div id="narration"><span class="who"></span><span class="txt"></span></div>
<div id="badge"></div>
<button id="fsBtn" title="Fullscreen">⛶</button>
<button id="btn" class="hidden"></button>

<div id="pull" class="hidden">
  <div id="pullLabel">Slide to PULL! ➜</div>
  <div id="pullTrack">
    <div id="pullFill"></div>
    <div id="pullChevrons">›&nbsp;›&nbsp;›</div>
    <div id="pullHandle">✊</div>
  </div>
</div>
<div id="tapHint"><div class="ring"></div><div class="finger">👆</div></div>

<div id="titleScreen" class="screen">
  <div class="cast">👩‍🌾👨‍🌾🚜🐶🐱🐈‍⬛🐔🦆👦</div>
  <h1>Tommy and the<br>Enormous Carrot</h1>
  <p>A storybook from our very own farm</p>
  <button id="beginBtn">📖 Begin the story</button>
</div>

<div id="endScreen" class="screen gone">
  <div class="cast">🥕 🍲 👦</div>
  <h1>The End</h1>
  <p>…and Tommy pulled the hardest of all,<br>the strongest little boy on the whole farm!</p>
  <button id="againBtn">↺ Read it again</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
/* =========================================================
   TOMMY AND THE ENORMOUS CARROT — a farm storybook
   Cast: Mum, Dad & the grey-and-gold Fergie, Teddy the
   cavoodle, Ringo & Rose the cats, the hens & the runner
   duck — and Tommy, who saves the day.
   ========================================================= */

/* ---------- tiny sound kit ---------- */
let AC = null;
function audio() {
  if (!AC) { try { AC = new (window.AudioContext || window.webkitAudioContext)(); } catch(e){} }
  if (AC && AC.state === 'suspended') AC.resume();
  return AC;
}
function tone(freq, dur, type, vol, slideTo) {
  const ac = audio(); if (!ac) return;
  const o = ac.createOscillator(), g = ac.createGain();
  o.type = type || 'sine'; o.frequency.setValueAtTime(freq, ac.currentTime);
  if (slideTo) o.frequency.exponentialRampToValueAtTime(slideTo, ac.currentTime + dur);
  g.gain.setValueAtTime(vol || 0.18, ac.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + dur);
  o.connect(g).connect(ac.destination); o.start(); o.stop(ac.currentTime + dur + 0.05);
}
function noise(dur, vol, freq) {
  const ac = audio(); if (!ac) return;
  const len = Math.floor(ac.sampleRate * dur);
  const buf = ac.createBuffer(1, len, ac.sampleRate);
  const d = buf.getChannelData(0);
  for (let i = 0; i < len; i++) d[i] = (Math.random() * 2 - 1) * (1 - i / len);
  const src = ac.createBufferSource(); src.buffer = buf;
  const f = ac.createBiquadFilter(); f.type = 'bandpass'; f.frequency.value = freq || 700; f.Q.value = 0.6;
  const g = ac.createGain(); g.gain.value = vol || 0.25;
  src.connect(f).connect(g).connect(ac.destination); src.start();
}
const sndThud   = () => tone(150, 0.18, 'sine', 0.3, 60);
const sndClick  = () => tone(1200, 0.07, 'square', 0.1);
const sndDing   = () => { tone(660,0.3,'triangle',0.12); setTimeout(()=>tone(880,0.4,'triangle',0.12),140); };
const sndBoing  = (n) => tone(180 + n*60, 0.3, 'sine', 0.22, 460 + n*120);
const sndWater  = () => noise(0.7, 0.2, 1800);
const sndStrain = () => { tone(85, 0.45, 'sawtooth', 0.13, 65); noise(0.35, 0.12, 220); };
const sndPopBig = () => { noise(0.35, 0.4, 600); tone(220, 0.5, 'square', 0.22, 950); };
const sndWhee   = () => tone(280, 0.8, 'sawtooth', 0.12, 1100);
const sndBark   = () => { tone(260, 0.09, 'square', 0.2, 170); setTimeout(()=>tone(260,0.09,'square',0.2,170),160); };
const sndMeow   = (f) => tone(f || 720, 0.5, 'sawtooth', 0.1, (f || 720) * 0.5);
const sndQuack  = () => { tone(330, 0.16, 'sawtooth', 0.18, 200); setTimeout(()=>tone(310,0.16,'sawtooth',0.16,190),220); };
const sndPutt   = () => tone(58 + Math.random()*10, 0.09, 'square', 0.13);
const sndRev    = () => { tone(55, 0.9, 'sawtooth', 0.2, 140); noise(0.8, 0.18, 160); };
const sndGiggle = () => { tone(700,0.1,'sine',0.14,900); setTimeout(()=>tone(800,0.1,'sine',0.14,1000),130); setTimeout(()=>tone(900,0.12,'sine',0.14,1150),260); };
function cluckChorus(n) {
  for (let k = 0; k < (n || 6); k++) {
    setTimeout(() => tone(520 + Math.random()*300, 0.07, 'square', 0.11, 300), k * 130 + Math.random()*60);
  }
}

/* ---------- three.js scene ---------- */
const canvas = document.getElementById('c');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
const scene = new THREE.Scene();
scene.background = new THREE.Color(0xb8e0f2);
scene.fog = new THREE.Fog(0xb8e0f2, 35, 100);

const camera = new THREE.PerspectiveCamera(50, 1, 0.1, 300);
function sizeIt() {
  const w = window.innerWidth, h = window.innerHeight;
  renderer.setSize(w, h); camera.aspect = w / h; camera.updateProjectionMatrix();
}
window.addEventListener('resize', sizeIt); sizeIt();

const hemi = new THREE.HemisphereLight(0xfff7df, 0x8aa362, 0.95); scene.add(hemi);
const sunL = new THREE.DirectionalLight(0xfff2cf, 0.85); sunL.position.set(5, 12, 8); scene.add(sunL);

function lam(color) { return new THREE.MeshLambertMaterial({ color }); }

/* paddock */
const ground = new THREE.Mesh(new THREE.PlaneGeometry(180, 100), lam(0xa9c96a));
ground.rotation.x = -Math.PI / 2; scene.add(ground);

/* veggie garden rows behind */
for (let i = 0; i < 4; i++) {
  const row = new THREE.Mesh(new THREE.BoxGeometry(16, 0.25, 0.9), lam(0x7a5230));
  row.position.set(2, 0.12, -7 - i * 1.6); scene.add(row);
  for (let j = 0; j < 7; j++) {
    const sprout = new THREE.Mesh(new THREE.ConeGeometry(0.16, 0.4, 6), lam(0x4f9e4a));
    sprout.position.set(-4.5 + j * 2.2, 0.4, -7 - i * 1.6); scene.add(sprout);
  }
}
/* farmhouse + shed */
const barn = new THREE.Group();
const barnBody = new THREE.Mesh(new THREE.BoxGeometry(5.5, 3.2, 4), lam(0xe8e2d2)); barnBody.position.y = 1.6; barn.add(barnBody);
const barnRoof = new THREE.Mesh(new THREE.ConeGeometry(4.4, 1.9, 4), lam(0x8a3d33));
barnRoof.rotation.y = Math.PI / 4; barnRoof.position.y = 4.1; barn.add(barnRoof);
const barnDoor = new THREE.Mesh(new THREE.BoxGeometry(1.2, 1.9, 0.12), lam(0x6f4a26)); barnDoor.position.set(-1.2, 0.95, 2.02); barn.add(barnDoor);
const barnWin = new THREE.Mesh(new THREE.BoxGeometry(1.0, 0.9, 0.1), lam(0xbfe6ff)); barnWin.position.set(1.2, 1.7, 2.02); barn.add(barnWin);
barn.position.set(-10, 0, -13); scene.add(barn);
const shed = new THREE.Group();
const shedBody = new THREE.Mesh(new THREE.BoxGeometry(4.5, 2.4, 3.4), lam(0x9aa0a6)); shedBody.position.y = 1.2; shed.add(shedBody);
const shedRoof = new THREE.Mesh(new THREE.BoxGeometry(4.9, 0.18, 3.8), lam(0x6e747c)); shedRoof.position.y = 2.5; shedRoof.rotation.z = 0.08; shed.add(shedRoof);
shed.position.set(12, 0, -14); scene.add(shed);
/* fence */
for (let i = 0; i < 13; i++) {
  const post = new THREE.Mesh(new THREE.CylinderGeometry(0.09, 0.1, 1.1, 6), lam(0x9a6a3a));
  post.position.set(-14 + i * 3.2, 0.55, -18); scene.add(post);
}
const railTop = new THREE.Mesh(new THREE.BoxGeometry(42, 0.12, 0.12), lam(0x9a6a3a));
railTop.position.set(4, 0.95, -18); scene.add(railTop);
const railBot = railTop.clone(); railBot.position.y = 0.55; scene.add(railBot);
/* gum trees on the horizon */
function gum(x, z, s) {
  const g = new THREE.Group();
  const trunk = new THREE.Mesh(new THREE.CylinderGeometry(0.16, 0.22, 2.4, 8), lam(0xcfc4ae));
  trunk.position.y = 1.2; g.add(trunk);
  [[0,3.0,0],[-0.7,2.5,0.2],[0.7,2.6,-0.2]].forEach(p => {
    const leaf = new THREE.Mesh(new THREE.SphereGeometry(0.85, 12, 10), lam(0x6e8f5e));
    leaf.position.set(p[0], p[1], p[2]); g.add(leaf);
  });
  g.position.set(x, 0, z); g.scale.setScalar(s || 1); scene.add(g);
}
[[-18,-10,1.2],[-15,-15,1.0],[18,-9,1.3],[22,-13,1.1],[7,-16,0.9],[-5,-16,1.1]].forEach(t => gum(t[0], t[1], t[2]));
/* clouds + sun */
const clouds = [];
const cloudMat = lam(0xffffff);
for (let i = 0; i < 7; i++) {
  const c = new THREE.Group();
  for (let j = 0; j < 3; j++) {
    const p = new THREE.Mesh(new THREE.SphereGeometry(1.1 + Math.random(), 12, 10), cloudMat);
    p.position.set(j * 1.4 - 1.4, Math.random()*0.4, 0); c.add(p);
  }
  c.position.set(-28 + i * 11, 11 + Math.random()*4, -22 - Math.random()*8);
  scene.add(c); clouds.push(c);
}
const SUN_HOME = new THREE.Vector3(17, 13, -28);
const SUN_NEAR = new THREE.Vector3(1.0, 5.6, -13);   // close & low enough to tap below the story card
const sunBall = new THREE.Mesh(new THREE.SphereGeometry(2.2, 16, 14),
  new THREE.MeshBasicMaterial({ color: 0xffe27a })); sunBall.position.copy(SUN_HOME); scene.add(sunBall);
const flowerCols = [0xff8fb1, 0xffd54f, 0xffffff, 0xb39ddb];
for (let i = 0; i < 22; i++) {
  const f = new THREE.Mesh(new THREE.SphereGeometry(0.12, 8, 6), lam(flowerCols[i % 4]));
  f.position.set(-14 + Math.random()*32, 0.12, 2.5 + Math.random()*8);
  scene.add(f);
}

function blobShadow(r) {
  const m = new THREE.Mesh(new THREE.CircleGeometry(r, 20),
    new THREE.MeshBasicMaterial({ color: 0x4a5e23, transparent: true, opacity: 0.26 }));
  m.rotation.x = -Math.PI / 2; m.position.y = 0.02; return m;
}

/* ---------- the carrot patch ---------- */
const CARROT_X = -4.8;
const patch = new THREE.Mesh(new THREE.CircleGeometry(2.0, 22), lam(0x7a5230));
patch.rotation.x = -Math.PI / 2; patch.position.set(CARROT_X, 0.03, 0); scene.add(patch);
const mound = new THREE.Mesh(new THREE.SphereGeometry(0.9, 16, 12), lam(0x8a5e36));
mound.scale.set(1, 0.3, 1); mound.position.set(CARROT_X, 0, 0); mound.visible = false; scene.add(mound);
const hole = new THREE.Mesh(new THREE.CircleGeometry(0.95, 20), lam(0x3a2812));
hole.rotation.x = -Math.PI / 2; hole.position.set(CARROT_X, 0.04, 0); hole.visible = false; scene.add(hole);

/* the carrot: a long orange root + feathery green tops */
const plant = new THREE.Group(); plant.position.set(CARROT_X, 0, 0); scene.add(plant);
const root = new THREE.Group(); plant.add(root);
const carrotBody = new THREE.Mesh(new THREE.ConeGeometry(0.95, 3.6, 16), lam(0xf07f1f));
carrotBody.rotation.x = Math.PI; carrotBody.position.y = -1.3; root.add(carrotBody);
const carrotShoulder = new THREE.Mesh(new THREE.SphereGeometry(0.95, 16, 12), lam(0xf07f1f));
carrotShoulder.scale.y = 0.55; carrotShoulder.position.y = 0.5; root.add(carrotShoulder);
/* little ring lines on the carrot */
for (let i = 0; i < 3; i++) {
  const ring = new THREE.Mesh(new THREE.CylinderGeometry(0.82 - i*0.2, 0.82 - i*0.2, 0.05, 14), lam(0xd96a10));
  ring.position.y = -0.3 - i * 0.8; root.add(ring);
}
const leaves = new THREE.Group(); plant.add(leaves);
for (let i = 0; i < 7; i++) {
  const a = (i / 7) * Math.PI * 2;
  const frond = new THREE.Group();
  const stem = new THREE.Mesh(new THREE.CylinderGeometry(0.04, 0.06, 1.0, 6), lam(0x4f9e4a));
  stem.position.y = 0.5; frond.add(stem);
  for (let k = 0; k < 3; k++) {
    const tuft = new THREE.Mesh(new THREE.SphereGeometry(0.2 - k*0.04, 8, 6), lam(0x57b04f));
    tuft.scale.set(0.7, 1.4, 0.55);
    tuft.position.y = 0.85 + k * 0.32; frond.add(tuft);
  }
  frond.position.set(Math.cos(a) * 0.3, 0, Math.sin(a) * 0.3);
  frond.rotation.z = -Math.cos(a) * 0.5; frond.rotation.x = Math.sin(a) * 0.5;
  leaves.add(frond);
}
const GROW = [
  { rootY: -3.4, leafS: 0.001, leafY: 0.0 },
  { rootY: -3.4, leafS: 0.45,  leafY: 0.0 },
  { rootY: -1.7, leafS: 1.0,   leafY: 0.15 },
  { rootY: -1.1, leafS: 1.6,   leafY: 0.55 },
  { rootY: -0.55, leafS: 2.3,  leafY: 1.0 },
];
function setGrowth(stage, animated) {
  const G = GROW[stage];
  if (!animated) {
    root.position.y = G.rootY; leaves.scale.setScalar(G.leafS); leaves.position.y = G.leafY;
    return;
  }
  const r0 = root.position.y, s0 = leaves.scale.x, y0 = leaves.position.y;
  tween(0.6, p => {
    const e = 1 + 0.45 * Math.sin(Math.min(p * 1.4, 1) * Math.PI);
    const q = easeOut(p);
    root.position.y = r0 + (G.rootY - r0) * q;
    leaves.scale.setScalar((s0 + (G.leafS - s0) * q) * (p < 1 ? e * 0.6 + 0.4 : 1));
    leaves.position.y = y0 + (G.leafY - y0) * q;
  });
}
setGrowth(0, false);

/* ---------- the rope ---------- */
const rope = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 1, 8), lam(0xc9b27c));
rope.rotation.z = Math.PI / 2; rope.visible = false; scene.add(rope);
let ropeEndX = 0;
function updateRope(endX) {
  ropeEndX = endX;
  const startX = CARROT_X + 0.7;
  const len = Math.max(endX - startX, 0.5);
  rope.scale.y = len;
  rope.position.set(startX + len / 2, 0.78, 0);
  ropeHomeX = rope.position.x;
  rope.visible = true;
}

/* ---------- people ---------- */
function makeHead(g, skin, y, eyeColor, eyeSize) {
  const head = new THREE.Mesh(new THREE.SphereGeometry(0.34, 18, 14), lam(skin));
  head.position.y = y; g.add(head);

function makeTractor() {
  const g = new THREE.Group();
  const grey = lam(0x9aa0a6), gold = lam(0xc8a23a), darkT = lam(0x2c2c32);
  /* gold engine block below, grey bonnet above — the classic FE35 look */
  const engine = new THREE.Mesh(new THREE.BoxGeometry(1.7, 0.6, 0.8), gold);
  engine.position.set(0.5, 0.75, 0); g.add(engine);

  bonnet.position.set(0.5, 1.3, 0); g.add(bonnet);
  const noseT = new THREE.Mesh(new THREE.BoxGeometry(0.25, 0.85, 0.72), grey);
  noseT.position.set(1.45, 1.05, 0); g.add(noseT);
  const seatBack = new THREE.Mesh(new THREE.BoxGeometry(0.5, 0.55, 0.55), grey);
  seatBack.position.set(-0.95, 1.25, 0); g.add(seatBack);
  const wheelArchL = new THREE.Mesh(new THREE.BoxGeometry(0.9, 0.14, 0.3), grey);
  wheelArchL.position.set(-0.7, 1.78, 0.62); g.add(wheelArchL);
  const wheelArchR = wheelArchL.clone(); wheelArchR.position.z = -0.62; g.add(wheelArchR);
  /* steering wheel */
  const col = new THREE.Mesh(new THREE.CylinderGeometry(0.03, 0.03, 0.5, 6), darkT);
  col.rotation.z = 0.6; col.position.set(-0.35, 1.65, 0); g.add(col);
  const wheelS = new THREE.Mesh(new THREE.TorusGeometry(0.16, 0.03, 8, 14), darkT);
  wheelS.rotation.y = Math.PI / 2; wheelS.rotation.z = 0.6; wheelS.position.set(-0.5, 1.82, 0); g.add(wheelS);
  /* exhaust */
  const pipe = new THREE.Mesh(new THREE.CylinderGeometry(0.05, 0.05, 0.8, 8), darkT);
  pipe.position.set(0.7, 1.95, 0.18); g.add(pipe);
  g.userData.exhaust = new THREE.Vector3(0.7, 2.4, 0.18);
  /* wheels in holders so they can spin */
  g.userData.wheels = [];
  function wheel(r, w, x, z) {
    const holder = new THREE.Group();
    const tyre = new THREE.Mesh(new THREE.CylinderGeometry(r, r, w, 18), darkT);
    tyre.rotation.x = Math.PI / 2; holder.add(tyre);
    const hub = new THREE.Mesh(new THREE.CylinderGeometry(r * 0.5, r * 0.5, w + 0.02, 12), gold);
    hub.rotation.x = Math.PI / 2; holder.add(hub);
    holder.position.set(x, r, z);
    g.add(holder); g.userData.wheels.push(holder);
  }
  wheel(0.85, 0.3, -0.7, 0.75); wheel(0.85, 0.3, -0.7, -0.75);
  wheel(0.42, 0.2, 1.2, 0.55);  wheel(0.42, 0.2, 1.2, -0.55);
  /* seated driver (Dad), shown while driving */
  const driver = new THREE.Group();
  const dTorso = new THREE.Mesh(new THREE.SphereGeometry(0.34, 14, 12), lam(0xc4453a));
  dTorso.scale.set(1, 1.2, 0.8); dTorso.position.y = 0.3; driver.add(dTorso);
  const dHead = new THREE.Mesh(new THREE.SphereGeometry(0.26, 14, 12), lam(0xf2c9a0));
  dHead.position.y = 0.95; driver.add(dHead);
  const dHair = new THREE.Mesh(new THREE.SphereGeometry(0.27, 12, 10), lam(0x5d3f26));
  dHair.scale.set(1, 0.6, 1); dHair.position.set(0, 1.08, -0.03); driver.add(dHair);
  driver.position.set(-0.85, 1.55, 0);
  g.add(driver); g.userData.driver = driver;
  return g;
}

/* ---------- UI helpers ---------- */
const narrEl = document.getElementById('narration');
const narrWho = narrEl.querySelector('.who');
const narrTxt = narrEl.querySelector('.txt');
const btn = document.getElementById('btn');
const badge = document.getElementById('badge');

function showNarr(who, text) {
  narrWho.textContent = who || '📖';
  narrTxt.textContent = ' ' + text;
  narrEl.style.opacity = 1;
}
function hideNarr() { narrEl.style.opacity = 0; }

let btnAction = null, lastBtnTap = 0;
function setBtn(label, action, color) {
  btn.textContent = label;
  btn.className = color ? color : '';
  btnAction = action;
}
function hideBtn() { btn.classList.add('hidden'); btnAction = null; }
btn.addEventListener('click', () => {
  audio();
  const now = performance.now();
  if (now - lastBtnTap < 500) return;   // no machine-gun tapping!
  lastBtnTap = now;
  if (btnAction) { const a = btnAction; btnAction = null; a(); }
});

function say(lines, cb, btnLabel) {
  let i = 0;
  function step() {
    const L = lines[i];
    showNarr(L.who, L.text);
    if (L.snd) L.snd();
    i++;
    if (i < lines.length) setBtn(btnLabel || 'Next ▸', step, 'blue');
    else setBtn(btnLabel || 'Next ▸', () => { cb && cb(); }, 'blue');
  }
  step();
}

/* ---------- tap-the-world targets ---------- */
const tapHint = document.getElementById('tapHint');
let tapTarget = null;   // { getPos: () => Vector3, action }
function setTapTarget(getPos, action) { hideBtn(); tapTarget = { getPos, action }; tapHint.style.display = 'block'; }
function clearTapTarget() { tapTarget = null; tapHint.style.display = 'none'; }
function projectToScreen(pos) {
  const v = pos.clone().project(camera);
  return { x: (v.x * 0.5 + 0.5) * window.innerWidth, y: (-v.y * 0.5 + 0.5) * window.innerHeight, behind: v.z > 1 };
}
canvas.addEventListener('pointerdown', e => {
  audio();
  if (!tapTarget) return;
  const s = projectToScreen(tapTarget.getPos());
  const r = Math.max(85, window.innerWidth * 0.13);  // generous toddler-sized hit zone
  if (Math.hypot(e.clientX - s.x, e.clientY - s.y) < r) {
    const a = tapTarget.action; clearTapTarget(); a();
  }
});

/* ---------- the rope-pull slider ---------- */
const pullEl = document.getElementById('pull');
const pullLabel = document.getElementById('pullLabel');
const pullTrack = document.getElementById('pullTrack');
const pullFill = document.getElementById('pullFill');
const pullHandle = document.getElementById('pullHandle');
let pullActive = false, pullProgress = 0, dragging = false, pullZone = 0;
let ropeHomeX = 0, tommyTugs = 0;

function layoutHandle() {
  const w = pullTrack.clientWidth - 82;
  pullHandle.style.left = (3 + pullProgress * w) + 'px';
  pullFill.style.width = Math.round(pullProgress * 100) + '%';
}
function showPull(label) {
  hideBtn();
  pullLabel.textContent = label || 'Slide to PULL! ➜';
  pullProgress = 0; pullZone = 0; pullActive = true;
  pullEl.classList.remove('hidden');
  layoutHandle();
}
function hidePull() { pullActive = false; dragging = false; pullEl.classList.add('hidden'); }

function trackProgress(e) {
  const rect = pullTrack.getBoundingClientRect();
  return (e.clientX - rect.left - 41) / (rect.width - 82);
}
pullTrack.addEventListener('pointerdown', e => {
  audio();
  if (!pullActive) return;
  /* must grab near the handle — no cheeky taps at the finish line! */
  const rect = pullTrack.getBoundingClientRect();
  const handleX = rect.left + 41 + pullProgress * (rect.width - 82);
  if (Math.abs(e.clientX - handleX) > 90) return;
  dragging = true;
  pullTrack.setPointerCapture(e.pointerId);
});
pullTrack.addEventListener('pointermove', e => {
  if (!dragging || !pullActive) return;
  pullProgress = Math.min(Math.max(trackProgress(e), 0), 1);
  layoutHandle();
  const zone = Math.floor(pullProgress * 4);
  if (zone > pullZone) { pullZone = zone; sndStrain(); if (tractorPulling) sndRev(); }
  if (pullProgress >= 0.97) finishDrag();
});
['pointerup', 'pointercancel'].forEach(ev => pullTrack.addEventListener(ev, () => {
  if (!dragging) return;
  dragging = false;
  if (pullActive && pullProgress > 0.04 && pullProgress < 0.97) slipBack();
}));
function slipBack() {
  tone(420, 0.35, 'sine', 0.14, 130);   // whoops — it slipped!
  const from = pullProgress;
  tween(0.35, p => { pullProgress = from * (1 - easeOut(p)); layoutHandle(); },
    () => { pullProgress = 0; pullZone = 0; layoutHandle(); });
}
function finishDrag() {
  dragging = false; pullActive = false;
  pullProgress = 0; pullZone = 0; wheelSpin = 0; layoutHandle();
  hidePull();
  completePull();
}

function completePull() {
  const success = round === 6;

  tween(0.3, p => {
    const yank = 1 + Math.sin(p * Math.PI) * 0.5;
    pullers.forEach(P => { P.obj.position.x = P.baseX + P.amp * yank; P.obj.rotation.z = -0.3 * yank; });
    plant.rotation.z = 0.016 * round * yank;
    leaves.rotation.y = Math.sin(p * 30) * 0.08;
    if (tractorPulling && Math.random() < 0.4) {
      smokePuff(tractor.userData.exhaust.clone().applyMatrix4(tractor.matrixWorld), true);
    }
  }, () => {
    if (success) {
      tommyTugs++;
      if (tommyTugs === 1) {
        relaxTeam(0.5); shakeT = 0.25; sndBoing(2);
        showNarr('📖', 'It moved! It MOVED! Quick — slide and pull again!');

function relaxTeam(dur) {
  plant.rotation.z = 0; leaves.rotation.y = 0; tractor.rotation.z = 0; wheelSpin = 0;
  pullers.forEach(P => {
    const x0 = P.obj.position.x, r0 = P.obj.rotation.z;

      P.obj.position.x = x0 + (P.baseX - x0) * easeOut(p);
      P.obj.rotation.z = r0 * (1 - easeOut(p));

  });
}

  });
  say([
    { who: '📖', text: '“And do you know who did it?” laughed Dad. “Our TOMMY pulled the hardest of all!”', snd: sndGiggle },
    { who: '📖', text: 'That night, Mum cooked a great big pot of yummy carrot soup.' },
    { who: '📖', text: 'And there was plenty for everyone — Mum and Dad, Teddy, Ringo and Rose, all the chooks and the little duck…' },
    { who: '👦', text: '…and most of all, for TOMMY — the strongest little boy on the whole farm!', snd: sndDing },
  ], showTheEnd, '▸');
}
function showTheEnd() {
  hideBtn(); hideNarr();
  theEnd = true; dropConfetti(); sndDing();
  setTimeout(() => {
    document.getElementById('endScreen').classList.remove('gone');
  }, 2400);
}

/* ---------- fullscreen toggle ---------- */
const fsBtn = document.getElementById('fsBtn');
const fsRoot = document.documentElement;
const fsSupported = !!(fsRoot.requestFullscreen || fsRoot.webkitRequestFullscreen);
if (!fsSupported) fsBtn.style.display = 'none'; // e.g. iPhone Safari
function inFullscreen() { return !!(document.fullscreenElement || document.webkitFullscreenElement); }
fsBtn.addEventListener('click', () => {
  audio(); sndClick();
  if (inFullscreen()) {
    (document.exitFullscreen || document.webkitExitFullscreen).call(document);
  } else {
    (fsRoot.requestFullscreen || fsRoot.webkitRequestFullscreen).call(fsRoot);
  }
});
['fullscreenchange', 'webkitfullscreenchange'].forEach(ev =>
  document.addEventListener(ev, () => {
    fsBtn.title = inFullscreen() ? 'Exit fullscreen' : 'Fullscreen';
    sizeIt();
  })
);

/* ---------- title / restart ---------- */
document.getElementById('beginBtn').addEventListener('click', () => {
  audio(); sndDing();
  document.getElementById('titleScreen').classList.add('gone');
  startStory();
});
document.getElementById('againBtn').addEventListener('click', () => {
  audio(); sndClick();
  document.getElementById('endScreen').classList.add('gone');
  [mum, dad, teddy, ringo, rose, tommy, ...birds].forEach(c => { c.userData.party = false; });
  startStory();
});

/* ---------- main loop ---------- */
const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  bobT += dt;

  /* tweens */
  for (let i = tweens.length - 1; i >= 0; i--) {
    const tw = tweens[i];
    tw.t += dt;
    const p = Math.min(tw.t / tw.dur, 1);
    tw.fn(p);
    if (p >= 1) { tweens.splice(i, 1); if (tw.done) tw.done(); }
  }
  /* walkers */
  for (let i = walkers.length - 1; i >= 0; i--) {
    const w = walkers[i];
    const dx = w.target.x - w.obj.position.x;
    const dz = w.target.z - w.obj.position.z;
    const dist = Math.hypot(dx, dz);
    const step = w.speed * dt;
    w.t += dt;
    if (dist <= step) {
      w.obj.position.set(w.target.x, 0, w.target.z);
      walkers.splice(i, 1); if (w.done) w.done();
    } else {
      w.obj.position.x += dx / dist * step;
      w.obj.position.z += dz / dist * step;
      if (w.hop) w.obj.position.y = Math.abs(Math.sin(w.t * 10)) * w.hopH;
    }
  }
  /* live rope tension — the whole team leans as the handle slides */
  if (pullProgress > 0) {
    const tug = pullProgress;
    pullers.forEach(P => {
      P.obj.position.x = P.baseX + tug * P.amp;
      P.obj.rotation.z = -tug * 0.3;
    });
    rope.position.x = ropeHomeX + tug * 0.12;
    plant.rotation.z = tug * 0.016 * round;
    leaves.rotation.y = Math.sin(bobT * 22) * 0.06 * tug;
    if (tractorPulling) {
      tractor.rotation.z = -tug * 0.05;
      wheelSpin = tug * 13;
      if (tug > 0.35 && Math.random() < 0.18) {
        smokePuff(tractor.userData.exhaust.clone().applyMatrix4(tractor.matrixWorld), true);
      }
    }
    if (tug > 0.55 && Math.random() < 0.1) {
      soilBurst(new THREE.Vector3(CARROT_X + 0.7, 0.2, 0.4), false);
    }
  }
  /* keep the tap hint pinned to its target on screen */
  if (tapTarget) {
    const s = projectToScreen(tapTarget.getPos());
    if (!s.behind) { tapHint.style.left = s.x + 'px'; tapHint.style.top = s.y + 'px'; }
  }

  /* tractor engine & wheels */
  if (engineOn) {
    engineT += dt;
    if (engineT > 0.16) {
      engineT = 0; sndPutt();
      if (Math.random() < 0.5) smokePuff(tractor.userData.exhaust.clone().applyMatrix4(tractor.matrixWorld), false);
    }
  }
  if (wheelSpin) tractor.userData.wheels.forEach(w => { w.rotation.z -= wheelSpin * dt; });

  /* camera */
  const target = new THREE.Vector3(
    camHome.x + Math.sin(bobT * 0.25) * 0.3, camHome.y, camHome.z);
  camera.position.lerp(target, 0.05);
  let look = new THREE.Vector3(camHome.lookX, camHome.lookY, 0);
  if (shakeT > 0) { shakeT -= dt; look.x += (Math.random()-0.5) * 0.3; look.y += (Math.random()-0.5) * 0.3; }
  camera.lookAt(look);

  /* idles & party hops */
  [mum, dad, teddy, ringo, rose, tommy, ...birds].forEach((c, i) => {
    if (!c.visible) return;
    const walking = walkers.find(w => w.obj === c);
    if (walking) return;
    if (c.userData.party) {
      c.position.y = Math.abs(Math.sin(bobT * 5 + c.userData.pi * 1.1)) * (c === tommy ? 0.3 : 0.2);
    }
  });
  if (teddy.visible && teddy.userData.tail) teddy.userData.tail.position.x = Math.sin(bobT * 9) * 0.06;
  leaves.rotation.z = Math.sin(bobT * 1.2) * 0.03;

  /* particles */
  for (let i = puffs.length - 1; i >= 0; i--) {
    const p = puffs[i];
    if (p.userData.g) p.userData.v.y -= 9.8 * dt;
    p.position.addScaledVector(p.userData.v, dt);
    p.userData.life -= dt;
    p.material.opacity = Math.max(p.userData.life, 0);
    if (p.userData.life <= 0 || p.position.y < 0) { scene.remove(p); puffs.splice(i, 1); }
  }
  /* confetti */
  for (let i = confetti.length - 1; i >= 0; i--) {
    const c = confetti[i];
    c.position.y -= c.userData.v * dt;
    c.rotation.x += c.userData.r * dt; c.rotation.y += c.userData.r * 0.7 * dt;
    if (c.position.y < 0.05) c.position.y = 7 + Math.random()*4;
  }
  clouds.forEach((c, i) => { c.position.x += dt * (0.14 + i * 0.03); if (c.position.x > 60) c.position.x = -40; });

  renderer.render(scene, camera);
}
animate();
</script>
