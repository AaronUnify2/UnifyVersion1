    --text:        #1c2b22;

    --white:       #ffffff;

    --shadow-lg:   0 8px 32px rgba(46,125,79,0.13);

  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.65;
  }

  /* \u2500\u2500 Header \u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500\u2500 */
  .site-header {
    background: var(--green-dark);
    padding: 0 32px;
    display: flex;
    align-items: center;
    gap: 18px;
    height: 64px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.18);
  }
  .site-header .logo-mark {
    width: 38px; height: 38px;
    background: var(--gold);
    border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    font-family: 'DM Serif Display', serif;
    color: white;
    font-size: 18px;
    font-weight: 400;
    flex-shrink: 0;
    letter-spacing: -0.5px;
  }
  .site-header .site-name {
    color: white;
    font-size: 14px;
    font-weight: 500;
    line-height: 1.3;
    letter-spacing: 0.01em;
  }
  .site-header .site-name span {
    display: block;
    font-size: 11px;
    font-weight: 300;
    opacity: 0.7;
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .hero {
    background: linear-gradient(135deg, var(--green-dark) 0%, var(--green) 100%);
    padding: 48px 32px 40px;
    position: relative;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    right: -60px; top: -60px;
    width: 320px; height: 320px;
    border-radius: 50%;
    background: rgba(255,255,255,0.04);
    pointer-events: none;
  }
  .hero::after {
    content: '';
    position: absolute;
    right: 60px; bottom: -80px;
    width: 200px; height: 200px;
    border-radius: 50%;
    background: rgba(200,153,42,0.10);
    pointer-events: none;
  }
  .hero-inner { max-width: 860px; position: relative; }
  .hero-eyebrow {
    display: inline-flex; align-items: center; gap: 7px;
    background: rgba(255,255,255,0.12);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 20px;
    padding: 4px 14px;
    font-size: 11px;
    font-weight: 600;
    color: rgba(255,255,255,0.85);
    text-transform: uppercase;
    letter-spacing: 0.1em;
    margin-bottom: 16px;
  }
  .hero h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 38px;
    color: white;
    line-height: 1.15;
    margin-bottom: 12px;
    font-weight: 400;
  }
